        transform: scale(1.05);
        filter: drop-shadow(0 0 3px rgba(255,255,255,0.5));
      }

      /* Lesson Hover Tooltip */
      #lesson-tooltip {
          position: fixed;
          background: rgba(15, 23, 42, 0.95);
          backdrop-filter: blur(8px);
          color: white;
          padding: 0.75rem 1rem;
          border-radius: 0.75rem;
          font-size: 0.95rem;
          font-weight: 600;
          pointer-events: none;
          z-index: 10000;
          opacity: 0;
          transition: opacity 0.15s ease;
          display: none;
          max-width: 250px;
      }

      #lesson-tooltip[data-visible="true"] {
          opacity: 1;
          display: block;
      }
    </style>

    <script>
      // Tooltip functions
      let tooltipEl = null;
      function getOrCreateTooltip() {
        if (!tooltipEl) {
          tooltipEl = document.createElement('div');
          tooltipEl.id = 'lesson-tooltip';
          document.body.appendChild(tooltipEl);
        }
        return tooltipEl;
      }

      function showLessonPopup(event, lessonTitle) {
          const tooltip = getOrCreateTooltip();
          tooltip.textContent = lessonTitle;
          tooltip.setAttribute('data-visible', 'true');
      }

      function moveLessonPopup(event) {
          const tooltip = getOrCreateTooltip();
          tooltip.style.left = (event.pageX + 12) + 'px';
          tooltip.style.top = (event.pageY + 12) + 'px';
      }

      function hideLessonPopup() {
          const tooltip = getOrCreateTooltip();
          tooltip.setAttribute('data-visible', 'false');
      }

      // Lesson tracking functions
      function markLessonStarted(unit, lesson) {
        localStorage.setItem(`apbio_u${unit}_l${lesson}_started`, 'true');
        applyProgressColors();
      }

      function applyProgressColors() {
          for (let u = 1; u <= 8; u++) {
              for (let l = 1; l <= 8; l++) {
                  const segment = document.getElementById(`u${u}-l${l}`);
                  if (segment) {
                      const isCompleted = localStorage.getItem(`apbio_u${u}_l${l}_completed`) === 'true';
                      const isStarted = localStorage.getItem(`apbio_u${u}_l${l}_started`) === 'true';
                      
                      if (isCompleted) {
                          segment.setAttribute('fill', '#16a34a');
                          segment.setAttribute('fill-opacity', '0.7');
                      } else if (isStarted) {
                          segment.setAttribute('fill', '#f97316');
                          segment.setAttribute('fill-opacity', '0.6');
                      }
                  }
              }
          }
      }

      document.addEventListener('DOMContentLoaded', applyProgressColors);
    </script>
    <script src="scripts/dev_tools.js"></script>
    <script>
      // Show dev-only buttons if dev user
      if (window._isDevUser && window._isDevUser()) {
        var dcb = document.getElementById('dev-clear-btn');
        if (dcb) dcb.style.display = '';
      }
    </script>
</body>
</html>
