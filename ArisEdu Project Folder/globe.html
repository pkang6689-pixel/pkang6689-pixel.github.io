<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArisEdu World Map</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #d6c98a; overflow: hidden; }
    canvas { display: block; cursor: crosshair; }
    #tip {
      position: fixed;
      background: rgba(40,28,12,0.93);
      color: #f5e8b0;
      border: 3px solid #a07828;
      padding: 10px 16px;
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 13px;
      pointer-events: none;
      display: none;
      z-index: 10;
      box-shadow: 4px 4px 0 rgba(0,0,0,.4);
      max-width: 220px;
      border-radius: 8px;
    }
    #tip-name { font-size: 15px; font-weight: bold; color: #fff5cc; margin-bottom: 6px; }
    #tip-courses { font-size: 11px; color: #d4b870; line-height: 1.85; }
    #progress-btns {
      position: fixed; bottom: 18px; right: 18px;
      display: flex; gap: 8px; z-index: 20;
    }
    #progress-btns button {
      padding: 7px 13px; border: none; border-radius: 6px;
      font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px;
      cursor: pointer; font-weight: 600; box-shadow: 2px 2px 6px rgba(0,0,0,.4);
    }
    #btn-import { background: #2d6a2d; color: #d4f5d4; }
    #btn-import:hover { background: #3a8a3a; }
    #btn-clear  { background: #5a2222; color: #f5d4d4; }
    #btn-clear:hover  { background: #7a3030; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="tip">
  <div id="tip-name"></div>
  <div id="tip-courses"></div>
</div>
<div id="progress-btns">
  <button id="btn-import" title="Import progress from your completed lessons">&#x21A9; Import Progress</button>
  <button id="btn-clear"  title="Dev tool: wipe all territory progress">&#x1F5D1; Clear Progress</button>
</div>
<script>
/* GLOBE v3 — single script, no duplicate */
(() => {
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  const tip    = document.getElementById('tip');
  const tipName    = document.getElementById('tip-name');

  // ── Progress buttons ────────────────────────────────────────────────
  // Maps localStorage prefix → globe section id
  const PREFIX_TO_SEC = {
    alg1:'algebra1', alg2:'algebra2', geometry:'geometry', bio:'biology',
    chem:'chemistry', physics:'physics',
    precalc:'precalc', trig:'trig', stats:'statistics', linalg:'linalg',
    finmath:'finmath', earthsci:'earth', intsci:'integrated',
    envsci:'environmental', astro:'astronomy', anat:'anatomy', marine:'marine',
  };
  function importFromObj(obj, existing) {
    let added = 0;
    const re = /^([a-z0-9_]+)_u(\d+)_l(\d+)_completed$/;
    for (const [k, v] of Object.entries(obj)) {
      if (v !== true && v !== 'true') continue;
      const m = k.match(re);
      if (!m) continue;
      const secId = PREFIX_TO_SEC[m[1]];
      if (!secId) continue;
      const globeKey = secId + '_' + (parseInt(m[2]) - 1) + '_' + (parseInt(m[3]) - 1);
      if (!existing.has(globeKey)) { existing.add(globeKey); added++; }
    }
    return added;
  }
  document.getElementById('btn-import').addEventListener('click', async function() {
    const existing = new Set(JSON.parse(localStorage.getItem('aris_completed') || '[]'));
    // 1. Scan localStorage
    const lsObj = {};
    for (let i = 0; i < localStorage.length; i++) { const k = localStorage.key(i); lsObj[k] = localStorage.getItem(k); }
    let added = importFromObj(lsObj, existing);
    // 2. Try Firebase (if user is logged in)
    let fbAdded = 0;
    try {
      const { db, auth } = await import('/ArisEdu Project Folder/firebase-config.js');
      const { getDoc, doc } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
      const { onAuthStateChanged } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js');
      // Wait up to 4s for auth state to resolve (Firebase restores session async)
      const user = await new Promise((resolve) => {
        const t = setTimeout(() => resolve(null), 4000);
        const unsub = onAuthStateChanged(auth, (u) => { clearTimeout(t); unsub(); resolve(u); });
      });
      if (user) {
        const snap = await getDoc(doc(db, 'userProgress', user.uid));
        if (snap.exists()) fbAdded = importFromObj(snap.data(), existing);
      }
    } catch(e) { /* Firebase unavailable or not logged in */ }
    added += fbAdded;
    localStorage.setItem('aris_completed', JSON.stringify([...existing]));
    const msg = added > 0
      ? 'Imported ' + added + ' new lesson(s)' + (fbAdded > 0 ? ' (' + fbAdded + ' from account)' : '') + '. Reloading…'
      : 'No new lessons found. Make sure you are logged in or have completed lessons on this device.';
    alert(msg);
    if (added > 0) location.reload();
  });

  document.getElementById('btn-clear').addEventListener('click', function() {
    if (!confirm('Clear all territory progress? This cannot be undone.')) return;
    localStorage.removeItem('aris_completed');
    location.reload();
  });
  const tipCourses = document.getElementById('tip-courses');
  let W = 0, H = 0, hoverId = null, hoverSec = null, hoverUnit = -1;
  let zoomAnim = { isl: null, t: 0, dir: 0, raf: 0, ts0: 0 };
  let secZoom  = { sec: null, prevSec: null, t: 0, dir: 0, raf: 0, ts0: 0 };
  let unitZoom = { sec: null, unitIdx: -1, prevUnitIdx: -1, t: 0, dir: 0, raf: 0, ts0: 0 };
  const ZOOM_DUR = 540;
  const SEC_ZOOM_DUR = 860;
  const UNIT_ZOOM_DUR = 700;
  let _unitBlobsCache = { sec: null, W: 0, H: 0, data: null };
  let lesZoom  = { sec: null, unitIdx: -1, t: 0, dir: 0, raf: 0, ts0: 0 };
  const LES_ZOOM_DUR = 700;
  let hoverLesson = -1;
  let _lessonBlobsCache = { sec: null, unitIdx: -1, W: 0, H: 0, data: null };

  const ISLANDS = [
    {
      id: 'math', name: 'Isle of Mathematics',
      courses: ['Algebra I','Algebra II','Geometry','Pre-Calculus','Trigonometry','Statistics','Linear Algebra','Financial Math'],
      cx: 0.27, cy: 0.50, size: 2.9,
      shoreHi: '#f7e888', shoreLo: '#c49018', borderCol: '#7a5c10',
      greenHi: '#b4e052', greenLo: '#3a7010',
      hillHi:  '#78c228', hillLo:  '#265808',
      treeHi:  '#cae860', treeLo:  '#4c9010',
      pts: [[ .08,-1.02],[ .42,-.90],[ .88,-.44],[1.10,-.04],[ .88, .20],[ .58, .30],[ .82, .64],[ .50, .98],[ .10,1.10],[-.36,1.04],[-.72, .68],[-.98, .20],[-1.00,-.32],[-.64,-.76],[-.24,-.96]],
      sections: [
        { id:'algebra1',   name:'Algebra I',       col:'#3b82f6', nx: 0.221, ny:-0.465, units:12, lessons:[7,9,7,8,10,6,8,4,4,4,3,4] },
        { id:'algebra2',   name:'Algebra II',      col:'#2f92d5', nx: 0.501, ny:-0.221, units: 9, lessons:[9,7,7,6,7,5,7,6,4] },
        { id:'geometry',   name:'Geometry',        col:'#22a1b3', nx: 0.579, ny: 0.098, units:13, lessons:[7,9,7,8,6,7,8,8,7,9,6,9,7] },
        { id:'precalc',    name:'Pre-Calculus',    col:'#16b192', nx: 0.281, ny: 0.311, units:10, lessons:[10,9,9,8,9,9,8,7,8,8] },
        { id:'trig',       name:'Trigonometry',    col:'#22ac92', nx:-0.116, ny: 0.417, units:10, lessons:[7,7,6,7,7,7,7,7,7,6] },
        { id:'statistics', name:'Statistics',      col:'#4591b3', nx:-0.504, ny: 0.200, units:10, lessons:[7,8,7,8,8,7,7,7,7,6] },
        { id:'linalg',     name:'Linear Algebra',  col:'#6877d5', nx:-0.637, ny:-0.161, units:10, lessons:[8,8,8,8,8,8,8,8,8,8] },
        { id:'finmath',    name:'Financial Math',  col:'#8b5cf6', nx:-0.221, ny:-0.366, units:10, lessons:[8,8,8,8,8,8,8,8,8,7] },
      ],
    },
    {
      id: 'science', name: 'Sciencia Shores',
      courses: ['Physics','Chemistry','Biology','Earth Science','Integrated Science','Environmental Science','Astronomy','Anatomy & Physiology','Marine Science'],
      cx: 0.73, cy: 0.49, size: 2.7,
      shoreHi: '#ffc870', shoreLo: '#c07018', borderCol: '#885010',
      greenHi: '#52e8b0', greenLo: '#187850',
      hillHi:  '#2ad8a0', hillLo:  '#0d5838',
      treeHi:  '#70f0c0', treeLo:  '#18a870',
      pts: [[-.08,-1.06],[ .24,-.92],[ .62,-.58],[ .96,-.16],[1.04, .28],[ .84, .60],[1.02, .90],[ .76,1.12],[ .38,1.04],[ .00,1.00],[-.40, .86],[-.78, .52],[-1.02, .10],[-.92,-.38],[-.58,-.78],[-.22,-.96]],
      sections: [
        { id:'physics',       name:'Physics',               col:'#fbbf24', nx: 0.236, ny:-0.426, units:11, lessons:[6,6,8,6,6,6,8,6,6,9,6] },
        { id:'chemistry',     name:'Chemistry',             col:'#3b82f6', nx: 0.534, ny:-0.263, units:13, lessons:[5,8,8,5,8,9,7,8,9,8,10,6,5] },
        { id:'biology',       name:'Biology',               col:'#22c55e', nx: 0.652, ny: 0.053, units:12, lessons:[7,7,5,5,5,6,7,6,5,6,9,5] },
        { id:'earth',         name:'Earth Science',         col:'#3b82f6', nx: 0.522, ny: 0.384, units: 7, lessons:[5,5,5,5,5,6,5] },
        { id:'integrated',    name:'Integrated Science',    col:'#38bdf8', nx: 0.092, ny: 0.429, units:10, lessons:[9,9,9,9,8,8,7,7,7,6] },
        { id:'environmental', name:'Environmental Science', col:'#22c55e', nx:-0.284, ny: 0.302, units:10, lessons:[7,8,7,7,6,7,7,6,6,6] },
        { id:'astronomy',     name:'Astronomy',             col:'#fbbf24', nx:-0.534, ny: 0.050, units:10, lessons:[7,7,8,7,8,7,7,7,7,6] },
        { id:'anatomy',       name:'Anatomy & Physiology',  col:'#22c55e', nx:-0.543, ny:-0.284, units:10, lessons:[7,8,8,8,7,8,8,7,8,7] },
        { id:'marine',        name:'Marine Science',        col:'#0ea5e9', nx:-0.212, ny:-0.444, units:10, lessons:[7,7,7,6,7,6,7,6,6,6] },
      ],
    },
  ];

  const ROUTES = [['math','science']];

  const COURSE_FOLDER = {
    algebra1:    { folder:'Algebra1Lessons',            pre:'Lesson' },
    algebra2:    { folder:'Algebra2Lessons',            pre:'Lesson' },
    geometry:    { folder:'GeometryLessons',            pre:'Lesson' },
    biology:     { folder:'BiologyLessons',             pre:'Lesson' },
    precalc:     { folder:'PrecalculusLessons',         pre:'Lesson ' },
    trig:        { folder:'TrigonometryLessons',        pre:'Lesson ' },
    statistics:  { folder:'StatisticsLessons',          pre:'Lesson ' },
    linalg:      { folder:'LinearAlgebraLessons',       pre:'Lesson ' },
    finmath:     { folder:'FinancialMathLessons',       pre:'Lesson ' },
    physics:     { folder:'PhysicsLessons',             pre:'Lesson ' },
    chemistry:   { folder:'ChemistryLessons',           pre:'Lesson ' },
    earth:       { folder:'EarthScienceLessons',        pre:'Lesson ' },
    integrated:  { folder:'IntegratedScienceLessons',   pre:'Lesson ' },
    environmental:{ folder:'EnvironmentalScienceLessons',pre:'Lesson ' },
    astronomy:   { folder:'AstronomyLessons',           pre:'Lesson ' },
    anatomy:     { folder:'AnatomyLessons',             pre:'Lesson ' },
    marine:      { folder:'MarineScienceLessons',       pre:'Lesson ' },
  };

  // ── Lesson names (loaded async from lesson_names.txt) ────────────────
  // LESSON_NAMES[secId][unitIdx][lesIdx] = 'Lesson Name'
  const LESSON_NAMES = {};
  // Reverse map: folder name → section id
  const FOLDER_TO_SEC = {};
  // Built after COURSE_FOLDER is defined (same scope, runs immediately)
  (function buildFolderMap() {
    for (const [id, cf] of Object.entries(COURSE_FOLDER)) FOLDER_TO_SEC[cf.folder] = id;
  })();
  fetch('/lesson_names.txt').then(r => r.text()).then(txt => {
    for (const line of txt.split('\n')) {
      const parts = line.split(' | ');
      if (parts.length < 4) continue;
      const secId = FOLDER_TO_SEC[parts[0].trim()];
      if (!secId) continue;
      const unitIdx = parseInt(parts[1].trim().replace('Unit','')) - 1;
      const lesStr  = parts[2].trim(); // e.g. "Lesson 2.1"
      const dotIdx  = lesStr.lastIndexOf('.');
      const lesIdx  = dotIdx >= 0 ? parseInt(lesStr.slice(dotIdx + 1)) - 1 : 0;
      const name    = parts[3].trim();
      if (!name) continue;
      if (!LESSON_NAMES[secId]) LESSON_NAMES[secId] = {};
      if (!LESSON_NAMES[secId][unitIdx]) LESSON_NAMES[secId][unitIdx] = {};
      LESSON_NAMES[secId][unitIdx][lesIdx] = name;
    }
  }).catch(() => {});

  // ── Territory (claimed lessons) ────────────────────────────────────────────
  // Key format: "secId_unitIdx_lesIdx" (0-based unit and lesson indices)
  const COMPLETED = new Set(JSON.parse(localStorage.getItem('aris_completed') || '[]'));
  function lesKey(secId, unitIdx, lesIdx) { return secId + '_' + unitIdx + '_' + lesIdx; }
  function isLessonDone(secId, unitIdx, lesIdx) { return COMPLETED.has(lesKey(secId, unitIdx, lesIdx)); }
  const GREY_FILL    = '#5a6070';
  const GREY_FILL_HI = '#6e7484';
  const CLAIM_COL    = '#22c55e';
  const CLAIM_COL_HI = '#4ade80';

  // Pre-compute unit/section completion fractions once at load (keyed by "secId_unitIdx")
  const COMP_UNIT = {}, COMP_SEC = {};
  for (const isl of ISLANDS) {
    for (const sec of isl.sections) {
      let secDone = 0, secTotal = 0;
      for (let u = 0; u < sec.lessons.length; u++) {
        let d = 0;
        for (let l = 0; l < sec.lessons[u]; l++) { if (COMPLETED.has(lesKey(sec.id, u, l))) d++; }
        COMP_UNIT[sec.id + '_' + u] = sec.lessons[u] > 0 ? d / sec.lessons[u] : 0;
        secDone += d; secTotal += sec.lessons[u];
      }
      COMP_SEC[sec.id] = secTotal > 0 ? secDone / secTotal : 0;
    }
  }

  // Decorative features: one medium island + scattered tiny islets
  // Positions computed to be in clear ocean, drawn AFTER main islands
  const DECOS = [
    // ── medium island ─ top-center, above both main islands
    { type:'mid', id:'midIsle', cx:0.50, cy:0.17, size:0.80,
      shoreHi:'#f5dfa4', shoreLo:'#c48c2c', borderCol:'#7a5520',
      greenHi:'#aad83c', greenLo:'#347010', hillHi:'#74bc1c', hillLo:'#1e4c08',
      treeHi:'#c4e240', treeLo:'#3c8012',
      pts:[[.20,-.98],[.62,-.72],[.94,-.18],[.90,.42],[.58,.84],[.10,.98],[-.32,.96],[-.76,.60],[-.96,.06],[-.82,-.50],[-.38,-.88]] },
    // ── science cluster ─ NE corner (clear of science upper-right edge)
    { type:'tiny', cx:0.92, cy:0.18, r:0.042,
      shoreHi:'#ffd890', shoreLo:'#c07830', borderCol:'#885018',
      greenHi:'#52e8b0', greenLo:'#187850',
      pts:[[.3,-.9],[.9,-.2],[.8,.6],[.1,1],[-.6,.8],[-.9,.1],[-.7,-.6]] },
    // ── science cluster ─ right side, below mid-point
    { type:'tiny', cx:0.96, cy:0.60, r:0.036,
      shoreHi:'#ffc870', shoreLo:'#be7820', borderCol:'#885010',
      greenHi:'#48e0a8', greenLo:'#147848',
      pts:[[.4,-.8],[.9,.1],[.6,.8],[-.1,1],[-.8,.5],[-.9,-.3],[-.2,-.9]] },
    // ── medium island ─ science cluster, below-right of science
    { type:'mid', id:'sciIsle', cx:0.91, cy:0.82, size:0.72,
      shoreHi:'#ffe0a0', shoreLo:'#c07828', borderCol:'#885018',
      greenHi:'#52e8b0', greenLo:'#187850', hillHi:'#2ad8a0', hillLo:'#0d5838',
      treeHi:'#70f0c0', treeLo:'#18a870',
      pts:[[.14,-.98],[.58,-.74],[.92,-.20],[.96,.34],[.70,.80],[.18,.98],[-.28,.96],[-.72,.62],[-.96,.08],[-.86,-.46],[-.44,-.86]] },
    // ── math cluster ─ left side, mid-height
    { type:'tiny', cx:0.05, cy:0.42, r:0.040,
      shoreHi:'#f7e888', shoreLo:'#c49018', borderCol:'#7a5c10',
      greenHi:'#b4e052', greenLo:'#3a7010',
      pts:[[.2,-1],[.8,-.3],[.9,.4],[.4,.9],[-.2,1],[-.8,.5],[-.8,-.3],[-.3,-.9]] },
    // ── math cluster ─ lower-left
    { type:'tiny', cx:0.07, cy:0.76, r:0.032,
      shoreHi:'#f7e470', shoreLo:'#c08c14', borderCol:'#7a5010',
      greenHi:'#a8d848', greenLo:'#306010',
      pts:[[.3,-.9],[.9,-.2],[.8,.6],[.1,1],[-.6,.8],[-.9,.1],[-.7,-.6]] },
  ];

  function buildPath(isl, sc) {
    sc = sc == null ? 1 : sc;
    const x = isl.cx * W, y = isl.cy * H;
    const s = Math.min(W, H) * 0.105 * isl.size * sc;
    const p = isl.pts, n = p.length, ys = 0.72;
    ctx.beginPath();
    ctx.moveTo(x + (p[n-1][0]+p[0][0])/2*s, y + (p[n-1][1]+p[0][1])/2*s*ys);
    for (let i = 0; i < n; i++) {
      const c = p[i], nx = p[(i+1)%n];
      ctx.quadraticCurveTo(x+c[0]*s, y+c[1]*s*ys, x+(c[0]+nx[0])/2*s, y+(c[1]+nx[1])/2*s*ys);
    }
    ctx.closePath();
  }

  function lighten(hex, d) {
    d = d == null ? 22 : d;
    const r = Math.min(255, parseInt(hex.slice(1,3),16)+d);
    const g = Math.min(255, parseInt(hex.slice(3,5),16)+d);
    const b = Math.min(255, parseInt(hex.slice(5,7),16)+d);
    return 'rgb('+r+','+g+','+b+')';
  }

  function isInsideAny(px, py, sc) {
    sc = sc == null ? 1 : sc;
    for (let i = 0; i < ISLANDS.length; i++) {
      buildPath(ISLANDS[i], sc);
      if (ctx.isPointInPath(px, py)) return true;
    }
    return false;
  }

  function islandAt(mx, my) {
    for (let i = ISLANDS.length - 1; i >= 0; i--) {
      buildPath(ISLANDS[i]);
      if (ctx.isPointInPath(mx, my)) return ISLANDS[i];
    }
    return null;
  }

  function drawOcean() {
    // parchment base
    const g = ctx.createRadialGradient(W*0.5, H*0.46, 0, W*0.5, H*0.46, Math.max(W,H)*0.72);
    g.addColorStop(0,   '#ede0a8');
    g.addColorStop(0.6, '#d8c878');
    g.addColorStop(1,   '#b89e48');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    // subtle grid lines like an old chart
    ctx.save();
    ctx.strokeStyle = 'rgba(120,88,30,0.13)';
    ctx.lineWidth = 1;
    const gs = Math.min(W, H) * 0.072;
    for (let x = 0; x < W; x += gs) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for (let y = 0; y < H; y += gs) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
    ctx.restore();

    // vignette
    const v = ctx.createRadialGradient(W*0.5, H*0.5, Math.min(W,H)*0.32, W*0.5, H*0.5, Math.max(W,H)*0.75);
    v.addColorStop(0, 'rgba(0,0,0,0)');
    v.addColorStop(1, 'rgba(60,35,5,0.42)');
    ctx.fillStyle = v;
    ctx.fillRect(0, 0, W, H);
  }



  function drawRoutes() {
    ctx.save();
    ctx.strokeStyle = 'rgba(80,50,10,0.55)';
    ctx.lineWidth = 2.5;
    ctx.setLineDash([7, 11]);
    for (let i = 0; i < ROUTES.length; i++) {
      const a = ISLANDS.find(function(x){ return x.id === ROUTES[i][0]; });
      const b = ISLANDS.find(function(x){ return x.id === ROUTES[i][1]; });
      ctx.beginPath();
      ctx.moveTo(a.cx * W, a.cy * H);
      ctx.lineTo(b.cx * W, b.cy * H);
      ctx.stroke();
    }
    ctx.setLineDash([]);
    ctx.restore();
  }

  function buildTinyPath(x, y, r, pts) {
    const n = pts.length, ys = 0.72;
    ctx.beginPath();
    ctx.moveTo(x + (pts[n-1][0]+pts[0][0])/2*r, y + (pts[n-1][1]+pts[0][1])/2*r*ys);
    for (let i = 0; i < n; i++) {
      const c = pts[i], nx = pts[(i+1)%n];
      ctx.quadraticCurveTo(x+c[0]*r, y+c[1]*r*ys, x+(c[0]+nx[0])/2*r, y+(c[1]+nx[1])/2*r*ys);
    }
    ctx.closePath();
  }

  function drawDecoFeatures() {
    // ── tiny islets ──────────────────────────────────────────────────────────
    for (let k = 0; k < DECOS.length; k++) {
      const d = DECOS[k];
      if (d.type !== 'tiny') continue;
      const x = d.cx * W, y = d.cy * H, r = H * d.r;
      ctx.save(); ctx.shadowColor='rgba(0,0,0,0.15)'; ctx.shadowBlur=10;
      ctx.shadowOffsetX=5; ctx.shadowOffsetY=7;
      buildTinyPath(x, y, r, d.pts); ctx.fillStyle=d.shoreLo; ctx.fill();
      ctx.restore();
      buildTinyPath(x, y, r, d.pts);
      const bg = ctx.createRadialGradient(x-r*0.22, y-r*0.28, r*0.04, x+r*0.08, y+r*0.12, r*0.96);
      bg.addColorStop(0, d.shoreHi); bg.addColorStop(1, d.shoreLo);
      ctx.fillStyle=bg; ctx.fill(); ctx.strokeStyle='rgba(0,0,0,0.75)'; ctx.lineWidth=1.2; ctx.stroke();
      buildTinyPath(x, y, r*1.07, d.pts); ctx.strokeStyle='rgba(0,0,0,0.28)'; ctx.lineWidth=r*0.06; ctx.stroke();
      buildTinyPath(x, y, r*1.035, d.pts); ctx.strokeStyle='rgba(0,0,0,0.12)'; ctx.lineWidth=r*0.032; ctx.stroke();
      buildTinyPath(x, y, r*0.55, d.pts);
      const gg = ctx.createRadialGradient(x-r*0.10, y-r*0.14, 0, x, y, r*0.55);
      gg.addColorStop(0, d.greenHi); gg.addColorStop(1, d.greenLo);
      ctx.fillStyle=gg; ctx.fill();
    }
    // ── medium island ─────────────────────────────────────────────────────────
    for (let k = 0; k < DECOS.length; k++) {
      const d = DECOS[k];
      if (d.type !== 'mid') continue;
      const x = d.cx * W, y = d.cy * H;
      const s = Math.min(W, H) * 0.105 * d.size;
      ctx.save(); ctx.shadowColor='rgba(0,0,0,0.20)'; ctx.shadowBlur=26;
      ctx.shadowOffsetX=12; ctx.shadowOffsetY=16;
      buildPath(d); ctx.fillStyle=d.shoreLo; ctx.fill();
      ctx.restore();
      buildPath(d);
      const sg = ctx.createRadialGradient(x-s*0.24, y-s*0.32, s*0.05, x+s*0.08, y+s*0.14, s*1.08);
      sg.addColorStop(0, d.shoreHi); sg.addColorStop(0.72, d.shoreLo); sg.addColorStop(1, d.borderCol);
      ctx.fillStyle=sg; ctx.fill(); ctx.strokeStyle='rgba(0,0,0,0.75)'; ctx.lineWidth=2; ctx.stroke();
      buildPath(d, 1.055); ctx.strokeStyle='rgba(0,0,0,0.28)'; ctx.lineWidth=s*0.046; ctx.stroke();
      buildPath(d, 1.025); ctx.strokeStyle='rgba(0,0,0,0.12)'; ctx.lineWidth=s*0.026; ctx.stroke();
      buildPath(d, 0.82);
      const eg1 = ctx.createRadialGradient(x-s*0.14, y-s*0.20, 0, x, y, s*0.82);
      eg1.addColorStop(0, d.greenHi); eg1.addColorStop(1, d.greenLo);
      ctx.fillStyle=eg1; ctx.fill(); ctx.strokeStyle='rgba(0,0,0,0.07)'; ctx.lineWidth=1.5; ctx.stroke();
      buildPath(d, 0.55);
      const eg2 = ctx.createRadialGradient(x-s*0.12, y-s*0.18, 0, x, y, s*0.55);
      eg2.addColorStop(0, d.hillHi); eg2.addColorStop(1, d.greenHi);
      ctx.fillStyle=eg2; ctx.fill(); ctx.strokeStyle='rgba(0,0,0,0.06)'; ctx.lineWidth=1.2; ctx.stroke();
      buildPath(d, 0.34);
      const eg3 = ctx.createRadialGradient(x-s*0.08, y-s*0.12, 0, x, y, s*0.34);
      eg3.addColorStop(0, lighten(d.hillHi, 28)); eg3.addColorStop(1, d.hillHi);
      ctx.fillStyle=eg3; ctx.fill();
      drawTrees(d, s, false, 1.0);
      ctx.save(); buildPath(d, 0.85); ctx.clip();
      const hl = ctx.createRadialGradient(x-s*0.30, y-s*0.44, 0, x-s*0.08, y-s*0.20, s*0.72);
      hl.addColorStop(0, 'rgba(255,255,255,0.24)'); hl.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle=hl; ctx.fillRect(x-s*1.2, y-s*1.2, s*2.4, s*2.4);
      ctx.restore();
    }
  }

  function drawIsland(isl, hover) {
    const x = isl.cx * W, y = isl.cy * H;
    const hsc = hover ? 1.08 : 1.0;
    const s   = Math.min(W, H) * 0.105 * isl.size * hsc;

    ctx.save();
    if (hover) ctx.globalAlpha = 0.82;

    // Drop shadow
    ctx.save();
    ctx.shadowColor   = 'rgba(0,0,0,0.22)';
    ctx.shadowBlur    = 42;
    ctx.shadowOffsetX = 16;
    ctx.shadowOffsetY = 22;
    buildPath(isl, hsc);
    ctx.fillStyle = isl.shoreLo;
    ctx.fill();
    ctx.restore();

    // Beach — radial gradient, light from upper-left
    const sg = ctx.createRadialGradient(x - s*0.24, y - s*0.32, s*0.05, x + s*0.08, y + s*0.14, s*1.08);
    sg.addColorStop(0,    isl.shoreHi);
    sg.addColorStop(0.72, isl.shoreLo);
    sg.addColorStop(1,    isl.borderCol);
    buildPath(isl, hsc);
    ctx.fillStyle = sg;
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.80)';
    ctx.lineWidth = 2.5;
    ctx.stroke();

    // Surf foam ring — drawn over beach edge
    ctx.save();
    buildPath(isl, hsc * 1.055);
    ctx.strokeStyle = 'rgba(0,0,0,0.30)';
    ctx.lineWidth = s * 0.048;
    ctx.lineJoin = 'round';
    ctx.stroke();
    buildPath(isl, hsc * 1.025);
    ctx.strokeStyle = 'rgba(0,0,0,0.14)';
    ctx.lineWidth = s * 0.028;
    ctx.stroke();
    ctx.restore();

    // Elevation rings: outer forest → mid highland → bright summit
    const eg1 = ctx.createRadialGradient(x - s*0.14, y - s*0.20, 0, x, y, s * 0.82);
    eg1.addColorStop(0, isl.greenHi);
    eg1.addColorStop(1, isl.greenLo);
    buildPath(isl, 0.82 * hsc);
    ctx.fillStyle = eg1; ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.07)'; ctx.lineWidth = 1.8; ctx.stroke();

    const eg2 = ctx.createRadialGradient(x - s*0.14, y - s*0.20, 0, x, y, s * 0.58);
    eg2.addColorStop(0, isl.hillHi);
    eg2.addColorStop(1, isl.greenHi);
    buildPath(isl, 0.58 * hsc);
    ctx.fillStyle = eg2; ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.06)'; ctx.lineWidth = 1.5; ctx.stroke();

    const eg3 = ctx.createRadialGradient(x - s*0.10, y - s*0.14, 0, x, y, s * 0.36);
    eg3.addColorStop(0, lighten(isl.hillHi, 28));
    eg3.addColorStop(1, isl.hillHi);
    buildPath(isl, 0.36 * hsc);
    ctx.fillStyle = eg3; ctx.fill();

    // Landmark
    if (isl.id === 'math')    drawMathLandmark(isl, s, hsc);
    if (isl.id === 'science') drawScienceLandmark(isl, s, hsc);

    // Trees
    drawTrees(isl, s, hover, hsc);

    // Specular sheen
    ctx.save();
    buildPath(isl, 0.85 * hsc);
    ctx.clip();
    const hl = ctx.createRadialGradient(x - s*0.30, y - s*0.44, 0, x - s*0.08, y - s*0.20, s*0.72);
    hl.addColorStop(0, 'rgba(255,255,255,0.26)');
    hl.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = hl;
    ctx.fillRect(x - s*1.2, y - s*1.2, s*2.4, s*2.4);
    ctx.restore();

    // Border re-stroke over terrain — makes both sides of outline visible
    buildPath(isl, hsc);
    ctx.strokeStyle = 'rgba(0,0,0,0.80)';
    ctx.lineWidth = 2.5;
    ctx.stroke();

    // Label
    const fs = Math.max(12, Math.round(s * 0.155));
    ctx.save();
    ctx.font = 'italic bold ' + fs + "px Georgia, 'Times New Roman', serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.strokeStyle = 'rgba(245,228,150,0.95)';
    ctx.lineWidth = 3.5;
    ctx.fillStyle = '#1a0e00';
    ctx.strokeText(isl.name, x, y + s * 0.92);
    ctx.fillText(isl.name,   x, y + s * 0.92);
    ctx.restore();

    ctx.restore();
  }

  function drawMathLandmark(isl, s, hsc) {
    const x = isl.cx * W, y = isl.cy * H;
    const lx = x, ly = y - s * 0.05;
    const tw = s * 0.086, th = s * 0.27;

    // Base stone steps (2 tiers)
    for (let st = 1; st >= 0; st--) {
      ctx.beginPath();
      ctx.rect(lx - tw*(1.5 + st*0.52), ly - s*0.034*(st+1), tw*(3 + st*1.04), s*0.034);
      ctx.fillStyle = st === 0 ? '#d4c898' : '#c0ae78';
      ctx.fill();
      ctx.strokeStyle = '#4a3a20'; ctx.lineWidth = 1; ctx.stroke();
    }

    // Tower body — trapezoid, stone gradient lit left
    const tg = ctx.createLinearGradient(lx - tw, ly, lx + tw, ly);
    tg.addColorStop(0,    '#7a6c4c');
    tg.addColorStop(0.30, '#d4c898');
    tg.addColorStop(0.65, '#b8a870');
    tg.addColorStop(1,    '#6a5c3c');
    ctx.beginPath();
    ctx.moveTo(lx - tw * 1.10, ly - s*0.068);
    ctx.lineTo(lx - tw,         ly - th);
    ctx.lineTo(lx + tw,         ly - th);
    ctx.lineTo(lx + tw * 1.10,  ly - s*0.068);
    ctx.closePath();
    ctx.fillStyle = tg; ctx.fill();
    ctx.strokeStyle = '#3e2e10'; ctx.lineWidth = 1.8; ctx.stroke();

    // Mortar lines (horizontal)
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(lx - tw * 1.10, ly - s*0.068);
    ctx.lineTo(lx - tw, ly - th); ctx.lineTo(lx + tw, ly - th);
    ctx.lineTo(lx + tw * 1.10, ly - s*0.068); ctx.closePath();
    ctx.clip();
    ctx.strokeStyle = 'rgba(60,40,10,0.18)'; ctx.lineWidth = 1;
    for (let mr = 1; mr < 6; mr++) {
      const my = ly - th * mr / 6;
      ctx.beginPath(); ctx.moveTo(lx - tw*1.2, my); ctx.lineTo(lx + tw*1.2, my); ctx.stroke();
    }
    ctx.restore();

    // Battlement merlons (3)
    const bw = tw * 0.30, bh = s * 0.034;
    for (let b = -1; b <= 1; b++) {
      ctx.beginPath();
      ctx.rect(lx + b * tw * 0.72 - bw*0.5, ly - th - bh, bw, bh);
      ctx.fillStyle = '#c8b880'; ctx.fill();
      ctx.strokeStyle = '#3e2e10'; ctx.lineWidth = 1; ctx.stroke();
    }

    // Conical roof — gradient warm red
    const rg = ctx.createLinearGradient(lx - tw*1.3, ly - th, lx + tw*0.6, ly - th - s*0.12);
    rg.addColorStop(0,   '#8a2808');
    rg.addColorStop(0.5, '#cc3c10');
    rg.addColorStop(1,   '#5a1a08');
    ctx.beginPath();
    ctx.moveTo(lx,            ly - th - bh - s*0.125);
    ctx.lineTo(lx + tw*1.32,  ly - th);
    ctx.lineTo(lx - tw*1.32,  ly - th);
    ctx.closePath();
    ctx.fillStyle = rg; ctx.fill();
    ctx.strokeStyle = '#2a0e04'; ctx.lineWidth = 1.8; ctx.stroke();

    // 3 arched windows
    for (let w = 0; w < 3; w++) {
      const wy = ly - th * (0.20 + w * 0.26) + s*0.012;
      const ww = tw * 0.33;
      ctx.beginPath();
      ctx.moveTo(lx - ww, wy + s*0.026);
      ctx.lineTo(lx - ww, wy);
      ctx.arc(lx, wy, ww, Math.PI, 0);
      ctx.lineTo(lx + ww, wy + s*0.026);
      ctx.closePath();
      ctx.fillStyle = 'rgba(18,35,90,0.68)'; ctx.fill();
      ctx.strokeStyle = '#3e2e10'; ctx.lineWidth = 0.8; ctx.stroke();
      // window glint
      ctx.beginPath();
      ctx.arc(lx - ww*0.26, wy - s*0.004, ww*0.18, Math.PI, 0);
      ctx.strokeStyle = 'rgba(180,210,255,0.38)'; ctx.lineWidth = 1.0; ctx.stroke();
    }

    // Flag
    const fx = lx, fy = ly - th - bh - s*0.125 - s*0.040;
    ctx.beginPath();
    ctx.moveTo(fx, fy); ctx.lineTo(fx, fy - s*0.060);
    ctx.strokeStyle = '#2a1800'; ctx.lineWidth = 1.2; ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(fx,           fy - s*0.060);
    ctx.lineTo(fx + s*0.042, fy - s*0.042);
    ctx.lineTo(fx,           fy - s*0.022);
    ctx.closePath();
    ctx.fillStyle = '#cc1a1a'; ctx.fill();
  }

  function drawScienceLandmark(isl, s, hsc) {
    const x = isl.cx * W, y = isl.cy * H;
    const lx = x, ly = y - s * 0.02;
    const dr = s * 0.168;

    // Cylinder base
    const bg = ctx.createLinearGradient(lx - dr, ly, lx + dr, ly);
    bg.addColorStop(0,    '#6c7e8e');
    bg.addColorStop(0.38, '#c4d0dc');
    bg.addColorStop(1,    '#505e6c');
    ctx.beginPath();
    ctx.rect(lx - dr, ly - s*0.068, dr*2, s*0.068);
    ctx.fillStyle = bg; ctx.fill();
    ctx.strokeStyle = '#3a4e5e'; ctx.lineWidth = 1.5; ctx.stroke();
    // panel lines on base
    ctx.save();
    ctx.beginPath(); ctx.rect(lx - dr, ly - s*0.068, dr*2, s*0.068); ctx.clip();
    ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1;
    for (let p = -2; p <= 2; p++) {
      ctx.beginPath(); ctx.moveTo(lx + p*dr*0.44, ly - s*0.068); ctx.lineTo(lx + p*dr*0.44, ly); ctx.stroke();
    }
    ctx.restore();

    // Ground shadow
    ctx.beginPath();
    ctx.ellipse(lx, ly, dr*1.05, dr*0.11, 0, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,0.10)'; ctx.fill();

    // Dome fill
    const dg = ctx.createRadialGradient(lx - dr*0.38, ly - dr*0.52, dr*0.04, lx + dr*0.12, ly - dr*0.08, dr*1.18);
    dg.addColorStop(0,    '#eef4ff');
    dg.addColorStop(0.28, '#c0d4ee');
    dg.addColorStop(0.68, '#6090c4');
    dg.addColorStop(1,    '#2a5090');
    ctx.beginPath();
    ctx.arc(lx, ly, dr, Math.PI, 0);
    ctx.fillStyle = dg; ctx.fill();
    ctx.strokeStyle = '#2a5090'; ctx.lineWidth = 2; ctx.stroke();

    // Aperture slit
    ctx.save();
    ctx.beginPath(); ctx.arc(lx, ly, dr * 0.98, Math.PI, 0); ctx.clip();
    ctx.beginPath();
    ctx.rect(lx - dr*0.104, ly - dr*1.04, dr*0.208, dr*1.08);
    ctx.fillStyle = 'rgba(6,12,36,0.82)'; ctx.fill();
    ctx.restore();

    // Dome rim
    ctx.beginPath();
    ctx.moveTo(lx - dr, ly); ctx.lineTo(lx + dr, ly);
    ctx.strokeStyle = '#2a5090'; ctx.lineWidth = 2; ctx.stroke();

    // Dome sheen
    ctx.save();
    ctx.beginPath(); ctx.arc(lx, ly, dr, Math.PI, 0); ctx.clip();
    const hs = ctx.createRadialGradient(lx - dr*0.34, ly - dr*0.56, 0, lx - dr*0.10, ly - dr*0.24, dr*0.72);
    hs.addColorStop(0, 'rgba(255,255,255,0.48)');
    hs.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = hs;
    ctx.fillRect(lx - dr*1.1, ly - dr*1.1, dr*2.2, dr*1.1);
    ctx.restore();

    // Telescope tube
    ctx.save();
    ctx.translate(lx, ly - dr * 0.30);
    ctx.rotate(-0.28);
    const ttg = ctx.createLinearGradient(-dr*0.060, 0, dr*0.060, 0);
    ttg.addColorStop(0,    '#40688a');
    ttg.addColorStop(0.45, '#90b8d0');
    ttg.addColorStop(1,    '#2a4c6c');
    ctx.beginPath();
    ctx.rect(-dr*0.060, -dr*0.65, dr*0.120, dr*0.68);
    ctx.fillStyle = ttg; ctx.fill();
    ctx.strokeStyle = '#204060'; ctx.lineWidth = 1.2; ctx.stroke();
    ctx.beginPath();
    ctx.arc(0, -dr*0.65, dr*0.060, 0, Math.PI*2);
    ctx.fillStyle = '#a8c4d8'; ctx.fill();
    ctx.strokeStyle = '#204060'; ctx.lineWidth = 1; ctx.stroke();
    ctx.restore();

    // Star above dome
    ctx.save();
    ctx.translate(lx, ly - dr - s*0.052);
    const sr = s * 0.026;
    ctx.fillStyle = '#f0c830'; ctx.strokeStyle = '#b08010'; ctx.lineWidth = 0.8;
    ctx.beginPath();
    for (let p = 0; p < 5; p++) {
      const pa = p * Math.PI*2/5 - Math.PI*0.5;
      const pb = (p + 0.5) * Math.PI*2/5 - Math.PI*0.5;
      if (p === 0) ctx.moveTo(Math.cos(pa)*sr, Math.sin(pa)*sr);
      else         ctx.lineTo(Math.cos(pa)*sr, Math.sin(pa)*sr);
      ctx.lineTo(Math.cos(pb)*sr*0.42, Math.sin(pb)*sr*0.42);
    }
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.restore();
  }


  function drawTrees(isl, s, hover, hsc) {
    hsc = hsc == null ? 1 : hsc;
    const x = isl.cx * W, y = isl.cy * H;
    let seed = isl.id.split('').reduce(function(a, c){ return a*31 + c.charCodeAt(0); }, 7);
    function rng() { seed = (seed * 1664525 + 1013904223) | 0; return (seed >>> 0) / 0xffffffff; }
    const minDist = s * 0.38;
    const placed = [];
    const attempts = 40;
    // Reset to identity for hit-testing — isPointInPath uses CSS-pixel coords
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    for (let i = 0; i < attempts && placed.length < 5; i++) {
      const ang = rng() * Math.PI * 2;
      const rr  = s * (0.12 + rng() * 0.62);
      const tx  = x + Math.cos(ang) * rr;
      const ty  = y + Math.sin(ang) * rr * 0.72;
      buildPath(isl, 0.88 * hsc);
      if (!ctx.isPointInPath(tx, ty)) continue;
      let tooClose = false;
      for (let p = 0; p < placed.length; p++) {
        const dx = tx - placed[p][0], dy = ty - placed[p][1];
        if (dx*dx + dy*dy < minDist*minDist) { tooClose = true; break; }
      }
      if (tooClose) continue;
      placed.push([tx, ty, rr]);
    }
    ctx.restore(); // restore zoom transform for drawing
    for (let i = 0; i < placed.length; i++) {
      const tx = placed[i][0], ty = placed[i][1], rr = placed[i][2];
      const ts = s * (0.13 + rng() * 0.06);
      if (rr > s * 0.38) {
        // ── Palm (coastal / outer) ───────────────────────────────────────────
        const lean = (rng() - 0.5) * ts * 2.2;
        const topX = tx + lean, topY = ty - ts * 2.4;
        // ground shadow ellipse
        ctx.beginPath();
        ctx.ellipse(tx + ts*0.35, ty + ts*0.15, ts*0.75, ts*0.22, 0.1, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(0,0,0,0.15)'; ctx.fill();
        // trunk — tapered filled shape
        ctx.beginPath();
        ctx.moveTo(tx - ts*0.15, ty + ts*0.80);
        ctx.quadraticCurveTo(tx + lean*0.45 - ts*0.09, ty - ts*0.30, topX - ts*0.07, topY);
        ctx.quadraticCurveTo(tx + lean*0.45 + ts*0.13, ty - ts*0.30, tx + ts*0.15, ty + ts*0.80);
        ctx.closePath();
        const trunkGrad = ctx.createLinearGradient(tx - ts*0.15, 0, tx + ts*0.15, 0);
        trunkGrad.addColorStop(0,    '#5a2a08');
        trunkGrad.addColorStop(0.28, '#d07830');
        trunkGrad.addColorStop(0.55, '#f0aa58');
        trunkGrad.addColorStop(1,    '#7a3c14');
        ctx.fillStyle = trunkGrad; ctx.fill();
        ctx.strokeStyle = '#3a1606'; ctx.lineWidth = 1.5; ctx.stroke();
        // bark rings (bezier arcs)
        for (let b = 1; b < 6; b++) {
          const bt = b / 6;
          const bx = tx + lean * bt * 0.45;
          const by = ty + ts*0.80 - (ty + ts*0.80 - topY) * bt;
          const bw = ts*0.13 * (1 - bt*0.45);
          ctx.beginPath();
          ctx.moveTo(bx - bw, by + ts*0.025);
          ctx.bezierCurveTo(bx - bw*0.3, by - ts*0.025, bx + bw*0.3, by - ts*0.025, bx + bw, by + ts*0.025);
          ctx.strokeStyle = '#8a4018'; ctx.lineWidth = 1.6; ctx.stroke();
        }
        // fronds — filled leaf shapes, back three drawn first
        for (let pass = 0; pass < 2; pass++) {
          for (let f = 0; f < 7; f++) {
            const isBack = (f === 0 || f === 1 || f === 6);
            if (pass === 0 && !isBack) continue;
            if (pass === 1 &&  isBack) continue;
            const fa = -Math.PI * 0.72 + f * Math.PI * 0.22;
            const fl = ts * (1.75 + rng() * 0.45);
            const perpX = -Math.sin(fa) * ts * 0.34;
            const perpY =  Math.cos(fa) * ts * 0.34;
            const midX = topX + Math.cos(fa) * fl * 0.50;
            const midY = topY + Math.sin(fa) * fl * 0.80 * 0.50;
            const tipX = topX + Math.cos(fa) * fl;
            const tipY = topY + Math.sin(fa) * fl * 0.80;
            const isBright = (f >= 1 && f <= 4);
            // frond body
            ctx.beginPath();
            ctx.moveTo(topX, topY);
            ctx.quadraticCurveTo(midX + perpX, midY + perpY, tipX, tipY);
            ctx.quadraticCurveTo(midX - perpX, midY - perpY, topX, topY);
            ctx.closePath();
            const fg = ctx.createLinearGradient(topX, topY, tipX, tipY);
            fg.addColorStop(0,    isBright ? isl.treeHi : isl.treeLo);
            fg.addColorStop(0.50, isBright ? isl.treeHi : isl.treeLo);
            fg.addColorStop(1,    isl.treeLo);
            ctx.fillStyle = fg; ctx.fill();
            ctx.strokeStyle = 'rgba(0,0,0,0.30)'; ctx.lineWidth = 1.3; ctx.stroke();
            // center rib highlight stripe
            ctx.beginPath();
            ctx.moveTo(topX, topY);
            ctx.lineTo(topX + (tipX - topX)*0.58, topY + (tipY - topY)*0.58);
            ctx.strokeStyle = 'rgba(255,255,255,0.42)'; ctx.lineWidth = 1.1; ctx.stroke();
          }
        }
        // coconut cluster — radial gradient spheres
        for (let c = 0; c < 3; c++) {
          const ca = (c / 3) * Math.PI * 2;
          const cx2 = topX + Math.cos(ca) * ts*0.19;
          const cy2 = topY + ts*0.26 + Math.sin(ca) * ts*0.09;
          ctx.beginPath();
          ctx.arc(cx2, cy2, ts*0.17, 0, Math.PI*2);
          const cg = ctx.createRadialGradient(cx2 - ts*0.06, cy2 - ts*0.06, ts*0.01, cx2, cy2, ts*0.17);
          cg.addColorStop(0,   '#ffcc60');
          cg.addColorStop(0.40,'#d46820');
          cg.addColorStop(1,   '#6e2408');
          ctx.fillStyle = cg; ctx.fill();
          ctx.strokeStyle = '#4a1404'; ctx.lineWidth = 0.9; ctx.stroke();
        }

        // ── Pine/conifer (inland / summit) ───────────────────────────────────

        ctx.beginPath();
        ctx.ellipse(tx + ts*0.28, ty + ts*0.68, ts*0.58, ts*0.18, -0.15, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(0,0,0,0.16)'; ctx.fill();
        // trunk with gradient
        const tg = ctx.createLinearGradient(tx - ts*0.11, 0, tx + ts*0.11, 0);
        tg.addColorStop(0,    '#4a2208');
        tg.addColorStop(0.40, '#a05c28');
        tg.addColorStop(1,    '#5a2c0c');
        ctx.beginPath();
        ctx.rect(tx - ts*0.11, ty + ts*0.05, ts*0.22, ts*0.64);
        ctx.fillStyle = tg; ctx.fill();
        ctx.strokeStyle = '#2e1204'; ctx.lineWidth = 1.3; ctx.stroke();
        // tiers (4 layers, bottom to top) — flat two-tone cartoon shading
        for (let l = 0; l < 4; l++) {
          const base = ty + ts*0.14 - ts*0.48*l;
          const hw   = ts * (1.62 - l * 0.28);
          const ht   = ts * (1.24 - l * 0.20);
          // lit left half
          ctx.beginPath();
          ctx.moveTo(tx, base - ht);
          ctx.lineTo(tx, base);
          ctx.lineTo(tx - hw, base);
          ctx.closePath();
          ctx.fillStyle = isl.treeHi; ctx.fill();
          // shadow right half
          ctx.beginPath();
          ctx.moveTo(tx, base - ht);
          ctx.lineTo(tx + hw, base);
          ctx.lineTo(tx, base);
          ctx.closePath();
          ctx.fillStyle = isl.treeLo; ctx.fill();
          // bold outline
          ctx.beginPath();
          ctx.moveTo(tx, base - ht);
          ctx.lineTo(tx + hw, base);
          ctx.lineTo(tx - hw, base);
          ctx.closePath();
          ctx.strokeStyle = 'rgba(0,0,0,0.32)'; ctx.lineWidth = 1.6; ctx.stroke();
          // white specular streak along upper-left edge
          ctx.beginPath();
          ctx.moveTo(tx, base - ht);
          ctx.lineTo(tx - hw*0.60, base - ht*0.20);
          ctx.strokeStyle = 'rgba(255,255,255,0.52)'; ctx.lineWidth = 2.0; ctx.stroke();
          // spiky needle tufts along base of tier
          const nSpikes = Math.round(hw / (ts * 0.26));
          for (let k = 0; k <= nSpikes; k++) {
            const sx = tx - hw + (k / nSpikes) * hw * 2;
            const sdrop = ts * (0.11 + (k % 2) * 0.08);
            ctx.beginPath();
            ctx.moveTo(sx - ts*0.08, base);
            ctx.lineTo(sx, base + sdrop);
            ctx.lineTo(sx + ts*0.08, base);
            ctx.strokeStyle = (sx < tx) ? isl.treeHi : isl.treeLo;
            ctx.lineWidth = 1.1; ctx.stroke();
          }

        // snow cap — white with icy blue tint
        ctx.beginPath();
        ctx.moveTo(tx, ty - ts*1.78);
        ctx.lineTo(tx + ts*0.38, ty - ts*1.22);
        ctx.lineTo(tx - ts*0.33, ty - ts*1.22);
        ctx.closePath();
        const sg = ctx.createLinearGradient(tx - ts*0.33, ty - ts*1.78, tx + ts*0.38, ty - ts*1.22);
        sg.addColorStop(0,    '#ffffff');
        sg.addColorStop(0.55, '#e4f2ff');
        sg.addColorStop(1,    '#a8ccee');
        ctx.fillStyle = sg; ctx.fill();
        ctx.strokeStyle = 'rgba(80,120,180,0.45)'; ctx.lineWidth = 1.1; ctx.stroke();
      }
    }
  }

  function drawCompass(cx, cy, r) {
    ctx.save();
    ctx.translate(cx, cy);

    ctx.fillStyle = 'rgba(255,255,255,0.22)'; ctx.fill();
    ctx.strokeStyle = 'rgba(80,50,10,0.65)'; ctx.lineWidth = 2.5; ctx.stroke();
    const DIRS = [
      {l:'N', a:-Math.PI/2, col:'#e84040'},
      {l:'E', a:0,          col:'#fff'},
      {l:'S', a:Math.PI/2,  col:'#fff'},
      {l:'W', a:Math.PI,    col:'#fff'},
    ];
    for (let i = 0; i < DIRS.length; i++) {
      const d = DIRS[i];
      const cos = Math.cos(d.a), sin = Math.sin(d.a);
      const px = -sin*r*0.13, py = cos*r*0.13;
      ctx.beginPath();
      ctx.moveTo(cos*r*0.92, sin*r*0.92);
      ctx.lineTo(px, py); ctx.lineTo(0, 0); ctx.lineTo(-px, -py);

      ctx.fillStyle = d.col; ctx.fill();
      ctx.strokeStyle = '#3a2005'; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.font = 'bold ' + Math.round(r*0.33) + "px 'Segoe UI', Arial, sans-serif";
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.strokeStyle = '#f5e8b0'; ctx.lineWidth = 3.5;
      ctx.fillStyle = d.l === 'N' ? '#e84040' : '#3a2005';

      ctx.fillText(d.l,   cos*r*1.42, sin*r*1.42);

    ctx.fillStyle = '#222'; ctx.fill();
    ctx.restore();

  function drawBorder() {
    const p = 10, r = 16;
    ctx.save();
    ctx.strokeStyle = 'rgba(60,35,5,0.52)'; ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(p+r, p); ctx.arcTo(W-p, p, W-p, p+r, r);

  function getZoomTransform() {

    const Z = Math.max(1.25, (Math.min(W, H) - rem * 2) / (2.2 * s0));
    let z = 1 + et * (Z - 1);
    let panX = (W/2 * et + ix * (1 - et)) - z * ix;
    let panY = (H/2 * et + iy * (1 - et)) - z * iy;
    // compose second-level section zoom on top
    if (secZoom.sec && secZoom.t > 0) {
      const st = secZoom.t;
      const isl = zoomAnim.isl;
      const s1 = Math.min(W, H) * 0.105 * isl.size;
      const Z2 = 2.0;
      if (secZoom.prevSec) {

        const ps = secZoom.prevSec, ns = secZoom.sec;

        const pscyS = (isl.cy * H + ps.ny * s1) * z + panY;
        const nscxS = (isl.cx * W + ns.nx * s1) * z + panX;
        const nscyS = (isl.cy * H + ns.ny * s1) * z + panY;
        const focxS = pscxS + (nscxS - pscxS) * st;
        const focyS = pscyS + (nscyS - pscyS) * st;
        panX = panX * Z2 + focxS * (1 - Z2) + (W / 2 - focxS);
        panY = panY * Z2 + focyS * (1 - Z2) + (H / 2 - focyS);
        z = z * Z2;
      } else {

        const scx = isl.cx * W + sec.nx * s1;
        const scy = isl.cy * H + sec.ny * s1;
        const scxS = scx * z + panX;
        const scyS = scy * z + panY;
        const z2 = 1 + st * (Z2 - 1);

        const focyS = pucyS + (nucyS - pucyS) * ut;

        panY = panY * Z3 + focyS * (1 - Z3) + (H / 2 - focyS);
        z = z * Z3;
      } else {
        const pos = getUnitPos(isl, unitZoom.sec, unitZoom.unitIdx);
        const ucxS = pos.x * z + panX, ucyS = pos.y * z + panY;
        const z3 = 1 + ut * (Z3 - 1);
        panX = panX * z3 + ucxS * (1 - z3) + (W / 2 - ucxS) * ut;
        panY = panY * z3 + ucyS * (1 - z3) + (H / 2 - ucyS) * ut;
        z = z * z3;
      }
    }
    // compose 4th-level lesson zoom: zoom into the active unit's centroid
    if (lesZoom.sec && lesZoom.unitIdx >= 0 && lesZoom.t > 0) {
      const lt = lesZoom.t;
      const isl = zoomAnim.isl;
      const Z4 = 1.4;
      const pos = getUnitCenter(isl, lesZoom.sec, lesZoom.unitIdx);
      const ucxS = pos.x * z + panX, ucyS = pos.y * z + panY;
      const z4 = 1 + lt * (Z4 - 1);
      panX = panX * z4 + ucxS * (1 - z4) + (W / 2 - ucxS) * lt;
      panY = panY * z4 + ucyS * (1 - z4) + (H / 2 - ucyS) * lt;
      z = z * z4;
    }
    return { z, panX, panY };
  }

  function sectionAtPoint(mx, my) {
    const isl = zoomAnim.isl;
    if (!isl || !isl.sections) return null;
    const zt = getZoomTransform();
    if (!zt) return null;
    // invert zoom transform to get canvas coords
    const cx = (mx - zt.panX) / zt.z;
    const cy = (my - zt.panY) / zt.z;
    const x = isl.cx * W, y = isl.cy * H;
    const s = Math.min(W, H) * 0.105 * isl.size;
    const secs = isl.sections, n = secs.length;
    const R = s * 1.40, ys = 0.72;

    if (Math.hypot(dx, dy) > R) return null; // outside island radius
    const startA = -Math.PI * 0.5;
    let a = Math.atan2(dy, dx) - startA;
    if (a < 0) a += Math.PI * 2;
    return Math.floor(a / (Math.PI * 2 / n)) % n;

  function startZoom(isl) {

  // Sample island bezier path into a flat polygon for Sutherland-Hodgman clipping
  // Sutherland-Hodgman: clip polygon keeping the left side of directed line A→B
  function clipPolyHalf(poly, ax, ay, bx, by) {
    if (!poly.length) return poly;
    const out = [], dx = bx - ax, dy = by - ay;
    for (let i = 0; i < poly.length; i++) {
      const p = poly[i], q = poly[(i + 1) % poly.length];
      const dp = dx * (p.y - ay) - dy * (p.x - ax);
      const dq = dx * (q.y - ay) - dy * (q.x - ax);
      if (dp >= 0) out.push(p);
      if ((dp >= 0) !== (dq >= 0)) {
        const t = dp / (dp - dq);
        out.push({ x: p.x + t * (q.x - p.x), y: p.y + t * (q.y - p.y) });
      }
    }
    return out;
  }

  // Voronoi partition: N cells that tile the section area with matching edges
  function computeUnitBlobs(isl, sec) {
    if (_unitBlobsCache.sec === sec && _unitBlobsCache.W === W && _unitBlobsCache.H === H) {
      return _unitBlobsCache.data;
    }
    const secIdx = isl.sections.indexOf(sec);
    const n = isl.sections.length, N = sec.units;
    const x = isl.cx * W, y = isl.cy * H;
    const s = Math.min(W, H) * 0.105 * isl.size;
    const ys = 0.72, startA = -Math.PI * 0.5;
    const a0 = startA + (secIdx / n) * Math.PI * 2;
    const a1 = startA + ((secIdx + 1) / n) * Math.PI * 2;
    const angSpan = a1 - a0;
    let seed = sec.id.split('').reduce(function(a, c){ return a*31 + c.charCodeAt(0); }, 37);
    function rng(){ seed = (seed*1664525+1013904223)|0; return (seed>>>0)/0xffffffff; }
    const { bnd } = computeSecBnd(isl);
    const jj = (secIdx + 1) % n;
    const R = s * 1.40;
    const polyRes = 14, arcSteps = 32;
    // Use identity transform for all isPointInPath checks in this function
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    // Build sectionPoly with outer arc clamped to the island boundary (binary search)
    let sectionPoly = [{ x, y }];
    for (let k = 1; k <= polyRes; k++) {
      const t = k / polyRes;
      sectionPoly.push({
        x: (1-t)*(1-t)*x + 2*(1-t)*t*bnd[secIdx].cpx + t*t*bnd[secIdx].rx,
        y: (1-t)*(1-t)*y + 2*(1-t)*t*bnd[secIdx].cpy + t*t*bnd[secIdx].ry
      });
    }
    const arcRadii = [];
    for (let k = 1; k <= arcSteps; k++) {
      const aa = a0 + angSpan * k / arcSteps;
      const dx = Math.cos(aa), dy = Math.sin(aa) * ys;
      // Binary search for island boundary radius in this direction
      let lo = 0, hi = R;
      buildPath(isl, 1.0);
      if (!ctx.isPointInPath(x + dx * hi, y + dy * hi)) {
        for (let it = 0; it < 12; it++) {
          const mid = (lo + hi) / 2;
          buildPath(isl, 1.0);
          if (ctx.isPointInPath(x + dx * mid, y + dy * mid)) lo = mid; else hi = mid;
        }
        arcRadii.push(lo * 0.98);
        sectionPoly.push({ x: x + dx * lo * 0.98, y: y + dy * lo * 0.98 });

        sectionPoly.push({ x: x + dx * R, y: y + dy * R });

    for (let k = polyRes - 1; k >= 0; k--) {
      const t = k / polyRes;
      sectionPoly.push({
        x: (1-t)*(1-t)*x + 2*(1-t)*t*bnd[jj].cpx + t*t*bnd[jj].rx,
        y: (1-t)*(1-t)*y + 2*(1-t)*t*bnd[jj].cpy + t*t*bnd[jj].ry
