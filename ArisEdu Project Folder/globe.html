    }
    // Ray-casting PIP against the (island-bounded) section polygon
    function inSection(px, py) {
      let inside = false;
      for (let i = 0, j = sectionPoly.length - 1; i < sectionPoly.length; j = i++) {
        const xi = sectionPoly[i].x, yi = sectionPoly[i].y;
        const xj = sectionPoly[j].x, yj = sectionPoly[j].y;
        if (((yi > py) !== (yj > py)) && (px < (xj-xi)*(py-yi)/(yj-yi)+xi)) inside = !inside;
      }
      return inside;
    }
    // Bounding box of island-clamped sectionPoly for uniform rejection sampling
    let bboxMinX = Infinity, bboxMaxX = -Infinity, bboxMinY = Infinity, bboxMaxY = -Infinity;
    for (let k = 0; k < sectionPoly.length; k++) {
      if (sectionPoly[k].x < bboxMinX) bboxMinX = sectionPoly[k].x;
      if (sectionPoly[k].x > bboxMaxX) bboxMaxX = sectionPoly[k].x;
      if (sectionPoly[k].y < bboxMinY) bboxMinY = sectionPoly[k].y;
      if (sectionPoly[k].y > bboxMaxY) bboxMaxY = sectionPoly[k].y;
    }
    const avgIslR = arcRadii.reduce(function(a, b){ return a + b; }, 0) / arcRadii.length;
    const minDist = avgIslR * 0.38 / Math.sqrt(N);
    const edgeMargin = s * 0.11; // L/R/top clearance
    const edgeMarginBot = s * 0.21; // bottom clearance (lesson count line below unit number)
    // Uniform rejection sampling: seeds anywhere inside island-bounded sectionPoly
    const seeds = [];
    for (let i = 0; i < N; i++) {
      let sx, sy, placed = false;
      for (let attempt = 0; attempt < 400 && !placed; attempt++) {
        const cx2 = bboxMinX + rng() * (bboxMaxX - bboxMinX);
        const cy2 = bboxMinY + rng() * (bboxMaxY - bboxMinY);
        if (!inSection(cx2, cy2)) continue;
        buildPath(isl, 1.0);
        if (!ctx.isPointInPath(cx2, cy2)) continue;
        // Require clearance so the two-line label fits
        if (!ctx.isPointInPath(cx2 + edgeMargin, cy2) || !ctx.isPointInPath(cx2 - edgeMargin, cy2) ||
            !ctx.isPointInPath(cx2, cy2 - edgeMargin) || !ctx.isPointInPath(cx2, cy2 + edgeMarginBot)) continue;
        let ok = true;
        for (let j = 0; j < seeds.length; j++) {
          if (Math.hypot(cx2 - seeds[j].x, cy2 - seeds[j].y) < minDist) { ok = false; break; }
        }
        if (ok) { sx = cx2; sy = cy2; placed = true; }
      }
      if (!placed) {
        // Fallback without edge-margin constraint
        for (let attempt2 = 0; attempt2 < 200 && !placed; attempt2++) {
          const cx2 = bboxMinX + rng() * (bboxMaxX - bboxMinX);
          const cy2 = bboxMinY + rng() * (bboxMaxY - bboxMinY);
          if (!inSection(cx2, cy2)) continue;
          buildPath(isl, 1.0);
          if (!ctx.isPointInPath(cx2, cy2)) continue;
          let ok = true;
          for (let j = 0; j < seeds.length; j++) {
            if (Math.hypot(cx2 - seeds[j].x, cy2 - seeds[j].y) < minDist * 0.5) { ok = false; break; }
          }
          if (ok) { sx = cx2; sy = cy2; placed = true; }
        }
      }
      if (!placed) {
        const fa = a0 + ((i + 0.5) / N) * angSpan;
        for (let ri = 0; ri < 16; ri++) {
          const fr = avgIslR * (0.90 - ri * 0.06);
          const fx = x + Math.cos(fa) * fr, fy = y + Math.sin(fa) * fr * ys;
          buildPath(isl, 1.0);
          if (inSection(fx, fy) && ctx.isPointInPath(fx, fy)) { sx = fx; sy = fy; break; }
        }
        if (sx == null) { sx = x + Math.cos(a0 + angSpan * 0.5) * avgIslR * 0.40; sy = y + Math.sin(a0 + angSpan * 0.5) * avgIslR * 0.40 * ys; }
      }
      seeds.push({ x: sx, y: sy });
    }
    ctx.restore();
    // Sort: unit 1 nearest the outer edge, unit N nearest the center
    seeds.sort(function(a, b) {
      return Math.hypot(b.x - x, b.y - y) - Math.hypot(a.x - x, a.y - y);
    });
    // Each cell = sectionPoly clipped by perpendicular bisectors; label at centroid
    // Label validated against island boundary — centroid may fall in bezier-wing outside island
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    const cells = [];
    for (let i = 0; i < N; i++) {
      let cell = sectionPoly.slice();
      for (let j = 0; j < N; j++) {
        if (j === i || !cell.length) continue;
        const mx = (seeds[i].x + seeds[j].x) / 2;
        const my = (seeds[i].y + seeds[j].y) / 2;
        const dx = seeds[j].x - seeds[i].x;
        const dy = seeds[j].y - seeds[i].y;
        cell = clipPolyHalf(cell, mx, my, mx - dy, my + dx);
      }
      let lx = 0, ly = 0;
      for (let k = 0; k < cell.length; k++) { lx += cell[k].x; ly += cell[k].y; }
      let label;
      if (cell.length) {
        const clx = lx / cell.length, cly = ly / cell.length;
        // Check label has clearance from island edge.
        // Bottom needs extra margin for the lesson count line below the unit number.
        const tr = s * 0.11, trBot = s * 0.21;
        buildPath(isl, 1.0);
        const hasRoom = ctx.isPointInPath(clx + tr, cly) && ctx.isPointInPath(clx - tr, cly) &&
                        ctx.isPointInPath(clx, cly - tr) && ctx.isPointInPath(clx, cly + trBot);
        if (hasRoom) {
          label = { x: clx, y: cly };
        } else {
          // Slide toward seed until text fits inside island
          label = { x: seeds[i].x, y: seeds[i].y };
          for (let t = 0.15; t <= 0.95; t += 0.10) {
            const tx = clx + t * (seeds[i].x - clx);
            const ty = cly + t * (seeds[i].y - cly);
            buildPath(isl, 1.0);
            if (ctx.isPointInPath(tx + tr, ty) && ctx.isPointInPath(tx - tr, ty) &&
                ctx.isPointInPath(tx, ty - tr) && ctx.isPointInPath(tx, ty + trBot)) {
              label = { x: tx, y: ty }; break;
            }
          }
        }
      } else {
        label = { x: seeds[i].x, y: seeds[i].y };
      }
      cells.push({ seed: seeds[i], poly: cell, label });
    }
    ctx.restore();
    const data = { cells, seeds, sectionPoly, x, y, N, s };
    _unitBlobsCache = { sec, W, H, data };
    return data;
  }

  function getUnitPos(isl, sec, idx) {
    const { cells } = computeUnitBlobs(isl, sec);
    return { x: cells[idx].seed.x, y: cells[idx].seed.y };
  }

  function getUnitCenter(isl, sec, idx) {
    const { cells } = computeUnitBlobs(isl, sec);
    return { x: cells[idx].label.x, y: cells[idx].label.y };
  }

  function computeLessonBlobs(isl, sec, unitIdx) {
    if (_lessonBlobsCache.sec === sec && _lessonBlobsCache.unitIdx === unitIdx &&
        _lessonBlobsCache.W === W && _lessonBlobsCache.H === H) {
      return _lessonBlobsCache.data;
    }
    const { cells: uCells, s } = computeUnitBlobs(isl, sec);
    const unitPoly = uCells[unitIdx].poly;
    const N = (sec.lessons && sec.lessons[unitIdx]) || 1;
    if (!unitPoly.length) {
      const data = { cells: [], seeds: [], unitPoly: [], N: 0, s };
      _lessonBlobsCache = { sec, unitIdx, W, H, data }; return data;
    }
    let mnX = Infinity, mxX = -Infinity, mnY = Infinity, mxY = -Infinity;
    for (let k = 0; k < unitPoly.length; k++) {
      if (unitPoly[k].x < mnX) mnX = unitPoly[k].x;
      if (unitPoly[k].x > mxX) mxX = unitPoly[k].x;
      if (unitPoly[k].y < mnY) mnY = unitPoly[k].y;
      if (unitPoly[k].y > mxY) mxY = unitPoly[k].y;
    }
    function inPoly(px, py) {
      let inside = false;
      for (let i = 0, j = unitPoly.length - 1; i < unitPoly.length; j = i++) {
        const xi = unitPoly[i].x, yi = unitPoly[i].y, xj = unitPoly[j].x, yj = unitPoly[j].y;
        if (((yi > py) !== (yj > py)) && (px < (xj-xi)*(py-yi)/(yj-yi)+xi)) inside = !inside;
      }
      return inside;
    }
    let seed = sec.id.split('').reduce(function(a,c){return a*31+c.charCodeAt(0);}, 59 + unitIdx * 7);
    function rng(){seed=(seed*1664525+1013904223)|0;return(seed>>>0)/0xffffffff;}
    const polyArea = (mxX - mnX) * (mxY - mnY);
    const minDist = Math.sqrt(polyArea / N) * 0.28;
    const seeds = [];
    for (let i = 0; i < N; i++) {
      let sx, sy, placed = false;
      for (let attempt = 0; attempt < 300 && !placed; attempt++) {
        const cx2 = mnX + rng() * (mxX - mnX), cy2 = mnY + rng() * (mxY - mnY);
        if (!inPoly(cx2, cy2)) continue;
        let ok = true;
        for (let j = 0; j < seeds.length; j++) {
          if (Math.hypot(cx2 - seeds[j].x, cy2 - seeds[j].y) < minDist) { ok = false; break; }
        }
        if (ok) { sx = cx2; sy = cy2; placed = true; }
      }
      if (!placed) {
        for (let attempt = 0; attempt < 200 && !placed; attempt++) {
          const cx2 = mnX + rng() * (mxX - mnX), cy2 = mnY + rng() * (mxY - mnY);
          if (inPoly(cx2, cy2)) { sx = cx2; sy = cy2; placed = true; }
        }
      }
      if (!placed) { sx = (mnX + mxX) * 0.5; sy = (mnY + mxY) * 0.5; }
      seeds.push({ x: sx, y: sy });
    }
    const cells = [];
    for (let i = 0; i < N; i++) {
      let cell = unitPoly.slice();
      for (let j = 0; j < N; j++) {
        if (j === i || !cell.length) continue;
        const mx = (seeds[i].x + seeds[j].x) / 2, my = (seeds[i].y + seeds[j].y) / 2;
        const dx = seeds[j].x - seeds[i].x, dy = seeds[j].y - seeds[i].y;
        cell = clipPolyHalf(cell, mx, my, mx - dy, my + dx);
      }
      let lx = 0, ly = 0;
      for (let k = 0; k < cell.length; k++) { lx += cell[k].x; ly += cell[k].y; }
      const label = cell.length ? { x: lx / cell.length, y: ly / cell.length } : { x: seeds[i].x, y: seeds[i].y };
      cells.push({ seed: seeds[i], poly: cell, label });
    }
    const data = { cells, seeds, unitPoly, N, s };
    _lessonBlobsCache = { sec, unitIdx, W, H, data };
    return data;
  }

  function getLessonPos(isl, sec, unitIdx, lesIdx) {
    const { cells } = computeLessonBlobs(isl, sec, unitIdx);
    return { x: cells[lesIdx].seed.x, y: cells[lesIdx].seed.y };
  }

  function lessonAt(mx, my) {
    if (!lesZoom.sec || lesZoom.unitIdx < 0 || !zoomAnim.isl || lesZoom.t < 0.3) return -1;
    const sec = lesZoom.sec, unitIdx = lesZoom.unitIdx;
    const zt = getZoomTransform(); if (!zt) return -1;
    const px = (mx - zt.panX) / zt.z, py = (my - zt.panY) / zt.z;
    const { cells, unitPoly, N } = computeLessonBlobs(zoomAnim.isl, sec, unitIdx);
    let inUnit = false;
    for (let i = 0, j = unitPoly.length - 1; i < unitPoly.length; j = i++) {
      const xi = unitPoly[i].x, yi = unitPoly[i].y, xj = unitPoly[j].x, yj = unitPoly[j].y;
      if (((yi > py) !== (yj > py)) && (px < (xj - xi) * (py - yi) / (yj - yi) + xi)) inUnit = !inUnit;
    }
    if (!inUnit) return -1;
    for (let i = 0; i < N; i++) {
      const poly = cells[i].poly; if (!poly.length) continue;
      let inside = false;
      for (let j = 0, k = poly.length - 1; j < poly.length; k = j++) {
        const xi = poly[j].x, yi = poly[j].y, xj = poly[k].x, yj = poly[k].y;
        if (((yi > py) !== (yj > py)) && (px < (xj - xi) * (py - yi) / (yj - yi) + xi)) inside = !inside;
      }
      if (inside) return i;
    }
    return -1;
  }

  function unitAt(mx, my) {
    if (!secZoom.sec || !zoomAnim.isl || secZoom.t < 0.5) return -1;
    const sec = secZoom.sec, isl = zoomAnim.isl;
    if (!sec.units) return -1;
    const zt = getZoomTransform(); if (!zt) return -1;
    const px = (mx - zt.panX) / zt.z, py = (my - zt.panY) / zt.z;
    const { cells, sectionPoly, N, x, y, s } = computeUnitBlobs(isl, sec);
    if (Math.hypot(px - x, py - y) > s * 1.50) return -1;
    // Reject if outside island-bounded sectionPoly (no canvas state needed)
    let inSec = false;
    for (let i = 0, j = sectionPoly.length - 1; i < sectionPoly.length; j = i++) {
      const xi = sectionPoly[i].x, yi = sectionPoly[i].y;
      const xj = sectionPoly[j].x, yj = sectionPoly[j].y;
      if (((yi > py) !== (yj > py)) && (px < (xj - xi) * (py - yi) / (yj - yi) + xi)) inSec = !inSec;
    }
    if (!inSec) return -1;
    // Point-in-polygon on each Voronoi cell for accurate hitbox
    for (let i = 0; i < N; i++) {
      const poly = cells[i].poly;
      if (!poly.length) continue;
      let inside = false;
      for (let j = 0, k = poly.length - 1; j < poly.length; k = j++) {
        const xi = poly[j].x, yi = poly[j].y, xj = poly[k].x, yj = poly[k].y;
        if (((yi > py) !== (yj > py)) && (px < (xj - xi) * (py - yi) / (yj - yi) + xi)) inside = !inside;
      }
      if (inside) return i;
    }
    return -1;
  }

  function drawSectionUnits(isl, sec, alpha) {
    if (alpha <= 0 || !sec.units) return;
    const { cells, N, s } = computeUnitBlobs(isl, sec);
    const activeIdx = (unitZoom.sec === sec && unitZoom.unitIdx >= 0 && unitZoom.t > 0) ? unitZoom.unitIdx : -1;
    const ir = s * 0.090;
    const secIdx = isl.sections.indexOf(sec);
    const n = isl.sections.length;
    const ys = 0.72, startA = -Math.PI * 0.5;
    const a0 = startA + (secIdx / n) * Math.PI * 2;
    const a1 = startA + ((secIdx + 1) / n) * Math.PI * 2;
    const angSpan = a1 - a0;
    const cx = isl.cx * W, cy = isl.cy * H;
    ctx.save();
    // clip 1: smooth island bezier boundary
    buildPath(isl, 1.0);
    ctx.clip();
    // clip 2: exact curved section boundary matching drawIslandSections
    const { bnd: bndC } = computeSecBnd(isl);
    const jC = (secIdx + 1) % n;
    const RC = s * 1.40;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.quadraticCurveTo(bndC[secIdx].cpx, bndC[secIdx].cpy, bndC[secIdx].rx, bndC[secIdx].ry);
    for (let k = 1; k <= 28; k++) {
      const aa = a0 + angSpan * k / 28;
      ctx.lineTo(cx + Math.cos(aa) * RC, cy + Math.sin(aa) * RC * ys);
    }
    ctx.quadraticCurveTo(bndC[jC].cpx, bndC[jC].cpy, cx, cy);
    ctx.closePath();
    ctx.clip();
    for (let i = 0; i < N; i++) {
      const cell = cells[i];
      if (!cell.poly.length) continue;
      const isActive = (activeIdx < 0 || i === activeIdx);
      const isHov = (hoverUnit === i && activeIdx < 0);
      ctx.beginPath();
      ctx.moveTo(cell.poly[0].x, cell.poly[0].y);
      for (let k = 1; k < cell.poly.length; k++) ctx.lineTo(cell.poly[k].x, cell.poly[k].y);
      ctx.closePath();
      ctx.globalAlpha = alpha * (isHov ? 0.82 : 0.62);
      ctx.fillStyle = GREY_FILL;
      ctx.fill();
      const _uf = COMP_UNIT[sec.id + '_' + i] || 0;
      if (_uf > 0) { ctx.globalAlpha = alpha * _uf * 0.68; ctx.fillStyle = CLAIM_COL; ctx.fill(); }
      if (!isActive) {
        ctx.globalAlpha = alpha * 0.65 * (activeIdx >= 0 ? unitZoom.t : 0);
        ctx.fillStyle = 'rgba(0,0,0,1)';
        ctx.fill();
      }
      ctx.globalAlpha = alpha * (isActive ? 0.85 : 0.35);
      ctx.strokeStyle = isHov ? 'rgba(255,255,255,0.92)' : 'rgba(0,0,0,0.65)';
      ctx.lineWidth = Math.max(1.5, s * 0.018);
      ctx.stroke();
      ctx.globalAlpha = alpha * (isActive ? 0.95 : 0.30);
      const isLesZooming = lesZoom.sec === sec && lesZoom.unitIdx === i && lesZoom.t > 0;
      const lesAnyActive = lesZoom.sec === sec && lesZoom.t > 0;
      // fade out non-active unit labels as lesson zoom opens
      const lesOtherFade = (lesAnyActive && !isLesZooming) ? Math.max(0, 1 - lesZoom.t * 2) : 1;
      const labelAlpha = isLesZooming ? Math.max(0, 1 - lesZoom.t * 2) : lesOtherFade;
      if (labelAlpha > 0.02) {
        ctx.globalAlpha = alpha * (isActive ? 0.95 : 0.30) * labelAlpha;
        const lessonCount = sec.lessons ? sec.lessons[i] : null;
        const labelY = cell.label.y;
        ctx.font = 'bold ' + Math.round(ir) + 'px Arial,sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.strokeStyle = 'rgba(0,0,0,0.72)';
        ctx.lineWidth = ir * 0.28;
        ctx.strokeText(i + 1, cell.label.x, labelY);
        ctx.fillStyle = 'white';
        ctx.fillText(i + 1, cell.label.x, labelY);
      }
      if (isLesZooming) {
        drawUnitLessons(isl, sec, i, alpha * lesZoom.t);
      }
    }
    ctx.restore();
  }

  function drawUnitLessons(isl, sec, unitIdx, alpha) {
    if (alpha <= 0) return;
    const { cells, unitPoly, N, s } = computeLessonBlobs(isl, sec, unitIdx);
    if (!N || !unitPoly.length) return;
    // font proportional to average lesson-cell size, not island size
    let mnXu = Infinity, mxXu = -Infinity, mnYu = Infinity, mxYu = -Infinity;
    for (const p of unitPoly) { mnXu=Math.min(mnXu,p.x); mxXu=Math.max(mxXu,p.x); mnYu=Math.min(mnYu,p.y); mxYu=Math.max(mxYu,p.y); }
    const cellSpan = Math.sqrt((mxXu-mnXu) * (mxYu-mnYu) / N);
    const ir = Math.round(Math.max(3, cellSpan * 0.36));
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(unitPoly[0].x, unitPoly[0].y);
    for (let k = 1; k < unitPoly.length; k++) ctx.lineTo(unitPoly[k].x, unitPoly[k].y);
    ctx.closePath();
    ctx.clip();
    for (let i = 0; i < N; i++) {
      const cell = cells[i];
      if (!cell.poly.length) continue;
      const isHov = (hoverLesson === i);
      ctx.beginPath();
      ctx.moveTo(cell.poly[0].x, cell.poly[0].y);
      for (let k = 1; k < cell.poly.length; k++) ctx.lineTo(cell.poly[k].x, cell.poly[k].y);
      ctx.closePath();
      const done = isLessonDone(sec.id, unitIdx, i);
      ctx.globalAlpha = alpha * (isHov ? 0.88 : 0.68);
      ctx.fillStyle = done ? (isHov ? CLAIM_COL_HI : CLAIM_COL) : (isHov ? GREY_FILL_HI : GREY_FILL);
      ctx.fill();
      ctx.globalAlpha = alpha * 0.90;
      ctx.strokeStyle = isHov ? 'rgba(255,255,255,0.95)' : 'rgba(255,255,255,0.65)';
      ctx.lineWidth = Math.max(0.8, s * 0.010);
      ctx.stroke();
      ctx.globalAlpha = alpha * 0.95;
      ctx.font = 'bold ' + Math.round(ir) + 'px Arial,sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.strokeStyle = 'rgba(0,0,0,0.72)';
      ctx.lineWidth = ir * 0.28;
      ctx.strokeText(i + 1, cell.label.x, cell.label.y);
      ctx.fillStyle = 'white';
      ctx.fillText(i + 1, cell.label.x, cell.label.y);
    }
    ctx.restore();
  }

  function drawCourseIcon(id, cx, cy, r, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = 'rgba(255,255,255,0.92)';
    ctx.fillStyle   = 'rgba(255,255,255,0.92)';
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.lineWidth = Math.max(1.2, r * 0.17);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    if (id === 'algebra1') {
      ctx.font = 'bold ' + Math.max(8,Math.round(r*1.50)) + 'px Georgia,serif';
      ctx.strokeStyle='rgba(0,0,0,0.60)'; ctx.lineWidth=r*0.24; ctx.strokeText('x',cx,cy);
      ctx.strokeStyle='rgba(255,255,255,0.92)'; ctx.lineWidth=r*0.08; ctx.strokeText('x',cx,cy);
      ctx.fillText('x',cx,cy);
    } else if (id === 'algebra2') {
      ctx.font = 'bold ' + Math.max(8,Math.round(r*1.25)) + 'px Georgia,serif';
      ctx.strokeStyle='rgba(0,0,0,0.60)'; ctx.lineWidth=r*0.24; ctx.strokeText('x\u00B2',cx,cy);
      ctx.strokeStyle='rgba(255,255,255,0.92)'; ctx.lineWidth=r*0.08; ctx.strokeText('x\u00B2',cx,cy);
      ctx.fillText('x\u00B2',cx,cy);
    } else if (id === 'geometry') {
      ctx.beginPath(); ctx.moveTo(cx,cy-r*0.90); ctx.lineTo(cx+r*0.85,cy+r*0.64); ctx.lineTo(cx-r*0.85,cy+r*0.64); ctx.closePath(); ctx.stroke();
    } else if (id === 'precalc') {
      ctx.font = 'bold ' + Math.max(10,Math.round(r*1.95)) + 'px Georgia,serif';
      ctx.strokeStyle='rgba(0,0,0,0.60)'; ctx.lineWidth=r*0.24; ctx.strokeText('\u222B',cx,cy+r*0.12);
      ctx.strokeStyle='rgba(255,255,255,0.92)'; ctx.lineWidth=r*0.08; ctx.strokeText('\u222B',cx,cy+r*0.12);
      ctx.fillText('\u222B',cx,cy+r*0.12);
    } else if (id === 'trig') {
      ctx.beginPath(); ctx.moveTo(cx-r*0.85,cy+r*0.72); ctx.lineTo(cx+r*0.85,cy+r*0.72); ctx.lineTo(cx,cy-r*0.72); ctx.closePath(); ctx.stroke();
      ctx.save(); ctx.setLineDash([r*0.20,r*0.14]);
      ctx.beginPath(); ctx.moveTo(cx,cy-r*0.72); ctx.lineTo(cx,cy+r*0.72); ctx.stroke();
      ctx.restore();
    } else if (id === 'statistics') {
      // bars vertically centered: bottom at cy+r*0.55, tops spread upward symmetrically
      const bw=r*0.32, hs=[r*0.68,r*1.10,r*0.85], bx0=cx-r*0.56;
      for (let j=0;j<3;j++){ctx.beginPath();ctx.rect(bx0+j*(bw+r*0.12),cy+r*0.55-hs[j],bw,hs[j]);ctx.stroke();}
    } else if (id === 'linalg') {
      for (let ri=0;ri<3;ri++) for (let ci=0;ci<3;ci++) {
        ctx.beginPath(); ctx.arc(cx-r*0.60+ci*r*0.60, cy-r*0.60+ri*r*0.60, r*0.11, 0, Math.PI*2); ctx.fill();
      }
    } else if (id === 'finmath') {
      ctx.beginPath(); ctx.arc(cx,cy,r*0.85,0,Math.PI*2); ctx.stroke();
      ctx.font='bold '+Math.max(8,Math.round(r*1.20))+'px Georgia,serif';
      ctx.strokeStyle='rgba(0,0,0,0.60)'; ctx.lineWidth=r*0.24; ctx.strokeText('$',cx,cy);
      ctx.strokeStyle='rgba(255,255,255,0.92)'; ctx.lineWidth=r*0.08; ctx.strokeText('$',cx,cy); ctx.fillText('$',cx,cy);
    } else if (id === 'physics') {
      // thunderbolt: top-right to mid, jag left, continue down-right
      ctx.beginPath();
      ctx.moveTo(cx+r*0.28, cy-r*0.92);
      ctx.lineTo(cx-r*0.12, cy-r*0.04);
      ctx.lineTo(cx+r*0.20, cy-r*0.04);
      ctx.lineTo(cx-r*0.28, cy+r*0.92);
      ctx.lineTo(cx+r*0.12, cy+r*0.04);
      ctx.lineTo(cx-r*0.20, cy+r*0.04);
      ctx.closePath();
      ctx.globalAlpha = alpha * 0.28; ctx.fill();
      ctx.globalAlpha = alpha; ctx.stroke();
    } else if (id === 'chemistry') {
      const fw=r*0.28;
      ctx.beginPath(); ctx.moveTo(cx-fw,cy-r); ctx.lineTo(cx-fw,cy-r*0.15); ctx.lineTo(cx-r*0.82,cy+r*0.88); ctx.lineTo(cx+r*0.82,cy+r*0.88); ctx.lineTo(cx+fw,cy-r*0.15); ctx.lineTo(cx+fw,cy-r); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx-fw*1.6,cy-r); ctx.lineTo(cx+fw*1.6,cy-r); ctx.stroke();
      ctx.beginPath(); ctx.arc(cx-r*0.20,cy+r*0.38,r*0.14,0,Math.PI*2); ctx.fill();
    } else if (id === 'biology') {
      for (let sg=-1;sg<=1;sg+=2) {
        ctx.beginPath();
        for (let k=0;k<=20;k++){const t=k/20;const px=cx+sg*Math.sin(t*Math.PI*3)*r*0.50;const py=cy-r*0.90+t*r*1.80;k===0?ctx.moveTo(px,py):ctx.lineTo(px,py);}
        ctx.stroke();
      }
      for (let k=0;k<=2;k++){const t=(k+0.5)/3;const py=cy-r*0.90+t*r*1.80;const px=Math.sin(t*Math.PI*3)*r*0.50;ctx.globalAlpha=alpha*0.48;ctx.beginPath();ctx.moveTo(cx+px,py);ctx.lineTo(cx-px,py);ctx.stroke();ctx.globalAlpha=alpha;}
    } else if (id === 'earth') {
      ctx.beginPath(); ctx.arc(cx,cy,r*0.85,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx-r*0.85,cy); ctx.lineTo(cx+r*0.85,cy); ctx.stroke();
      ctx.beginPath(); ctx.ellipse(cx,cy,r*0.38,r*0.85,0,0,Math.PI*2); ctx.stroke();
    } else if (id === 'integrated') {
      ctx.beginPath(); ctx.arc(cx,cy,r*0.18,0,Math.PI*2); ctx.fill();
      for (let j=0;j<3;j++){ctx.save();ctx.translate(cx,cy);ctx.rotate(j*Math.PI/3);ctx.beginPath();ctx.ellipse(0,0,r*0.90,r*0.34,0,0,Math.PI*2);ctx.stroke();ctx.restore();}
    } else if (id === 'environmental') {
      ctx.beginPath(); ctx.moveTo(cx,cy+r*0.92); ctx.bezierCurveTo(cx-r*1.08,cy+r*0.18,cx-r*0.72,cy-r*0.88,cx,cy-r*0.92); ctx.bezierCurveTo(cx+r*0.72,cy-r*0.88,cx+r*1.08,cy+r*0.18,cx,cy+r*0.92); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx,cy+r*0.92); ctx.lineTo(cx,cy-r*0.92); ctx.stroke();
    } else if (id === 'astronomy') {
      ctx.beginPath();
      for (let j=0;j<10;j++){const rad=j%2===0?r*0.90:r*0.38;const a=j*Math.PI/5-Math.PI/2;j===0?ctx.moveTo(cx+Math.cos(a)*rad,cy+Math.sin(a)*rad):ctx.lineTo(cx+Math.cos(a)*rad,cy+Math.sin(a)*rad);}
      ctx.closePath(); ctx.globalAlpha=alpha*0.42; ctx.fill(); ctx.globalAlpha=alpha; ctx.stroke();
    } else if (id === 'anatomy') {
      // head top ≈ cy-0.90r, feet ≈ cy+0.90r → centered
      ctx.beginPath(); ctx.arc(cx, cy-r*0.62, r*0.28, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx, cy-r*0.34); ctx.lineTo(cx, cy+r*0.28); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx-r*0.56, cy-r*0.08); ctx.lineTo(cx+r*0.56, cy-r*0.08); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx, cy+r*0.28); ctx.lineTo(cx-r*0.40, cy+r*0.90); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx, cy+r*0.28); ctx.lineTo(cx+r*0.40, cy+r*0.90); ctx.stroke();
    } else if (id === 'marine') {
      ctx.beginPath(); ctx.ellipse(cx-r*0.08,cy,r*0.66,r*0.38,0,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx+r*0.54,cy); ctx.lineTo(cx+r*0.92,cy-r*0.50); ctx.lineTo(cx+r*0.92,cy+r*0.50); ctx.closePath(); ctx.stroke();
      ctx.beginPath(); ctx.arc(cx-r*0.25,cy-r*0.10,r*0.09,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  function drawIslandSections(isl, s, alpha) {
    if (alpha <= 0) return;
    const x = isl.cx * W, y = isl.cy * H;
    const secs = isl.sections, n = secs.length;
    const R = s * 1.40, ys = 0.72, startA = -Math.PI * 0.5;
    // reuse same bnd[] as computeSecBnd (identical RNG seed)
    const { bnd } = computeSecBnd(isl);
    ctx.save();
    buildPath(isl, 1.0);
    ctx.clip();
    // which section is currently sec-zoomed (if any)
    const secZoomIdx = (secZoom.sec && secZoom.t > 0)
      ? isl.sections.indexOf(secZoom.sec) : -1;
    // sector fills (curved bezier boundaries + arc rim)
    for (let i = 0; i < n; i++) {
      const j = (i + 1) % n;
      const isActive = (secZoomIdx < 0 || i === secZoomIdx);
      const isHov = (hoverSec === i);
      const a0 = startA + (i / n) * Math.PI * 2;
      const a1 = startA + ((i + 1) / n) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.quadraticCurveTo(bnd[i].cpx, bnd[i].cpy, bnd[i].rx, bnd[i].ry);
      for (let k = 1; k <= 28; k++) {
        const a = a0 + (a1 - a0) * k / 28;
        ctx.lineTo(x + Math.cos(a) * R, y + Math.sin(a) * R * ys);
      }
      ctx.quadraticCurveTo(bnd[j].cpx, bnd[j].cpy, x, y);
      ctx.closePath();
      ctx.globalAlpha = alpha * (isHov ? 0.65 : 0.35);
      ctx.fillStyle = GREY_FILL;
      ctx.fill();
      const _sf = COMP_SEC[secs[i].id] || 0;
      if (_sf > 0) { ctx.globalAlpha = alpha * _sf * 0.50; ctx.fillStyle = CLAIM_COL; ctx.fill(); }
      // dark overlay on inactive sectors — dims terrain+trees, fades in with sec zoom
      if (!isActive) {
        ctx.globalAlpha = alpha * 0.65 * secZoom.t;
        ctx.fillStyle = 'rgba(0,0,0,1)';
        ctx.fill();
      }
      if (isHov && secZoomIdx < 0) {
        ctx.globalAlpha = alpha * 0.90;
        ctx.strokeStyle = 'rgba(0,0,0,0.70)';
        ctx.lineWidth = Math.max(2, s * 0.022);
        ctx.stroke();
      }
    }
    // curved dividing lines
    ctx.strokeStyle = 'rgba(0,0,0,0.60)';
    ctx.lineWidth = Math.max(1.5, s * 0.018);
    for (let i = 0; i < n; i++) {
      const isActive = (secZoomIdx < 0 || i === secZoomIdx);
      ctx.globalAlpha = alpha * (isActive ? 1 : 0.5);
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.quadraticCurveTo(bnd[i].cpx, bnd[i].cpy, bnd[i].rx, bnd[i].ry);
      ctx.stroke();
    }
    // course icons at sector centroids
    const ir = s * 0.115;
    for (let i = 0; i < n; i++) {
      const isActive = (secZoomIdx < 0 || i === secZoomIdx);
      const ix = x + secs[i].nx * s;
      const iy = y + secs[i].ny * s;
      const iconAlpha = (secZoomIdx >= 0 && i === secZoomIdx)
        ? alpha * (1 - secZoom.t)
        : alpha * (isActive ? 1 : 0.5);
      if (iconAlpha > 0.01) drawCourseIcon(secs[i].id, ix, iy, ir, iconAlpha);
    }
    // draw unit badges for the sec-zoomed section
    if (secZoomIdx >= 0 && secZoom.t > 0) {
      drawSectionUnits(isl, secs[secZoomIdx], secZoom.t);
    }
    ctx.restore();
  }

  // Returns the bnd[] array for sector boundaries — same seeded RNG as drawIslandSections
  function computeSecBnd(isl) {
    let seed = isl.id.split('').reduce(function(a,c){return a*31+c.charCodeAt(0);}, 17);
    function rng(){seed=(seed*1664525+1013904223)|0;return (seed>>>0)/0xffffffff;}
    const x = isl.cx * W, y = isl.cy * H;
    const n = isl.sections.length;
    const s = Math.min(W, H) * 0.105 * isl.size;
    const R = s * 1.40, ys = 0.72, startA = -Math.PI * 0.5;
    const bnd = [];
    for (let i = 0; i < n; i++) {
      const a = startA + (i / n) * Math.PI * 2;
      const rx = x + Math.cos(a) * R, ry = y + Math.sin(a) * R * ys;
      const mx = (x + rx) * 0.5, my = (y + ry) * 0.5;
      const perp = (rng() - 0.5) * R * 0.52;
      bnd.push({ rx, ry, cpx: mx - Math.sin(a) * perp, cpy: my + Math.cos(a) * perp * ys });
    }
    return { bnd, x, y, n, R, ys, startA };
  }

  function redraw() {
    ctx.clearRect(0, 0, W, H);

    // Ocean drawn at identity — always covers full screen
    drawOcean();

    // ── Compute zoom + pan transform ──
    const hasZoom = zoomAnim.isl && zoomAnim.t > 0;
    if (hasZoom) {
      const et = zoomAnim.t;
      const ix = zoomAnim.isl.cx * W, iy = zoomAnim.isl.cy * H;
      const s0 = Math.min(W, H) * 0.105 * zoomAnim.isl.size;
      const rem = parseFloat(getComputedStyle(document.documentElement).fontSize) || 16;
      const Z = Math.max(1.25, (Math.min(W, H) - rem * 2) / (2.2 * s0));
      const { z, panX, panY } = getZoomTransform();
      ctx.setTransform(z, 0, 0, z, panX, panY);
    }

    drawRoutes();
    for (let i = 0; i < ISLANDS.length; i++) {
      const thisIsl = ISLANDS[i];
      drawIsland(thisIsl, !hasZoom && thisIsl.id === hoverId);
    }
    drawDecoFeatures();

    // Course sections fade in with zoom
    if (hasZoom) {
      drawIslandSections(zoomAnim.isl, Math.min(W, H) * 0.105 * zoomAnim.isl.size, zoomAnim.t);
    }

    if (hasZoom) {
      ctx.setTransform(1, 0, 0, 1, 0, 0);
    }

    // UI always in screen space (outside zoom transform)
    const cr = Math.min(W, H) * 0.062;
    drawCompass(W - cr*2.20, cr*2.20, cr);
    drawBorder();
    drawTitle();
  }

  canvas.addEventListener('click', function(e) {
    // 3rd level: unit-zoomed
    if (unitZoom.sec && unitZoom.t > 0.7) {
      // lesson cell click → navigate to lesson page
      if (lesZoom.sec && lesZoom.t > 0.3) {
        const li = lessonAt(e.clientX, e.clientY);
        if (li >= 0) {
          const cf = COURSE_FOLDER[lesZoom.sec.id];
          if (cf) {
            const u = lesZoom.unitIdx + 1, l = li + 1;
            const file = encodeURIComponent(cf.pre + u + '.' + l + '_Video.html');
            window.location.href = 'CourseFiles/' + cf.folder + '/Unit' + u + '/' + file;
            return;
          }
        }
      }
      const ui = unitAt(e.clientX, e.clientY);
      if (ui >= 0 && ui !== unitZoom.unitIdx) { const s3 = secZoom.sec; startUnitZoom(ui); startLesZoom(s3, ui); return; }
      endUnitZoom(); return;
    }
    // 2nd level: sec-zoomed
    if (secZoom.sec && secZoom.t > 0.7) {
      const ui = unitAt(e.clientX, e.clientY);
      if (ui >= 0) { const s2 = secZoom.sec; startUnitZoom(ui); startLesZoom(s2, ui); return; }
      const si = sectionAtPoint(e.clientX, e.clientY);
      const newSec = (si !== null) ? zoomAnim.isl.sections[si] : null;
      if (newSec && newSec !== secZoom.sec) { startSecZoom(newSec); return; }
      endSecZoom(); return;
    }
    if (secZoom.sec) { endSecZoom(); return; }
    if (zoomAnim.isl && zoomAnim.t > 0.85) {
      const si = sectionAtPoint(e.clientX, e.clientY);
      if (si !== null) { startSecZoom(zoomAnim.isl.sections[si]); return; }
      endZoom(); return;
    }
    if (zoomAnim.isl) {
      endZoom();
    } else {
      const isl = islandAt(e.clientX, e.clientY);
      if (isl) startZoom(isl);
    }
  });

  let hoverRaf = 0;

  canvas.addEventListener('mousemove', function(e) {
    if (zoomAnim.isl && zoomAnim.t > 0.85) {
      const ex = e.clientX, ey = e.clientY;
      // unit hover (highest priority when sec-zoomed)
      if (secZoom.sec && secZoom.t > 0.5) {
        // lesson hover (inside active unit, when lesson view is open)
        if (lesZoom.sec === secZoom.sec && lesZoom.unitIdx >= 0 && lesZoom.t > 0.3) {
          const li = lessonAt(ex, ey);
          if (li !== hoverLesson) {
            hoverLesson = li;
            if (!hoverRaf) hoverRaf = requestAnimationFrame(function(){ hoverRaf=0; redraw(); });
          }
          if (li >= 0) {
            canvas.style.cursor = 'pointer';
            const _u = lesZoom.unitIdx, _l = li;
            const _lesName = LESSON_NAMES[lesZoom.sec.id]?.[_u]?.[_l];
            tipName.textContent = _lesName || ('Lesson ' + (_u + 1) + '.' + (_l + 1));
            tipCourses.textContent = secZoom.sec.name + ' · Unit ' + (_u + 1);
            tip.style.left = Math.min(ex + 16, innerWidth  - 228) + 'px';
            tip.style.top  = Math.min(ey + 16, innerHeight - 130) + 'px';
            tip.style.display = 'block';
            return;
          }
          tip.style.display = 'none';
        }
        const ui = unitAt(ex, ey);
        if (ui !== hoverUnit) {
          hoverUnit = ui;
          if (!hoverRaf) hoverRaf = requestAnimationFrame(function(){ hoverRaf=0; redraw(); });
        }
        if (ui >= 0) {
          canvas.style.cursor = 'pointer';
          tipName.textContent    = 'Unit ' + (ui + 1);
          tipCourses.textContent = secZoom.sec.name;
          tip.style.left = Math.min(ex + 16, innerWidth  - 228) + 'px';
          tip.style.top  = Math.min(ey + 16, innerHeight - 130) + 'px';
          tip.style.display = 'block';
          return;
        }
        tip.style.display = 'none';
      }
      // section hover
      const si = sectionAtPoint(ex, ey);
      canvas.style.cursor = (si !== null) ? 'pointer' : 'default';
      if (si !== null) {
        const sec = zoomAnim.isl.sections[si];
        tipName.textContent    = sec.name;
        tipCourses.textContent = zoomAnim.isl.name;
        tip.style.left = Math.min(ex + 16, innerWidth  - 228) + 'px';
        tip.style.top  = Math.min(ey + 16, innerHeight - 130) + 'px';
        tip.style.display = 'block';
      } else {
        tip.style.display = 'none';
      }
      if (si !== hoverSec) {
        hoverSec = si;
        if (!hoverRaf) hoverRaf = requestAnimationFrame(function(){ hoverRaf=0; redraw(); });
      }
      return;
    }
    if (zoomAnim.isl) return; // animating — ignore
    const isl = islandAt(e.clientX, e.clientY);
    const nid = isl ? isl.id : null;
    if (nid !== hoverId) {
      hoverId = nid;
      canvas.style.cursor = nid ? 'pointer' : 'crosshair';
      redraw();
    }
    if (isl) {
      tipName.textContent  = isl.name;
      tipCourses.textContent = '';
      isl.courses.forEach(function(c, i) {
        if (i) tipCourses.appendChild(document.createElement('br'));
        tipCourses.appendChild(document.createTextNode(c));
      });
      tip.style.left    = Math.min(e.clientX + 16, innerWidth  - 228) + 'px';
      tip.style.top     = Math.min(e.clientY + 16, innerHeight - 130) + 'px';
      tip.style.display = 'block';
    } else {
      tip.style.display = 'none';
    }
  });

  canvas.addEventListener('mouseleave', function() {
    hoverId = null; hoverSec = null; hoverUnit = -1;
    tip.style.display = 'none';
    redraw();
  });

  window.addEventListener('resize', function() {
    W = canvas.width  = innerWidth;
    H = canvas.height = innerHeight;
    redraw();
  });

  W = canvas.width  = innerWidth;
  H = canvas.height = innerHeight;
  redraw();
})();
</script>
</body>
