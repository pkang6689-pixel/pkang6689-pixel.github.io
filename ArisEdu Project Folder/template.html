<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TITLE_PLACEHOLDER</title>
  <script src="../_sdk/element_sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
  <style>
    body {
      box-sizing: border-box;
      background-color: white;
    }
    
    .logo-font {
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    
    .main-container {
      height: 100%;
      width: 100%;
      padding: 5rem 2rem 2rem 2rem;
      overflow: auto;
    }
    
    /* Taskbar styles now loaded from styles/main.css */

    @media (max-width: 640px) {
      .courses-grid {
        grid-template-columns: 1fr;
        gap: 2rem;
      }
    
      .courses-container {
        height: auto; /* Remove fixed height */
      }
    }

    /* .settings-menu styles are in main.css (position:fixed, z-index:10000) */

    .courses-container {
      background: linear-gradient(#3b82f6 0%, #10b981 50%, #8b5cf6 100%);
      border-radius: 2rem;
      height:32rem;
      padding: 2rem;
      margin-bottom: 2rem;
    }

    .courses-section {
      margin-bottom: 2rem;
    }

    .courses-section-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: white;
      margin-bottom: 1rem;
    }

    .courses-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }

    .course-box {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 0.75rem;
      padding: 1.5rem;
      text-align: center;
      transition: all 0.3s ease;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      color: #1e293b;
    }

    .course-box:hover {
      transform: translateY(-4px);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.2);
      background: white;
    }

    .course-box a {
      text-decoration: none;
      color: #1e293b;
      font-size: 1.125rem;
      font-weight: 600;
      display: block;
    }

    .course-box a:hover {
      color: #3b82f6;
    }

    body.dark-mode .course-box {
      background: rgba(15, 23, 42, 0.8);
      color: #cbd5e1;
    }

    body.dark-mode .course-box a {
      color: #cbd5e1;
    }

    body.dark-mode .course-box a:hover {
      color: #3b82f6;
    }

    body.dark-mode {
      background-color: #1e293b;
    }

  </style>
 <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="theme_manager.js"></script>
</head>
 <body class="h-full dark-mode">
<script src="scripts/taskbar.js"></script>
  <main class="main-container">
    <div class="courses-container">
      <div class="courses-section">
        <h2 class="courses-section-title">H2_PLACEHOLDER</h2>
        <p>P_PLACEHOLDER</p>
      </div>
    </div>
  </main>

    <!-- ArisEdu Global Search -->

    <script src="scripts/translation_loader.js" data-base="translations"></script>
<script src="../search_data.js"></script>
    <script src="../search_logic.js"></script>
</body>
</html>
