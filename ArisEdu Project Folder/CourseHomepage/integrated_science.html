<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>High School: Integrated Science</title>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/ArisEdu Project Folder/styles/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="../theme_manager.js"></script>
  <script type="module">
    // Import Firebase config and make auth + db available to analytics
    import { auth, db } from '../firebase-config.js';
    window.auth = auth;
    window.db = db;
  </script>
<script src="../scripts/analytics-helper.js"></script>
  <script charset="UTF-8" src="../scripts/global_translations.js?v=7.4"></script>
  <script src="../scripts/spanish_translations.js?v=1.4"></script>
  <script src="../scripts/hindi_translations.js?v=1.4"></script>
</head>
 <body class="dark-mode h-full">
<script src="../scripts/taskbar.js"></script>
  <main class="main-container">
    <div class="logo-title-wrapper" style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem;">
      <h1 id="company-name" class="logo-font page-title" style="font-size: 3rem; margin-bottom: 0;">High School: Integrated Science</h1>
    </div>
    <div class="courses-container">
      <div style="position: relative; transform: translateY(0); display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; padding: 1rem; min-height: 60rem;" id="grid-container"></div>
    </div>
  </main>

  <style>
    #lesson-tooltip {
        position: fixed;
        background: rgba(15, 23, 42, 0.95);
        backdrop-filter: blur(12px);
        color: #f1f5f9;
        padding: 0.75rem 1.25rem;
        border-radius: 0.75rem;
        font-size: 0.95rem;
        font-weight: 600;
        pointer-events: none;
        z-index: 10000;
        opacity: 0;
        transition: opacity 0.15s ease;
        border: 1px solid rgba(255, 255, 255, 0.15);
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        white-space: nowrap;
        display: none;
    }
    #lesson-tooltip[data-visible="true"] {
        opacity: 1;
        display: block;
    }

    rect[id^="u"], path[id^="u"] {
        transform-box: fill-box;
        transform-origin: center;
        transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.2s ease, stroke-width 0.2s ease;
    }
    .segment-hover {
        transform: scale(1.05);
        filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.9));
        fill-opacity: 0.15;
    }

    @keyframes star-pulse {
      0%, 100% { stroke-opacity: 0.8; stroke-width: 0.12; filter: drop-shadow(0 0 2px #3b82f6); }
      50% { stroke-opacity: 1; stroke-width: 0.25; filter: drop-shadow(0 0 6px #3b82f6); }
    }
    .starred-lesson-glow {
      stroke: #3b82f6 !important;
      stroke-dasharray: 0.3, 0.1;
      animation: star-pulse 1.5s infinite ease-in-out;
    }
    @keyframes star-twinkle {
        0%, 100% { opacity: 0.4; transform: scale(0.8); }
        50% { opacity: 1; transform: scale(1.3); }
    }
    .star-icon {
        animation: star-twinkle 2s infinite ease-in-out;
        font-family: inherit;
        pointer-events: none;
        transform-box: fill-box;
        transform-origin: center;
        font-size: 0.6px;
        user-select: none;
    }
  </style>

  <div id="lesson-tooltip"></div>

  <script>
  const courseConfig = {
    units: {
      1: 9,
      2: 9,
      3: 9,
      4: 9,
      5: 8,
      6: 8,
      7: 7,
      8: 7,
      9: 7,
      10: 6,
    },
    numUnits: 10,
    coursePrefix: 'intsci'
  };

  const lessonMappings = {
      1: [{num: 1, name: 'Layers of the Earth (Crust, Mantle, Core)'}, {num: 2, name: 'Minerals (Classification, Identification Tests)'}, {num: 3, name: 'Rock Cycle (Igneous, Sedimentary, Metamorphic)'}, {num: 4, name: 'Plate Tectonics (Continental Drift, Seafloor Spreading)'}, {num: 5, name: 'Earthquakes (Seismic Waves, Measurement, Prediction)'}, {num: 6, name: 'Volcanoes (Types, Eruptions, Hazards)'}, {num: 7, name: 'Mountain Building & Geological Structures'}, {num: 8, name: 'Geological Resources (Ores, Fossil Fuels)'}, {num: 9, name: 'Case Studies in Natural Hazards'}],
      2: [{num: 1, name: 'Composition & Layers of the Atmosphere'}, {num: 2, name: 'Energy Transfer (Radiation, Conduction, Convection)'}, {num: 3, name: 'Weather Systems (Fronts, Pressure Systems)'}, {num: 4, name: 'Clouds & Precipitation Types'}, {num: 5, name: 'Climate Zones & Global Circulation'}, {num: 6, name: 'Severe Weather (Hurricanes, Tornadoes, Blizzards)'}, {num: 7, name: 'Human Impact on Atmosphere (Pollution, Greenhouse Gases)'}, {num: 8, name: '⭐ Weather Prediction Models'}, {num: 9, name: 'Case Studies in Climate Events'}],
      3: [{num: 1, name: 'Hydrologic Cycle (Evaporation, Condensation, Precipitation)'}, {num: 2, name: 'Oceans (Currents, Salinity, Temperature Layers)'}, {num: 3, name: 'Waves & Tides (Causes, Effects)'}, {num: 4, name: 'Freshwater Systems (Rivers, Lakes, Aquifers)'}, {num: 5, name: 'Glaciers & Ice Caps (Formation, Melting Impacts)'}, {num: 6, name: 'Water Resources & Human Use'}, {num: 7, name: 'Water Pollution & Conservation'}, {num: 8, name: 'Case Studies in Hydrology'}, {num: 9, name: '⭐ AP Prep: Ocean Circulation Models'}],
      4: [{num: 1, name: 'Fossils & Fossil Formation'}, {num: 2, name: 'Relative Dating (Stratigraphy, Index Fossils)'}, {num: 3, name: '⭐ Radiometric Dating & Half-Life'}, {num: 4, name: 'Geologic Time Scale (Eras, Periods, Epochs)'}, {num: 5, name: 'Mass Extinctions & Evolutionary Events'}, {num: 6, name: 'Origin of Earth & Early Atmosphere'}, {num: 7, name: 'Plate Movements Through Time (Supercontinents)'}, {num: 8, name: 'Case Studies in Paleontology'}, {num: 9, name: '⭐ AP Prep: Geologic Time Calculations'}],
      5: [{num: 1, name: 'Renewable Resources (Solar, Wind, Hydro)'}, {num: 2, name: 'Nonrenewable Resources (Coal, Oil, Natural Gas)'}, {num: 3, name: 'Nuclear Energy (Fission, Fusion Potential)'}, {num: 4, name: 'Resource Extraction Methods (Mining, Drilling)'}, {num: 5, name: 'Environmental Impacts of Resource Use'}, {num: 6, name: 'Sustainability & Conservation Strategies'}, {num: 7, name: 'Case Studies in Energy Policy'}, {num: 8, name: '⭐ AP Prep: Energy Calculations'}],
      6: [{num: 1, name: 'Deforestation & Land Use Changes'}, {num: 2, name: 'Urbanization & Soil Degradation'}, {num: 3, name: 'Pollution (Air, Water, Soil)'}, {num: 4, name: '⭐ Climate Change & Global Warming'}, {num: 5, name: 'Conservation & Restoration Strategies'}, {num: 6, name: 'Future Challenges (Population Growth, Resource Scarcity)'}, {num: 7, name: 'Case Studies in Environmental Policy'}, {num: 8, name: '⭐ AP Prep: Climate Models'}],
      7: [{num: 1, name: 'Earth Science & Biology (Ecosystems, Biogeochemical Cycles)'}, {num: 2, name: 'Earth Science & Chemistry (Atmospheric Composition, Reactions)'}, {num: 3, name: 'Earth Science & Physics (Energy Transfer, Waves, Forces)'}, {num: 4, name: 'Earth Science & Technology (Satellites, Climate Modeling)'}, {num: 5, name: 'Careers in Earth & Environmental Sciences'}, {num: 6, name: 'Case Studies in Interdisciplinary Science'}, {num: 7, name: '⭐ AP Prep: Cross-Disciplinary Applications'}],
      8: [{num: 1, name: 'Earth\'s Place in the Universe'}, {num: 2, name: 'Seasons & Earth\'s Tilt'}, {num: 3, name: 'Lunar Phases & Eclipses'}, {num: 4, name: 'Solar Energy & Earth Systems'}, {num: 5, name: 'Gravity & Orbital Motion'}, {num: 6, name: 'Case Studies in Space-Earth Interactions'}, {num: 7, name: '⭐ AP Prep: Orbital Calculations'}],
      9: [{num: 1, name: 'Systems Thinking in Earth Science'}, {num: 2, name: 'Feedback Loops (Positive & Negative)'}, {num: 3, name: 'Modeling Climate Systems'}, {num: 4, name: 'Modeling Geological Processes'}, {num: 5, name: 'Case Studies in Predictive Modeling'}, {num: 6, name: '⭐ AP Prep: Earth System Simulations'}, {num: 7, name: 'Applications in Environmental Engineering'}],
      10: [{num: 1, name: '⭐ Review of Key Earth Science Concepts'}, {num: 2, name: '⭐ AP-Style Practice Problems'}, {num: 3, name: '⭐ Case Studies in AP Earth Science'}, {num: 4, name: 'Real-World Applications (Policy, Conservation, Engineering)'}, {num: 5, name: '⭐ Capstone Project: Earth Systems Analysis'}, {num: 6, name: '⭐ Comprehensive Review & AP Exam Prep'}],
    };

  function generateUnitSVG(unitNum, lessonCount) {
    let segments = '';
    const lessons = lessonMappings[unitNum] || [];
    const totalSpace = 30;
    const rectHeight = (totalSpace / lessons.length).toFixed(3);

    for (let i = 0; i < lessons.length; i++) {
      const lesson = lessons[i];
      const yPos = (3 + totalSpace - ((i + 1) * rectHeight)).toFixed(3);
      segments += '<a href="../CourseFiles/IntegratedScienceLessons/Unit' + unitNum + '/Lesson ' + unitNum + '.' + lesson.num + '_Video.html" onclick="markLessonStarted(\'' + unitNum + '\', ' + (i+1) + ')">\n' +
        '    <rect id="u' + unitNum + '-l' + (i+1) + '" stroke="none" x="3" y="' + yPos + '" width="18" height="' + rectHeight + '" fill="white" fill-opacity="0" cursor="pointer" pointer-events="auto" onmouseenter="showLessonPopup(event, \'Lesson ' + unitNum + '.' + lesson.num + ': ' + lesson.name.replace(/'/g, "\\'") + '\')" onmousemove="moveLessonPopup(event)" onmouseleave="hideLessonPopup()"></rect>\n' +
        '</a>\n' +
        '  <line x1="3" y1="' + yPos + '" x2="21" y2="' + yPos + '" stroke="currentColor" stroke-width="0.08" stroke-opacity="0.3" pointer-events="none" />\n';
    }

    return '<div style="position: relative; display: flex; align-items: flex-start; justify-content: center; height: 100%;"><svg viewBox="0 0 24 38" fill="none" stroke="currentColor" stroke-width="0.4" stroke-linecap="round" stroke-linejoin="round" style="width: 100%; height: 100%; max-height: 45rem; color: inherit;"><rect x="3" y="3" width="18" height="30" rx="1.5" ry="1.5" fill="none" stroke="currentColor" stroke-width="0.5" /><rect id="fill-unit-' + unitNum + '" x="3" y="3" width="18" height="30" rx="1.5" ry="1.5" fill="#9ca3af" fill-opacity="0.15" stroke="none" /><g id="segments-unit-' + unitNum + '">\n' + segments + '</g><text x="12" y="36" text-anchor="middle" fill="currentColor" stroke="none" font-size="1.8" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="600" style="pointer-events: none;">Unit ' + unitNum + '</text></svg></div>';
  }

  function populateGrid() {
    const container = document.getElementById('grid-container');
    container.innerHTML = '';
    for (const [unitNum, lessonCount] of Object.entries(courseConfig.units)) {
      container.innerHTML += generateUnitSVG(parseInt(unitNum), lessonCount);
    }
  }

  function markLessonStarted(unit, lesson) {
    const startedKey = courseConfig.coursePrefix + '_u' + unit + '_l' + lesson + '_started';
    const completedKey = courseConfig.coursePrefix + '_u' + unit + '_l' + lesson + '_completed';
    if (localStorage.getItem(completedKey) !== 'true') {
      localStorage.setItem(startedKey, 'true');
    }
  }

  function applyProgressColors() {
    for (let u = 1; u <= courseConfig.numUnits; u++) {
      const lessonCount = courseConfig.units[u] || 0;
      for (let l = 1; l <= lessonCount; l++) {
        const element = document.getElementById('u' + u + '-l' + l);
        if(element) {
          const completed = localStorage.getItem(courseConfig.coursePrefix + '_u' + u + '_l' + l + '_completed') === 'true';
          const started = localStorage.getItem(courseConfig.coursePrefix + '_u' + u + '_l' + l + '_started') === 'true';
          if (completed) {
            element.setAttribute('fill', '#16a34a');
            element.setAttribute('fill-opacity', '0.7');
          } else if (started) {
            element.setAttribute('fill', '#f97316');
            element.setAttribute('fill-opacity', '0.6');
          }
        }
      }
    }
  }

  let tooltipEl = null;
  function getOrCreateTooltip() {
    if (!tooltipEl) {
      tooltipEl = document.createElement('div');
      tooltipEl.id = 'lesson-tooltip';
      document.body.appendChild(tooltipEl);
    }
    return tooltipEl;
  }
  function showLessonPopup(event, title) {
    const tooltip = getOrCreateTooltip();
    const target = event.target;
    if (target && target.id && target.id.match(/^u\d+-l\d+$/)) {
      target.classList.add('segment-hover');
    }
    let status = '';
    const match = target.id ? target.id.match(/u(\d+)-l(\d+)/) : null;
    if (match) {
      const u = match[1], l = match[2];
      const isCompleted = localStorage.getItem(courseConfig.coursePrefix + '_u' + u + '_l' + l + '_completed') === 'true';
      const isStarted = localStorage.getItem(courseConfig.coursePrefix + '_u' + u + '_l' + l + '_started') === 'true';
      if (isCompleted) status = 'COMPLETED \u2714 ';
      else if (isStarted) status = 'IN PROGRESS ';
    }
    tooltip.textContent = status + title;
    tooltip.setAttribute('data-visible', 'true');
  }
  function moveLessonPopup(e) {
    const tooltip = getOrCreateTooltip();
    if (tooltip.getAttribute('data-visible') !== 'true') return;
    const offset = 15;
    let x = e.clientX + offset, y = e.clientY + offset;
    const rect = tooltip.getBoundingClientRect();
    if (x + rect.width > window.innerWidth) x = e.clientX - rect.width - offset;
    if (y + rect.height > window.innerHeight) y = e.clientY - rect.height - offset;
    tooltip.style.left = x + 'px';
    tooltip.style.top = y + 'px';
  }
  function hideLessonPopup() {
    const tooltip = getOrCreateTooltip();
    tooltip.setAttribute('data-visible', 'false');
    document.querySelectorAll('.segment-hover').forEach(function(el) { el.classList.remove('segment-hover'); });
  }

  document.addEventListener('DOMContentLoaded', function() {
    
    // Initialize analytics and track course visit
    if (typeof StudentAnalytics !== 'undefined') {
      try {
        const analytics = new StudentAnalytics();
        analytics.trackLessonView('integrated_science', 0, 0); // Track course visit
        analytics.updateLearningStreak(); // Update daily streak
      } catch (e) {
        console.warn('Analytics initialization failed:', e);
      }
    }

    populateGrid();
    applyProgressColors();
  });

  window.addEventListener('storage', function(e) {
    if (e.key && e.key.indexOf(courseConfig.coursePrefix + '_u') === 0) {
      applyProgressColors();
    }
  });
  </script>

  <script src="../../search_data.js"></script>
  <script src="../../search_logic.js"></script>
  <script src="../scripts/dev_tools.js"></script>
</body>
</html>
