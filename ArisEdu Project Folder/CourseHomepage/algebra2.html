<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>High School: Algebra 2</title>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/ArisEdu Project Folder/styles/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="../theme_manager.js"></script>
  <script type="module">
    // Import Firebase config and make auth + db available to analytics
    import { auth, db } from '../firebase-config.js';
    window.auth = auth;
    window.db = db;
  </script>
<script src="../scripts/analytics-helper.js"></script>
<script src="../scripts/translation_loader.js" data-section="algebra2" data-base="../translations"></script>
</head>
<body class="dark-mode h-full">
<script src="../scripts/taskbar.js"></script>
  <main class="main-container">
    <div class="logo-title-wrapper" style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem;">
      <div style="display: flex; align-items: center; gap: 1.5rem;"><div style="color: currentColor; flex-shrink: 0;"><svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8 28C10 22 12 18 15 16C18 14 20 14 20 14C20 14 22 14 25 16C28 18 30 22 32 28" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="8" y1="30" x2="32" y2="30" stroke="currentColor" stroke-width="1.5"/><line x1="20" y1="8" x2="20" y2="30" stroke="currentColor" stroke-width="1" stroke-dasharray="2,2" opacity="0.5"/></svg></div><h1 id="company-name" class="logo-font page-title" style="font-size: 3rem; margin-bottom: 0;">High School: Algebra 2</h1></div>
    </div>
    <div id="courses-container" class="courses-container" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.25rem 2rem; padding: 1rem; min-height: auto;"></div>
    <div class="practice-exam-wrapper" style="display: flex; justify-content: center; padding: 1rem 0 0 0; margin-top: 0;">
      <button onclick="alert('Practice exam coming soon!')" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 1rem 3rem; border: none; border-radius: 0.5rem; font-size: 1.1rem; font-weight: 600; cursor: pointer; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); transition: transform 0.2s, box-shadow 0.2s;" onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 6px 12px rgba(0, 0, 0, 0.15)'" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 6px rgba(0, 0, 0, 0.1)'">Take Practice Exam</button>
    </div>
  </main>

  <script src="../../search_data.js"></script>
  <script src="../../search_logic.js"></script>

<style>
  rect[id^="u"], path[id^="u"] { transform-box: fill-box; transform-origin: center; transition: transform 0.2s ease; }
  #lesson-tooltip { position: fixed; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(8px); color: white; padding: 0.75rem 1rem; border-radius: 0.75rem; font-size: 0.95rem; font-weight: 600; pointer-events: none; z-index: 10000; opacity: 0; transition: opacity 0.15s ease; display: none; max-width: 250px; }
  #lesson-tooltip[data-visible="true"] { opacity: 1; display: block; }
</style>

<script>
  // Course configuration
  const courseConfig = {
    name: "High School: Algebra 2",
    folder: "Algebra2",
    units: {
      1: 10,
      2: 8,
      3: 8,
      4: 7,
      5: 8,
      6: 6,
      7: 8,
      8: 7,
      9: 5
    },
    lessonNames: {
      1: ['Review of Functions & Notation', 'Linear Equations & Graphing', 'Systems of Linear Equations', 'Solving Systems by Substitution', 'Solving Systems by Elimination', 'Applications of Linear Systems', 'Inequalities & System of Inequalities', 'Linear Programming', 'Advanced Linear Applications'],
      2: ['Quadratic Functions & Parabolas', 'Transformations of Quadratics', 'Completing the Square', 'Quadratic Formula & Discriminant', 'Graphing Quadratic Functions', 'Applications of Quadratics', 'Quadratic Inequalities'],
      3: ['Polynomial Operations', 'Factoring Polynomials', 'Synthetic Division', 'Polynomial Graphs & Zeros', 'Remainder & Factor Theorems', 'Complex Numbers & Polynomial Roots', 'Higher-Degree Polynomials'],
      4: ['Rational Expressions', 'Operations on Rational Expressions', 'Rational Equations', 'Graphing Rational Functions', 'Asymptotes & Discontinuities', 'Applications of Rational Functions'],
      5: ['Exponential Functions & Growth', 'Exponential Decay & Applications', 'Logarithms & Properties', 'Logarithmic Functions & Graphs', 'Exponential & Logarithmic Equations', 'Applications of Exponentials & Logs', 'Natural Logarithms & e'],
      6: ['Arithmetic Sequences', 'Geometric Sequences', 'Series & Summation Notation', 'Infinite Geometric Series', 'Applications & Mathematical Induction'],
      7: ['Counting Principles', 'Permutations & Combinations', 'Probability Basics & Events', 'Conditional Probability', 'Normal Distributions', 'Hypothesis Testing & Confidence Intervals', 'Correlation & Linear Regression'],
      8: ['Angles & Angle Measures', 'Unit Circle & Trigonometric Ratios', 'Graphs of Trigonometric Functions', 'Trigonometric Identities', 'Solving Trigonometric Equations', 'Applications of Trigonometry'],
      9: ['Conic Sections', 'Parametric Equations', 'Vectors & Vector Operations', 'Complex Numbers in Polar Form']
    },
    numUnits: 9
  };

  // Generate unit SVG with smart spacing
    // Generate unit SVG with smart spacing (horizontal layout)
    // Generate unit SVG with smart spacing (horizontal layout)
    // Generate unit SVG with smart spacing (horizontal layout)
    // Generate unit SVG with smart spacing (horizontal layout)
    // Generate unit SVG with smart spacing (horizontal layout)
  function generateUnitSVG(unitNum, lessonCount) {
    const totalItems = lessonCount;
    const realLessons = lessonCount - 1;
    const _barX = 12, _barY = 2, _barW = 86, _barH = 8;
    const spacing = _barW / totalItems;
    let segments = '';

    for (let itemNum = 1; itemNum <= totalItems; itemNum++) {
      const xPos = (_barX + (itemNum - 1) * spacing).toFixed(3);
      const segW = spacing.toFixed(3);
      let href, tooltipName;

      if (itemNum <= realLessons) {
        href = `../CourseFiles/Algebra2Lessons/Unit${unitNum}/Lesson${unitNum}.${itemNum}_Video.html`;
        const name = (courseConfig.lessonNames && courseConfig.lessonNames[unitNum]) ? courseConfig.lessonNames[unitNum][itemNum - 1] : '';
        tooltipName = name ? `${unitNum}.${itemNum} ${name}` : `Lesson ${unitNum}.${itemNum}`;
      } else {
        href = `../CourseFiles/Algebra2Lessons/Unit${unitNum}/Unit${unitNum}_Test_Practice.html`;
        tooltipName = `Unit ${unitNum} Test`;
      }

      segments += `<a href="${href}" onclick="markLessonStarted('${unitNum}', ${itemNum})">
    <rect id="u${unitNum}-l${itemNum}" stroke="none" x="${xPos}" y="${_barY}" width="${segW}" height="${_barH}" fill="white" fill-opacity="0" cursor="pointer" pointer-events="auto" onmouseenter="showLessonPopup(event, '${tooltipName.replace(/\'/g, "&#39;")}', ${unitNum}, ${itemNum})" onmousemove="moveLessonPopup(event)" onmouseleave="hideLessonPopup()"></rect></a>
  <line x1="${xPos}" y1="${_barY}" x2="${xPos}" y2="${_barY + _barH}" stroke="currentColor" stroke-width="0.08" stroke-opacity="0.3" pointer-events="none" />`;
    }

    return `<div style="position: relative; width: 100%;"><svg viewBox="0 0 100 12" fill="none" stroke="currentColor" stroke-width="0.2" stroke-linecap="round" stroke-linejoin="round" style="width: 100%; height: auto; color: inherit;"><text x="${_barX - 2}" y="${_barY + _barH / 2 + 1}" text-anchor="end" fill="currentColor" stroke="none" font-size="2.6" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="600" style="pointer-events: none;">Unit ${unitNum}</text><rect x="${_barX}" y="${_barY}" width="${_barW}" height="${_barH}" rx="1" ry="1" fill="none" stroke="currentColor" stroke-width="0.3" /><rect id="fill-unit-${unitNum}" x="${_barX}" y="${_barY}" width="${_barW}" height="${_barH}" rx="1" ry="1" fill="#9ca3af" fill-opacity="0.15" stroke="none" /><g id="segments-unit-${unitNum}">
${segments}</g></svg></div>`;
  }






  // Populate the grid
  function populateGrid() {
    const container = document.getElementById('courses-container');
    for (const [unitNum, lessonCount] of Object.entries(courseConfig.units)) {
      container.innerHTML += generateUnitSVG(parseInt(unitNum), lessonCount);
    }
  }

  // Initialize on load
  document.addEventListener('DOMContentLoaded', () => {
    populateGrid();
    applyProgressColors();
  });

  let tooltipEl = null;
  function getOrCreateTooltip() { if (!tooltipEl) { tooltipEl = document.createElement('div'); tooltipEl.id = 'lesson-tooltip'; document.body.appendChild(tooltipEl); } return tooltipEl; }
  function showLessonPopup(event, lessonTitle, unitNum, lessonNum) {
    const tooltip = getOrCreateTooltip();
    let status = '';
    const isCompleted = localStorage.getItem(`alg2_u${unitNum}_l${lessonNum}_completed`) === 'true';
    const isStarted = localStorage.getItem(`alg2_u${unitNum}_l${lessonNum}_started`) === 'true';
    if (isCompleted) {
      status = '✅ COMPLETED\n';
    } else if (isStarted) {
      status = '⌛ IN PROGRESS\n';
    }
    tooltip.textContent = status + lessonTitle;
    tooltip.setAttribute('data-visible', 'true');
  }
  function moveLessonPopup(event) { const tooltip = getOrCreateTooltip(); tooltip.style.left = (event.pageX + 12) + 'px'; tooltip.style.top = (event.pageY + 12) + 'px'; }
  function hideLessonPopup() { const tooltip = getOrCreateTooltip(); tooltip.setAttribute('data-visible', 'false'); }
  function markLessonStarted(unit, lesson) { localStorage.setItem(`alg2_u${unit}_l${lesson}_started`, 'true'); applyProgressColors(); }
  function applyProgressColors() { 
    for (let u = 1; u <= courseConfig.numUnits; u++) { 
      const count = courseConfig.units[u];
      for (let l = 1; l <= count; l++) { 
        const segment = document.getElementById(`u${u}-l${l}`); 
        if (segment) { 
          const isCompleted = localStorage.getItem(`alg2_u${u}_l${l}_completed`) === 'true'; 
          const isStarted = localStorage.getItem(`alg2_u${u}_l${l}_started`) === 'true'; 
          if (isCompleted) { 
            segment.setAttribute('fill', '#16a34a'); 
            segment.setAttribute('fill-opacity', '0.7'); 
          } else if (isStarted) { 
            segment.setAttribute('fill', '#f97316'); 
            segment.setAttribute('fill-opacity', '0.6'); } 
        } 
      } 
    } 
  }
</script>
<script src="../scripts/dev_tools.js"></script>
<script>
  if (window._isDevUser && window._isDevUser()) {
    var dcb = document.getElementById('dev-clear-btn');
    if (dcb) dcb.style.display = '';
  }
</script>
</body>
</html>
