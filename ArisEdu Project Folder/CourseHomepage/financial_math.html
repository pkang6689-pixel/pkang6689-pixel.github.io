<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>High School: Financial Math</title>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/ArisEdu Project Folder/styles/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="../theme_manager.js"></script>
<script src="../scripts/translation_loader.js" data-section="financial_math" data-base="../translations"></script>
</head>
 <body class="dark-mode h-full">
<script src="../scripts/taskbar.js"></script>
  <main class="main-container">
    <div class="logo-title-wrapper" style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem;">
      <h1 id="company-name" class="logo-font page-title" style="font-size: 3rem; margin-bottom: 0;">High School: Financial Math</h1>
    </div>
    <div class="courses-container">
      <div style="position: relative; transform: translateY(0); display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; padding: 1rem; min-height: 60rem;" id="grid-container"></div>
    </div>
  </main>

  <style>
    #lesson-tooltip {
        position: fixed;
        background: rgba(15, 23, 42, 0.95);
        backdrop-filter: blur(12px);
        color: #f1f5f9;
        padding: 0.75rem 1.25rem;
        border-radius: 0.75rem;
        font-size: 0.95rem;
        font-weight: 600;
        pointer-events: none;
        z-index: 10000;
        opacity: 0;
        transition: opacity 0.15s ease;
        border: 1px solid rgba(255, 255, 255, 0.15);
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        white-space: nowrap;
        display: none;
    }
    #lesson-tooltip[data-visible="true"] {
        opacity: 1;
        display: block;
    }

    rect[id^="u"], path[id^="u"] {
        transform-box: fill-box;
        transform-origin: center;
        transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.2s ease, stroke-width 0.2s ease;
    }
    .segment-hover {
        transform: scale(1.05);
        filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.9));
        fill-opacity: 0.15;
    }

    @keyframes star-pulse {
      0%, 100% { stroke-opacity: 0.8; stroke-width: 0.12; filter: drop-shadow(0 0 2px #a78bfa); }
      50% { stroke-opacity: 1; stroke-width: 0.25; filter: drop-shadow(0 0 6px #a78bfa); }
    }
    .starred-lesson-glow {
      stroke: #a78bfa !important;
      stroke-dasharray: 0.3, 0.1;
      animation: star-pulse 1.5s infinite ease-in-out;
    }
    @keyframes star-twinkle {
        0%, 100% { opacity: 0.4; transform: scale(0.8); }
        50% { opacity: 1; transform: scale(1.3); }
    }
    .star-icon {
        animation: star-twinkle 2s infinite ease-in-out;
        font-family: inherit;
        pointer-events: none;
        transform-box: fill-box;
        transform-origin: center;
        font-size: 0.6px;
        user-select: none;
    }
  </style>

  <div id="lesson-tooltip"></div>

  <script>
  const courseConfig = {
    units: {
      1: 8,
      2: 8,
      3: 8,
      4: 8,
      5: 8,
      6: 8,
      7: 8,
      8: 8,
      9: 8,
      10: 7,
    },
    numUnits: 10,
    coursePrefix: 'finmath'
  };

  const lessonMappings = {
      1: [{num: 1, name: 'Importance of Financial Literacy'}, {num: 2, name: 'Sources of Income (wages, salaries, investments)'}, {num: 3, name: 'Budgeting Basics'}, {num: 4, name: 'Needs vs. Wants'}, {num: 5, name: 'Opportunity Cost in Financial Decisions'}, {num: 6, name: 'Short-Term vs. Long-Term Goals'}, {num: 7, name: 'Case Studies in Personal Finance'}, {num: 8, name: 'Financial Decision-Making Models'}],
      2: [{num: 1, name: 'Simple Interest Formula'}, {num: 2, name: 'Compound Interest Formula'}, {num: 3, name: '⭐ Continuous Compounding'}, {num: 4, name: 'Growth vs. Decay Models'}, {num: 5, name: 'Applications in Savings Accounts'}, {num: 6, name: 'Comparing Interest Scenarios'}, {num: 7, name: 'Case Studies in Banking'}, {num: 8, name: 'Technology Tools for Interest Calculations'}],
      3: [{num: 1, name: 'Loan Terminology (principal, interest, term)'}, {num: 2, name: 'Amortization Schedules'}, {num: 3, name: 'Mortgages (fixed vs. variable rates)'}, {num: 4, name: 'Credit Cards & Debt Management'}, {num: 5, name: 'Student Loans & Repayment Options'}, {num: 6, name: '⭐ Real Estate Financing'}, {num: 7, name: 'Case Studies in Borrowing'}, {num: 8, name: 'Loan Comparison & Decision Making'}],
      4: [{num: 1, name: 'Stocks, Bonds, and Mutual Funds'}, {num: 2, name: 'Risk vs. Return'}, {num: 3, name: 'Annuities (ordinary vs. annuity due)'}, {num: 4, name: 'Retirement Accounts (401k, IRA)'}, {num: 5, name: '⭐ Long-Term Investment Strategies'}, {num: 6, name: 'Diversification & Portfolio Management'}, {num: 7, name: 'Case Studies in Investing'}, {num: 8, name: 'Technology in Investment Planning'}],
      5: [{num: 1, name: 'Creating a Personal Budget'}, {num: 2, name: 'Tracking Expenses'}, {num: 3, name: 'Emergency Funds'}, {num: 4, name: 'Short-Term vs. Long-Term Planning'}, {num: 5, name: 'Case Studies in Budgeting'}, {num: 6, name: 'Technology Tools for Budgeting'}, {num: 7, name: 'Lifestyle Choices & Financial Impact'}, {num: 8, name: 'Budget Adjustments & Flexibility'}],
      6: [{num: 1, name: 'Basics of Income Tax'}, {num: 2, name: 'Tax Brackets & Deductions'}, {num: 3, name: 'Property & Sales Taxes'}, {num: 4, name: 'Insurance Types (health, auto, life)'}, {num: 5, name: '⭐ Risk Management Strategies'}, {num: 6, name: 'Case Studies in Tax Planning'}, {num: 7, name: 'Insurance in Real Life'}, {num: 8, name: 'Tax Software & Filing Tools'}],
      7: [{num: 1, name: 'Business Start-Up Costs'}, {num: 2, name: 'Profit & Loss Statements'}, {num: 3, name: 'Break-Even Analysis'}, {num: 4, name: 'Small Business Financing'}, {num: 5, name: '⭐ Entrepreneurship Case Studies'}, {num: 6, name: 'Marketing & Financial Planning'}, {num: 7, name: 'Business Risk & Reward'}, {num: 8, name: 'Technology in Business Finance'}],
      8: [{num: 1, name: 'Stock Market Basics'}, {num: 2, name: 'Reading Stock Tables'}, {num: 3, name: 'Market Indices (Dow, S&P 500)'}, {num: 4, name: 'Trading Strategies'}, {num: 5, name: '⭐ Global Financial Systems'}, {num: 6, name: 'Case Studies in Market Behavior'}, {num: 7, name: 'Technology in Financial Markets'}, {num: 8, name: 'Behavioral Finance'}],
      9: [{num: 1, name: '⭐ Time Value of Money'}, {num: 2, name: 'Net Present Value (NPV)'}, {num: 3, name: 'Internal Rate of Return (IRR)'}, {num: 4, name: 'Financial Modeling with Spreadsheets'}, {num: 5, name: 'Case Studies in Corporate Finance'}, {num: 6, name: 'Risk Analysis & Forecasting'}, {num: 7, name: '⭐ Applications in AP Economics'}, {num: 8, name: 'Case Studies in International Finance'}],
      10: [{num: 1, name: '⭐ Review of Key Formulas'}, {num: 2, name: '⭐ AP-Style Practice Problems'}, {num: 3, name: '⭐ Financial Math in AP Economics Context'}, {num: 4, name: 'Real-World Applications (housing, retirement, investing)'}, {num: 5, name: '⭐ Capstone Project: Personal Financial Plan'}, {num: 6, name: '⭐ Comprehensive Review & AP Exam Practice'}, {num: 7, name: 'Case Studies in AP-Level Scenarios'}],
    };

  function generateUnitSVG(unitNum, lessonCount) {
    let segments = '';
    const lessons = lessonMappings[unitNum] || [];
    const totalSpace = 30;
    const rectHeight = (totalSpace / lessons.length).toFixed(3);

    for (let i = 0; i < lessons.length; i++) {
      const lesson = lessons[i];
      const yPos = (3 + totalSpace - ((i + 1) * rectHeight)).toFixed(3);
      segments += '<a href="../CourseFiles/FinancialMathLessons/Unit' + unitNum + '/Lesson ' + unitNum + '.' + lesson.num + '_Video.html" onclick="markLessonStarted(\'' + unitNum + '\', ' + (i+1) + ')">\n' +
        '    <rect id="u' + unitNum + '-l' + (i+1) + '" stroke="none" x="3" y="' + yPos + '" width="18" height="' + rectHeight + '" fill="white" fill-opacity="0" cursor="pointer" pointer-events="auto" onmouseenter="showLessonPopup(event, \'Lesson ' + unitNum + '.' + lesson.num + ': ' + lesson.name.replace(/'/g, "\\'") + '\')" onmousemove="moveLessonPopup(event)" onmouseleave="hideLessonPopup()"></rect>\n' +
        '</a>\n' +
        '  <line x1="3" y1="' + yPos + '" x2="21" y2="' + yPos + '" stroke="currentColor" stroke-width="0.08" stroke-opacity="0.3" pointer-events="none" />\n';
    }

    return '<div style="position: relative; display: flex; align-items: flex-start; justify-content: center; height: 100%;"><svg viewBox="0 0 24 38" fill="none" stroke="currentColor" stroke-width="0.4" stroke-linecap="round" stroke-linejoin="round" style="width: 100%; height: 100%; max-height: 45rem; color: inherit;"><rect x="3" y="3" width="18" height="30" rx="1.5" ry="1.5" fill="none" stroke="currentColor" stroke-width="0.5" /><rect id="fill-unit-' + unitNum + '" x="3" y="3" width="18" height="30" rx="1.5" ry="1.5" fill="#9ca3af" fill-opacity="0.15" stroke="none" /><g id="segments-unit-' + unitNum + '">\n' + segments + '</g><text x="12" y="36" text-anchor="middle" fill="currentColor" stroke="none" font-size="1.8" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="600" style="pointer-events: none;">Unit ' + unitNum + '</text></svg></div>';
  }

  function populateGrid() {
    const container = document.getElementById('grid-container');
    container.innerHTML = '';
    for (const [unitNum, lessonCount] of Object.entries(courseConfig.units)) {
      container.innerHTML += generateUnitSVG(parseInt(unitNum), lessonCount);
    }
  }

  function markLessonStarted(unit, lesson) {
    const startedKey = courseConfig.coursePrefix + '_u' + unit + '_l' + lesson + '_started';
    const completedKey = courseConfig.coursePrefix + '_u' + unit + '_l' + lesson + '_completed';
    if (localStorage.getItem(completedKey) !== 'true') {
      localStorage.setItem(startedKey, 'true');
    }
  }

  function applyProgressColors() {
    for (let u = 1; u <= courseConfig.numUnits; u++) {
      const lessonCount = courseConfig.units[u] || 0;
      for (let l = 1; l <= lessonCount; l++) {
        const element = document.getElementById('u' + u + '-l' + l);
        if(element) {
          const completed = localStorage.getItem(courseConfig.coursePrefix + '_u' + u + '_l' + l + '_completed') === 'true';
          const started = localStorage.getItem(courseConfig.coursePrefix + '_u' + u + '_l' + l + '_started') === 'true';
          if (completed) {
            element.setAttribute('fill', '#16a34a');
            element.setAttribute('fill-opacity', '0.7');
          } else if (started) {
            element.setAttribute('fill', '#f97316');
            element.setAttribute('fill-opacity', '0.6');
          }
        }
      }
    }
  }

  let tooltipEl = null;
  function getOrCreateTooltip() {
    if (!tooltipEl) {
      tooltipEl = document.createElement('div');
      tooltipEl.id = 'lesson-tooltip';
      document.body.appendChild(tooltipEl);
    }
    return tooltipEl;
  }
  function showLessonPopup(event, title) {
    const tooltip = getOrCreateTooltip();
    const target = event.target;
    if (target && target.id && target.id.match(/^u\d+-l\d+$/)) {
      target.classList.add('segment-hover');
    }
    let status = '';
    const match = target.id ? target.id.match(/u(\d+)-l(\d+)/) : null;
    if (match) {
      const u = match[1], l = match[2];
      const isCompleted = localStorage.getItem(courseConfig.coursePrefix + '_u' + u + '_l' + l + '_completed') === 'true';
      const isStarted = localStorage.getItem(courseConfig.coursePrefix + '_u' + u + '_l' + l + '_started') === 'true';
      if (isCompleted) status = 'COMPLETED \u2714 ';
      else if (isStarted) status = 'IN PROGRESS ';
    }
    tooltip.textContent = status + title;
    tooltip.setAttribute('data-visible', 'true');
  }
  function moveLessonPopup(e) {
    const tooltip = getOrCreateTooltip();
    if (tooltip.getAttribute('data-visible') !== 'true') return;
    const offset = 15;
    let x = e.clientX + offset, y = e.clientY + offset;
    const rect = tooltip.getBoundingClientRect();
    if (x + rect.width > window.innerWidth) x = e.clientX - rect.width - offset;
    if (y + rect.height > window.innerHeight) y = e.clientY - rect.height - offset;
    tooltip.style.left = x + 'px';
    tooltip.style.top = y + 'px';
  }
  function hideLessonPopup() {
    const tooltip = getOrCreateTooltip();
    tooltip.setAttribute('data-visible', 'false');
    document.querySelectorAll('.segment-hover').forEach(function(el) { el.classList.remove('segment-hover'); });
  }

  document.addEventListener('DOMContentLoaded', function() {
    populateGrid();
    applyProgressColors();
  });

  window.addEventListener('storage', function(e) {
    if (e.key && e.key.indexOf(courseConfig.coursePrefix + '_u') === 0) {
      applyProgressColors();
    }
  });
  </script>

  <script src="../../search_data.js"></script>
  <script src="../../search_logic.js"></script>
  <script src="../scripts/dev_tools.js"></script>
</body>
</html>
