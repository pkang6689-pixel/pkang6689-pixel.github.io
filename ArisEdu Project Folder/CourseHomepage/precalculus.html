<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>High School: Precalculus</title>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/ArisEdu Project Folder/styles/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="../theme_manager.js"></script>
  <script charset="UTF-8" src="../scripts/global_translations.js?v=7.4"></script>
  <script src="../scripts/spanish_translations.js?v=1.4"></script>
  <script src="../scripts/hindi_translations.js?v=1.4"></script>
</head>
 <body class="dark-mode h-full">
<script src="../scripts/taskbar.js"></script>
  <main class="main-container">
    <div class="logo-title-wrapper" style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem;">
      <h1 id="company-name" class="logo-font page-title" style="font-size: 3rem; margin-bottom: 0;">High School: Precalculus</h1>
    </div>
    <div class="courses-container">
      <div style="position: relative; transform: translateY(0); display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; padding: 1rem; min-height: 60rem;" id="grid-container"></div>
    </div>
  </main>

  <style>
    #lesson-tooltip {
        position: fixed;
        background: rgba(15, 23, 42, 0.95);
        backdrop-filter: blur(12px);
        color: #f1f5f9;
        padding: 0.75rem 1.25rem;
        border-radius: 0.75rem;
        font-size: 0.95rem;
        font-weight: 600;
        pointer-events: none;
        z-index: 10000;
        opacity: 0;
        transition: opacity 0.15s ease;
        border: 1px solid rgba(255, 255, 255, 0.15);
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        white-space: nowrap;
        display: none;
    }
    #lesson-tooltip[data-visible="true"] {
        opacity: 1;
        display: block;
    }

    rect[id^="u"], path[id^="u"] {
        transform-box: fill-box;
        transform-origin: center;
        transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.2s ease, stroke-width 0.2s ease;
    }
    .segment-hover {
        transform: scale(1.05);
        filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.9));
        fill-opacity: 0.15;
    }

    @keyframes star-pulse {
      0%, 100% { stroke-opacity: 0.8; stroke-width: 0.12; filter: drop-shadow(0 0 2px #a78bfa); }
      50% { stroke-opacity: 1; stroke-width: 0.25; filter: drop-shadow(0 0 6px #a78bfa); }
    }
    .starred-lesson-glow {
      stroke: #a78bfa !important;
      stroke-dasharray: 0.3, 0.1;
      animation: star-pulse 1.5s infinite ease-in-out;
    }
    @keyframes star-twinkle {
        0%, 100% { opacity: 0.4; transform: scale(0.8); }
        50% { opacity: 1; transform: scale(1.3); }
    }
    .star-icon {
        animation: star-twinkle 2s infinite ease-in-out;
        font-family: inherit;
        pointer-events: none;
        transform-box: fill-box;
        transform-origin: center;
        font-size: 0.6px;
        user-select: none;
    }
  </style>

  <div id="lesson-tooltip"></div>

  <script>
  const courseConfig = {
    units: {
      1: 10,
      2: 9,
      3: 9,
      4: 8,
      5: 9,
      6: 9,
      7: 8,
      8: 7,
      9: 8,
      10: 8,
    },
    numUnits: 10,
    coursePrefix: 'precalc'
  };

  const lessonMappings = {
      1: [{num: 1, name: 'Review of Algebra (factoring, radicals, rational expressions)'}, {num: 2, name: 'Order of Operations & Exponents'}, {num: 3, name: 'Relations vs. Functions'}, {num: 4, name: 'Domain & Range (interval notation)'}, {num: 5, name: 'Function Notation & Evaluation'}, {num: 6, name: 'Graphing Basics (intercepts, symmetry)'}, {num: 7, name: 'Transformations (shifts, reflections, stretches)'}, {num: 8, name: '⭐ Inverse Functions & Composition'}, {num: 9, name: 'Piecewise Functions'}, {num: 10, name: 'Applications in Modeling'}],
      2: [{num: 1, name: 'Linear Equations & Graphs'}, {num: 2, name: 'Slope, Intercepts, and Parallel/Perpendicular Lines'}, {num: 3, name: 'Quadratic Functions (vertex form, standard form)'}, {num: 4, name: 'Completing the Square'}, {num: 5, name: 'Quadratic Formula & Complex Solutions'}, {num: 6, name: 'Graphing Quadratic Functions'}, {num: 7, name: '⭐ Applications of Linear & Quadratic Models'}, {num: 8, name: 'Absolute Value Functions'}, {num: 9, name: 'Inequalities (linear & quadratic)'}],
      3: [{num: 1, name: 'Characteristics of Polynomials (degree, leading coefficient)'}, {num: 2, name: 'End Behavior & Graph Shapes'}, {num: 3, name: 'Factoring Techniques (synthetic division, long division)'}, {num: 4, name: 'Roots, Zeros, and Multiplicity'}, {num: 5, name: '⭐ Intermediate Value Theorem'}, {num: 6, name: 'Graphing Polynomial Functions'}, {num: 7, name: '⭐ Rational Root Theorem'}, {num: 8, name: 'Applications of Polynomial Models'}, {num: 9, name: 'Case Studies in Economics & Physics'}],
      4: [{num: 1, name: 'Rational Expressions & Simplification'}, {num: 2, name: 'Vertical, Horizontal, and Oblique Asymptotes'}, {num: 3, name: 'Holes and Discontinuities'}, {num: 4, name: 'Graphing Rational Functions'}, {num: 5, name: '⭐ Partial Fraction Decomposition'}, {num: 6, name: 'Applications in Real-World Ratios (rates, proportions)'}, {num: 7, name: 'Rational Inequalities'}, {num: 8, name: 'Case Studies in Engineering'}],
      5: [{num: 1, name: 'Exponential Growth & Decay Models'}, {num: 2, name: 'Compound Interest & Continuous Growth'}, {num: 3, name: 'Properties of Logarithms'}, {num: 4, name: 'Change of Base Formula'}, {num: 5, name: 'Solving Exponential & Logarithmic Equations'}, {num: 6, name: 'Applications: pH, Richter Scale, Population Growth'}, {num: 7, name: '⭐ Graphing Exponential & Logarithmic Functions'}, {num: 8, name: 'Logistic Growth Models'}, {num: 9, name: 'Case Studies in Biology & Finance'}],
      6: [{num: 1, name: 'Angles in Degrees & Radians'}, {num: 2, name: 'Arc Length & Sector Area'}, {num: 3, name: 'Unit Circle & Special Angles'}, {num: 4, name: 'Sine, Cosine, Tangent Definitions'}, {num: 5, name: 'Graphs of Trigonometric Functions (amplitude, period, phase shift)'}, {num: 6, name: 'Inverse Trigonometric Functions'}, {num: 7, name: '⭐ Applications in Physics & Engineering'}, {num: 8, name: 'Coterminal & Reference Angles'}, {num: 9, name: 'Case Studies in Navigation'}],
      7: [{num: 1, name: 'Pythagorean Identities'}, {num: 2, name: 'Sum & Difference Formulas'}, {num: 3, name: 'Double-Angle & Half-Angle Formulas'}, {num: 4, name: '⭐ Product-to-Sum and Sum-to-Product Identities'}, {num: 5, name: 'Solving Trigonometric Equations'}, {num: 6, name: 'Applications in Modeling Periodic Phenomena'}, {num: 7, name: 'Case Studies in Engineering'}, {num: 8, name: '⭐ AP Calculus Prep'}],
      8: [{num: 1, name: 'Arithmetic Sequences (nth term, partial sums)'}, {num: 2, name: 'Geometric Sequences (nth term, infinite series)'}, {num: 3, name: 'Sigma Notation & Summation Rules'}, {num: 4, name: '⭐ Mathematical Induction'}, {num: 5, name: '⭐ Binomial Theorem'}, {num: 6, name: 'Applications in Finance & Growth Patterns'}, {num: 7, name: 'Case Studies in Probability'}],
      9: [{num: 1, name: 'Concept of Limits (graphical, numerical approaches)'}, {num: 2, name: 'Evaluating Limits Algebraically'}, {num: 3, name: 'One-Sided Limits'}, {num: 4, name: 'Continuity & Types of Discontinuities'}, {num: 5, name: 'Infinite Limits & Asymptotic Behavior'}, {num: 6, name: '⭐ Applications: Instantaneous Rate of Change'}, {num: 7, name: 'Piecewise Functions & Limits'}, {num: 8, name: '⭐ AP Calculus Prep'}],
      10: [{num: 1, name: 'Derivative as Slope of Tangent Line'}, {num: 2, name: 'Derivative Rules (power rule basics)'}, {num: 3, name: 'Applications in Optimization'}, {num: 4, name: 'Area Under Curves (intro to integration)'}, {num: 5, name: '⭐ Connecting Precalculus to Calculus'}, {num: 6, name: '⭐ AP-Style Practice Problems'}, {num: 7, name: '⭐ Capstone Project: Modeling with Functions'}, {num: 8, name: '⭐ Comprehensive Review & AP Exam Prep'}],
    };

  function generateUnitSVG(unitNum, lessonCount) {
    let segments = '';
    const lessons = lessonMappings[unitNum] || [];
    const totalSpace = 30;
    const rectHeight = (totalSpace / lessons.length).toFixed(3);

    for (let i = 0; i < lessons.length; i++) {
      const lesson = lessons[i];
      const yPos = (3 + totalSpace - ((i + 1) * rectHeight)).toFixed(3);
      segments += '<a href="../CourseFiles/PrecalculusLessons/Unit' + unitNum + '/Lesson ' + unitNum + '.' + lesson.num + '_Video.html" onclick="markLessonStarted(\'' + unitNum + '\', ' + (i+1) + ')">\n' +
        '    <rect id="u' + unitNum + '-l' + (i+1) + '" stroke="none" x="3" y="' + yPos + '" width="18" height="' + rectHeight + '" fill="white" fill-opacity="0" cursor="pointer" pointer-events="auto" onmouseenter="showLessonPopup(event, \'Lesson ' + unitNum + '.' + lesson.num + ': ' + lesson.name.replace(/'/g, "\\'") + '\')" onmousemove="moveLessonPopup(event)" onmouseleave="hideLessonPopup()"></rect>\n' +
        '</a>\n' +
        '  <line x1="3" y1="' + yPos + '" x2="21" y2="' + yPos + '" stroke="currentColor" stroke-width="0.08" stroke-opacity="0.3" pointer-events="none" />\n';
    }

    return '<div style="position: relative; display: flex; align-items: flex-start; justify-content: center; height: 100%;"><svg viewBox="0 0 24 38" fill="none" stroke="currentColor" stroke-width="0.4" stroke-linecap="round" stroke-linejoin="round" style="width: 100%; height: 100%; max-height: 45rem; color: inherit;"><rect x="3" y="3" width="18" height="30" rx="1.5" ry="1.5" fill="none" stroke="currentColor" stroke-width="0.5" /><rect id="fill-unit-' + unitNum + '" x="3" y="3" width="18" height="30" rx="1.5" ry="1.5" fill="#9ca3af" fill-opacity="0.15" stroke="none" /><g id="segments-unit-' + unitNum + '">\n' + segments + '</g><text x="12" y="36" text-anchor="middle" fill="currentColor" stroke="none" font-size="1.8" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="600" style="pointer-events: none;">Unit ' + unitNum + '</text></svg></div>';
  }

  function populateGrid() {
    const container = document.getElementById('grid-container');
    container.innerHTML = '';
    for (const [unitNum, lessonCount] of Object.entries(courseConfig.units)) {
      container.innerHTML += generateUnitSVG(parseInt(unitNum), lessonCount);
    }
  }

  function markLessonStarted(unit, lesson) {
    const startedKey = courseConfig.coursePrefix + '_u' + unit + '_l' + lesson + '_started';
    const completedKey = courseConfig.coursePrefix + '_u' + unit + '_l' + lesson + '_completed';
    if (localStorage.getItem(completedKey) !== 'true') {
      localStorage.setItem(startedKey, 'true');
    }
  }

  function applyProgressColors() {
    for (let u = 1; u <= courseConfig.numUnits; u++) {
      const lessonCount = courseConfig.units[u] || 0;
      for (let l = 1; l <= lessonCount; l++) {
        const element = document.getElementById('u' + u + '-l' + l);
        if(element) {
          const completed = localStorage.getItem(courseConfig.coursePrefix + '_u' + u + '_l' + l + '_completed') === 'true';
          const started = localStorage.getItem(courseConfig.coursePrefix + '_u' + u + '_l' + l + '_started') === 'true';
          if (completed) {
            element.setAttribute('fill', '#16a34a');
            element.setAttribute('fill-opacity', '0.7');
          } else if (started) {
            element.setAttribute('fill', '#f97316');
            element.setAttribute('fill-opacity', '0.6');
          }
        }
      }
    }
  }

  let tooltipEl = null;
  function getOrCreateTooltip() {
    if (!tooltipEl) {
      tooltipEl = document.createElement('div');
      tooltipEl.id = 'lesson-tooltip';
      document.body.appendChild(tooltipEl);
    }
    return tooltipEl;
  }
  function showLessonPopup(event, title) {
    const tooltip = getOrCreateTooltip();
    const target = event.target;
    if (target && target.id && target.id.match(/^u\d+-l\d+$/)) {
      target.classList.add('segment-hover');
    }
    let status = '';
    const match = target.id ? target.id.match(/u(\d+)-l(\d+)/) : null;
    if (match) {
      const u = match[1], l = match[2];
      const isCompleted = localStorage.getItem(courseConfig.coursePrefix + '_u' + u + '_l' + l + '_completed') === 'true';
      const isStarted = localStorage.getItem(courseConfig.coursePrefix + '_u' + u + '_l' + l + '_started') === 'true';
      if (isCompleted) status = 'COMPLETED \u2714 ';
      else if (isStarted) status = 'IN PROGRESS ';
    }
    tooltip.textContent = status + title;
    tooltip.setAttribute('data-visible', 'true');
  }
  function moveLessonPopup(e) {
    const tooltip = getOrCreateTooltip();
    if (tooltip.getAttribute('data-visible') !== 'true') return;
    const offset = 15;
    let x = e.clientX + offset, y = e.clientY + offset;
    const rect = tooltip.getBoundingClientRect();
    if (x + rect.width > window.innerWidth) x = e.clientX - rect.width - offset;
    if (y + rect.height > window.innerHeight) y = e.clientY - rect.height - offset;
    tooltip.style.left = x + 'px';
    tooltip.style.top = y + 'px';
  }
  function hideLessonPopup() {
    const tooltip = getOrCreateTooltip();
    tooltip.setAttribute('data-visible', 'false');
    document.querySelectorAll('.segment-hover').forEach(function(el) { el.classList.remove('segment-hover'); });
  }

  document.addEventListener('DOMContentLoaded', function() {
    populateGrid();
    applyProgressColors();
  });

  window.addEventListener('storage', function(e) {
    if (e.key && e.key.indexOf(courseConfig.coursePrefix + '_u') === 0) {
      applyProgressColors();
    }
  });
  </script>

  <script src="../../search_data.js"></script>
  <script src="../../search_logic.js"></script>
  <script src="../scripts/dev_tools.js"></script>
</body>
</html>
