<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>High School: Algebra 1</title>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/ArisEdu Project Folder/styles/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="../theme_manager.js"></script>
  <script type="module">
    // Import Firebase config and make auth + db available to analytics
    import { auth, db } from '../firebase-config.js';
    window.auth = auth;
    window.db = db;
  </script>
<script src="../scripts/analytics-helper.js"></script>
<script src="../scripts/translation_loader.js" data-section="algebra1" data-base="../translations"></script>
</head>
<body class="dark-mode h-full">
<script src="../scripts/taskbar.js"></script>
  <main class="main-container">
    <div class="logo-title-wrapper" style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem;">
      <div style="display: flex; align-items: center; gap: 1.5rem;"><div style="color: currentColor; flex-shrink: 0;"><svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg"><text x="20" y="26" font-size="24" font-weight="bold" text-anchor="middle" fill="currentColor">π</text></svg></div><h1 id="company-name" class="logo-font page-title" style="font-size: 3rem; margin-bottom: 0;">High School: Algebra 1</h1></div>
    </div>
    <div id="courses-container" class="courses-container" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 2rem; padding: 1rem; min-height: 60rem;"></div>
  </main>

  <script src="../../search_data.js"></script>
  <script src="../../search_logic.js"></script>

<style>
  rect[id^="u"], path[id^="u"] { transform-box: fill-box; transform-origin: center; transition: transform 0.2s ease; }
  #lesson-tooltip { position: fixed; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(8px); color: white; padding: 0.75rem 1rem; border-radius: 0.75rem; font-size: 0.95rem; font-weight: 600; pointer-events: none; z-index: 10000; opacity: 0; transition: opacity 0.15s ease; display: none; max-width: 250px; }
  #lesson-tooltip[data-visible="true"] { opacity: 1; display: block; }
</style>

<script>
  // Course configuration
  const courseConfig = {
    name: "High School: Algebra 1",
    folder: "Algebra1",
    units: {
      1: 8,
      2: 10,
      3: 8,
      4: 9,
      5: 11,
      6: 7,
      7: 9,
      8: 5,
      9: 5,
      10: 5,
      11: 4,
      12: 5
    },
    lessonNames: {
      1: ['Measures of Center', 'Measures of Spread', 'Data Distributions', 'Describing Distributions', 'Box Plots & Dot Plots', 'Two-Way Tables', 'Outliers & Their Effects'],
      2: ['One-Step & Two-Step Equations', 'Multi-Step Equations', 'Equations with Variables on Both Sides', 'Literal Equations', 'One-Step & Two-Step Inequalities', 'Compound Inequalities', 'Absolute Value Equations & Inequalities', 'Systems of Equations — Substitution & Elimination', 'Systems of Inequalities'],
      3: ['Scatter Plots & Correlation', 'Line of Best Fit', 'Residuals & Residual Plots', 'Correlation vs. Causation', 'Two-Way Frequency Tables', 'Relative Frequency', 'Association in Categorical Data'],
      4: ['Relations & Functions', 'Function Notation', 'Domain & Range', 'Evaluating & Interpreting Functions', 'Rate of Change & Slope', 'Arithmetic Sequences as Functions', 'Piecewise & Step Functions', 'Function Transformations'],
      5: ['Exponential Growth', 'Exponential Decay', 'Exponential vs. Linear Models', 'Geometric Sequences', 'Compound Interest', 'Exponential Equations from Tables & Graphs', 'Transformations of Exponential Functions', 'Solving Exponential Equations', 'Interpreting Exponential Models', 'Exponential Regression'],
      6: ['Key Features of Parabolas', 'Graphing in Standard Form', 'Graphing in Vertex Form', 'Transformations of Quadratic Functions', 'Comparing Linear, Exponential, & Quadratic Models', 'Quadratic Regression'],
      7: ['Solving by Factoring — GCF & Grouping', 'Solving by Factoring — Trinomials', 'Special Products & Factoring Patterns', 'Completing the Square', 'The Quadratic Formula', 'The Discriminant', 'Systems with Quadratics', 'Quadratic Inequalities'],
      8: ['Adding & Subtracting Polynomials', 'Multiplying Polynomials', 'Dividing Polynomials', 'Polynomial Identities'],
      9: ['Simplifying Rational Expressions', 'Multiplying & Dividing Rational Expressions', 'Adding & Subtracting Rational Expressions', 'Solving Rational Equations'],
      10: ['Simplifying Radicals', 'Operations with Radicals', 'Rational Exponents', 'Solving Radical Equations'],
      11: ['Arithmetic & Geometric Sequences Review', 'Recursive & Explicit Formulas', 'Introduction to Series'],
      12: ['Sample Spaces & Basic Probability', 'Independent & Dependent Events', 'Conditional Probability', 'Probability with Combinatorics']
    },
    numUnits: 12
  };

  // Generate unit SVG with smart spacing
  function generateUnitSVG(unitNum, lessonCount) {
    const totalItems = lessonCount; // includes unit test as last item
    const realLessons = lessonCount - 1;
    const areaHeight = 30; // SVG area from y=3 to y=33
    const spacing = areaHeight / totalItems;
    const bottomY = 33;
    let segments = '';

    for (let itemNum = 1; itemNum <= totalItems; itemNum++) {
      const yPos = (bottomY - itemNum * spacing).toFixed(3);
      const height = spacing.toFixed(3);
      let href, tooltipName;

      if (itemNum <= realLessons) {
        // Regular lesson
        href = `../CourseFiles/Algebra1Lessons/Unit${unitNum}/Lesson${unitNum}.${itemNum}_Video.html`;
        const name = courseConfig.lessonNames[unitNum][itemNum - 1];
        tooltipName = `${unitNum}.${itemNum} ${name}`;
      } else {
        // Unit test (last item)
        href = `../CourseFiles/Algebra1Lessons/Unit${unitNum}/Unit${unitNum}_Test_Practice.html`;
        tooltipName = `Unit ${unitNum} Test`;
      }

      segments += `<a href="${href}" onclick="markLessonStarted('${unitNum}', ${itemNum})">
    <rect id="u${unitNum}-l${itemNum}" stroke="none" x="3" y="${yPos}" width="18" height="${height}" fill="white" fill-opacity="0" cursor="pointer" pointer-events="auto" onmouseenter="showLessonPopup(event, '${tooltipName.replace(/\'/g, "&#39;")}', ${unitNum}, ${itemNum})" onmousemove="moveLessonPopup(event)" onmouseleave="hideLessonPopup()"></rect></a>
  <line x1="3" y1="${yPos}" x2="21" y2="${yPos}" stroke="currentColor" stroke-width="0.08" stroke-opacity="0.3" pointer-events="none" />`;
    }

    return `<div style="position: relative; display: flex; align-items: flex-start; justify-content: center; height: 100%;"><svg viewBox="0 0 24 38" fill="none" stroke="currentColor" stroke-width="0.4" stroke-linecap="round" stroke-linejoin="round" style="width: 100%; height: 100%; max-height: 45rem; color: inherit;"><rect x="3" y="3" width="18" height="30" rx="1.5" ry="1.5" fill="none" stroke="currentColor" stroke-width="0.5" /><rect id="fill-unit-${unitNum}" x="3" y="3" width="18" height="30" rx="1.5" ry="1.5" fill="#9ca3af" fill-opacity="0.15" stroke="none" /><g id="segments-unit-${unitNum}">
${segments}</g><text x="12" y="36" text-anchor="middle" fill="currentColor" stroke="none" font-size="1.8" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="600" style="pointer-events: none;">Unit ${unitNum}</text></svg></div>`;
  }

  // Populate the grid
  function populateGrid() {
    const container = document.getElementById('courses-container');
    for (const [unitNum, lessonCount] of Object.entries(courseConfig.units)) {
      container.innerHTML += generateUnitSVG(parseInt(unitNum), lessonCount);
    }
  }

  // Initialize on load
  document.addEventListener('DOMContentLoaded', () => {
    populateGrid();
    applyProgressColors();
    
    // Initialize analytics and track course visit
    if (typeof StudentAnalytics !== 'undefined') {
      try {
        const analytics = new StudentAnalytics();
        analytics.trackLessonView('algebra1', 0, 0); // Track course visit
        analytics.updateLearningStreak(); // Update daily streak
      } catch (e) {
        console.warn('Analytics initialization failed:', e);
      }
    }
  });

  let tooltipEl = null;
  function getOrCreateTooltip() { if (!tooltipEl) { tooltipEl = document.createElement('div'); tooltipEl.id = 'lesson-tooltip'; document.body.appendChild(tooltipEl); } return tooltipEl; }
  function showLessonPopup(event, lessonTitle, unitNum, lessonNum) {
    const tooltip = getOrCreateTooltip();
    let status = '';
    const isCompleted = localStorage.getItem(`alg1_u${unitNum}_l${lessonNum}_completed`) === 'true';
    const isStarted = localStorage.getItem(`alg1_u${unitNum}_l${lessonNum}_started`) === 'true';
    if (isCompleted) {
      status = '✅ COMPLETED\n';
    } else if (isStarted) {
      status = '⌛ IN PROGRESS\n';
    }
    tooltip.textContent = status + lessonTitle;
    tooltip.setAttribute('data-visible', 'true');
  }
  function moveLessonPopup(event) { const tooltip = getOrCreateTooltip(); tooltip.style.left = (event.pageX + 12) + 'px'; tooltip.style.top = (event.pageY + 12) + 'px'; }
  function hideLessonPopup() { const tooltip = getOrCreateTooltip(); tooltip.setAttribute('data-visible', 'false'); }
  function markLessonStarted(unit, lesson) { localStorage.setItem(`alg1_u${unit}_l${lesson}_started`, 'true'); applyProgressColors(); }
  function applyProgressColors() { 
    for (let u = 1; u <= courseConfig.numUnits; u++) { 
      const count = courseConfig.units[u];
      for (let l = 1; l <= count; l++) { 
        const segment = document.getElementById(`u${u}-l${l}`); 
        if (segment) { 
          const isCompleted = localStorage.getItem(`alg1_u${u}_l${l}_completed`) === 'true'; 
          const isStarted = localStorage.getItem(`alg1_u${u}_l${l}_started`) === 'true'; 
          if (isCompleted) { 
            segment.setAttribute('fill', '#16a34a'); 
            segment.setAttribute('fill-opacity', '0.7'); 
          } else if (isStarted) { 
            segment.setAttribute('fill', '#f97316'); 
            segment.setAttribute('fill-opacity', '0.6'); } 
        } 
      } 
    } 
  }
</script>
<script src="../scripts/dev_tools.js"></script>
<script>
  if (window._isDevUser && window._isDevUser()) {
    var dcb = document.getElementById('dev-clear-btn');
    if (dcb) dcb.style.display = '';
  }
</script>
</body>
</html>
