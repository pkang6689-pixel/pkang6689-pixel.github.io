<style>
  rect[id^="u"], path[id^="u"] { transform-box: fill-box; transform-origin: center; transition: transform 0.2s ease; }
  #lesson-tooltip { position: fixed; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(8px); color: white; padding: 0.75rem 1rem; border-radius: 0.75rem; font-size: 0.95rem; font-weight: 600; pointer-events: none; z-index: 10000; opacity: 0; transition: opacity 0.15s ease; display: none; max-width: 250px; }
  #lesson-tooltip[data-visible="true"] { opacity: 1; display: block; }
</style>

<script>
  let tooltipEl = null;
  function getOrCreateTooltip() { if (!tooltipEl) { tooltipEl = document.createElement('div'); tooltipEl.id = 'lesson-tooltip'; document.body.appendChild(tooltipEl); } return tooltipEl; }
  function showLessonPopup(event, lessonTitle) { const tooltip = getOrCreateTooltip(); tooltip.textContent = lessonTitle; tooltip.setAttribute('data-visible', 'true'); }
  function moveLessonPopup(event) { const tooltip = getOrCreateTooltip(); tooltip.style.left = (event.pageX + 12) + 'px'; tooltip.style.top = (event.pageY + 12) + 'px'; }
  function hideLessonPopup() { const tooltip = getOrCreateTooltip(); tooltip.setAttribute('data-visible', 'false'); }
  function markLessonStarted(unit, lesson) { localStorage.setItem(`apphys1_u${unit}_l${lesson}_started`, 'true'); applyProgressColors(); }
  function markLessonComplete(unit, lesson) { localStorage.setItem(`apphys1_u${unit}_l${lesson}_completed`, 'true'); applyProgressColors(); }
  function applyProgressColors() { for (let u = 1; u <= 8; u++) { for (let l = 1; l <= 8; l++) { const segment = document.getElementById(`u${u}-l${l}`); if (segment) { const isCompleted = localStorage.getItem(`apphys1_u${u}_l${l}_completed`) === 'true'; const isStarted = localStorage.getItem(`apphys1_u${u}_l${l}_started`) === 'true'; if (isCompleted) { segment.setAttribute('fill', '#16a34a'); segment.setAttribute('fill-opacity', '0.7'); } else if (isStarted) { segment.setAttribute('fill', '#f97316'); segment.setAttribute('fill-opacity', '0.6'); } } } } }
  // Listen for storage changes from other tabs/quiz completion
  window.addEventListener('storage', function(e) { if (e.key && e.key.match(/apphys1_u\d+_l\d+_(completed|started)/)) { applyProgressColors(); } });
  document.addEventListener('DOMContentLoaded', applyProgressColors);
</script>
