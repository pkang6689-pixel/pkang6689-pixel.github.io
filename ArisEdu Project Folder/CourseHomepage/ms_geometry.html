<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Middle School: Geometry</title>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/ArisEdu Project Folder/styles/main.css">

 <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="../theme_manager.js"></script>
  <script type="module">
    // Import Firebase config and make auth + db available to analytics
    import { auth, db } from '../firebase-config.js';
    window.auth = auth;
    window.db = db;
  </script>
<script src="../scripts/analytics-helper.js"></script>
<script src="../scripts/translation_loader.js" data-section="ms_geometry" data-base="../translations"></script>
</head>
 <body class="dark-mode h-full">
<script src="../scripts/taskbar.js"></script>
  <main class="main-container">
    <div class="logo-title-wrapper" style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem;">
      <h1 id="company-name" class="logo-font page-title" style="font-size: 3rem; margin-bottom: 0;">Middle School: Geometry</h1>
    </div>
    <div class="courses-container">
      <!-- Dynamic Unit Grid -->
      <div style="position: relative; transform: translateY(0); display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; padding: 1rem; min-height: 60rem;" id="grid-container"></div>

      </div>

    </div>
  </main>

    
    <!-- ArisEdu Global Search -->

    <script src="../../search_data.js"></script>
    <script src="../../search_logic.js"></script>
    <script src="../scripts/dev_tools.js"></script>

  <!-- Popup & Game Logic Scripts -->
  <style>
      #lesson-tooltip {
          position: fixed;
          background: rgba(15, 23, 42, 0.95);
          backdrop-filter: blur(12px);
          color: #f1f5f9;
          padding: 0.75rem 1.25rem;
          border-radius: 0.75rem;
          font-size: 0.95rem;
          font-weight: 600;
          pointer-events: none;
          z-index: 10000;
          opacity: 0;
          transition: opacity 0.15s ease;
          border: 1px solid rgba(255, 255, 255, 0.15);
          box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
          white-space: nowrap;
          display: none;
      }
      #lesson-tooltip[data-visible="true"] {
          opacity: 1;
          display: block;
      }
      }
      /* Hover interactions & Transitions */
      rect[id^="u"], path[id^="u"] {
          transform-box: fill-box;
          transform-origin: center;
          transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.2s ease, stroke-width 0.2s ease;
      }
      .segment-hover {
          transform: scale(1.05);
          filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.9));
          fill-opacity: 0.15;
      }

      /* Starred Lesson Glow & Animation */
      @keyframes star-pulse {
        0%, 100% { stroke-opacity: 0.8; stroke-width: 0.12; filter: drop-shadow(0 0 2px #a78bfa); }
        50% { stroke-opacity: 1; stroke-width: 0.25; filter: drop-shadow(0 0 6px #8b5cf6); }
      }
      .starred-lesson-glow {
        stroke: #c4b5fd !important;
        stroke-dasharray: 0.3, 0.1;
        animation: star-pulse 1.5s infinite ease-in-out;
      }
      @keyframes star-twinkle {
          0%, 100% { opacity: 0.4; transform: scale(0.8); }
          50% { opacity: 1; transform: scale(1.3); }
      }
      .star-icon {
          animation: star-twinkle 2s infinite ease-in-out;
          font-family: inherit;
          pointer-events: none;
          transform-box: fill-box;
          transform-origin: center;
          font-size: 0.6px;
          user-select: none;
      }
  </style>

  <div id="lesson-tooltip"></div>
  
  <script>
  const courseConfig = {
    units: {
      1: 23, 2: 14, 3: 23
    },
    numUnits: 3,
    coursePrefix: 'ms_geom'
  };

  function generateUnitSVG(unitNum, lessonCount) {
    let segments = '';
    const totalSpace = 30; // Available SVG space from y=3 to y=33
    
    // Determine lesson links based on unit
    const lessonMappings = {
      1: [{num: 1, name: 'Points, Lines, Planes'}, {num: 4, name: 'Angle Measure'}],
      2: [{num: 1, name: 'Inductive Reasoning'}, {num: 3, name: 'Conditional Statements'}],
      3: [{num: 1, name: 'Parallel Lines'}, {num: 3, name: 'Slopes'}],
      4: [{num: 1, name: 'Classifying Triangles'}, {num: 2, name: 'Angles of Triangles'}, {num: 3, name: 'Congruent Triangles'}, {num: 4, name: 'Proving Congruence: SSS, SAS'}],
      5: [{num: 1, name: 'Bisectors of Triangles'}, {num: 3, name: 'Inequalities in One Triangle'}],
      6: [{num: 1, name: 'Angles of Polygons'}, {num: 2, name: 'Parallelograms'}, {num: 4, name: 'Rectangles'}],
      7: [{num: 1, name: 'Ratios and Proportions'}, {num: 2, name: 'Similar Polygons'}, {num: 3, name: 'Similar Triangles'}, {num: 4, name: 'Parallel Lines and Proportional Parts'}],
      8: [{num: 1, name: 'Geometric Mean'}, {num: 2, name: 'The Pythagorean Theorem and Its Converse'}]
    };
    
    const lessons = lessonMappings[unitNum] || [];
    const rectHeight = (totalSpace / lessons.length).toFixed(3);
    
    for (let i = 0; i < lessons.length; i++) {
      const lesson = lessons[i];
      const yPos = (3 + totalSpace - ((i + 1) * rectHeight)).toFixed(3);
      segments += `<a href="../CourseFiles/MS_GeometryLessons/Unit${unitNum}/Lesson${unitNum}.${lesson.num}_Video.html" onclick="markLessonStarted('${unitNum}', ${i+1})">
    <rect id="u${unitNum}-l${i+1}" stroke="none" x="3" y="${yPos}" width="18" height="${rectHeight}" fill="white" fill-opacity="0" cursor="pointer" pointer-events="auto" onmouseenter="showLessonPopup(event, 'Lesson ${unitNum}.${lesson.num}: ${lesson.name}')" onmousemove="moveLessonPopup(event)" onmouseleave="hideLessonPopup()"></rect>
</a>
  <line x1="3" y1="${yPos}" x2="21" y2="${yPos}" stroke="currentColor" stroke-width="0.08" stroke-opacity="0.3" pointer-events="none" />`;
    }
    
    return `<div style="position: relative; display: flex; align-items: flex-start; justify-content: center; height: 100%;"><svg viewBox="0 0 24 38" fill="none" stroke="currentColor" stroke-width="0.4" stroke-linecap="round" stroke-linejoin="round" style="width: 100%; height: 100%; max-height: 45rem; color: inherit;"><rect x="3" y="3" width="18" height="30" rx="1.5" ry="1.5" fill="none" stroke="currentColor" stroke-width="0.5" /><rect id="fill-unit-${unitNum}" x="3" y="3" width="18" height="30" rx="1.5" ry="1.5" fill="#9ca3af" fill-opacity="0.15" stroke="none" /><g id="segments-unit-${unitNum}">
${segments}</g><text x="12" y="36" text-anchor="middle" fill="currentColor" stroke="none" font-size="1.8" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="600" style="pointer-events: none;">Unit ${unitNum}</text></svg></div>`;
  }

  function populateGrid() {
    const container = document.getElementById('grid-container');
    container.innerHTML = '';
    for (const [unitNum, lessonCount] of Object.entries(courseConfig.units)) {
      container.innerHTML += generateUnitSVG(parseInt(unitNum), lessonCount);
    }
  }

  function markLessonStarted(unit, lesson) {
    const startedKey = `ms_geom_u${unit}_l${lesson}_started`;
    const completedKey = `ms_geom_u${unit}_l${lesson}_completed`;
    if (localStorage.getItem(completedKey) !== 'true') {
      localStorage.setItem(startedKey, 'true');
    }
  }

  function applyProgressColors() {
    for (let u = 1; u <= courseConfig.numUnits; u++) {
      const lessonCount = courseConfig.units[u] || 0;
      for (let l = 1; l <= lessonCount; l++) {
        const element = document.getElementById(`u${u}-l${l}`);
        if(element) {
          const completed = localStorage.getItem(`ms_geom_u${u}_l${l}_completed`) === 'true';
          const started = localStorage.getItem(`ms_geom_u${u}_l${l}_started`) === 'true';
          if (completed) {
            element.setAttribute('fill', '#16a34a');
            element.setAttribute('fill-opacity', '0.7');
          } else if (started) {
            element.setAttribute('fill', '#f97316');
            element.setAttribute('fill-opacity', '0.6');
          }
        }
      }
    }
  }

  let tooltipEl = null;
  function getOrCreateTooltip() { 
    if (!tooltipEl) { 
      tooltipEl = document.createElement('div'); 
      tooltipEl.id = 'lesson-tooltip'; 
      document.body.appendChild(tooltipEl); 
    } 
    return tooltipEl; 
  }
  function showLessonPopup(event, title) { 
    const tooltip = getOrCreateTooltip();
    const target = event.target;
    if (target && target.id && target.id.match(/^u\d+-l\d+$/)) {
      target.classList.add('segment-hover');
    }
    let status = '';
    const match = target.id.match(/u(\d+)-l(\d+)/);
    if (match) {
      const u = match[1], l = match[2];
      const isCompleted = localStorage.getItem(`ms_geom_u${u}_l${l}_completed`) === 'true';
      const isStarted = localStorage.getItem(`ms_geom_u${u}_l${l}_started`) === 'true';
      if (isCompleted) status = '✅ COMPLETED\n';
      else if (isStarted) status = '⏳ IN PROGRESS\n';
    }
    tooltip.textContent = status + title;
    tooltip.setAttribute('data-visible', 'true');
  }
  function moveLessonPopup(e) { 
    const tooltip = getOrCreateTooltip();
    if (tooltip.getAttribute('data-visible') !== 'true') return;
    const offset = 15;
    let x = e.clientX + offset, y = e.clientY + offset;
    const rect = tooltip.getBoundingClientRect();
    if (x + rect.width > window.innerWidth) x = e.clientX - rect.width - offset;
    if (y + rect.height > window.innerHeight) y = e.clientY - rect.height - offset;
    tooltip.style.left = x + 'px';
    tooltip.style.top = y + 'px';
  }
  function hideLessonPopup() { 
    const tooltip = getOrCreateTooltip();
    tooltip.setAttribute('data-visible', 'false');
    document.querySelectorAll('.segment-hover').forEach(el => el.classList.remove('segment-hover'));
  }

  document.addEventListener('DOMContentLoaded', () => {
    // Initialize analytics and track course visit
    if (typeof StudentAnalytics !== 'undefined') {
      try {
        const analytics = new StudentAnalytics();
        analytics.trackLessonView('ms_geometry', 0, 0); // Track course visit
        analytics.updateLearningStreak(); // Update daily streak
      } catch (e) {
        console.warn('Analytics initialization failed:', e);
      }
    }

    populateGrid();
    applyProgressColors();
  });

  window.addEventListener('storage', function(e) {
    if (e.key && e.key.match(/ms_geom_u\d+_l\d+_(completed|started)/)) {
      applyProgressColors();
    }
  });
</script>
            

</body>
</html>
