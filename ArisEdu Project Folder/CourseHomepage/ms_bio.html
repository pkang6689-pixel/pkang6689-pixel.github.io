<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Middle School: Life Science</title>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/ArisEdu Project Folder/styles/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="../theme_manager.js"></script>
  <script type="module">
    // Import Firebase config and make auth + db available to analytics
    import { auth, db } from '../firebase-config.js';
    window.auth = auth;
    window.db = db;
  </script>
<script src="../scripts/analytics-helper.js"></script>
<script src="../scripts/translation_loader.js" data-section="ms_biology" data-base="../translations"></script>
</head>
<body class="dark-mode h-full">
<script src="../scripts/taskbar.js"></script>
  <main class="main-container">
    <div class="logo-title-wrapper" style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem;">
      <div style="display: flex; align-items: center; gap: 1.5rem;"><div style="color: currentColor; flex-shrink: 0;"><svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 10C14 12 16 14 18 16M12 30C14 28 16 26 18 24M28 10C26 12 24 14 22 16M28 30C26 28 24 26 22 24M14 14L26 26M14 26L26 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="12" cy="10" r="2" fill="currentColor"/><circle cx="12" cy="30" r="2" fill="currentColor"/><circle cx="28" cy="10" r="2" fill="currentColor"/><circle cx="28" cy="30" r="2" fill="currentColor"/></svg></div><h1 id="company-name" class="logo-font page-title" style="font-size: 3rem; margin-bottom: 0;">Middle School: Life Science</h1></div>
    </div>
    <div id="courses-container" class="courses-container" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; padding: 1rem; min-height: 60rem;"></div>
  </main>

  <script src="../../search_data.js"></script>
  <script src="../../search_logic.js"></script>

<style>
  rect[id^="u"], path[id^="u"] { transform-box: fill-box; transform-origin: center; transition: transform 0.2s ease; }
  #lesson-tooltip { position: fixed; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(8px); color: white; padding: 0.75rem 1rem; border-radius: 0.75rem; font-size: 0.95rem; font-weight: 600; pointer-events: none; z-index: 10000; opacity: 0; transition: opacity 0.15s ease; display: none; max-width: 250px; }
  #lesson-tooltip[data-visible="true"] { opacity: 1; display: block; }
</style>

<script>
  // Course configuration
  const courseConfig = {
    name: "Middle School: Life Science",
    folder: "MS Biology",
    units: {
      1: 5,
      2: 5,
      3: 4,
      4: 4,
      5: 3,
      6: 4,
      7: 3,
      8: 3,
      9: 3
    },
    numUnits: 9
  };

  // Generate unit SVG with adaptive spacing
  function generateUnitSVG(unitNum, lessonCount) {
    let segments = '';
    const maxLessons = 8;
    const actualLessonCount = Math.min(lessonCount, maxLessons);
    
    // Smart lesson fitting: distribute lessons evenly across 30 units of SVG height
    const totalSpace = 30;
    const rectHeight = (totalSpace / actualLessonCount).toFixed(3);
    
    for (let lessonNum = 1; lessonNum <= actualLessonCount; lessonNum++) {
      const yPos = (3 + totalSpace - (lessonNum * rectHeight)).toFixed(3);
      segments += `<a href="../CourseFiles/MS_BiologyLessons/Unit${unitNum}/Lesson${unitNum}.${lessonNum}_Video.html" onclick="markLessonStarted('${unitNum}', ${lessonNum})">
    <rect id="u${unitNum}-l${lessonNum}" stroke="none" x="3" y="${yPos}" width="18" height="${rectHeight}" fill="white" fill-opacity="0" cursor="pointer" pointer-events="auto" onmouseenter="showLessonPopup(event, 'Lesson ${unitNum}.${lessonNum}', ${unitNum}, ${lessonNum})" onmousemove="moveLessonPopup(event)" onmouseleave="hideLessonPopup()"></rect></a>
  <line x1="3" y1="${yPos}" x2="21" y2="${yPos}" stroke="currentColor" stroke-width="0.08" stroke-opacity="0.3" pointer-events="none" />`;
    }
    
    return `<div style="position: relative; display: flex; align-items: flex-start; justify-content: center; height: 100%;"><svg viewBox="0 0 24 38" fill="none" stroke="currentColor" stroke-width="0.4" stroke-linecap="round" stroke-linejoin="round" style="width: 100%; height: 100%; max-height: 45rem; color: inherit;"><rect x="3" y="3" width="18" height="30" rx="1.5" ry="1.5" fill="none" stroke="currentColor" stroke-width="0.5" /><rect id="fill-unit-${unitNum}" x="3" y="3" width="18" height="30" rx="1.5" ry="1.5" fill="#9ca3af" fill-opacity="0.15" stroke="none" /><g id="segments-unit-${unitNum}">
${segments}</g><text x="12" y="36" text-anchor="middle" fill="currentColor" stroke="none" font-size="1.8" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="600" style="pointer-events: none;">Unit ${unitNum}</text></svg></div>`;
  }

  // Populate the grid
  function populateGrid() {
    const container = document.getElementById('courses-container');
    for (const [unitNum, lessonCount] of Object.entries(courseConfig.units)) {
      container.innerHTML += generateUnitSVG(parseInt(unitNum), lessonCount);
    }
  }

  // Initialize on load
  document.addEventListener('DOMContentLoaded', () => {
    // Initialize analytics and track course visit
    if (typeof StudentAnalytics !== 'undefined') {
      try {
        const analytics = new StudentAnalytics();
        analytics.trackLessonView('ms_biology', 0, 0); // Track course visit
        analytics.updateLearningStreak(); // Update daily streak
      } catch (e) {
        console.warn('Analytics initialization failed:', e);
      }
    }

    populateGrid();
    applyProgressColors();
  });

  let tooltipEl = null;
  function getOrCreateTooltip() { if (!tooltipEl) { tooltipEl = document.createElement('div'); tooltipEl.id = 'lesson-tooltip'; document.body.appendChild(tooltipEl); } return tooltipEl; }
  const lessonNames = {
    '1.1': 'Introduction to Biology', '1.2': 'The Science of Life', '1.3': 'The Nature of Science', '1.4': 'Characteristics of Life', '1.5': 'Levels of Biological Organization', '1.6': 'Branches of Biology', '1.7': 'Careers in Biology',
    '2.1': 'Organisms and Their Relationships', '2.2': 'Flow of Energy in an Ecosystem', '2.3': 'Cycling of Matter', '2.4': 'Ecological Succession', '2.5': 'Niches and Habitat', '2.6': 'Food Chains, Webs, and Trophic Levels', '2.7': 'Human Impact on Ecosystems',
    '3.1': 'Community Ecology', '3.2': 'Terrestrial Biomes', '3.3': 'Aquatic Ecosystems', '3.4': 'Climate Change and Ecosystem Shifts', '3.5': 'Symbiosis and Species Interactions',
    '4.1': 'Population Dynamics', '4.2': 'Human Population Growth and Demographics', '4.3': 'Carrying Capacity and Limiting Factors', '4.4': 'Population Regulation', '4.5': 'Conservation and Sustainable Development',
    '5.1': 'Biodiversity', '5.2': 'Threats to Biodiversity', '5.3': 'Conserving Biodiversity', '5.4': 'Endangered Species and Conservation Strategies', '5.5': 'Global Conservation Efforts',
    '6.1': 'Matter and Atomic Structure', '6.2': 'Chemical Reactions and Enzymes', '6.3': 'Water and Its Solutions', '6.4': 'The Building Blocks of Life', '6.5': 'DNA and RNA', '6.6': 'Biochemistry in Everyday Life',
    '7.1': 'Cell Structure and Function', '7.2': 'Cell Discovery and Theory', '7.3': 'The Plasma Membrane', '7.4': 'Cellular Transport', '7.5': 'Structures and Organelles', '7.6': 'Prokaryotic vs. Eukaryotic Cells', '7.7': 'Microscopy and Cell Imaging',
    '8.1': 'How Organisms Obtain Energy', '8.2': 'Chemical Energy and ATP', '8.3': 'Photosynthesis', '8.4': 'Cellular Respiration', '8.5': 'Fermentation', '8.6': 'Energy Flow in Living Systems'
  };

  function showLessonPopup(event, lessonTitle, unitNum, lessonNum) { 
    const tooltip = getOrCreateTooltip(); 
    tooltip.setAttribute('data-visible', 'true'); 
    
    let status = '';
    const isCompleted = localStorage.getItem(`bio_u${unitNum}_l${lessonNum}_completed`) === 'true';
    const isStarted = localStorage.getItem(`bio_u${unitNum}_l${lessonNum}_started`) === 'true';
    if (isCompleted) {
      status = '✅ COMPLETED\n';
    } else if (isStarted) {
      status = '⏳ IN PROGRESS\n';
    }
    
    // Look up lesson name from mapping
    const lessonKey = `${unitNum}.${lessonNum}`;
    const lessonName = lessonNames[lessonKey] || lessonTitle;
    tooltip.textContent = status + `Lesson ${unitNum}.${lessonNum}: ${lessonName}`;
  }
  function moveLessonPopup(event) { const tooltip = getOrCreateTooltip(); tooltip.style.left = (event.pageX + 12) + 'px'; tooltip.style.top = (event.pageY + 12) + 'px'; }
  function hideLessonPopup() { const tooltip = getOrCreateTooltip(); tooltip.setAttribute('data-visible', 'false'); }
  function markLessonStarted(unit, lesson) { localStorage.setItem(`bio_u${unit}_l${lesson}_started`, 'true'); applyProgressColors(); }
  function applyProgressColors() { 
    for (let u = 1; u <= courseConfig.numUnits; u++) { 
      for (let l = 1; l <= 12; l++) { 
        const segment = document.getElementById(`u${u}-l${l}`); 
        if (segment) { 
          const isCompleted = localStorage.getItem(`bio_u${u}_l${l}_completed`) === 'true'; 
          const isStarted = localStorage.getItem(`bio_u${u}_l${l}_started`) === 'true'; 
          if (isCompleted) { 
            segment.setAttribute('fill', '#16a34a'); 
            segment.setAttribute('fill-opacity', '0.7'); 
          } else if (isStarted) { 
            segment.setAttribute('fill', '#f97316'); 
            segment.setAttribute('fill-opacity', '0.6'); } 
        } 
      } 
    } 
  }
</script>

  if (window._isDevUser && window._isDevUser()) {
    var dcb = document.getElementById('dev-clear-btn');
    if (dcb) dcb.style.display = '';
  }
</script>
</body>
</html>
