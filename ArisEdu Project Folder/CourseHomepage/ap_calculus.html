<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AP Calculus AB</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="../theme_manager.js"></script>
  <script type="module">
    // Import Firebase config and make auth + db available to analytics
    import { auth, db } from '../firebase-config.js';
    window.auth = auth;
    window.db = db;
  </script>
<script src="../scripts/analytics-helper.js"></script>
<script src="../scripts/translation_loader.js" data-section="ap_calculus" data-base="../translations"></script>
<script type="module" src="../scripts/course-progress-firebase.js"></script>
</head>
<body class="dark-mode h-full">
<script src="../scripts/taskbar.js"></script>
  <main class="main-container">
    <div class="logo-title-wrapper" style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem;">
      <div style="display: flex; align-items: center; gap: 1.5rem;"><div style="color: currentColor; flex-shrink: 0;"><svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M18 8C16 8 14 10 14 12L14 28C14 30 16 32 18 32C20 32 22 30 22 28L22 12C22 10 20 8 18 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="24" y1="6" x2="26" y2="34" stroke="currentColor" stroke-width="1.5"/></svg></div><h1 id="company-name" class="logo-font page-title" style="font-size: 3rem; margin-bottom: 0;">AP Calculus AB</h1></div>
    </div>
    <div id="courses-container" class="courses-container" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; padding: 1rem; min-height: 60rem;"></div>
    <div style="display: flex; justify-content: center; padding: 2rem; margin-top: 2rem;">
      <button onclick="window.location.href='../CourseFiles/APLessons/AP Calculus AB/practice_exam.html'" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 1rem 3rem; border: none; border-radius: 0.5rem; font-size: 1.1rem; font-weight: 600; cursor: pointer; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); transition: transform 0.2s, box-shadow 0.2s;" onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 6px 12px rgba(0, 0, 0, 0.15)'" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 6px rgba(0, 0, 0, 0.1)'">Take Practice Exam</button>
    </div>
  </main>

  <script src="../../search_data.js"></script>
  <script src="../../search_logic.js"></script>

<style>
  rect[id^="u"], path[id^="u"] { transform-box: fill-box; transform-origin: center; transition: transform 0.2s ease; }
  #lesson-tooltip { position: fixed; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(8px); color: white; padding: 0.75rem 1rem; border-radius: 0.75rem; font-size: 0.95rem; font-weight: 600; pointer-events: none; z-index: 10000; opacity: 0; transition: opacity 0.15s ease; display: none; max-width: 250px; }
  #lesson-tooltip[data-visible="true"] { opacity: 1; display: block; }
</style>

<script>
  // Course configuration
  const courseConfig = {
    name: "AP Calculus AB",
    folder: "AP Calculus AB",
    coursePrefix: "ap_calc_ab",
    units: {
      1: 11,
      2: 9,
      3: 6,
      4: 7,
      5: 12,
      6: 12,
      7: 7,
      8: 12
    },
    numUnits: 8,
    lessonNames: {
      1: { 1: "Limits: Intuition", 2: "Limits: Formal Definition", 3: "Continuity Basics", 4: "Continuity: Formal", 5: "Removable Discontinuities", 6: "Non-Removable Discontinuities", 7: "Vertical Asymptotes", 8: "Horizontal Asymptotes", 9: "Squeeze Theorem", 10: "Infinite Limits", 11: "Limiting Behavior" },
      2: { 1: "Derivative: Slope of Tangent", 2: "Derivative: Alternative Forms", 3: "Differentiability", 4: "Power Rule", 5: "Product & Quotient Rules", 6: "Chain Rule", 7: "Derivatives of Trig Functions", 8: "Derivatives of Exponentials & Logs", 9: "Implicit Differentiation" },
      3: { 1: "Related Rates", 2: "Linear Approximation", 3: "Mean Value Theorem", 4: "First Derivative Test", 5: "Second Derivative Test", 6: "Optimization Problems" },
      4: { 1: "Antiderivatives Basics", 2: "Indefinite Integrals", 3: "Integration Rules", 4: "Integration by Substitution", 5: "Area Under Curve", 6: "Riemann Sums", 7: "Fundamental Theorem of Calculus" },
      5: { 1: "Definite Integrals", 2: "Properties of Integrals", 3: "U-Substitution with Bounds", 4: "Area Between Curves", 5: "Volume of Revolution: Disk", 6: "Volume of Revolution: Shell", 7: "Volume of Revolution: Washer", 8: "Arc Length", 9: "Work & Force", 10: "Average Value Function", 11: "Accumulation Functions", 12: "Particle Motion" },
      6: { 1: "Differential Equations: Intro", 2: "Separable Equations", 3: "Slope Fields", 4: "Euler's Method", 5: "Exponential Growth & Decay", 6: "Logistic Growth", 7: "Solving Initial Value Problems", 8: "Modeling with Differential Equations", 9: "Solution Curves", 10: "Particular Solutions", 11: "General Solutions", 12: "Applications of Differential Equations" },
      7: { 1: "Parametric Equations: Intro", 2: "Parametric vs Cartesian", 3: "Slope of Parametric Curves", 4: "Velocity & Speed Vectors", 5: "Polar Coordinates Introduction", 6: "Polar Equations", 7: "Area in Polar Coordinates" },
      8: { 1: "Sequences: Limits", 2: "Series: Convergence/Divergence", 3: "Geometric Series", 4: "Harmonic Series", 5: "Divergence Test", 6: "Integral Test", 7: "P-Series", 8: "Ratio Test", 9: "Power Series Introduction", 10: "Taylor Series", 11: "Maclaurin Series", 12: "Series Convergence Regions" }
    }
  };

  // Generate unit SVG with adaptive spacing
  function generateUnitSVG(unitNum, lessonCount) {
    let segments = '';
    const actualLessonCount = lessonCount + 1; // +1 for unit test
    
    // Calculate height based on total available space (30 units) divided by lesson count
    const totalSpace = 30; // Available SVG space from y=3 to y=33
    const rectHeight = (totalSpace / actualLessonCount).toFixed(3);
    
    for (let lessonNum = 1; lessonNum <= lessonCount; lessonNum++) {
      // Y position: lessons positioned from bottom (high lesson #) to top (lesson 1)
      const yPos = (3 + totalSpace - (lessonNum * rectHeight)).toFixed(3);
      const folderPath = courseConfig.folder.replace(/\s+/g, '%20');
      const unitText = `Unit ${unitNum}`.replace(/\s+/g, '%20');
      const lessonText = `Lesson${unitNum}.${lessonNum}_Video.html`;
      const topicName = courseConfig.lessonNames?.[unitNum]?.[lessonNum];
      const lessonName = topicName ? `⭐ Lesson ${unitNum}.${lessonNum}: ${topicName}` : `Lesson ${unitNum}.${lessonNum}`;
      
      const href = `../CourseFiles/APLessons/${folderPath}/${unitText}/${lessonText}`;
      segments += `<g onclick="markLessonStarted(${unitNum}, ${lessonNum}); window.location.href='${href}';" style="cursor: pointer;">
    <rect id="u${unitNum}-l${lessonNum}" stroke="none" x="3" y="${yPos}" width="18" height="${rectHeight}" fill="white" fill-opacity="0.25" pointer-events="auto" onmouseenter="showLessonPopup(event, '${lessonName}', ${unitNum}, ${lessonNum})" onmousemove="moveLessonPopup(event)" onmouseleave="hideLessonPopup()"></rect></g>
  <line x1="3" y1="${yPos}" x2="21" y2="${yPos}" stroke="currentColor" stroke-width="0.08" stroke-opacity="0.3" pointer-events="none" />`;
    }
    
    // Unit Test
    const testYPos = (3 + totalSpace - ((lessonCount + 1) * rectHeight)).toFixed(3);
    const testHref = `AP_Unit_Tests/${courseConfig.folder}/Unit${unitNum}/unit_tests.html`;
    const testName = `Unit ${unitNum} Test`;
    segments += `<g onclick="markLessonStarted(${unitNum}, 99); window.location.href='${testHref}';" style="cursor: pointer;">
    <rect id="u${unitNum}-l99" stroke="none" x="3" y="${testYPos}" width="18" height="${rectHeight}" fill="white" fill-opacity="0.25" pointer-events="auto" onmouseenter="showLessonPopup(event, '${testName}', ${unitNum}, 99)" onmousemove="moveLessonPopup(event)" onmouseleave="hideLessonPopup()"></rect></g>
  <line x1="3" y1="${testYPos}" x2="21" y2="${testYPos}" stroke="currentColor" stroke-width="0.08" stroke-opacity="0.3" pointer-events="none" />`;
    
    return `<div style="position: relative; display: flex; align-items: flex-start; justify-content: center; height: 100%;"><svg viewBox="0 0 24 38" fill="none" stroke="currentColor" stroke-width="0.4" stroke-linecap="round" stroke-linejoin="round" style="width: 100%; height: 100%; max-height: 45rem; color: inherit;"><rect x="3" y="3" width="18" height="30" rx="1.5" ry="1.5" fill="none" stroke="currentColor" stroke-width="0.5" /><rect id="fill-unit-${unitNum}" x="3" y="3" width="18" height="30" rx="1.5" ry="1.5" fill="#9ca3af" fill-opacity="0.15" stroke="none" /><g id="segments-unit-${unitNum}">
${segments}</g><text x="12" y="36" text-anchor="middle" fill="currentColor" stroke="none" font-size="1.8" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="600" style="pointer-events: none;">Unit ${unitNum}</text></svg></div>`;
  }

  // Populate the grid
  function populateGrid() {
    const container = document.getElementById('courses-container');
    for (const [unitNum, lessonCount] of Object.entries(courseConfig.units)) {
      container.innerHTML += generateUnitSVG(parseInt(unitNum), lessonCount);
    }
  }

  // Initialize on load
  document.addEventListener('DOMContentLoaded', () => {
    // Initialize analytics and track course visit
    if (typeof StudentAnalytics !== 'undefined') {
      try {
        const analytics = new StudentAnalytics();
        analytics.trackLessonView('ap_calculus_ab', 0, 0); // Track course visit
        analytics.updateLearningStreak(); // Update daily streak
      } catch (e) {
        console.warn('Analytics initialization failed:', e);
      }
    }

    populateGrid();
    applyProgressColors();
  });

  let tooltipEl = null;
  function getOrCreateTooltip() { if (!tooltipEl) { tooltipEl = document.createElement('div'); tooltipEl.id = 'lesson-tooltip'; document.body.appendChild(tooltipEl); } return tooltipEl; }
  function showLessonPopup(event, lessonTitle, unitNum, lessonNum) { 
    const tooltip = getOrCreateTooltip();
    let status = '';
    const isCompleted = localStorage.getItem(`${courseConfig.coursePrefix}_u${unitNum}_l${lessonNum}_completed`) === 'true';
    const isStarted = localStorage.getItem(`${courseConfig.coursePrefix}_u${unitNum}_l${lessonNum}_started`) === 'true';
    if (isCompleted) {
      status = '✅ COMPLETED\n';
    } else if (isStarted) {
      status = '⏳ IN PROGRESS\n';
    }
    tooltip.textContent = status + lessonTitle;
    tooltip.setAttribute('data-visible', 'true');
  }
  function moveLessonPopup(event) { const tooltip = getOrCreateTooltip(); tooltip.style.left = (event.pageX + 12) + 'px'; tooltip.style.top = (event.pageY + 12) + 'px'; }
  function hideLessonPopup() { const tooltip = getOrCreateTooltip(); tooltip.setAttribute('data-visible', 'false'); }
  function markLessonStarted(unit, lesson) { 
    localStorage.setItem(`${courseConfig.coursePrefix}_u${unit}_l${lesson}_started`, 'true');
    if (window.courseProgress) { window.courseProgress.markStarted(courseConfig.coursePrefix, unit, lesson); }
    applyProgressColors();
  }
  function markLessonComplete(unit, lesson) { 
    localStorage.setItem(`${courseConfig.coursePrefix}_u${unit}_l${lesson}_completed`, 'true');
    if (window.courseProgress) { window.courseProgress.markComplete(courseConfig.coursePrefix, unit, lesson); }
    applyProgressColors();
  }
  function applyProgressColors() { 
    for (let u = 1; u <= courseConfig.numUnits; u++) { 
      const maxLessons = courseConfig.units[u] || 0;
      for (let l = 1; l <= maxLessons; l++) { 
        const segment = document.getElementById(`u${u}-l${l}`); 
        if (segment) { 
          const isCompleted = localStorage.getItem(`${courseConfig.coursePrefix}_u${u}_l${l}_completed`) === 'true'; 
          const isStarted = localStorage.getItem(`${courseConfig.coursePrefix}_u${u}_l${l}_started`) === 'true'; 
          if (isCompleted) { 
            segment.setAttribute('fill', '#16a34a'); 
            segment.setAttribute('fill-opacity', '0.7'); 
          } else if (isStarted) { 
            segment.setAttribute('fill', '#f97316'); 
            segment.setAttribute('fill-opacity', '0.6'); } 
        } 
      }
      // Apply colors to unit test
      const testSegment = document.getElementById(`u${u}-l99`);
      if (testSegment) {
        const isTestCompleted = localStorage.getItem(`${courseConfig.coursePrefix}_u${u}_l99_completed`) === 'true';
        const isTestStarted = localStorage.getItem(`${courseConfig.coursePrefix}_u${u}_l99_started`) === 'true';
        if (isTestCompleted) {
          testSegment.setAttribute('fill', '#16a34a');
          testSegment.setAttribute('fill-opacity', '0.7');
        } else if (isTestStarted) {
          testSegment.setAttribute('fill', '#f97316');
          testSegment.setAttribute('fill-opacity', '0.6');
        }
      }
    } 
  }
  // Listen for storage changes from other tabs/quiz completion
  window.addEventListener('storage', function(e) {
    if (e.key && e.key.match(/ap_calc_ab_u\d+_l\d+_(completed|started)/)) { applyProgressColors(); }
  });
</script>
<script src="../scripts/dev_tools.js"></script>
<script>
  if (window._isDevUser && window._isDevUser()) {
    var dcb = document.getElementById('dev-clear-btn');
    if (dcb) dcb.style.display = '';
  }
</script>
</body>
</html>
