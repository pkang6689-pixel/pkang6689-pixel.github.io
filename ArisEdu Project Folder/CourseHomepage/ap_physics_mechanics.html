<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AP Physics C: Mechanics</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="../theme_manager.js"></script>
  <script type="module">
    // Import Firebase config and make auth + db available to analytics
    import { auth, db } from '../firebase-config.js';
    window.auth = auth;
    window.db = db;
  </script>
<script src="../scripts/analytics-helper.js"></script>
<script src="../scripts/translation_loader.js" data-section="ap_physics_mechanics" data-base="../translations"></script>
<script type="module" src="../scripts/course-progress-firebase.js"></script>
</head>
<body class="dark-mode h-full">
<script src="../scripts/taskbar.js"></script>
  <main class="main-container">
    <div class="logo-title-wrapper" style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem;">
      <div style="display: flex; align-items: center; gap: 1.5rem;"><div style="color: currentColor; flex-shrink: 0;"><svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="20" cy="20" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M20 2V6M20 34V38M38 20H34M6 20H2M30.12 9.88L33.2 6.8M6.8 33.2L9.88 30.12M30.12 30.12L33.2 33.2M6.8 6.8L9.88 9.88" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div><h1 id="company-name" class="logo-font page-title" style="font-size: 3rem; margin-bottom: 0;">AP Physics C: Mechanics</h1></div>
    </div>
    <div id="courses-container" class="courses-container" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.25rem 2rem; padding: 1rem; min-height: auto;"></div>
    <div class="practice-exam-wrapper" style="display: flex; justify-content: center; padding: 1rem 0 0 0; margin-top: 0;">
      <button onclick="window.location.href='../CourseFiles/APLessons/AP Physics C - Mechanics/practice_exam.html'" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 1rem 3rem; border: none; border-radius: 0.5rem; font-size: 1.1rem; font-weight: 600; cursor: pointer; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); transition: transform 0.2s, box-shadow 0.2s;" onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 6px 12px rgba(0, 0, 0, 0.15)'" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 6px rgba(0, 0, 0, 0.1)'">Take Practice Exam</button>
    </div>
  </main>

  <script src="../../search_data.js"></script>
  <script src="../../search_logic.js"></script>

<style>
  rect[id^="u"], path[id^="u"] { transform-box: fill-box; transform-origin: center; transition: transform 0.2s ease; }
  #lesson-tooltip { position: fixed; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(8px); color: white; padding: 0.75rem 1rem; border-radius: 0.75rem; font-size: 0.95rem; font-weight: 600; pointer-events: none; z-index: 10000; opacity: 0; transition: opacity 0.15s ease; display: none; max-width: 250px; }
  #lesson-tooltip[data-visible="true"] { opacity: 1; display: block; }
</style>

<script>
  // Course configuration
  const courseConfig = {
    name: "AP Physics C: Mechanics",
    folder: "AP Physics C - Mechanics",
    coursePrefix: "ap_phys_mech",
    units: {
      1: 4,
      2: 4,
      3: 4,
      4: 4,
      5: 4,
      6: 4,
      7: 4
    },
    numUnits: 7,
    lessonNames: {
      1: { 1: "Kinematics: One Dimension", 2: "Kinematics: Vector Form", 3: "Kinematics: 2D Motion", 4: "Kinematics: Projectile Motion" },
      2: { 1: "Forces & Newton's Laws", 2: "Friction & Normal Forces", 3: "Applications of Newton's Laws", 4: "Systems & Free Body Diagrams" },
      3: { 1: "Work: Definitions", 2: "Work-Energy Theorem", 3: "Energy: Conservative Forces", 4: "Energy Conservation" },
      4: { 1: "Impulse & Momentum", 2: "Conservation of Momentum", 3: "Collisions: 1D", 4: "Collisions: 2D" },
      5: { 1: "Rotational Kinematics", 2: "Rotational Dynamics: Torque", 3: "Moment of Inertia", 4: "Rotational Energy" },
      6: { 1: "Angular Momentum", 2: "Conservation of Angular Momentum", 3: "Rotational Collisions", 4: "Rolling Without Slipping" },
      7: { 1: "Simple Harmonic Motion", 2: "Oscillations: Damping", 3: "Oscillations: Forced", 4: "Resonance" }
    }
  };

  // Generate unit SVG with adaptive spacing
            function generateUnitSVG(unitNum, lessonCount) {
    let segments = '';
    const totalItems = lessonCount + 1;
    const _barX = 12, _barY = 2, _barW = 86, _barH = 8;
    const spacing = _barW / totalItems;

    for (let lessonNum = 1; lessonNum <= lessonCount; lessonNum++) {
      const xPos = (_barX + (lessonNum - 1) * spacing).toFixed(3);
      const segW = spacing.toFixed(3);
      const folderPath = courseConfig.folder.replace(/\s+/g, '%20');
      const unitText = `Unit ${unitNum}`.replace(/\s+/g, '%20');
      const lessonText = `Lesson${unitNum}.${lessonNum}_Video.html`;
      const topicName = courseConfig.lessonNames?.[unitNum]?.[lessonNum];
      const lessonName = topicName ? `Lesson ${unitNum}.${lessonNum}: ${topicName}` : `Lesson ${unitNum}.${lessonNum}`;
      const href = `../CourseFiles/APLessons/${folderPath}/${unitText}/${lessonText}`;
      segments += `<g onclick="markLessonStarted(${unitNum}, ${lessonNum}); window.location.href='${href}';" style="cursor: pointer;">
    <rect id="u${unitNum}-l${lessonNum}" stroke="none" x="${xPos}" y="${_barY}" width="${segW}" height="${_barH}" fill="white" fill-opacity="0.25" pointer-events="auto" onmouseenter="showLessonPopup(event, '${lessonName.replace(/'/g, "&#39;")}', ${unitNum}, ${lessonNum})" onmousemove="moveLessonPopup(event)" onmouseleave="hideLessonPopup()"></rect></g>
  <line x1="${xPos}" y1="${_barY}" x2="${xPos}" y2="${_barY + _barH}" stroke="currentColor" stroke-width="0.08" stroke-opacity="0.3" pointer-events="none" />`;
    }

    // Unit Test
    const testXPos = (_barX + lessonCount * spacing).toFixed(3);
    const testW = spacing.toFixed(3);
    const testHref = `AP_Unit_Tests/${courseConfig.folder}/Unit${unitNum}/unit_tests.html`;
    segments += `<g onclick="markLessonStarted(${unitNum}, 99); window.location.href='${testHref}';" style="cursor: pointer;">
    <rect id="u${unitNum}-l99" stroke="none" x="${testXPos}" y="${_barY}" width="${testW}" height="${_barH}" fill="white" fill-opacity="0.25" pointer-events="auto" onmouseenter="showLessonPopup(event, 'Unit ${unitNum} Test', ${unitNum}, 99)" onmousemove="moveLessonPopup(event)" onmouseleave="hideLessonPopup()"></rect></g>
  <line x1="${testXPos}" y1="${_barY}" x2="${testXPos}" y2="${_barY + _barH}" stroke="currentColor" stroke-width="0.08" stroke-opacity="0.3" pointer-events="none" />`;

    return `<div style="position: relative; width: 100%;"><svg viewBox="0 0 100 12" fill="none" stroke="currentColor" stroke-width="0.2" stroke-linecap="round" stroke-linejoin="round" style="width: 100%; height: auto; color: inherit;"><text x="${_barX - 2}" y="${_barY + _barH / 2 + 1}" text-anchor="end" fill="currentColor" stroke="none" font-size="2.6" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="600" style="pointer-events: none;">Unit ${unitNum}</text><rect x="${_barX}" y="${_barY}" width="${_barW}" height="${_barH}" rx="1" ry="1" fill="none" stroke="currentColor" stroke-width="0.3" /><rect id="fill-unit-${unitNum}" x="${_barX}" y="${_barY}" width="${_barW}" height="${_barH}" rx="1" ry="1" fill="#9ca3af" fill-opacity="0.15" stroke="none" /><g id="segments-unit-${unitNum}">
${segments}</g></svg></div>`;
  }






  // Populate the grid
  function populateGrid() {
    const container = document.getElementById('courses-container');
    for (const [unitNum, lessonCount] of Object.entries(courseConfig.units)) {
      container.innerHTML += generateUnitSVG(parseInt(unitNum), lessonCount);
    }
  }

  // Initialize on load
  document.addEventListener('DOMContentLoaded', () => {
    // Initialize analytics and track course visit
    if (typeof StudentAnalytics !== 'undefined') {
      try {
        const analytics = new StudentAnalytics();
        analytics.trackLessonView('ap_physics_c_-_mechanics', 0, 0); // Track course visit
        analytics.updateLearningStreak(); // Update daily streak
      } catch (e) {
        console.warn('Analytics initialization failed:', e);
      }
    }

    populateGrid();
    applyProgressColors();
  });

  let tooltipEl = null;
  function getOrCreateTooltip() { if (!tooltipEl) { tooltipEl = document.createElement('div'); tooltipEl.id = 'lesson-tooltip'; document.body.appendChild(tooltipEl); } return tooltipEl; }
  function showLessonPopup(event, lessonTitle, unitNum, lessonNum) { 
    const tooltip = getOrCreateTooltip();
    let status = '';
    const isCompleted = localStorage.getItem(`${courseConfig.coursePrefix}_u${unitNum}_l${lessonNum}_completed`) === 'true';
    const isStarted = localStorage.getItem(`${courseConfig.coursePrefix}_u${unitNum}_l${lessonNum}_started`) === 'true';
    if (isCompleted) {
      status = '✅ COMPLETED\n';
    } else if (isStarted) {
      status = '⏳ IN PROGRESS\n';
    }
    tooltip.textContent = status + lessonTitle;
    tooltip.setAttribute('data-visible', 'true');
  }
  function moveLessonPopup(event) { const tooltip = getOrCreateTooltip(); tooltip.style.left = (event.pageX + 12) + 'px'; tooltip.style.top = (event.pageY + 12) + 'px'; }
  function hideLessonPopup() { const tooltip = getOrCreateTooltip(); tooltip.setAttribute('data-visible', 'false'); }
  function markLessonStarted(unit, lesson) { 
    localStorage.setItem(`${courseConfig.coursePrefix}_u${unit}_l${lesson}_started`, 'true');
    if (window.courseProgress) { window.courseProgress.markStarted(courseConfig.coursePrefix, unit, lesson); }
    applyProgressColors();
  }
  function markLessonComplete(unit, lesson) { 
    localStorage.setItem(`${courseConfig.coursePrefix}_u${unit}_l${lesson}_completed`, 'true');
    if (window.courseProgress) { window.courseProgress.markComplete(courseConfig.coursePrefix, unit, lesson); }
    applyProgressColors();
  }
  function applyProgressColors() { 
    for (let u = 1; u <= courseConfig.numUnits; u++) { 
      const maxLessons = courseConfig.units[u] || 0;
      for (let l = 1; l <= maxLessons; l++) { 
        const segment = document.getElementById(`u${u}-l${l}`); 
        if (segment) { 
          const isCompleted = localStorage.getItem(`${courseConfig.coursePrefix}_u${u}_l${l}_completed`) === 'true'; 
          const isStarted = localStorage.getItem(`${courseConfig.coursePrefix}_u${u}_l${l}_started`) === 'true'; 
          if (isCompleted) { 
            segment.setAttribute('fill', '#16a34a'); 
            segment.setAttribute('fill-opacity', '0.7'); 
          } else if (isStarted) { 
            segment.setAttribute('fill', '#f97316'); 
            segment.setAttribute('fill-opacity', '0.6'); } 
        } 
      }
      // Apply colors to unit test
      const testSegment = document.getElementById(`u${u}-l99`);
      if (testSegment) {
        const isTestCompleted = localStorage.getItem(`${courseConfig.coursePrefix}_u${u}_l99_completed`) === 'true';
        const isTestStarted = localStorage.getItem(`${courseConfig.coursePrefix}_u${u}_l99_started`) === 'true';
        if (isTestCompleted) {
          testSegment.setAttribute('fill', '#16a34a');
          testSegment.setAttribute('fill-opacity', '0.7');
        } else if (isTestStarted) {
          testSegment.setAttribute('fill', '#f97316');
          testSegment.setAttribute('fill-opacity', '0.6');
        }
      }
    } 
  }
  // Listen for storage changes from other tabs/quiz completion
  window.addEventListener('storage', function(e) {
    if (e.key && e.key.match(/ap_phys_mech_u\d+_l\d+_(completed|started)/)) { applyProgressColors(); }
  });
</script>
<script src="../scripts/dev_tools.js"></script>
<script>
  if (window._isDevUser && window._isDevUser()) {
    var dcb = document.getElementById('dev-clear-btn');
    if (dcb) dcb.style.display = '';
  }
</script>
</body>
</html>
