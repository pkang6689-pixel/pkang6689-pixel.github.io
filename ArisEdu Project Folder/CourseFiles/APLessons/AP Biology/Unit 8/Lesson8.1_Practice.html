  { question: 'Define: Logistic growth', answer: 'dN/dt = rN(K-N)/K; growth that slows as population approaches carrying capacity K, producing S-shaped (sigmoid) curves' },
  { question: 'Define: Carrying capacity (K)', answer: 'The maximum population size an environment can sustain indefinitely given available resources' },
  { question: 'Define: r-selected species', answer: 'Species with high reproductive rates, short lifespans, and little parental care (e.g., bacteria, insects); adapted to unstable environments' },
  { question: 'Define: K-selected species', answer: 'Species with low reproductive rates, long lifespans, and extensive parental care (e.g., elephants, whales); adapted to stable environments' },
  { question: 'What is Population Ecology?', answer: 'Population Ecology studies how populations grow, interact with their environment, and are regulated.' },
  { question: 'Why is Population Ecology important?', answer: 'Exponential growth (dN/dt = rN) occurs when resources are unlimited, producing J-shaped curves.' },
  { question: 'Give a real-world example of Population Ecology', answer: 'Human population growth following a roughly exponential pattern from 1 billion (1800) to 8 billion (2022), with demographic transition slowing growth in developed nations' },
  { question: 'How is Population Ecology applied in practice?', answer: 'Invasive species (zebra mussels, kudzu) exhibiting exponential growth upon introduction to new environments lacking natural predators or competitors' },
