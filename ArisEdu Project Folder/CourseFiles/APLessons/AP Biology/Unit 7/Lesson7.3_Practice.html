window.lessonFlashcards = [
  { question: 'Define: Hardy-Weinberg equilibrium', answer: 'A mathematical model predicting allele and genotype frequencies remain constant across generations in the absence of evolutionary forces' },
  { question: 'Define: Allele frequency', answer: 'The proportion of a specific allele in a population: p = frequency of dominant allele, q = frequency of recessive allele; p + q = 1' },
  { question: 'Define: Genotype frequency', answer: 'The proportion of each genotype in a population: p² (AA) + 2pq (Aa) + q² (aa) = 1 under Hardy-Weinberg conditions' },
  { question: 'Define: Hardy-Weinberg conditions', answer: 'No mutation, no migration, random mating, no selection, large population size; violations drive evolution' },
  { question: 'Define: Carrier frequency', answer: '2pq; the proportion of heterozygous carriers of a recessive allele in a population, estimable from disease frequency (q²)' },
  { question: 'What is Population Genetics?', answer: 'Population Genetics provides the mathematical framework for studying evolution using allele and genotype frequencies.' },
  { question: 'Why is Population Genetics important?', answer: 'The Hardy-Weinberg equilibrium (p² + 2pq + q² = 1, p + q = 1) serves as a null hypothesis: populations are in equilibrium only when there is no mutation, migration, selection, drift, or non-random mating.' },
  { question: 'Give a real-world example of Population Genetics', answer: 'Estimating cystic fibrosis carrier frequency: disease frequency q² ≈ 1/2500, so q ≈ 1/50, and carrier frequency 2pq ≈ 1/25 in European populations' },
  { question: 'How is Population Genetics applied in practice?', answer: 'Detecting natural selection by comparing observed genotype frequencies to Hardy-Weinberg predictions and identifying significant deviations using chi-square tests' },
  { question: 'Describe a practical application of Population Genetics', answer: 'Conservation biology using Hardy-Weinberg analysis to assess genetic health of endangered species populations and plan genetic rescue interventions' },
];
