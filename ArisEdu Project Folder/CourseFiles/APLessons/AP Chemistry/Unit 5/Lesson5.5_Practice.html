window.lessonFlashcards = [
  { question: 'Define: Elementary step', answer: 'A single-step reaction event at the molecular level; its rate law can be written directly from its molecularity' },
  { question: 'Define: Rate-determining step', answer: 'The slowest elementary step in a mechanism; acts as a \'bottleneck\' that controls the overall reaction rate' },
  { question: 'Define: Intermediate', answer: 'A species produced in one elementary step and consumed in a subsequent step; does not appear in the overall equation' },
  { question: 'Define: Molecularity', answer: 'The number of reactant particles in an elementary step: unimolecular (1), bimolecular (2), or termolecular (3, very rare)' },
  { question: 'Define: Steady-state approximation', answer: 'The assumption that the concentration of an intermediate remains approximately constant (rate of formation ≈ rate of consumption)' },
  { question: 'What is Reaction Mechanisms?', answer: 'Reaction Mechanisms are the step-by-step sequences of elementary reactions that make up an overall reaction.' },
  { question: 'Why is Reaction Mechanisms important?', answer: 'Each elementary step has a molecularity (unimolecular, bimolecular, rarely termolecular) that directly determines its rate law.' },
  { question: 'Give a real-world example of Reaction Mechanisms', answer: 'Ozone depletion mechanism: Cl from CFCs catalytically destroys O₃ in a two-step mechanism—Cl + O₃ → ClO + O₂, then ClO + O → Cl + O₂ (Cl regenerated)' },
  { question: 'How is Reaction Mechanisms applied in practice?', answer: 'SN1 and SN2 mechanisms in organic chemistry: SN1 (two-step, carbocation intermediate) vs. SN2 (one-step, bimolecular) determine reaction outcomes in drug synthesis' },
  { question: 'Describe a practical application of Reaction Mechanisms', answer: 'Chain reaction mechanisms in combustion: initiation produces radicals, propagation sustains the reaction, termination removes radicals (relevant to engine knocking and explosives)' },
];
