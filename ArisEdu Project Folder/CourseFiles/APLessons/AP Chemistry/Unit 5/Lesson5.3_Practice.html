  { question: 'Define: Maxwell-Boltzmann distribution', answer: 'The distribution of molecular kinetic energies at a given temperature; a higher temperature shifts the peak and increases the fraction of molecules above Ea' },

  { question: 'Why is Collision Theory important?', answer: 'Only a small fraction of collisions are effective.' },
  { question: 'Give a real-world example of Collision Theory', answer: 'Match striking requires friction to provide activation energy, initiating the exothermic combustion reaction of KClO₃ and sulfur in the match head' },
