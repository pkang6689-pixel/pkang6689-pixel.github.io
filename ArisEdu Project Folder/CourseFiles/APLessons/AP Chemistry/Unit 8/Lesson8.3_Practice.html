  { question: 'Define: End point', answer: 'The point where the indicator changes color; ideally matches the equivalence point; slightly different in practice' },
  { question: 'Define: Titration curve', answer: 'A plot of pH vs. volume of titrant added; shape reveals acid/base strength and equivalence point pH' },
  { question: 'Define: Half-equivalence point', answer: 'The point where half the analyte has reacted: [HA] = [A⁻], so pH = pKa; useful for determining Ka' },
  { question: 'Define: Indicator', answer: 'A weak acid or base that changes color at a specific pH range; chosen so its color change range includes the equivalence point pH (e.g., phenolphthalein, pH 8.2–10, ideal for weak acid–strong base titrations; bromothymol blue, pH 6.0–7.6, for strong acid–strong base)' },
  { question: 'What is Titration?', answer: 'Titration is a quantitative analytical technique where a solution of known concentration (titrant) is added to a solution of unknown concentration (analyte) until the equivalence point is reached.' },
  { question: 'Why is Titration important?', answer: 'Strong acid–strong base titrations have equivalence point at pH 7.' },
  { question: 'Give a real-world example of Titration', answer: 'Quality control in pharmaceutical manufacturing: acid-base titrations determining the exact concentration of active ingredients in drug formulations' },
