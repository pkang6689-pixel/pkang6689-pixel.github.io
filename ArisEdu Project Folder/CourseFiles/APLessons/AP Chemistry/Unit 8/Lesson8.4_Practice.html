window.lessonFlashcards = [
  { question: 'Define: Buffer solution', answer: 'A solution that resists pH changes upon addition of small amounts of acid or base; contains a weak acid-conjugate base pair' },
  { question: 'Define: Henderson-Hasselbalch equation', answer: 'pH = pKa + log([A⁻]/[HA]); relates buffer pH to the ratio of conjugate base to weak acid concentrations' },
  { question: 'Define: Buffer capacity', answer: 'The amount of acid or base a buffer can absorb before significant pH change; maximized when [HA] = [A⁻] and increased by higher total concentration' },
  { question: 'Define: Buffer range', answer: 'The pH range over which a buffer effectively resists pH change; approximately pKa ± 1' },
  { question: 'Define: Conjugate pair', answer: 'A weak acid and its conjugate base (HA/A⁻) that together create a buffer system' },
  { question: 'What is Buffer Solutions?', answer: 'Buffer Solutions resist pH change when small amounts of acid or base are added.' },
  { question: 'Why is Buffer Solutions important?', answer: 'A buffer consists of a weak acid and its conjugate base (e.g., CH₃COOH/CH₃COO⁻) or a weak base and its conjugate acid (e.g., NH₃/NH₄⁺).' },
  { question: 'Give a real-world example of Buffer Solutions', answer: 'Blood bicarbonate buffer system: H₂CO₃/HCO₃⁻ maintaining blood pH 7.35-7.45; regulated by breathing (CO₂ removal) and kidneys (HCO₃⁻ retention/excretion)' },
  { question: 'How is Buffer Solutions applied in practice?', answer: 'Biological research: phosphate buffer (H₂PO₄⁻/HPO₄²⁻, pKa = 7.20) commonly used in cell culture media to maintain physiological pH' },
  { question: 'Describe a practical application of Buffer Solutions', answer: 'Ocean buffering against acidification: carbonate/bicarbonate system absorbing excess CO₂, but capacity being overwhelmed by current emission rates' },
