  { question: 'Define: t-statistic', answer: 't = (x̄ - μ₀)/(s/√n); replaces the z-statistic when σ is unknown, using sample standard deviation s in the denominator' },
  { question: 'Define: Heavy tails', answer: 't-distributions have more probability in the tails than the normal, producing wider confidence intervals and larger critical values for small samples' },
  { question: 'Define: Robustness', answer: 't-procedures are robust to moderate non-normality for large samples but can be misleading for small samples from highly skewed distributions' },
  { question: 'What is t-Distributions?', answer: 't-Distributions replace the normal distribution when the population standard deviation σ is unknown and must be estimated by the sample standard deviation s.' },
  { question: 'Why is t-Distributions important?', answer: 'The t-distribution with n-1 degrees of freedom has thicker tails than the standard normal, reflecting the additional uncertainty from estimating σ.' },
  { question: 'Give a real-world example of t-Distributions', answer: 'Environmental monitoring using t-procedures to test whether mean pollutant concentrations exceed safety standards when only sample data (not population σ) are available' },
  { question: 'How is t-Distributions applied in practice?', answer: 'Clinical trials with small patient groups using t-distribution critical values for confidence intervals, which are wider than z-intervals to account for imprecise σ estimates' },
  { question: 'Describe a practical application of t-Distributions', answer: 'Student performance analysis in a classroom of 25 students using t-distribution (df = 24) rather than z-distribution because the true population standard deviation is unknown' },
