  { question: 'Define: Cell contribution to χ²', answer: '(O - E)²/E for each cell; identifies which observed-expected discrepancies drive the overall test result' },
  { question: 'Define: Practical vs. statistical significance', answer: 'A significant χ² test says the association exists, but effect size measures (Cramér\'s V, phi) quantify how strong it is' },
  { question: 'Define: Cramér\'s V', answer: 'V = √(χ²/(n·min(r-1, c-1))); ranges from 0 to 1, measuring the strength of association between two categorical variables' },
  { question: 'Define: Limitations of chi-square', answer: 'Chi-square tests require expected counts ≥ 5 in all cells; small expected counts inflate χ² and may invalidate the test' },
  { question: 'What is Interpreting Chi-Square Results?', answer: 'Interpreting Chi-Square Results requires understanding what a significant χ² value means and what it does not.' },
  { question: 'Why is Interpreting Chi-Square Results important?', answer: 'A significant result indicates that the observed data are unlikely under H₀ but does not identify which specific categories differ or quantify the strength of association.' },
  { question: 'Give a real-world example of Interpreting Chi-Square Results', answer: 'Interpreting a significant χ² test for independence between education level and voting behavior by examining which education-vote combinations have the largest standardized residuals' },
