  { question: 'Define: Confidence level', answer: 'The long-run proportion of intervals that capture the true parameter; e.g., 95% means 95 out of 100 intervals would contain p' },
  { question: 'Define: Margin of error', answer: 'z*·√(p̂(1-p̂)/n); the maximum likely difference between p̂ and the true p at the given confidence level' },
  { question: 'Define: Critical value (z*)', answer: 'The z-score corresponding to the desired confidence level: z* = 1.645 for 90%, 1.96 for 95%, 2.576 for 99%' },

  { question: 'Why is Confidence Intervals for Proportions important?', answer: 'The interval gives a range of plausible values for p, with the margin of error z*√(p̂(1-p̂)/n) reflecting both the confidence level and sample size.' },
