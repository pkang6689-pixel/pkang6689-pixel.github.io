  { question: 'Define: Multiplication rule (general)', answer: 'P(A and B) = P(A) × P(B|A); the probability of both events equals the probability of the first times the conditional probability of the second' },
  { question: 'Define: Complement', answer: 'The complement of event A (Aᶜ) consists of all outcomes not in A; P(Aᶜ) = 1 - P(A)' },
  { question: 'Define: Union and intersection', answer: 'A ∪ B ("A or B") includes outcomes in either event; A ∩ B ("A and B") includes only outcomes in both events' },
  { question: 'What is Basic Probability Rules?', answer: 'Basic Probability Rules provide the mathematical framework for calculating probabilities of compound events.' },
  { question: 'Why is Basic Probability Rules important?', answer: 'The addition rule for mutually exclusive events (P(A or B) = P(A) + P(B)) and the general addition rule (P(A or B) = P(A) + P(B) - P(A and B)) handle unions, while the multiplication rule handles intersections.' },
  { question: 'Give a real-world example of Basic Probability Rules', answer: 'Calculating the probability of drawing a heart or a face card from a standard deck using the general addition rule (accounting for hearts that are face cards)' },
