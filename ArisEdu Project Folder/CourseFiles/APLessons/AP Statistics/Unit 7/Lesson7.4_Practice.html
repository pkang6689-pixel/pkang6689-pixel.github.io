window.lessonFlashcards = [
  { question: 'Define: Paired data', answer: 'Two measurements on the same subject or matched subjects, creating natural pairs whose differences are analyzed' },
  { question: 'Define: Paired t-test', answer: 'One-sample t-test applied to the differences: t = d̄/(sd/√n) with df = n-1, testing H₀: μd = 0' },
  { question: 'Define: Mean difference (d̄)', answer: 'The average of the paired differences; estimates the true mean difference μd between the two conditions' },
  { question: 'Define: Paired t-interval', answer: 'd̄ ± t*·(sd/√n); estimates the true mean difference between two paired conditions' },
  { question: 'Define: Advantage of pairing', answer: 'Reduces variability by eliminating between-subject variation, making it easier to detect true treatment effects' },
  { question: 'What is Paired t-Tests?', answer: 'Paired t-Tests compare two related measurements on the same subjects by analyzing the differences d = x₁ - x₂ within each pair.' },
  { question: 'Why is Paired t-Tests important?', answer: 'The test statistic t = d̄/(sd/√n) with df = n-1 (where n is the number of pairs) tests H₀: μd = 0.' },
  { question: 'Give a real-world example of Paired t-Tests', answer: 'Before-and-after weight loss studies measuring each participant\'s weight before and after a diet program, testing whether the mean weight change differs from 0' },
  { question: 'How is Paired t-Tests applied in practice?', answer: 'Taste tests where each consumer rates two products, analyzing the paired differences to determine if there is a preference for one product over the other' },
  { question: 'Describe a practical application of Paired t-Tests', answer: 'Vision research comparing visual acuity readings from the left and right eyes of the same patients to test for systematic differences' },
