window.lessonFlashcards = [
  { question: 'Define: Significance test for μ', answer: 'A formal procedure using t = (x̄ - μ₀)/(s/√n) to decide whether sample evidence contradicts H₀: μ = μ₀' },
  { question: 'Define: Type I error', answer: 'Rejecting H₀ when it is actually true; probability equals α, the significance level' },
  { question: 'Define: Type II error', answer: 'Failing to reject H₀ when Hₐ is actually true; probability denoted β' },
  { question: 'Define: Power', answer: 'The probability of correctly rejecting H₀ when Hₐ is true; Power = 1 - β; increased by larger n, larger effect size, or larger α' },
  { question: 'Define: Effect size', answer: 'The magnitude of the difference between the true parameter and the null value; determines the practical importance of a statistically significant result' },
  { question: 'What is Significance Tests for Means?', answer: 'Significance Tests for Means follow the four-step hypothesis testing process: (1) state H₀: μ = μ₀ and Hₐ, (2) verify conditions (random, 10%, Normal/Large Sample), (3) compute t = (x̄ - μ₀)/(s/√n) and find the p-value from the t-distribution with df = n-1, (4) conclude in context.' },
  { question: 'Why is Significance Tests for Means important?', answer: 'The relationship between confidence intervals and significance tests is direct: a value μ₀ falls outside a C% confidence interval if and only if a two-sided test at significance level α = 1-C rejects H₀: μ = μ₀.' },
  { question: 'Give a real-world example of Significance Tests for Means', answer: 'Environmental agency testing whether mean mercury concentration in fish exceeds the 0.5 ppm safety limit (H₀: μ = 0.5, Hₐ: μ > 0.5) to issue consumption advisories' },
  { question: 'How is Significance Tests for Means applied in practice?', answer: 'Auto manufacturer testing whether a new engine design achieves the claimed 35 mpg fuel efficiency based on a sample of test drives' },
  { question: 'Describe a practical application of Significance Tests for Means', answer: 'Pharmaceutical company conducting power analysis to determine sample size needed to detect a clinically meaningful 5-point drop in blood pressure' },
];
