  { question: 'Define: Stratified random sample', answer: 'Dividing the population into homogeneous subgroups (strata) and taking an SRS from each stratum to ensure representation' },
  { question: 'Define: Cluster sample', answer: 'Randomly selecting entire groups (clusters) and surveying all individuals within chosen clusters; practical when a population list is unavailable' },
  { question: 'Define: Systematic sample', answer: 'Selecting every kth individual from a list after a random starting point between 1 and k' },
  { question: 'Define: Sampling frame', answer: 'The list of all individuals in the population from which the sample is actually drawn; ideally matches the target population' },
  { question: 'What is Sampling Methods?', answer: 'Sampling Methods are systematic procedures for selecting a subset of individuals from a population to draw conclusions about the whole.' },
  { question: 'Why is Sampling Methods important?', answer: 'Simple random sampling (SRS) gives every possible sample of size n an equal chance of selection, while stratified, cluster, and systematic sampling offer advantages in specific contexts.' },

  { question: 'How is Sampling Methods applied in practice?', answer: 'Healthcare studies using cluster sampling of hospitals rather than individual patients when a complete patient list is impractical' },
