  { question: 'Define: Selection bias (undercoverage)', answer: 'Systematic exclusion of certain population members from the sampling frame, producing a sample that doesn\'t represent the population' },
  { question: 'Define: Response bias', answer: 'Systematic error caused by the wording of questions, interviewer influence, or respondent dishonesty leading to inaccurate answers' },
  { question: 'Define: Nonresponse bias', answer: 'Occurs when individuals selected for a sample cannot be contacted or refuse to participate, and non-respondents differ systematically from respondents' },
  { question: 'Define: Confounding', answer: 'When the effects of two variables on the response cannot be distinguished from each other because they are intertwined' },
  { question: 'What is Bias and Confounding Variables?', answer: 'Bias and Confounding Variables threaten the validity of statistical studies by systematically distorting results.' },
  { question: 'Why is Bias and Confounding Variables important?', answer: 'Bias is a systematic tendency to over- or underestimate the true value and cannot be reduced by increasing sample size.' },
