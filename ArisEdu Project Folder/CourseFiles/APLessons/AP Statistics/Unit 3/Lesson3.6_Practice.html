  { question: 'Define: Control (in experiments)', answer: 'Holding all variables constant across treatment groups except the variable being tested, so differences can be attributed to the treatment' },
  { question: 'Define: Extraneous variable', answer: 'Any variable other than the explanatory variable that might affect the response and should be controlled in the experiment' },
  { question: 'Define: Standardized conditions', answer: 'Keeping environmental and procedural factors identical across all treatment groups to prevent them from influencing results' },
  { question: 'Define: Replication', answer: 'Repeating the experiment on many subjects to increase the reliability of results and enable estimation of natural variation' },
  { question: 'Define: Statistical control', answer: 'Using statistical techniques (stratification, regression) to adjust for confounding variables when physical control is not possible' },
  { question: 'What is Controlling Variables?', answer: 'Controlling Variables involves design strategies to isolate the effect of the treatment variable by holding other variables constant, matching subjects, or using statistical adjustments.' },
  { question: 'Why is Controlling Variables important?', answer: 'Effective control ensures that observed differences in the response are attributable to the treatment rather than extraneous factors.' },
  { question: 'Give a real-world example of Controlling Variables', answer: 'Pharmaceutical companies standardizing dosage timing, diet, and monitoring schedules across all treatment groups in a clinical trial' },
  { question: 'How is Controlling Variables applied in practice?', answer: 'Controlling for socioeconomic status in educational studies by matching treatment and control schools on demographics before comparing outcomes' },
  { question: 'Describe a practical application of Controlling Variables', answer: 'Laboratory experiments controlling temperature, humidity, and light exposure when testing plant growth under different fertilizer treatments' },
