  { question: 'Define: Bottleneck effect', answer: 'Drastic reduction in genetic diversity when a population\'s size is severely reduced by a catastrophic event (fire, disease, habitat destruction)' },
  { question: 'Define: Minimum viable population (MVP)', answer: 'The smallest population size that can sustain itself long-term without losing genetic diversity to drift or inbreeding' },
  { question: 'Define: Inbreeding depression', answer: 'Reduced fitness in a population due to breeding among close relatives, increasing susceptibility to disease and environmental stress' },
  { question: 'Define: Founder effect', answer: 'Loss of genetic variation when a small group colonizes a new habitat, creating a population genetically different from the original' },
  { question: 'What is Genetic Diversity?', answer: 'Genetic Diversity refers to the variety of genetic information within a species, which determines a population\'s ability to adapt to environmental change such as disease, climate shifts, and habitat loss.' },
  { question: 'Why is Genetic Diversity important?', answer: 'In environmental science, genetic diversity matters because it underpins ecosystem resilience—populations with greater variation are more likely to include individuals that can survive new stressors.' },
  { question: 'Give a real-world example of Genetic Diversity', answer: 'Managing breeding programs for endangered California condors by carefully tracking genetic diversity and preventing inbreeding depression' },
