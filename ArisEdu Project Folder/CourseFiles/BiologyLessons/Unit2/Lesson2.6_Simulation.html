<!DOCTYPE html>
<html class="h-full" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Lesson 2.6: Food Chains & Webs Simulation</title>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="../../../scripts/translation_loader.js" data-section="biology" data-base="../../../translations"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <link href="/ArisEdu Project Folder/styles/main.css" rel="stylesheet"/>
  <style>
    @view-transition { navigation: auto; }

    .sim-wrapper {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .sim-frame-container {
      width: 100%;
      border-radius: 1rem;
      overflow: hidden;
      border: 2px solid rgba(148, 163, 184, 0.2);
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
      background: #0f172a;
      position: relative;
    }

    .sim-frame-container iframe {
      width: 100%;
      height: 600px;
      border: none;
      display: block;
      overflow: hidden;
    }

    .sim-info-bar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: rgba(148, 163, 184, 0.08);
      border-radius: 0.75rem;
      font-size: 0.875rem;
      color: #94a3b8;
    }

    .sim-info-bar .sim-badge {
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      color: white;
      font-weight: 700;
      font-size: 0.75rem;
      padding: 0.2rem 0.6rem;
      border-radius: 9999px;
    }

    .sim-actions {
      display: flex;
      justify-content: flex-end;
    }

    .fullscreen-btn {
      background: none;
      border: 1px solid rgba(148,163,184,0.3);
      color: #94a3b8;
      border-radius: 0.5rem;
      padding: 0.4rem 0.9rem;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .fullscreen-btn:hover {
      background: rgba(148,163,184,0.1);
      color: #f1f5f9;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
  <script src="../../../theme_manager.js"></script>
</head>
<body class="dark-mode h-full">
  <script src="../../../scripts/taskbar.js"></script>
  <main class="main-container">
    <div id="simulation-content-view">
      <h2 class="page-title" data-i18n="Lesson 2.6: Food Chains & Webs Simulation">Lesson 2.6: Food Chains & Webs — Simulation</h2>
      <div class="diagram-card">
        <div class="sim-wrapper">

          <div class="sim-info-bar">
            <span class="sim-badge">🌍 Lab</span>
            <span>Trace energy flow through food chains and webs, and explore trophic levels and ecosystem stability.</span>
            <div class="sim-actions" style="margin-left:auto;">
              <button class="fullscreen-btn" onclick="toggleFullscreen()" title="Open simulation in full screen">&#x26F6; Fullscreen</button>
            </div>
          </div>

          <div class="sim-frame-container" id="sim-frame-container">
            <iframe
              id="sim-iframe"
              src="../../../labs/ecosystem.html"
              title="Food Chains & Webs Simulation"
              allow="fullscreen"
              scrolling="no"
              sandbox="allow-scripts allow-same-origin allow-forms"
            ></iframe>
          </div>

          <div class="summary-actions">
            <a class="side-button" href="Lesson2.6_Practice.html" style="text-align:center; text-decoration:none; display:block;">Next Up: Practice</a>
          </div>

        </div>
      </div>
    </div>
  </main>

  <script>
    var iframe = document.getElementById('sim-iframe');

    function resizeIframe() {
      try {
        var doc = iframe.contentDocument || iframe.contentWindow.document;
        var h = Math.max(
          doc.body.scrollHeight,
          doc.body.offsetHeight,
          doc.documentElement.scrollHeight
        );
        if (h > 100) iframe.style.height = h + 'px';
      } catch(e) {}
    }

    iframe.addEventListener('load', function() {
      resizeIframe();
      setTimeout(resizeIframe, 300);
      setTimeout(resizeIframe, 800);
    });

    function toggleFullscreen() {
      var container = document.getElementById('sim-frame-container');
      if (!document.fullscreenElement) {
        (container.requestFullscreen || container.webkitRequestFullscreen || function(){}).call(container);
      } else {
        (document.exitFullscreen || document.webkitExitFullscreen || function(){}).call(document);
      }
    }
  </script>
</body>
</html>
