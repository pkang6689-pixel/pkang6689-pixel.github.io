<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Account Information</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <script src="theme_manager.js?v=2.1"></script>
  <style>
    body {
      background: linear-gradient(135deg, #3b82f6 0%, #10b981 50%, #8b5cf6 100%);
      transition: background 0.3s;
    }
    body.dark-mode {
      background: #0f172a;
    }

    /* .settings-menu styles are in main.css (position:fixed, z-index:10000) */

    /* Account Info Layout */
    .account-layout {
      width: 90vw;
      max-width: 900px;
      height: auto;
      min-height: 60vh;
      max-height: 90vh;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 2rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      font-family: 'Poppins', sans-serif;
      display: flex;
      flex-direction: column;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      transition: background 0.3s, color 0.3s;
      padding: 3rem;
      overflow-y: auto;
    }
    
    body.dark-mode .account-layout {
      background: rgba(30, 41, 59, 0.95);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      color: #e2e8f0;
    }

    .account-title {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 2rem;
      background: linear-gradient(135deg, #3b82f6 0%, #10b981 50%, #8b5cf6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      color: transparent;
    }

    .account-section {
      margin-bottom: 2rem;
    }

    .account-section-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: #334155;
    }

    body.dark-mode .account-section-title {
      color: #94a3b8;
    }

    .account-field {
      display: flex;
      align-items: center;
      padding: 1rem;
      background: #f8fafc;
      border-radius: 0.75rem;
      margin-bottom: 0.75rem;
      transition: background 0.2s;
    }

    body.dark-mode .account-field {
      background: #1e293b;
    }

    .account-field-label {
      font-weight: 600;
      color: #64748b;
      min-width: 150px;
    }

    body.dark-mode .account-field-label {
      color: #94a3b8;
    }

    .account-field-value {
      color: #1e293b;
      font-weight: 500;
    }

    body.dark-mode .account-field-value {
      color: #e2e8f0;
    }

    .course-breakdown {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid #e2e8f0;
    }

    body.dark-mode .course-breakdown {
      border-top-color: #334155;
    }

    .time-period-toggle {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .time-period-btn {
      padding: 0.4rem 0.8rem;
      border-radius: 0.4rem;
      border: 1px solid #e2e8f0;
      background: transparent;
      color: #64748b;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.85rem;
    }

    body.dark-mode .time-period-btn {
      border-color: #475569;
      color: #94a3b8;
    }

    .time-period-btn.active {
      background: linear-gradient(135deg, #3b82f6 0%, #10b981 50%, #8b5cf6 100%);
      color: white;
      border-color: transparent;
    }

    .time-period-btn:hover:not(.active) {
      background: #f1f5f9;
    }

    body.dark-mode .time-period-btn:hover:not(.active) {
      background: #334155;
    }

    .time-display {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #3b82f6 0%, #10b981 50%, #8b5cf6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .account-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3b82f6 0%, #10b981 50%, #8b5cf6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: white;
      margin-bottom: 1.5rem;
    }

    .account-actions {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
    }

    .account-btn {
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }

    .account-btn-primary {
      background: linear-gradient(135deg, #3b82f6 0%, #10b981 50%, #8b5cf6 100%);
      color: white;
    }

    .account-btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }

    .account-btn-secondary {
      background: #e2e8f0;
      color: #334155;
    }

    body.dark-mode .account-btn-secondary {
      background: #334155;
      color: #e2e8f0;
    }

    .account-btn-secondary:hover {
      background: #cbd5e1;
    }

    body.dark-mode .account-btn-secondary:hover {
      background: #475569;
    }

    .account-btn-danger {
      background: #ef4444;
      color: white;
    }

    .account-btn-danger:hover {
      background: #dc2626;
    }

    .no-account-message {
      text-align: center;
      padding: 3rem;
    }

    .no-account-message h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: #334155;
    }

    body.dark-mode .no-account-message h2 {
      color: #e2e8f0;
    }

    .no-account-message p {
      color: #64748b;
      margin-bottom: 2rem;
    }

    body.dark-mode .no-account-message p {
      color: #94a3b8;
    }

    @media (max-width: 640px) {
      .account-layout {
        width: 95vw;
        padding: 1.5rem;
        border-radius: 1rem;
        max-height: 85vh;
      }
      
      .account-title {
        font-size: 2rem;
        margin-bottom: 1.5rem;
        text-align: center;
      }

      .account-field {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.5rem;
      }

      .account-field-label {
        min-width: auto;
        width: 100%;
        margin-bottom: 0.25rem;
      }

      .account-actions {
        flex-direction: column;
        gap: 0.75rem;
      }
      
      .time-period-toggle {
        flex-wrap: wrap;
      }

      /* Attempt to target the flex item with min-width: 300px */
      .account-layout > div > div {
        min-width: 0 !important; 
      }
    }

  </style>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body class="dark-mode">
<script src="scripts/taskbar.js"></script>

<div class="account-layout" id="account-layout">
  <!-- Content will be injected by JavaScript -->
</div>

<script>
(function() {
  const layout = document.getElementById('account-layout');
  const storedUserRaw = localStorage.getItem('user');
  
  // Auto-populate known_users if missing but user is logged in
  if (storedUserRaw) {
      try {
          const currentUser = JSON.parse(storedUserRaw);
          let known = JSON.parse(localStorage.getItem('known_users') || '[]');
          if (!known.some(u => u.email === currentUser.email)) {
              known.push(currentUser);
              localStorage.setItem('known_users', JSON.stringify(known));
          }
      } catch (e) {
          console.error("Error updating known_users on load", e);
      }
  }

  if (!storedUserRaw) {
    // No user logged in
    layout.innerHTML = `
      <div class="no-account-message">
        <h2 data-i18n="Not Logged In">Not Logged In</h2>
        <p data-i18n="You need to log in to view your account information.">You need to log in to view your account information.</p>
        <a href="Login.html" class="account-btn account-btn-primary" data-i18n="Log In / Sign Up">Log In / Sign Up</a>
      </div>
    `;
    return;
  }

  let user;
  try {
    user = JSON.parse(storedUserRaw);
  } catch (e) {
    layout.innerHTML = `
      <div class="no-account-message">
        <h2 data-i18n="Error">Error</h2>
        <p data-i18n="There was an error loading your account information.">There was an error loading your account information.</p>
        <a href="Login.html" class="account-btn account-btn-primary" data-i18n="Log In Again">Log In Again</a>
      </div>
    `;
    return;
  }

  const name = user.name || 'User';
  const email = user.email || 'Not provided';
  const createdAt = user.createdAt ? new Date(user.createdAt).toLocaleDateString() : 'Unknown';
  const initials = name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2) || '?';
  
  const role = user.role ? (user.role.charAt(0).toUpperCase() + user.role.slice(1)) : 'Student';
  const classInfoFormatted = user.role === 'teacher' && user.myClassCode 
      ? `<div class="account-field"><span class="account-field-label" data-i18n="Class Code">Class Code</span><span class="account-field-value" style="font-family:monospace; font-weight:bold; color:#10b981;">${user.myClassCode}</span></div>`
      : user.joinedClassCode 
          ? `<div class="account-field"><span class="account-field-label" data-i18n="Joined Class">Joined Class</span><span class="account-field-value" style="font-family:monospace;">${user.joinedClassCode}</span></div>`
          : '';

  layout.innerHTML = `
    <h1 class="account-title" data-i18n="Account Information">Account Information</h1>
    
    <div style="display: flex; align-items: flex-start; gap: 2rem; flex-wrap: wrap;">
      <div style="display: flex; flex-direction: column; align-items: center; gap: 0.5rem;">
        <div class="account-avatar" id="profile-avatar" style="cursor: pointer; position: relative;">
            ${user.avatar ? `<img src="${user.avatar}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">` : initials}
            <div style="position: absolute; bottom: 0; right: 0; background: white; border-radius: 50%; padding: 4px; border: 1px solid #ccc; font-size: 1rem;">✏️</div>
        </div>
        <button id="change-avatar-btn" style="background:none; border:none; color:#3b82f6; cursor:pointer; font-weight:600; font-size:0.9rem;" data-i18n="Change Avatar">Change Avatar</button>
      </div>

      <!-- Avatar Selection Modal -->
      <div id="avatar-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center;">
        <div style="background:var(--card-bg, #ffffff); padding:2rem; border-radius:1rem; max-width:400px; width:90%; border:1px solid var(--border-color, #e2e8f0);">
          <h3 style="margin-top:0; color:var(--text-color, #333);" data-i18n="Choose Profile Picture">Choose Profile Picture</h3>
          <div style="display:grid; grid-template-columns:repeat(4, 1fr); gap:1rem; margin:1rem 0;">
             ${['👨‍🎓','👩‍🎓','🦸','🧙‍♂️','🚀','🐉','😺','🐶','🦊','🦁','🏀','⚽'].map(emoji => 
                 `<div class="avatar-option" onclick="selectAvatar('${emoji}')" style="font-size:2rem; cursor:pointer; text-align:center; padding:0.5rem; border-radius:0.5rem; transition:background 0.2s;">${emoji}</div>`
             ).join('')}
          </div>
          <button onclick="document.getElementById('avatar-modal').style.display='none'" style="width:100%; padding:0.8rem; background:var(--border-color, #cbd5e1); color:var(--text-color, #333); border:none; border-radius:0.5rem; cursor:pointer;" data-i18n="Cancel">Cancel</button>
        </div>
      </div>
      
      <!-- Switch Account Modal -->
      <div id="switch-account-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center;">
        <div style="background:var(--card-bg, #ffffff); padding:2rem; border-radius:1rem; max-width:400px; width:90%; position:relative; border:1px solid var(--border-color, #e2e8f0);">
          <button onclick="document.getElementById('switch-account-modal').style.display='none'" style="position:absolute; top:1rem; right:1rem; background:none; border:none; font-size:1.5rem; cursor:pointer; color:var(--text-color, #333);">&times;</button>
          <h3 style="margin-top:0; color:var(--text-color, #333); margin-bottom:1.5rem;" data-i18n="Switch Account">Switch Account</h3>
          <div id="known-users-list" style="display:flex; flex-direction:column; gap:0.75rem; max-height:300px; overflow-y:auto; margin-bottom:1.5rem;">
            <!-- Users injected here -->
          </div>
          <div style="border-top:1px solid #e2e8f0; padding-top:1rem;">
             <button id="add-account-btn" style="width:100%; padding:0.8rem; background:linear-gradient(135deg, #3b82f6 0%, #10b981 50%, #8b5cf6 100%); color:white; border:none; border-radius:0.5rem; cursor:pointer; font-weight:600;" data-i18n="Add Another Account">Add Another Account</button>
          </div>
        </div>
      </div>
      
      <div style="flex: 1; min-width: 300px;">
        <div class="account-section">
          <h3 class="account-section-title" data-i18n="Profile Details">Profile Details</h3>
          <div class="account-field">
            <span class="account-field-label" data-i18n="Role">Role</span>
            <span class="account-field-value" data-i18n="${role}">${role}</span>
          </div>
          ${classInfoFormatted}
          <div class="account-field">
            <span class="account-field-label" data-i18n="Display Name">Display Name</span>
            <span class="account-field-value">${name}</span>
          </div>
          <div class="account-field">
            <span class="account-field-label" data-i18n="Email Address">Email Address</span>
            <span class="account-field-value">${email}</span>
          </div>
          <div class="account-field">
            <span class="account-field-label" data-i18n="Member Since">Member Since</span>
            <span class="account-field-value">${createdAt}</span>
          </div>
        </div>

        <div class="account-section">
          <h3 class="account-section-title" data-i18n="Learning Progress">Learning Progress</h3>
          <div class="account-field">
            <span class="account-field-label" data-i18n="Total Lessons Completed:">Total Lessons Completed:</span>
            <span class="account-field-value" id="lessons-completed">0</span>
          </div>
        </div>

        <div class="account-section">
            <h3 class="account-section-title">Achievements & Badges</h3>
            <div id="badges-grid" style="display: flex; flex-direction: column; gap: 1rem; padding: 1rem; background: var(--card-bg, #f1f5f9); border: 1px solid var(--border-color, #e2e8f0); border-radius: 1rem; min-height: 100px;">
                <!-- Badges injected here -->
            </div>
        </div>

        <div class="account-section">
          <h3 class="account-section-title" data-i18n="Time Spent Learning">Time Spent Learning</h3>
          <div class="time-period-toggle">
            <button class="time-period-btn active" data-period="today" data-i18n="Today">Today</button>
            <button class="time-period-btn" data-period="week" data-i18n="This Week">This Week</button>
            <button class="time-period-btn" data-period="month" data-i18n="This Month">This Month</button>
          </div>
          <div class="account-field" style="justify-content: center;">
            <span class="time-display" id="time-spent">0h 0m</span>
          </div>
        </div>

        <div class="account-actions">
          <button class="account-btn account-btn-secondary" onclick="window.location.href='Preferences.html'" data-i18n="⚙️ Preferences">
            ⚙️ Preferences
          </button>
          <button class="account-btn account-btn-secondary" id="switch-account-btn" data-i18n="🔄 Switch Account">
            🔄 Switch Account
          </button>
          <button class="account-btn account-btn-danger" id="logout-btn" data-i18n="🚪 Log Out">
            🚪 Log Out
          </button>
        </div>
      </div>
    </div>
  `;

  // Calculate learning progress from localStorage
  const startedLessons = new Set();
  const completedLessons = new Set();
  const badgeCounts = {}; // Key map for badge progress
  
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (!key) continue;
    
    // Generic Match for any course format: {subject}_u{unit}_l{lesson}_{type}
    const match = key.match(/^(.+)_u(\d+)_l(\d+)_(started|completed)$/);
    
    if (match && localStorage.getItem(key) === 'true') {
      let subject = match[1];
      const unit = match[2];
      const lesson = match[3];
      const type = match[4];

      // Normalize legacy physics key
      if (subject === 'phys') subject = 'physics';

      const lessonKey = `${subject}_u${unit}_l${lesson}`;
      
      if (type === 'started') {
        startedLessons.add(lessonKey);
      } else if (type === 'completed') {
        completedLessons.add(lessonKey);
        badgeCounts[subject] = (badgeCounts[subject] || 0) + 1;
      }
    }
  }
  
  // Update totals
  document.getElementById('lessons-completed').textContent = completedLessons.size;

  // --- Badge Logic ---
  const badgesGrid = document.getElementById('badges-grid');
  
  console.log('=== BADGE DEBUG START ===');
  console.log('badgesGrid element:', badgesGrid);
  
  // Calculate total minutes all time for badge
  let totalMinutesAllTime = 0;
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.startsWith('arisEdu_time_')) {
      const minutes = parseInt(localStorage.getItem(key)) || 0;
      totalMinutesAllTime += minutes;
    }
  }
  window.totalMinutesAllTime = totalMinutesAllTime; // Store globally

  // Get badges awarded via badges.js system
  // Re-read from storage to get latest updates if badges.js ran
  const awardedBadges = JSON.parse(localStorage.getItem('arisEdu_badges') || '[]');
  const streak = parseInt(localStorage.getItem('arisEdu_streak') || '0');

  // Listen for storage changes in other tabs/windows or from async scripts
  window.addEventListener('storage', (e) => {
      if (e.key === 'arisEdu_badges') {
          // Reload page to show new badges? Or simpler: just reload location
          location.reload();
      }
  });

  // Re-check logic on load (in case BadgeSystem loads late)
  setTimeout(() => {
      if (window.BadgeSystem && typeof window.BadgeSystem.checkAll === 'function') {
          window.BadgeSystem.checkAll();
          // If changes detected, reload to show them
          const currentBadges = JSON.parse(localStorage.getItem('arisEdu_badges') || '[]');
          if (currentBadges.length > awardedBadges.length) {
              location.reload();
          }
      }
  }, 1500);

const BADGE_DEFS = {
        'night_owl': { title: 'Night Owl', desc: t => `Studied after 10 PM on ${t} days`, icon: '🦉', thresholds: [1, 5, 15, 30, 50] },
        'early_bird': { title: 'Early Bird', desc: t => `Studied before 7 AM on ${t} days`, icon: '🌅', thresholds: [1, 5, 15, 30, 50] },
        'quiz_master': { title: 'Quiz Master', desc: t => `Completed ${t} quizzes`, icon: '🧠', thresholds: [1, 5, 15, 30, 50] },
        
        // High School (Legacy + New)
        'algebra': { title: 'Algebra Wizard', desc: t => `Completed ${t}% of Algebra (HS)`, icon: '📐', thresholds: [10, 30, 50, 80, 100], max: 186 },
        'hs_alg1': { title: 'Algebra 1 Mastery', desc: t => `Completed ${t}% of Algebra 1`, icon: '📐', thresholds: [10, 30, 50, 80, 100], max: 119 },
        'hs_alg2': { title: 'Algebra 2 Mastery', desc: t => `Completed ${t}% of Algebra 2`, icon: '📐', thresholds: [10, 30, 50, 80, 100], max: 67 },
        'geometry': { title: 'Geometry Expert', desc: t => `Completed ${t}% of Geometry (HS)`, icon: '△', thresholds: [10, 30, 50, 80, 100], max: 111 },
        'physics': { title: 'Physics Pro', desc: t => `Completed ${t}% of Physics (HS)`, icon: '⚛️', thresholds: [10, 30, 50, 80, 100], max: 84 },
        'chemistry': { title: 'Chem Whiz', desc: t => `Completed ${t}% of Chemistry (HS)`, icon: '⚗️', thresholds: [10, 30, 50, 80, 100], max: 109 },
        'biology': { title: 'Biology Guru', desc: t => `Completed ${t}% of Biology (HS)`, icon: '🧬', thresholds: [10, 30, 50, 80, 100], max: 83 },

        // Middle School
        'ms_pre_alg': { title: 'Pre-Algebra Pro', desc: t => `Completed ${t}% of MS Pre-Algebra`, icon: '➗', thresholds: [10, 30, 50, 80, 100], max: 59 },
        'ms_alg_found': { title: 'Algebra Foundations', desc: t => `Completed ${t}% of MS Alg Foundations`, icon: 'wd', thresholds: [10, 30, 50, 80, 100], max: 20 },
        'ms_geom': { title: 'MS Geometry Star', desc: t => `Completed ${t}% of MS Geometry`, icon: '🔷', thresholds: [10, 30, 50, 80, 100], max: 60 },
        'ms_phys': { title: 'MS Physics Explorer', desc: t => `Completed ${t}% of MS Physics`, icon: '🔭', thresholds: [10, 30, 50, 80, 100], max: 52 },
        'ms_chem': { title: 'MS Chemistry Spark', desc: t => `Completed ${t}% of MS Chemistry`, icon: '🧪', thresholds: [10, 30, 50, 80, 100], max: 54 },
        'ms_life_sci': { title: 'Life Science Badge', desc: t => `Completed ${t}% of MS Life Science`, icon: '🦠', thresholds: [10, 30, 50, 80, 100], max: 34 },

        // AP Courses
        'ap_bio': { title: 'AP Bio Scholar', desc: t => `Completed ${t}% of AP Biology`, icon: '🔬', thresholds: [10, 30, 50, 80, 100], max: 40 },
        'ap_chem': { title: 'AP Chem Scholar', desc: t => `Completed ${t}% of AP Chemistry`, icon: '🧪', thresholds: [10, 30, 50, 80, 100], max: 41 },
        'ap_env_sci': { title: 'AP Enviro Scholar', desc: t => `Completed ${t}% of AP Env Science`, icon: '🌍', thresholds: [10, 30, 50, 80, 100], max: 45 },
        'ap_hug': { title: 'AP HUG Scholar', desc: t => `Completed ${t}% of AP Human Geo`, icon: '🗺️', thresholds: [10, 30, 50, 80, 100], max: 41 },
        'ap_calc_ab': { title: 'AP Calc AB Scholar', desc: t => `Completed ${t}% of AP Calculus AB`, icon: '∫', thresholds: [10, 30, 50, 80, 100], max: 76 },
        'ap_stats': { title: 'AP Stats Scholar', desc: t => `Completed ${t}% of AP Statistics`, icon: '📊', thresholds: [10, 30, 50, 80, 100], max: 56 },
        'ap_phys1': { title: 'AP Phys 1 Scholar', desc: t => `Completed ${t}% of AP Physics 1`, icon: '🎢', thresholds: [10, 30, 50, 80, 100], max: 64 },
        'ap_phys2': { title: 'AP Phys 2 Scholar', desc: t => `Completed ${t}% of AP Physics 2`, icon: '⚡', thresholds: [10, 30, 50, 80, 100], max: 35 },
        'ap_phys_mech': { title: 'AP Mechanics Scholar', desc: t => `Completed ${t}% of AP Physics C`, icon: '⚙️', thresholds: [10, 30, 50, 80, 100], max: 28 },

        // Aggregates
        'master_hs': { title: 'High School Master', desc: t => `Completed ${t}% of High School Content`, icon: '🎓', thresholds: [10, 30, 50, 80, 100], max: 573 },
        'master_ms': { title: 'Middle School Master', desc: t => `Completed ${t}% of Middle School Content`, icon: '🎒', thresholds: [10, 30, 50, 80, 100], max: 279 },
        'master_ap': { title: 'AP Scholar Distinction', desc: t => `Completed ${t}% of AP Content`, icon: '🎖️', thresholds: [10, 30, 50, 80, 100], max: 426 },

      'streak': { title: 'Streak Master', desc: t => `Reached a ${t}-day streak`, icon: '🔥', thresholds: [3, 7, 14, 30, 60] },
      'game_2048': { title: 'Number Cruncher', desc: t => `Reached ${t} tile in 2048`, icon: '🎮', thresholds: [128, 256, 512, 1024, 2048], max: 2048 }
  };

  const TIERS = [
      { id: 'bronze', name: 'Bronze', icon: '🥉' },
      { id: 'silver', name: 'Silver', icon: '🥈' },
      { id: 'gold', name: 'Gold', icon: '🥇' },
      { id: 'diamond', name: 'Diamond', icon: '💎' },
      { id: 'amethyst', name: 'Amethyst', icon: '🔮' }
  ];

  const allBadges = [
      { id: 'first_visit', icon: '👋', name: 'First Steps', desc: 'Visited your first lesson!', condition: () => awardedBadges.includes('first_visit') }
  ];

  Object.entries(BADGE_DEFS).forEach(([id, def]) => {
        // Find highest earned tier
        let highestIndex = -1;
        for (let i = 0; i < def.thresholds.length; i++) {
            if (awardedBadges.includes(`${id}_${TIERS[i].id}`)) {
                highestIndex = i;
            }
        }
        
        // Show highest earned, OR show first tier if none earned
        const indexToShow = Math.max(0, highestIndex);
        const tier = TIERS[indexToShow];
        const badgeId = `${id}_${tier.id}`;
        
        allBadges.push({
            id: badgeId,
            baseId: id, // Pass baseId explicitly
            icon: def.icon + ' ' + tier.icon,
            name: `${def.title} (${tier.name})`,
            desc: def.desc(def.thresholds[indexToShow]),
            condition: () => highestIndex >= indexToShow
        }); // Close push
    }); // Close forEach

    // --- Helper to get actual progress values for bars ---
    function getBadgeProgress(id, def) {
        let current = 0;
        let max = def.max || (def.thresholds ? def.thresholds[def.thresholds.length - 1] : 100);
        
        try {
            // Stats Logic
            if (id === 'night_owl') current = JSON.parse(localStorage.getItem('arisEdu_stats_night_owl_days') || '[]').length;
            else if (id === 'early_bird') current = JSON.parse(localStorage.getItem('arisEdu_stats_early_bird_days') || '[]').length;
            else if (id === 'streak') current = parseInt(localStorage.getItem('arisEdu_streak') || '0');
            else if (id === 'quiz_master') current = parseInt(localStorage.getItem('arisEdu_stats_quizzes_completed') || '0');
            else if (id === 'game_2048') current = parseInt(localStorage.getItem('2048_max_tile') || '0');
            
            // Course Logic (Using badgeCounts from pre-calc loop)
            else if (id === 'algebra') current = (badgeCounts['alg1'] || 0) + (badgeCounts['alg2'] || 0);
            else if (id === 'hs_alg1') current = badgeCounts['alg1'] || 0;
            else if (id === 'hs_alg2') current = badgeCounts['alg2'] || 0;
            else if (id === 'geometry') current = badgeCounts['geometry'] || 0;
            else if (id === 'physics') current = badgeCounts['physics'] || 0;
            else if (id === 'chemistry') current = badgeCounts['chem'] || 0;
            else if (id === 'biology') current = badgeCounts['bio'] || 0;
            
            // MS Mappings
            else if (id === 'ms_pre_alg') current = badgeCounts['alg1'] || 0;
            else if (id === 'ms_alg_found') current = badgeCounts['alg2'] || 0;
            else if (id === 'ms_geom') current = badgeCounts['ms_geom'] || 0;
            else if (id === 'ms_phys') current = badgeCounts['ms_phys'] || 0;
            else if (id === 'ms_chem') current = badgeCounts['chem'] || 0;
            else if (id === 'ms_life_sci') current = badgeCounts['bio'] || 0;
            
            // AP Mappings (Direct lookup if key matches, else custom map)
            else if (id === 'ap_phys1') current = badgeCounts['apphys1'] || 0;
            else if (badgeCounts[id] !== undefined) current = badgeCounts[id]; // Generic fallback for matching IDs like ap_bio

            // Aggregates
            else if (id === 'master_hs') {
                current = (badgeCounts['alg1']||0) + (badgeCounts['alg2']||0) + (badgeCounts['geometry']||0) + (badgeCounts['physics']||0) + (badgeCounts['chem']||0) + (badgeCounts['bio']||0);
            }
            else if (id === 'master_ms') {
                current = (badgeCounts['alg1']||0) + (badgeCounts['alg2']||0) + (badgeCounts['ms_geom']||0) + (badgeCounts['ms_phys']||0) + (badgeCounts['chem']||0) + (badgeCounts['bio']||0);
            }
            else if (id === 'master_ap') {
                 const keys = ['ap_bio', 'ap_chem', 'ap_env_sci', 'ap_hug', 'ap_calc_ab', 'ap_stats', 'apphys1', 'ap_phys2', 'ap_phys_mech'];
                 current = keys.reduce((acc, k) => acc + (badgeCounts[k]||0), 0);
            }

        } catch (e) { console.error(e); }

        // Cap current at max for display (unless streak?)
        if (current > max && id !== 'streak' && id !== 'game_2048') current = max;
        
        const percent = Math.min(100, (current / max) * 100);
        return { current, max, percent };
    }

  // Inject Tooltip Styles
  const tooltipStyle = document.createElement('style');
  tooltipStyle.textContent = `
      .badge-item:hover .badge-tooltip {
          opacity: 1;
          visibility: visible;
          transform: translateX(-50%) translateY(-10px);
      }
      .badge-tooltip {
          position: absolute;
          bottom: 100%;
          left: 50%;
          transform: translateX(-50%) translateY(0);
          background: #334155;
          color: white;
          padding: 0.5rem 0.8rem;
          border-radius: 0.5rem;
          font-size: 0.75rem;
          width: max-content;
          max-width: 200px;
          text-align: center;
          pointer-events: none;
          opacity: 0;
          visibility: hidden;
          transition: all 0.2s;
          box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
          z-index: 10;
      }
      .badge-tooltip::after {
          content: "";
          position: absolute;
          top: 100%;
          left: 50%;
          margin-left: -5px;
          border-width: 5px;
          border-style: solid;
          border-color: #334155 transparent transparent transparent;
      }
        .progress-bar-container {
            flex: 1;
            margin-left: 2rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .badge-checkpoints {
            position: relative;
            height: 10px;
            background: rgba(0,0,0,0.1);
            border-radius: 5px;
            margin-top: 10px;
            margin-bottom: 20px;
        }
        .badge-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            border-radius: 5px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            transition: width 0.5s ease-out;
        }
        .badge-checkpoint {
            position: absolute;
            top: -4px;
            width: 2px;
            height: 18px;
            background: rgba(0,0,0,0.3);
            z-index: 2;
        }
        .badge-checkpoint-label {
            position: absolute;
            top: 16px;
            transform: translateX(-50%);
            font-size: 0.65rem;
            opacity: 0.7;
            white-space: nowrap;
        }
        body.dark-mode .badge-checkpoints {
            background: rgba(255,255,255,0.1);
        }
        body.dark-mode .badge-checkpoint {
            background: rgba(255,255,255,0.3);
        }
    `;
    document.head.appendChild(tooltipStyle);

    // Function to extract tier from badge name and return appropriate color
    function getTierColor(badgeName) {
        // Extract tier from format "Badge Name (Tier Name)"
        const tierMatch = badgeName.match(/\((\w+)\)$/);
        if (!tierMatch) return null;
        
        const tierName = tierMatch[1].toLowerCase();
        const isDark = document.body.classList.contains('dark-mode');
        
        // Use more vibrant colors for dark mode for better contrast
        const tierColors = isDark ? {
            'bronze': '#D4795F',    // Bright bronze/copper
            'silver': '#E0E0E0',    // Bright silver
            'gold': '#FFD700',      // Vibrant gold
            'diamond': '#00FFFF',   // Bright cyan
            'amethyst': '#DA70D6'   // Bright magenta/purple
        } : {
            'bronze': '#A0522D',    // Sienna/bronze
            'silver': '#A8A9AD',    // Silver-grey
            'gold': '#FFB800',      // Bright gold
            'diamond': '#00BFFF',   // Deep sky blue
            'amethyst': '#B565CC'   // Amethyst purple
        };
        
        const color = tierColors[tierName];
        console.log('Badge:', badgeName, 'Tier:', tierName, 'Color:', color, 'isDark:', isDark);
        return color;
    }

    allBadges.forEach(badge => {
        const earned = badge.condition();
        const isDark = document.body.classList.contains('dark-mode');
        const div = document.createElement('div');
        div.className = 'badge-item';
        const earnedBg = isDark ? '#1e293b' : 'white';
        const earnedShadow = isDark ? '0 2px 5px rgba(0,0,0,0.2)' : '0 2px 5px rgba(0,0,0,0.05)';
        
        div.style.cssText = `position: relative; display: flex; flex-direction: row; align-items: center; width: 100%; opacity: ${earned ? 1 : 0.4}; filter: grayscale(${earned ? 0 : 1}); transition: all 0.3s; padding: 1.5rem; border-radius: 12px; background: ${earned ? earnedBg : 'transparent'}; box-shadow: ${earned ? earnedShadow : 'none'}; cursor: default; margin-bottom: 1rem;`;

        // Try to get tier-specific color, fallback to default grey
        const tierColor = getTierColor(badge.name);
        const labelColor = tierColor || (isDark ? '#94a3b8' : '#64748b');
        
        // Progress Logic
        let progressHTML = '';
        let baseId = badge.baseId;
        if (!baseId && badge.id) {
            baseId = badge.id.split('_')[0];
        }

        if (baseId === 'polyglot') baseId = null; 
        
        const def = BADGE_DEFS[baseId];
        
        if (def && def.thresholds) {
            const stats = getBadgeProgress(baseId, def);
            
            // Checkpoint markers logic
            const markers = def.thresholds.map(t => {
                let position = 0;
                
                // Absolute Count Badges (Non-linear scale or specific values)
                const absoluteBadges = ['night_owl', 'early_bird', 'quiz_master', 'streak', 'game_2048'];
                
                if (absoluteBadges.includes(baseId)) {
                    // Calculate position relative to max
                    const maxVal = def.max || stats.max;
                    position = (t / maxVal) * 100;
                } else {
                    // Percentage Based Badges (Courses)
                    // The thresholds are already percentages (10, 30, 50, 80, 100)
                    position = t;
                }
                
                return `<div class="badge-checkpoint" style="left: ${position}%"></div>
                        <div class="badge-checkpoint-label" style="left: ${position}%">${t}${absoluteBadges.includes(baseId) ? '' : '%'}</div>`;
            }).join('');
            
            let unitLabel = 'count';
            if (baseId === 'game_2048') unitLabel = 'max tile';
            else if (def.max && baseId !== 'night_owl' && baseId !== 'early_bird' && baseId !== 'streak' && baseId !== 'quiz_master') unitLabel = 'lessons'; 

            progressHTML = `
                <div class="progress-bar-container">
                    <div style="font-size:0.8rem; font-weight:600; opacity:0.8; display:flex; justify-content:space-between;">
                        <span>Progress to next tier</span>
                        <span>${stats.current} / ${stats.max} ${unitLabel}</span>
                    </div>
                    <div class="badge-checkpoints">
                        <div class="badge-fill" style="width: ${stats.percent}%"></div>
                        ${markers}
                    </div>
                </div>
            `;
        }

        div.innerHTML = `
          <div style="display:flex; flex-direction:column; align-items:center; min-width:120px; width:120px;">
              <div style="font-size: 3rem; margin-bottom: 0.5rem; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));">${badge.icon}</div>
              <div style="font-size: 0.85rem; color: ${labelColor}; font-weight: 700; text-align: center; line-height:1.2; text-shadow: ${tierColor ? (isDark ? '0 2px 4px rgba(0,0,0,0.5)' : '0 1px 1px rgba(255,255,255,0.5)') : 'none'};">
                ${badge.name.replace(/\s\((.+)\)/, `<br><span style="font-weight:800; font-size:0.8rem; opacity:1; letter-spacing:0.5px; color:${labelColor};">$1</span>`)}
              </div>
          </div>
          
          <div style="flex:1; padding-left:2rem; display:flex; align-items:center;">
             ${progressHTML || '<div style="opacity:0.5; font-size:0.8rem;">Single achievement badge</div>'}
          </div>
          
          <!-- Tooltip still useful for description -->
          <div class="badge-tooltip" style="bottom: auto; top: -10px; transform: translateY(-100%) translateX(-50%);">
              <strong style="display:block; margin-bottom:0.2rem; font-size:0.9rem;">${badge.name}</strong>
              ${badge.desc}<br>
              <span style="font-weight:bold; color:${earned ? '#4ade80' : '#f87171'}">${earned ? '✓ Earned' : '🔒 Locked'}</span>
          </div>
        `;
        badgesGrid.appendChild(div);
    });

  // --- Avatar Logic ---
  window.selectAvatar = function(emoji) {
      const updatedUser = { ...user, avatar: null, avatarEmoji: emoji };
      user.avatarEmoji = emoji;
      localStorage.setItem('user', JSON.stringify(user));
      
      document.getElementById('profile-avatar').innerHTML = `
        <div style="width:100%; height:100%; border-radius:50%; background: linear-gradient(135deg, #3b82f6 0%, #10b981 50%, #8b5cf6 100%); display:flex; align-items:center; justify-content:center; font-size:3rem; color:white;">
            ${emoji}
        </div>
        <div style="position: absolute; bottom: 0; right: 0; background: white; border-radius: 50%; padding: 4px; border: 1px solid #ccc; font-size: 1rem;">✏️</div>
      `;
      document.getElementById('avatar-modal').style.display = 'none';
  };
  
  // Bind change avatar button
  document.getElementById('profile-avatar').addEventListener('click', () => document.getElementById('avatar-modal').style.display = 'flex');
  document.getElementById('change-avatar-btn').addEventListener('click', () => document.getElementById('avatar-modal').style.display = 'flex');

  // Check if we need to render saved emoji
  if(user.avatarEmoji) {
      document.getElementById('profile-avatar').innerHTML = `
        <div style="width:100%; height:100%; border-radius:50%; background: linear-gradient(135deg, #3b82f6 0%, #10b981 50%, #8b5cf6 100%); display:flex; align-items:center; justify-content:center; font-size:3rem; color:white;">
            ${user.avatarEmoji}
        </div>
        <div style="position: absolute; bottom: 0; right: 0; background: white; border-radius: 50%; padding: 4px; border: 1px solid #ccc; font-size: 1rem;">✏️</div>
      `;
  }

  // --- Time Spent Feature ---
  function getTimeSpent(period) {
    // Time data is stored as: arisEdu_time_{YYYY-MM-DD} = minutes (number)
    const now = new Date();
    let totalMinutes = 0;
    
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (!key || !key.startsWith('arisEdu_time_')) continue;
      
      const dateStr = key.replace('arisEdu_time_', '');
      const entryDate = new Date(dateStr);
      if (isNaN(entryDate.getTime())) continue;
      
      const minutes = parseInt(localStorage.getItem(key)) || 0;
      
      if (period === 'today') {
        // Same day
        if (entryDate.toDateString() === now.toDateString()) {
          totalMinutes += minutes;
        }
      } else if (period === 'week') {
        // Same week (last 7 days)
        const weekAgo = new Date(now);
        weekAgo.setDate(weekAgo.getDate() - 7);
        if (entryDate >= weekAgo && entryDate <= now) {
          totalMinutes += minutes;
        }
      } else if (period === 'month') {
        // Same month
        const monthAgo = new Date(now);
        monthAgo.setDate(monthAgo.getDate() - 30);
        if (entryDate >= monthAgo && entryDate <= now) {
          totalMinutes += minutes;
        }
      }
    }
    
    return totalMinutes;
  }
  
  function formatTime(minutes) {
    const hours = Math.floor(minutes / 60);
    const mins = minutes % 60;
    if (hours > 0) {
      return `${hours}h ${mins}m`;
    }
    return `${mins}m`;
  }
  
  function updateTimeDisplay(period) {
    const minutes = getTimeSpent(period);
    const timeEl = document.getElementById('time-spent');
    if (timeEl) {
      timeEl.textContent = formatTime(minutes);
    }
  }
  
  // Initialize time display
  updateTimeDisplay('today');
  
  // Handle time period toggle
  document.querySelectorAll('.time-period-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.time-period-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      updateTimeDisplay(this.dataset.period);
    });
  });

  // Logout button handler
  document.getElementById('logout-btn').addEventListener('click', function() {
    localStorage.removeItem('user');

    // Sign out from Firebase auth to fully clear session
    import('./firebase-config.js').then(function(mod) {
      if (mod.auth && mod.signOut) {
        return mod.signOut(mod.auth);
      }
    }).catch(function(e) {
      console.error('Firebase signOut error:', e);
    }).finally(function() {
      window.location.href = 'Login.html';
    });
  });

  // Switch Account button handler
  const switchBtn = document.getElementById('switch-account-btn');
  const switchModal = document.getElementById('switch-account-modal');
  const knownUsersList = document.getElementById('known-users-list');
  const addAccountBtn = document.getElementById('add-account-btn');
  
  if (addAccountBtn) {
      addAccountBtn.addEventListener('click', function() {
          localStorage.removeItem('user');
          window.location.href = 'Login.html';
      });
  }

  if (switchBtn) {
    switchBtn.addEventListener('click', function() {
      const knownUsers = JSON.parse(localStorage.getItem('known_users') || '[]');
      const currentUserEmail = user ? user.email : ''; // 'user' is from outer scope closure
      
      // Filter out current user to avoid switching to self
      const otherUsers = knownUsers.filter(u => u.email !== currentUserEmail);
      
      if (otherUsers.length === 0) {
        // No other accounts known, just go to login page to sign in to a new one
        localStorage.removeItem('user');
        window.location.href = 'Login.html';
        return;
      }
      
      // Populate list
      if (switchModal && knownUsersList) {
          knownUsersList.innerHTML = '';
          otherUsers.forEach(u => {
              const uName = u.name || u.email;
              const uRole = u.role ? (u.role.charAt(0).toUpperCase() + u.role.slice(1)) : 'Student';
              const uAvatar = u.avatarEmoji || uName.charAt(0).toUpperCase();

              const isDarkSw = document.body.classList.contains('dark-mode');
              const item = document.createElement('div');
              item.style.cssText = `display:flex; align-items:center; gap:1rem; padding:0.8rem; background:${isDarkSw ? '#1e293b' : '#f8fafc'}; border-radius:0.5rem; cursor:pointer; transition:background 0.2s; border:1px solid ${isDarkSw ? '#334155' : '#e2e8f0'};`;
              item.innerHTML = `
                <div style="width:40px; height:40px; border-radius:50%; background:${isDarkSw ? '#334155' : '#e2e8f0'}; display:flex; align-items:center; justify-content:center; font-size:1.2rem; font-weight:bold; color:${isDarkSw ? '#94a3b8' : '#64748b'};">
                    ${uAvatar}
                </div>
                <div style="flex:1;">
                    <div style="font-weight:600; color:${isDarkSw ? '#e2e8f0' : '#334155'};">${uName}</div>
                    <div style="font-size:0.8rem; color:#94a3b8;"><span data-i18n="${uRole}">${uRole}</span> • ${u.email}</div>
                </div>
                <div style="font-size:1.2rem; color:${isDarkSw ? '#475569' : '#cbd5e1'};">➔</div>
              `;
              
              item.onmouseover = () => item.style.background = isDarkSw ? '#334155' : '#f1f5f9';
              item.onmouseout = () => item.style.background = isDarkSw ? '#1e293b' : '#f8fafc';
              
              item.onclick = () => {
                  // Switch to this user
                  localStorage.setItem('user', JSON.stringify(u));
                  // Reload page to reflect new user
                  window.location.reload();
              };
              
              knownUsersList.appendChild(item);
          });
          
          switchModal.style.display = 'flex';
      } else {
        // Fallback
        localStorage.removeItem('user');
        window.location.href = 'Login.html';
      }
    });
  }
})();
</script>
