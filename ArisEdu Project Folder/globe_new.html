<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Globe - ArisEdu</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #7ec8f5; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    #canvas-container { width: 100vw; height: 100vh; }
    canvas { display: block; }
    #tooltip {
      position: fixed; background: rgba(0,0,0,0.75); color: #fff;
      padding: 6px 12px; border-radius: 6px; font-size: 13px;
      pointer-events: none; display: none; z-index: 10;
    }
    #info {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.6); font-size: 12px; pointer-events: none;
    }
  </style>
  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="tooltip"></div>
  <div id="info">Drag to rotate · Scroll to zoom</div>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    const container = document.getElementById('canvas-container');
    const tooltip = document.getElementById('tooltip');
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x7ec8f5);
    const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.z = 2.5;
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const sun = new THREE.DirectionalLight(0xffffff, 1.8);
    sun.position.set(5, 3, 5); scene.add(sun);
    // 4-step toon gradient
    const gradCanvas = document.createElement('canvas');
    gradCanvas.width = 4; gradCanvas.height = 1;
    const gctx = gradCanvas.getContext('2d');
    ['#555','#aaa','#ddd','#fff'].forEach((col, i) => { gctx.fillStyle = col; gctx.fillRect(i, 0, 1, 1); });
    const gradTex = new THREE.CanvasTexture(gradCanvas);
    gradTex.minFilter = THREE.NearestFilter;
    gradTex.magFilter = THREE.NearestFilter;
    const loader = new THREE.TextureLoader();
    const dayTex = loader.load('https://unpkg.com/three-globe/example/img/earth-day.jpg');
    const earth = new THREE.Mesh(
      new THREE.SphereGeometry(1, 64, 64),
      new THREE.MeshToonMaterial({ map: dayTex, gradientMap: gradTex })
    );
    scene.add(earth);
    // Bold cartoon outline
    scene.add(new THREE.Mesh(
      new THREE.SphereGeometry(1.035, 64, 64),
      new THREE.MeshBasicMaterial({ color: 0x222222, side: THREE.BackSide })
    ));
    // Bright atmosphere rim
    scene.add(new THREE.Mesh(
      new THREE.SphereGeometry(1.055, 64, 64),
      new THREE.MeshBasicMaterial({ color: 0x55ccff, side: THREE.BackSide, transparent: true, opacity: 0.25 })
    ));
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true; controls.dampingFactor = 0.07;
    controls.minDistance = 1.3; controls.maxDistance = 6;
    controls.autoRotate = true; controls.autoRotateSpeed = 0.4;
    renderer.domElement.addEventListener('pointerdown', () => { controls.autoRotate = false; });
    renderer.domElement.addEventListener('pointerup', () => { controls.autoRotate = true; });
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    renderer.domElement.addEventListener('pointermove', e => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObject(earth);
      if (hits.length > 0) {
        const n = hits[0].face.normal.clone().applyMatrix4(
          new THREE.Matrix4().extractRotation(earth.matrixWorld)
        );
        const lat = THREE.MathUtils.radToDeg(Math.asin(n.y)).toFixed(1);
        const lon = THREE.MathUtils.radToDeg(Math.atan2(n.x, n.z)).toFixed(1);
        tooltip.textContent = (lat >= 0 ? lat+'°N' : Math.abs(lat)+'°S') + '  ' + (lon >= 0 ? lon+'°E' : Math.abs(lon)+'°W');
        tooltip.style.display = 'block';
        tooltip.style.left = e.clientX + 14 + 'px';
        tooltip.style.top = e.clientY + 14 + 'px';
      } else { tooltip.style.display = 'none'; }
    });
    renderer.domElement.addEventListener('pointerleave', () => { tooltip.style.display = 'none'; });
    new ResizeObserver(() => {
      const w = container.clientWidth, h = container.clientHeight;
      camera.aspect = w / h; camera.updateProjectionMatrix(); renderer.setSize(w, h);
    }).observe(container);
    (function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    })();
  </script>
</body>
</html>
