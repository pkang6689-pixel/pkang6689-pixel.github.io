<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Clicker - Arcade</title>
    <script src="../scripts/arcade-core.js"></script>
    <script src="../firebase-utils.js"></script>
    <style>
        #game-session-timer {
            font-size: 2.5rem !important;
            font-weight: 700 !important;
        }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/main.css">
        <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; }
        body { 
            font-family: 'Orbitron', monospace; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        body > .flex { 
            display: flex !important; 
            flex-direction: row !important; 
            overflow: hidden; 
            height: 100vh; 
            gap: 1rem; 
            padding: 1rem; 
        }

        /* LEFT SIDEBAR - UPGRADES MENU */
        #game-sidebar {
            background: rgba(55, 65, 81, 0.98);
            border-radius: 1rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            justify-content: flex-start;
            width: 380px;
            height: 100%;
            border: 2px solid rgba(107, 114, 128, 0.9);
            box-shadow: 0 20px 45px rgba(0,0,0,0.6);
            overflow-y: auto;
            flex-shrink: 0;
            margin-left: auto;
        }

        #game-sidebar > div:first-child {
            width: 100%;
            text-align: center;
            color: #9ca3af;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            font-weight: 600;
        }

        #shopContainer {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .upgrade {
            background: rgba(107, 114, 128, 0.6);
            border: 2px solid rgba(156, 163, 175, 0.5);
            border-radius: 0.75rem;
            padding: 1rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            font-family: 'Orbitron', monospace;
            font-size: 0.85rem;
        }

        .upgrade:hover {
            background: rgba(107, 114, 128, 0.95);
            border-color: rgba(251, 191, 36, 0.8);
            transform: translateX(2px);
        }

        .upgrade:active {
            transform: translateX(0px) scale(0.98);
        }

        .upgrade-name {
            font-weight: bold;
            color: #fbbf24;
            margin-bottom: 0.25rem;
            font-size: 0.9rem;
        }

        .upgrade-cost {
            color: #f87171;
            font-size: 0.8rem;
            margin-bottom: 0.25rem;
        }

        .upgrade-effect {
            color: #60a5fa;
            font-size: 0.8rem;
            margin-bottom: 0.25rem;
        }

        .upgrade-count {
            color: #86efac;
            font-size: 0.75rem;
        }

        /* LEFT SIDE - MAIN GAME AREA */
        #game-wrapper { 
            flex: 0 0 420px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            width: 420px;
            min-width: 420px;
            max-width: 420px;
            margin: 0;
            margin-left: 2rem;
            overflow: visible;
            padding: 0;
            background: transparent;
            border: none;
            box-shadow: none;
        }

        #game-wrapper > div:first-child {
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            gap: 1rem;
        }

        /* HEADER */
        #game-wrapper > div:first-child > h1 {
            align-self: center;
            margin-bottom: 0;
            font-size: 1.5rem;
        }

        /* STATS PANEL */
        .stats-panel {
            background: rgba(55, 65, 81, 0.95);
            border: 2px solid rgba(107, 114, 128, 0.9);
            border-radius: 1rem;
            padding: 1.5rem;
            text-align: center;
            width: 400px;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .particle-count-display {
            font-size: 2.5rem;
            font-weight: bold;
            color: #fbbf24;
            margin-bottom: 0.5rem;
            font-variant-numeric: tabular-nums;
            min-width: 0;
        }

        .per-second-display {
            font-size: 1rem;
            color: #86efac;
        }

        /* GIANT CLICKER BUTTON */
        #giant-clicker {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 0 40px rgba(139, 92, 246, 0.6), inset 0 0 20px rgba(255, 255, 255, 0.1);
            border: 4px solid rgba(139, 92, 246, 0.4);
            background: radial-gradient(circle at 30% 30%, rgba(167, 139, 250, 0.3), rgba(124, 58, 237, 0.1));
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin: 2rem 0;
            font-weight: 700;
            color: white;
            padding: 0;
            overflow: visible;
        }

        #giant-clicker:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(139, 92, 246, 0.8), inset 0 0 20px rgba(255, 255, 255, 0.2);
        }

        #giant-clicker:active {
            transform: scale(0.95);
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.1);
        }

        #game-session-timer {
            background: rgba(34, 197, 94, 0.95);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 700;
            font-size: 2rem;
            font-family: monospace;
            width: 100%;
            max-width: 400px;
            text-align: center;
            letter-spacing: 2px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        #game-session-timer.warning {
            background: rgba(239, 68, 68, 0.95);
            animation: pulse 1s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        .pause-btn { 
            display: none !important; 
        }
        .pause-btn:hover { 
            display: none !important; 
        }
        
        /* LAB SCENE BACKGROUND */
        #lab-scene {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: #f0f4f8;
            border-radius: 1rem;
            overflow: hidden;
            min-width: 0;
            transition: background 0.3s ease;
        }
        body.dark-mode #lab-scene {
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
        }

        /* Floating bubbles container */
        #lab-bubbles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        .lab-bubble {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(96,165,250,0.4), rgba(59,130,246,0.15));
            border: 1px solid rgba(96,165,250,0.3);
            animation: bubbleFloat linear infinite;
        }
        body.dark-mode .lab-bubble {
            background: radial-gradient(circle at 30% 30%, rgba(96,165,250,0.25), rgba(59,130,246,0.08));
            border: 1px solid rgba(96,165,250,0.15);
        }

        @keyframes bubbleFloat {
            0%   { transform: translateY(0) scale(1);   opacity: 0; }
            10%  { opacity: 0.8; }
            90%  { opacity: 0.6; }
            100% { transform: translateY(-400px) scale(0.3); opacity: 0; }
        }

        /* SVG Lab illustration */
        .lab-svg-container {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 5;
        }
        .lab-svg-container svg {
            width: 100%;
            height: 100%;
        }

        /* Theme-aware SVG colors */
        .lab-wall   { fill: #e2e8f0; transition: fill 0.3s; }
        .lab-floor  { fill: #cbd5e1; transition: fill 0.3s; }
        .lab-bench  { fill: #78716c; transition: fill 0.3s; }
        .lab-bench-top { fill: #a8a29e; transition: fill 0.3s; }
        .lab-shelf  { fill: #a1a1aa; transition: fill 0.3s; }
        .lab-shelf-bracket { fill: #71717a; transition: fill 0.3s; }
        .lab-cabinet { fill: #d4d4d8; stroke: #a1a1aa; transition: fill 0.3s, stroke 0.3s; }
        .lab-cabinet-handle { fill: #71717a; }
        .lab-text   { fill: #334155; transition: fill 0.3s; }

        body.dark-mode .lab-wall   { fill: #1e293b; }
        body.dark-mode .lab-floor  { fill: #0f172a; }
        body.dark-mode .lab-bench  { fill: #44403c; }
        body.dark-mode .lab-bench-top { fill: #57534e; }
        body.dark-mode .lab-shelf  { fill: #3f3f46; }
        body.dark-mode .lab-shelf-bracket { fill: #52525b; }
        body.dark-mode .lab-cabinet { fill: #27272a; stroke: #3f3f46; }
        body.dark-mode .lab-text   { fill: #94a3b8; }

        /* Flask liquid animation */
        @keyframes liquidBubble1 {
            0%, 100% { transform: translateY(0); opacity: 0.7; }
            50% { transform: translateY(-8px); opacity: 0; }
        }
        @keyframes liquidBubble2 {
            0%, 100% { transform: translateY(0); opacity: 0.5; }
            50% { transform: translateY(-12px); opacity: 0; }
        }
        @keyframes liquidBubble3 {
            0%, 100% { transform: translateY(0); opacity: 0.6; }
            50% { transform: translateY(-10px); opacity: 0; }
        }
        .flask-bubble-1 { animation: liquidBubble1 2.5s ease-in-out infinite; }
        .flask-bubble-2 { animation: liquidBubble2 3.2s ease-in-out infinite 0.8s; }
        .flask-bubble-3 { animation: liquidBubble3 2.8s ease-in-out infinite 1.5s; }

        /* Glow effect for active equipment */
        @keyframes equipGlow {
            0%, 100% { filter: drop-shadow(0 0 3px rgba(96,165,250,0.4)); }
            50% { filter: drop-shadow(0 0 8px rgba(96,165,250,0.8)); }
        }
        body.dark-mode .lab-glow { animation: equipGlow 3s ease-in-out infinite; }
        
        
        /* TIERED UPGRADES (Cookie Clicker style) */
        #upgradesPanel {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            min-height: 2.5rem;
            margin-bottom: 0.75rem;
        }
        .tier-upgrade {
            width: 48px; height: 48px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            position: relative;
            transition: all 0.15s ease;
            border: 2px solid;
        }
        .tier-upgrade:hover {
            transform: scale(1.12);
            z-index: 2;
        }
        .tier-upgrade.purchased {
            opacity: 0.4;
            pointer-events: none;
        }
        .tier-upgrade.locked {
            opacity: 0.25;
            cursor: not-allowed;
            filter: grayscale(0.8);
        }
        .tier-upgrade.affordable {
            animation: tierPulse 1.5s ease-in-out infinite;
        }
        @keyframes tierPulse {
            0%, 100% { box-shadow: 0 0 4px rgba(255,255,255,0.2); }
            50% { box-shadow: 0 0 12px rgba(255,255,255,0.5); }
        }
        /* Tier colors */
        .tier-bronze   { background: linear-gradient(135deg, #92400e, #b45309); border-color: #d97706; }
        .tier-silver   { background: linear-gradient(135deg, #6b7280, #9ca3af); border-color: #d1d5db; }
        .tier-gold     { background: linear-gradient(135deg, #b45309, #f59e0b); border-color: #fbbf24; }
        .tier-diamond  { background: linear-gradient(135deg, #0891b2, #67e8f9); border-color: #a5f3fc; }
        .tier-amethyst { background: linear-gradient(135deg, #7c3aed, #c084fc); border-color: #ddd6fe; }
        /* Tooltip */
        .tier-tooltip {
            display: none;
            position: absolute;
            top: 56px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15,23,42,0.95);
            border: 1px solid rgba(148,163,184,0.3);
            border-radius: 8px;
            padding: 8px 10px;
            width: 180px;
            z-index: 100;
            font-size: 0.65rem;
            color: #e2e8f0;
            text-align: center;
            pointer-events: none;
            font-family: sans-serif;
        }
        .tier-upgrade:hover .tier-tooltip { display: block; }
        .tier-tooltip .tt-name { font-weight: 700; margin-bottom: 3px; font-size: 0.7rem; }
        .tier-tooltip .tt-cost { color: #fbbf24; }
        .tier-tooltip .tt-effect { color: #86efac; margin-top: 2px; }
        .tier-tooltip .tt-status { color: #f87171; margin-top: 2px; }

        @media (max-width: 1200px) {
            #game-sidebar { width: 300px; padding: 1rem; }
            #giant-clicker { width: 250px; height: 250px; font-size: 100px; }
        }

        @media (max-width: 768px) {
            .flex { flex-direction: column; height: auto; }
            #game-sidebar { width: 100%; height: auto; max-height: 300px; max-width: none; }
            #game-wrapper { height: auto; padding: 0.5rem; flex: 0 0 auto; width: auto; min-width: 0; max-width: 100%; }
            #giant-clicker { width: 200px; height: 200px; font-size: 80px; margin: 1rem 0; }
            .stats-panel { max-width: 100%; width: 100%; }
            #game-session-timer { max-width: 100%; }
        }
    </style>
    <script src="../theme_manager.js"></script>
    <style>
        #pause-screen.hidden { display: none !important; }
        #pause-screen:not(.hidden) { display: flex !important; }
    </style>
    <style>
        #start-screen.hidden { display: none !important; }
    </style>
    <style>
        #game-over.hidden { display: none !important; }
    </style>
</head>
<body class="dark-mode bg-gray-900 min-h-screen text-white">
<script src="../scripts/taskbar.js"></script>
<script src="../scripts/global_translations.js?v=8.0"></script>

<div class="flex">

    <!-- LEFT SIDE - MAIN GAME AREA -->
    <div id="game-wrapper" class="relative">
        <div>
            <h1 class="text-2xl font-bold bg-gradient-to-r from-amber-400 to-orange-500 bg-clip-text text-transparent text-center">⚛️ PARTICLE CLICKER</h1>

            <!-- STATS PANEL -->
            <div class="stats-panel">
                <div class="particle-count-display" id="particleCount">0</div>
                <div style="color: #c0cfd9; margin-bottom: 0.75rem;">✨ Particles</div>
                <div class="per-second-display">
                    Per second: <span id="perSecond" style="color: #86efac; font-weight: bold;">0</span> ✨/s
                </div>
                <div id="prestigeMultDisplay" style="color: #c084fc; font-size: 0.8rem; margin-top: 0.5rem; display: none;">
                    🌟 Prestige: <span id="prestigeMultText">1×</span>
                </div>
            </div>

            <!-- GIANT CLICKER BUTTON -->
            <button id="giant-clicker" onclick="clickParticle()" title="Click for particles">
                <svg width="100%" height="100%" viewBox="0 0 200 200" style="filter: drop-shadow(0 0 30px rgba(139, 92, 246, 0.8)) drop-shadow(0 0 50px rgba(96, 165, 250, 0.5))">
                    <defs>
                        <radialGradient id="quarkGrad" cx="40%" cy="40%">
                            <stop offset="0%" style="stop-color:#e0e7ff;stop-opacity:1" />
                            <stop offset="35%" style="stop-color:#a78bfa;stop-opacity:1" />
                            <stop offset="70%" style="stop-color:#7c3aed;stop-opacity:0.9" />
                            <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:0.8" />
                        </radialGradient>
                        <filter id="quarkGlow">
                            <feGaussianBlur stdDeviation="3" result="blur"/>
                            <feMerge>
                                <feMergeNode in="blur"/>
                                <feMergeNode in="blur"/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                    </defs>

                    <!-- Orbital ring 1 -->
                    <ellipse cx="100" cy="100" rx="85" ry="30" fill="none" stroke="rgba(167,139,250,0.35)" stroke-width="1.5" transform="rotate(-30 100 100)"/>
                    <!-- Orbital ring 2 -->
                    <ellipse cx="100" cy="100" rx="85" ry="30" fill="none" stroke="rgba(96,165,250,0.3)" stroke-width="1.5" transform="rotate(30 100 100)"/>
                    <!-- Orbital ring 3 -->
                    <ellipse cx="100" cy="100" rx="85" ry="30" fill="none" stroke="rgba(192,132,252,0.25)" stroke-width="1.5" transform="rotate(90 100 100)"/>

                    <!-- Core quark sphere -->
                    <circle cx="100" cy="100" r="38" fill="url(#quarkGrad)" filter="url(#quarkGlow)"/>

                    <!-- Highlight -->
                    <circle cx="88" cy="88" r="14" fill="white" opacity="0.25"/>
                    <circle cx="92" cy="84" r="6" fill="white" opacity="0.15"/>

                    <!-- Orbiting particles -->
                    <circle cx="28" cy="68" r="5" fill="#60a5fa" opacity="0.9"/>
                    <circle cx="172" cy="132" r="5" fill="#c084fc" opacity="0.9"/>
                    <circle cx="100" cy="15" r="4" fill="#a78bfa" opacity="0.8"/>
                </svg>
            </button>

            <!-- SESSION TIMER -->
            <div id="start-screen" class="fixed inset-0 bg-black z-50 text-center p-6" style="display:flex;flex-direction:column;align-items:center;justify-content:center;">
                <h2 class="text-3xl amber-400 font-bold mb-3">⚛️ PARTICLE CLICKER</h2>
                <p class="text-gray-300 mb-4 font-sans text-sm">Build your empire!</p>
                <div class="text-left text-xs text-gray-400 font-sans mb-6 space-y-1">
                    <p><span class="font-bold">Click</span> — Tap particles</p><p><span class="font-bold">Touch</span> — Tap (mobile)</p>
                </div>
                <div id="save-indicator" class="text-emerald-400 text-xs mb-3 font-sans" style="display:none;">💾 Save detected — progress will be restored</div>
                <button onclick="startGame()" class="bg-amber-600 hover:bg-amber-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transform transition active:scale-95">
                    START
                </button>
            </div>

            <div id="pause-screen" class="hidden absolute inset-0 bg-black/80 rounded-lg z-30 text-center p-6 backdrop-blur-sm" style="flex-direction:column;align-items:center;justify-content:center;top:50%;left:50%;transform:translate(-50%,-50%);width:90%;max-width:400px;height:auto;">
                <h2 class="text-4xl text-white font-bold mb-4">PAUSED</h2>
                <button onclick="togglePause()" class="bg-amber-600 hover:bg-amber-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transform transition active:scale-95">
                    RESUME
                </button>
            </div>
        </div>
    </div>

    <!-- MIDDLE - LAB SCENE BACKGROUND -->
    <div id="lab-scene">
        <div id="lab-bubbles"></div>
        <div class="lab-svg-container">
            <svg viewBox="0 0 520 520" xmlns="http://www.w3.org/2000/svg">
                <!-- Wall & Floor -->
                <rect class="lab-wall" x="0" y="0" width="520" height="380"/>
                <rect class="lab-floor" x="0" y="380" width="520" height="140"/>
                <!-- Floor tiles -->
                <line x1="0" y1="380" x2="520" y2="380" stroke="#94a3b8" stroke-width="2" opacity="0.4"/>
                <line x1="65" y1="380" x2="65" y2="520" stroke="#94a3b8" stroke-width="0.5" opacity="0.2"/>
                <line x1="130" y1="380" x2="130" y2="520" stroke="#94a3b8" stroke-width="0.5" opacity="0.2"/>
                <line x1="195" y1="380" x2="195" y2="520" stroke="#94a3b8" stroke-width="0.5" opacity="0.2"/>
                <line x1="260" y1="380" x2="260" y2="520" stroke="#94a3b8" stroke-width="0.5" opacity="0.2"/>
                <line x1="325" y1="380" x2="325" y2="520" stroke="#94a3b8" stroke-width="0.5" opacity="0.2"/>
                <line x1="390" y1="380" x2="390" y2="520" stroke="#94a3b8" stroke-width="0.5" opacity="0.2"/>
                <line x1="455" y1="380" x2="455" y2="520" stroke="#94a3b8" stroke-width="0.5" opacity="0.2"/>

                <!-- Lab bench -->
                <rect class="lab-bench" x="30" y="300" width="460" height="80" rx="3"/>
                <rect class="lab-bench-top" x="25" y="290" width="470" height="16" rx="4"/>
                <!-- Bench legs -->
                <rect class="lab-bench" x="50" y="380" width="16" height="60" rx="2"/>
                <rect class="lab-bench" x="454" y="380" width="16" height="60" rx="2"/>
                <rect class="lab-bench" x="248" y="380" width="16" height="60" rx="2"/>
                <!-- Cabinet doors -->
                <rect class="lab-cabinet" x="60" y="310" width="80" height="65" rx="3" stroke-width="1.5"/>
                <rect class="lab-cabinet-handle" x="130" y="335" width="6" height="16" rx="2"/>
                <rect class="lab-cabinet" x="160" y="310" width="80" height="65" rx="3" stroke-width="1.5"/>
                <rect class="lab-cabinet-handle" x="230" y="335" width="6" height="16" rx="2"/>
                <rect class="lab-cabinet" x="280" y="310" width="80" height="65" rx="3" stroke-width="1.5"/>
                <rect class="lab-cabinet-handle" x="350" y="335" width="6" height="16" rx="2"/>
                <rect class="lab-cabinet" x="380" y="310" width="80" height="65" rx="3" stroke-width="1.5"/>
                <rect class="lab-cabinet-handle" x="400" y="335" width="6" height="16" rx="2"/>

                <!-- Shelf 1 (upper) -->
                <rect class="lab-shelf" x="40" y="100" width="200" height="8" rx="2"/>
                <rect class="lab-shelf-bracket" x="60" y="108" width="6" height="20" rx="1"/>
                <rect class="lab-shelf-bracket" x="210" y="108" width="6" height="20" rx="1"/>

                <!-- Shelf 2 (upper right) -->
                <rect class="lab-shelf" x="310" y="80" width="170" height="8" rx="2"/>
                <rect class="lab-shelf-bracket" x="330" y="88" width="6" height="20" rx="1"/>
                <rect class="lab-shelf-bracket" x="455" y="88" width="6" height="20" rx="1"/>

                <!-- ===== EQUIPMENT ON BENCH ===== -->

                <!-- Erlenmeyer Flask (left) with green liquid - shows with centrifuge -->
                <g id="equip-centrifuge" class="lab-glow" transform="translate(80, 220)" style="display:none">
                    <!-- Flask body -->
                    <polygon points="30,0 45,55 55,70 5,70 15,55" fill="none" stroke="#64748b" stroke-width="2"/>
                    <!-- Neck -->
                    <rect x="26" y="-15" width="8" height="18" fill="none" stroke="#64748b" stroke-width="2" rx="1"/>
                    <!-- Liquid -->
                    <polygon points="18,45 42,45 50,70 10,70" fill="#4ade80" opacity="0.6"/>

    <script>
        // ====== NUMBER FORMATTING ======
        function formatNum(n) {
            if (n < 0) return '-' + formatNum(-n);
            if (n < 1000) return Math.floor(n).toString();
            const suffixes = ['', 'K', 'M', 'B', 'T', 'Qa', 'Qi', 'Sx', 'Sp', 'Oc'];
            const tier = Math.floor(Math.log10(n) / 3);
            if (tier >= suffixes.length) return n.toExponential(2);
            const scale = Math.pow(10, tier * 3);
            const scaled = n / scale;
            return (scaled < 10 ? scaled.toFixed(2) : scaled < 100 ? scaled.toFixed(1) : Math.floor(scaled)) + suffixes[tier];
        }

        // ====== PRESTIGE SYSTEM ======
        const PRESTIGE_TIERS = [

        function getPrestigeMultiplier() {
            if (prestigeLevel <= 0) return 1;
            return PRESTIGE_TIERS[prestigeLevel - 1].multiplier;
        }

        function getNextPrestige() {
            if (prestigeLevel >= PRESTIGE_TIERS.length) return null;
            return PRESTIGE_TIERS[prestigeLevel];
        }

        function canPrestige() {
            const next = getNextPrestige();
            return next && gameState.score >= next.threshold;
        }

            const next = getNextPrestige();
            if (!next || gameState.score < next.threshold) return;
            if (!confirm(`🌟 ${next.name}\n\nThis will reset your particles, buildings, and tier upgrades.\nYou'll gain a permanent ${next.multiplier}× global multiplier!\n\nPrestige now?`)) return;

            prestigeLevel++;

            // Reset game state but keep prestige
            gameState.particles = 0;
            gameState.score = 0;
            gameState.perSecond = 0;
            gameState.playtime = 0;
            purchasedTierUpgrades = {};
            for (const key in gameState.upgrades) {
                const u = gameState.upgrades[key];
                u.count = 0;
                u.cost = u.base_cost;
                u.unlocked = key === 'microscope';
            }
            for (const k in gameState.achievements) gameState.achievements[k] = false;

            // Refresh everything
            gameState.perSecond = calculatePerSecond();
            updateDisplay();
            checkUnlocks();
            renderShop();
            updateLabScene();
            renderTierUpgrades();
            renderPrestigePanel();

        // Track purchased tier upgrades
        let purchasedTierUpgrades = {};

        function getProductionMultiplier(buildingKey) {
            let mult = 1;
            for (const u of tierUpgrades) {
                if (u.building === buildingKey && purchasedTierUpgrades[u.id]) {
                    mult *= u.multiplier;
                }
            }
            return mult;
        }

        function buyTierUpgrade(id) {
            const u = tierUpgrades.find(x => x.id === id);
            if (!u || purchasedTierUpgrades[u.id]) return;
            if (gameState.particles < u.cost) {
                showNotification(`Need ${formatNum(Math.ceil(u.cost - gameState.particles))} more ✨`);
                return;
            }
            // Must own at least 1 of the building
            if (gameState.upgrades[u.building].count < 1) {
                showNotification(`Buy a ${gameState.upgrades[u.building].name} first!`);
                return;
            }
            gameState.particles -= u.cost;
            purchasedTierUpgrades[u.id] = true;
            gameState.perSecond = calculatePerSecond();
            updateDisplay();
            renderTierUpgrades();
            renderShop();
            showNotification(`⬆️ ${TIER_NAMES[u.tier]}: ${u.name}!`);
        }

        function renderTierUpgrades() {
            const panel = document.getElementById('upgradesPanel');
            if (!panel) return;
            panel.innerHTML = '';
            const tiers = ['bronze', 'silver', 'gold', 'diamond', 'amethyst'];
            // One slot per building: show only the next unpurchased tier
            const buildings = Object.keys(gameState.upgrades);
            const visible = [];
            for (const bKey of buildings) {
                const bld = gameState.upgrades[bKey];
                if (!bld.unlocked) continue;
                // Find the first unpurchased tier for this building
                for (const tier of tiers) {
                    const u = tierUpgrades.find(x => x.building === bKey && x.tier === tier);
                    if (u && !purchasedTierUpgrades[u.id]) {
                        visible.push(u);
                        break;
                    }
                }
            }

            for (const u of visible) {
                const isPurchased = purchasedTierUpgrades[u.id];
                const canAfford = gameState.particles >= u.cost;
                const hasBuilding = gameState.upgrades[u.building].count >= 1;
                const isLocked = !hasBuilding;

                const div = document.createElement('div');
                div.className = `tier-upgrade ${TIER_COLORS[u.tier]}`;
                if (isPurchased) div.classList.add('purchased');
                else if (isLocked) div.classList.add('locked');
                else if (canAfford) div.classList.add('affordable');
                div.innerHTML = `${u.icon}
                    <div class="tier-tooltip">
                        <div class="tt-name">${u.name}</div>
                        <div>${u.desc}</div>
                        ${isPurchased ? '<div class="tt-effect">✅ Purchased</div>' :
                          `<div class="tt-cost">Cost: ${formatNum(u.cost)} ✨</div>
                           ${isLocked ? '<div class="tt-status">Need 1 ' + gameState.upgrades[u.building].name + '</div>' : ''}`}

            const mult = getPrestigeMultiplier();
            gameState.particles += 1 * mult;
            gameState.score += 1 * mult;
            updateDisplay();
        }

        function calculatePerSecond() {
            let perSecond = 0;
            const pMult = getPrestigeMultiplier();
            for (const key in gameState.upgrades) {
                const upgrade = gameState.upgrades[key];
                if (upgrade.unlocked) {
                    perSecond += upgrade.count * upgrade.production * getProductionMultiplier(key) * pMult;
                }
            }
            return perSecond;
        }

        function checkUnlocks() {
            for (const key in gameState.upgrades) {
                const upgrade = gameState.upgrades[key];
                if (!upgrade.unlocked && upgrade.unlocksAt && gameState.particles >= upgrade.unlocksAt) {
                    upgrade.unlocked = true;
                    showNotification(`🔓 Unlocked: ${upgrade.name}!`);
                }

            if (gameState.particles >= 1 && !gameState.achievements.firstParticle) {

                showNotification('📜 Achievement: First Particle!');

                showNotification('🧪 Achievement: Thousand Particles!');

            if (gameState.particles >= 1000000 && !gameState.achievements.millionaire) {

                showNotification('💰 Achievement: Particle Millionaire!');

            const upgrade = gameState.upgrades[upgradeKey];
            if (!upgrade.unlocked) {

                return;
            }
            if (gameState.particles >= upgrade.cost) {
                gameState.particles -= upgrade.cost;
                upgrade.count++;
                upgrade.cost = Math.ceil(upgrade.base_cost * Math.pow(1.15, upgrade.count));
                gameState.perSecond = calculatePerSecond();
                gameState.score += upgrade.production * 10;
                checkUnlocks();
                updateDisplay();
                renderShop();
                updateLabScene();
                renderTierUpgrades();
                showNotification(`Bought ${upgrade.name}!`);

            let highest = -1;
            for (const u of tierUpgrades) {
                if (u.building === buildingKey && purchasedTierUpgrades[u.id]) {
                    const idx = TIER_ORDER.indexOf(u.tier);
                    if (idx > highest) highest = idx;

            return highest >= 0 ? TIER_TEXT_COLORS[TIER_ORDER[highest]] : '#fbbf24';

            for (const [key, upgrade] of Object.entries(gameState.upgrades)) {
                const canAfford = gameState.particles >= upgrade.cost;
                const isLocked = !upgrade.unlocked;
                const effectiveProd = upgrade.production * getProductionMultiplier(key);

        }

        function gameLoop() {
            if (!arcadeState.gamePaused) {
                // Passive income
                gameState.particles += gameState.perSecond / 60; // 60 FPS
                gameState.score += gameState.perSecond / 60;
                gameState.playtime++;
                
                updateDisplay();
                
                // Check unlocks every half second
                if (gameState.playtime % 30 === 0) {
                    checkUnlocks();
                    renderTierUpgrades();
                    renderPrestigePanel();
                }
            }

            arcadeState.animFrame = requestAnimationFrame(gameLoop);
        }
        
        function togglePause() {
            const pauseScreen = document.getElementById('pause-screen');
            console.log('togglePause called');
            
            if (pauseScreen) {
                pauseScreen.classList.toggle('hidden');
                
                if (pauseScreen.classList.contains('hidden')) {
                    // Game is running (pause screen hidden)
                    if (window.arcadeState) {
                        window.arcadeState.gamePaused = false;
                    }
                    console.log('Game resumed');
                } else {
                    // Game is paused (pause screen visible)
                    if (window.arcadeState) {
                        window.arcadeState.gamePaused = true;
                    }
                    console.log('Game paused');
                }
            } else {
                console.error('pause-screen element not found');
            }
        }


        async function exitGame() {
            const user = await getUser();
            if (user) {
                const tokensEarned = Math.floor(gameState.score / 50);
                await updateUserPoints(user.id, tokensEarned);
                
                setTimeout(() => {
                    window.history.back();
                }, 1000);
            }
        }

        // Initialize - deferred until user clicks START
        // (async function() {
        //     if (!await initializeArcadeGame('⚛️ PARTICLE CLICKER', 'from-amber-400', 'to-orange-500')) return;
        //     updateDisplay();
        //     checkUnlocks();
        //     renderShop();
        //     gameLoop();
        
        // Generate floating lab bubbles
        function generateLabBubbles() {
            const container = document.getElementById('lab-bubbles');
            const bubbleCount = 20;
            for (let i = 0; i < bubbleCount; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'lab-bubble';
                const size = Math.random() * 12 + 4;
                bubble.style.width = size + 'px';
                bubble.style.height = size + 'px';
                bubble.style.left = Math.random() * 90 + 5 + '%';
                bubble.style.bottom = '-20px';
                bubble.style.animationDuration = (Math.random() * 6 + 5) + 's';
                bubble.style.animationDelay = (Math.random() * 8) + 's';
                container.appendChild(bubble);
            }
        }
        
        // Initialize lab bubbles on page load
        generateLabBubbles();

        // ====== SAVE / LOAD SYSTEM ======
        const SAVE_KEY = 'particleClicker_save_v2';

        function saveGame() {
            const saveData = {
                particles: gameState.particles,
                score: gameState.score,
                playtime: gameState.playtime,
                upgrades: {},
                achievements: { ...gameState.achievements },
                tierUpgrades: { ...purchasedTierUpgrades },
                prestigeLevel: prestigeLevel,
                savedAt: Date.now()
            };
            for (const key in gameState.upgrades) {
                const u = gameState.upgrades[key];
                saveData.upgrades[key] = { count: u.count, cost: u.cost, unlocked: u.unlocked };
            }
            localStorage.setItem(SAVE_KEY, JSON.stringify(saveData));
        }

        function loadGame() {
            const raw = localStorage.getItem(SAVE_KEY);
            if (!raw) return false;
            try {
                const d = JSON.parse(raw);
                gameState.particles = d.particles || 0;
                gameState.score = d.score || 0;
                gameState.playtime = d.playtime || 0;
                if (d.achievements) Object.assign(gameState.achievements, d.achievements);
                if (d.tierUpgrades) purchasedTierUpgrades = d.tierUpgrades;
                if (d.prestigeLevel !== undefined) prestigeLevel = d.prestigeLevel;
                if (d.upgrades) {
                    for (const key in d.upgrades) {
                        if (gameState.upgrades[key]) {
                            gameState.upgrades[key].count = d.upgrades[key].count || 0;
                            gameState.upgrades[key].cost = d.upgrades[key].cost || gameState.upgrades[key].base_cost;
                            gameState.upgrades[key].unlocked = d.upgrades[key].unlocked || false;
                        }
                    }
                }
                // Calculate offline earnings
                if (d.savedAt) {
                    const elapsed = (Date.now() - d.savedAt) / 1000; // seconds
                    const perSec = calculatePerSecond();
                    if (perSec > 0 && elapsed > 5) {
                        const maxOffline = 3600; // cap at 1 hour
                        const offlineSec = Math.min(elapsed, maxOffline);
                        const earned = Math.floor(perSec * offlineSec);
                        gameState.particles += earned;
                        gameState.score += earned;
                        setTimeout(() => showNotification(`⏰ Offline: +${formatNum(earned)} ✨ (${Math.floor(offlineSec / 60)}m)`), 500);
                    }
                }
                gameState.perSecond = calculatePerSecond();
                return true;
            } catch(e) { return false; }
        }

        // Auto-save every 30 seconds
        setInterval(saveGame, 30000);
        // Save on page exit
        window.addEventListener('beforeunload', saveGame);

        // Show save indicator on start screen
        if (localStorage.getItem(SAVE_KEY)) {
            const ind = document.getElementById('save-indicator');
            if (ind) ind.style.display = 'block';
        }

        // ====== FIREBASE CLOUD SAVE ======
        const FB_CFG = {
            projectId: "arisedu-1bb22",
            apiKey: "AIzaSyCOauFIB0fu4BSbHBeBo_8dwR3F1Fct5IM"
        };
        const FIREBASE_SAVE_KEY = 'particleClicker_save_v2';

        function updateSaveStatus(msg, ok = true) {
            const el = document.getElementById('save-status');
            if (el) { el.textContent = msg; el.style.color = ok ? '#4ade80' : '#f87171'; }
            if (ok) setTimeout(() => { if (el) { el.textContent = 'Auto-saves every 30s'; el.style.color = '#6b7280'; } }, 4000);
        }

        function getSavePayload() {
            const saveData = {
                particles: gameState.particles,
                score: gameState.score,
                playtime: gameState.playtime,
                upgrades: {},
                achievements: { ...gameState.achievements },
                tierUpgrades: { ...purchasedTierUpgrades },
                prestigeLevel: prestigeLevel,
                savedAt: Date.now()
            };
            for (const key in gameState.upgrades) {
                const u = gameState.upgrades[key];
                saveData.upgrades[key] = { count: u.count, cost: u.cost, unlocked: u.unlocked };
            }
            return saveData;
        }

        async function saveToCloud() {
            try {
                updateSaveStatus('Saving to cloud...', true);
                saveGame(); // also save locally
                const userId = getCurrentUserId();
                const payload = JSON.stringify(getSavePayload());
                const docPath = `game_saves/${userId}/saves/${FIREBASE_SAVE_KEY}`;
                const url = `https://firestore.googleapis.com/v1/projects/${FB_CFG.projectId}/databases/(default)/documents/${docPath}?key=${FB_CFG.apiKey}`;
                const response = await fetch(url, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fields: { data: { stringValue: payload }, timestamp: { stringValue: new Date().toISOString() }, userId: { stringValue: userId } } })
                });
                if (response.ok) {
                    updateSaveStatus('☁️ Saved to cloud!');
                } else {
                    updateSaveStatus('Cloud save failed', false);
                }
            } catch(e) { updateSaveStatus('Cloud save error', false); }
        }

        async function loadFromCloud() {
            try {
                updateSaveStatus('Loading from cloud...', true);
                const userId = getCurrentUserId();
                const docPath = `game_saves/${userId}/saves/${FIREBASE_SAVE_KEY}`;
                const url = `https://firestore.googleapis.com/v1/projects/${FB_CFG.projectId}/databases/(default)/documents/${docPath}?key=${FB_CFG.apiKey}`;
                const response = await fetch(url);
                if (!response.ok) { updateSaveStatus('No cloud save found', false); return; }
                const doc = await response.json();
                if (!doc.fields || !doc.fields.data) { updateSaveStatus('No cloud save found', false); return; }
                const data = JSON.parse(doc.fields.data.stringValue);
                applyLoadedData(data);
                localStorage.setItem(SAVE_KEY, JSON.stringify(data));
                updateSaveStatus('☁️ Loaded from cloud!');
            } catch(e) { updateSaveStatus('Cloud load failed', false); }
        }

        function applyLoadedData(d) {
            gameState.particles = d.particles || 0;
            gameState.score = d.score || 0;
            gameState.playtime = d.playtime || 0;
            if (d.achievements) Object.assign(gameState.achievements, d.achievements);
            if (d.tierUpgrades) purchasedTierUpgrades = d.tierUpgrades;
            if (d.prestigeLevel !== undefined) prestigeLevel = d.prestigeLevel;
            if (d.upgrades) {
                for (const key in d.upgrades) {
                    if (gameState.upgrades[key]) {
                        gameState.upgrades[key].count = d.upgrades[key].count || 0;
                        gameState.upgrades[key].cost = d.upgrades[key].cost || gameState.upgrades[key].base_cost;
                        gameState.upgrades[key].unlocked = d.upgrades[key].unlocked || false;
                    }
                }
            }
            gameState.perSecond = calculatePerSecond();
            updateDisplay();
            checkUnlocks();
            renderShop();
            updateLabScene();
            renderTierUpgrades();
            renderPrestigePanel();
        }

        // ====== EXPORT / IMPORT SAVE CODE ======
        function exportSave() {
            saveGame();
            const raw = localStorage.getItem(SAVE_KEY);
            if (!raw) { updateSaveStatus('Nothing to export', false); return; }
            const code = btoa(raw);
            // Copy to clipboard
            navigator.clipboard.writeText(code).then(() => {
                updateSaveStatus('📋 Save code copied to clipboard!');
            }).catch(() => {
                // Fallback: show prompt
                prompt('Copy this save code:', code);
                updateSaveStatus('📋 Save code ready');
            });
        }

        function importSave() {
            const code = prompt('Paste your save code:');
            if (!code || !code.trim()) return;
            try {
                const raw = atob(code.trim());
                const data = JSON.parse(raw);
                if (data.particles === undefined && data.score === undefined) {
                    updateSaveStatus('Invalid save code', false);
                    return;
                }
                applyLoadedData(data);
                localStorage.setItem(SAVE_KEY, raw);
                updateSaveStatus('📥 Save imported!');
            } catch(e) {
                updateSaveStatus('Invalid save code', false);
            }
        }

    async function startGame() {
        if (!await initializeArcadeGame('⚛️ PARTICLE CLICKER', 'from-amber-400', 'to-orange-500')) return;
        document.getElementById('start-screen').style.display = 'none';
        loadGame();
        updateDisplay();
        checkUnlocks();
        renderShop();
        updateLabScene();
        renderTierUpgrades();
        renderPrestigePanel();
        gameLoop();
    }
    
    </script>
