<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Empire - Arcade</title>
    <script src="../scripts/arcade-core.js"></script>
    <script src="../firebase-utils.js"></script>
    <style>
        #game-session-timer {
            font-size: 2.5rem !important;
            font-weight: 700 !important;
        }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/main.css">
        <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; }
        body { 
            font-family: 'Orbitron', monospace; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        body > .flex { 
            display: flex !important; 
            flex-direction: row !important; 
            overflow: hidden; 
            height: 100vh; 
            gap: 1rem; 
            padding: 1rem; 
        }

        /* LEFT SIDEBAR - UPGRADES MENU */
        #game-sidebar {
            background: rgba(55, 65, 81, 0.98);
            border-radius: 1rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            justify-content: flex-start;
            width: 380px;
            height: 100%;
            border: 2px solid rgba(107, 114, 128, 0.9);
            box-shadow: 0 20px 45px rgba(0,0,0,0.6);
            overflow-y: auto;
            flex-shrink: 0;
            margin-left: auto;
        }

        #game-sidebar > div:first-child {
            width: 100%;
            text-align: center;
            color: #9ca3af;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            font-weight: 600;
        }

        #shopContainer {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .upgrade {
            background: rgba(107, 114, 128, 0.6);
            border: 2px solid rgba(156, 163, 175, 0.5);
            border-radius: 0.75rem;
            padding: 1rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            font-family: 'Orbitron', monospace;
            font-size: 0.85rem;
        }

        .upgrade:hover {
            background: rgba(107, 114, 128, 0.95);
            border-color: rgba(251, 191, 36, 0.8);
            transform: translateX(2px);
        }

        .upgrade:active {
            transform: translateX(0px) scale(0.98);
        }

        .upgrade-name {
            font-weight: bold;
            color: #fbbf24;
            margin-bottom: 0.25rem;
            font-size: 0.9rem;
        }

        .upgrade-cost {
            color: #f87171;
            font-size: 0.8rem;
            margin-bottom: 0.25rem;
        }

        .upgrade-effect {
            color: #60a5fa;
            font-size: 0.8rem;
            margin-bottom: 0.25rem;
        }

        .upgrade-count {
            color: #86efac;
            font-size: 0.75rem;
        }

        /* LEFT SIDE - MAIN GAME AREA */
        #game-wrapper { 
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            width: auto;
            min-width: 0;
            max-width: 100%;
            margin: 0;
            margin-left: 2rem;
            overflow: visible;
            padding: 0;
            background: transparent;
            border: none;
            box-shadow: none;
        }

        #game-wrapper > div:first-child {
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            gap: 1rem;
        }

        /* HEADER */
        #game-wrapper > div:first-child > h1 {
            align-self: center;
            margin-bottom: 0;
            font-size: 1.5rem;
        }

        /* STATS PANEL */
        .stats-panel {
            background: rgba(55, 65, 81, 0.95);
            border: 2px solid rgba(107, 114, 128, 0.9);
            border-radius: 1rem;
            padding: 1.5rem;
            text-align: center;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .particle-count-display {
            font-size: 2.5rem;
            font-weight: bold;
            color: #fbbf24;
            margin-bottom: 0.5rem;
        }

        .per-second-display {
            font-size: 1rem;
            color: #86efac;
        }

        /* GIANT CLICKER BUTTON */
        #giant-clicker {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 0 40px rgba(251, 191, 36, 0.6), inset 0 0 20px rgba(255, 255, 255, 0.1);
            border: 4px solid rgba(251, 191, 36, 0.4);
            background: radial-gradient(circle at 30% 30%, rgba(255, 200, 0, 0.3), rgba(255, 150, 0, 0.1));
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin: 2rem 0;
            font-weight: 700;
            color: white;
            padding: 0;
            overflow: visible;
        }

        #giant-clicker:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(251, 191, 36, 0.8), inset 0 0 20px rgba(255, 255, 255, 0.2);
        }

        #giant-clicker:active {
            transform: scale(0.95);
            box-shadow: 0 0 30px rgba(251, 191, 36, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.1);
        }

        #game-session-timer {
            background: rgba(34, 197, 94, 0.95);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 700;
            font-size: 2rem;
            font-family: monospace;
            width: 100%;
            max-width: 400px;
            text-align: center;
            letter-spacing: 2px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        #game-session-timer.warning {
            background: rgba(239, 68, 68, 0.95);
            animation: pulse 1s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        .pause-btn { 
            position: absolute; 
            bottom: 0.75rem; 
            left: 0.75rem; 
            z-index: 50; 
            background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 0.75rem; 
            color: white; 
            cursor: pointer; 
            padding: 8px; 
            line-height: 0; 
            transition: background 0.2s, transform 0.2s; 
        }
        .pause-btn:hover { 
            background: rgba(255,255,255,0.25); 
            transform: scale(1.1); 
        }
        
        /* SOLAR SYSTEM BACKGROUND */
        #solar-system {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: 
                radial-gradient(ellipse 200% 200% at 40% 40%, rgba(80,20,120,0.3) 0%, rgba(30,10,80,0.2) 25%, transparent 50%),
                radial-gradient(ellipse 150% 150% at 70% 60%, rgba(20,80,120,0.25) 0%, transparent 40%),
                radial-gradient(ellipse 180% 100% at 50% 50%, rgba(15,10,40,0.8) 0%, rgba(5,2,15,0.95) 100%);
            border-radius: 1rem;
            overflow: hidden;
            min-width: 0;
        }
        
        /* Starfield */
        #starfield {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        .star {
            position: absolute;
            border-radius: 50%;
            background: white;
            animation: twinkle 3s infinite;
            box-shadow: 0 0 2px 0.5px rgba(255, 255, 255, 0.6);
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }
        
        .solar-system-container {
            position: relative;
            width: 520px;
            height: 520px;
            z-index: 5;
        }
        
        /* Sun - Much Enhanced */
        .sun {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: radial-gradient(circle at 30% 30%, #FFFACD, #FFD700, #FFA500, #FF8C00);
            border-radius: 50%;
            box-shadow: 
                0 0 20px rgba(255, 215, 0, 1),
                0 0 40px rgba(255, 165, 0, 0.9),
                0 0 80px rgba(255, 140, 0, 0.7),
                0 0 120px rgba(255, 100, 0, 0.4),
                inset -3px -3px 10px rgba(0, 0, 0, 0.3),
                inset 3px 3px 10px rgba(255, 255, 150, 0.2);
            z-index: 10;
            animation: sunPulse 4s ease-in-out infinite;
        }
        
        @keyframes sunPulse {
            0%, 100% { 
                box-shadow: 
                    0 0 20px rgba(255, 215, 0, 1),
                    0 0 40px rgba(255, 165, 0, 0.9),
                    0 0 80px rgba(255, 140, 0, 0.7),
                    0 0 120px rgba(255, 100, 0, 0.4),
                    inset -3px -3px 10px rgba(0, 0, 0, 0.3),
                    inset 3px 3px 10px rgba(255, 255, 150, 0.2);
            }
            50% { 
                box-shadow: 
                    0 0 30px rgba(255, 215, 0, 1),
                    0 0 60px rgba(255, 165, 0, 1),
                    0 0 100px rgba(255, 140, 0, 0.8),
                    0 0 150px rgba(255, 100, 0, 0.5),
                    inset -3px -3px 10px rgba(0, 0, 0, 0.3),
                    inset 3px 3px 10px rgba(255, 255, 150, 0.2);
            }
        }
        
        /* Orbit paths - More visible */
        .orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid rgba(100, 200, 255, 0.2);
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(100, 200, 255, 0.15);
        }
        
        .orbit-1 { width: 140px; height: 140px; }
        .orbit-2 { width: 220px; height: 220px; }
        .orbit-3 { width: 300px; height: 300px; }
        .orbit-4 { width: 380px; height: 380px; }
        
        /* Planets - Highly Realistic */
        .planet {
            position: absolute;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            filter: drop-shadow(0 0 8px rgba(0, 0, 0, 0.8));
        }
        
        /* Mercury - Small rocky planet */
        .planet-1 {
            width: 20px;
            height: 20px;
            background: radial-gradient(circle at 35% 35%, #B8860B, #8B5A2B, #5C3D2E);
            box-shadow: 
                0 0 16px rgba(139, 69, 19, 0.8),
                inset -2px -2px 4px rgba(0, 0, 0, 0.6),
                inset 2px 2px 4px rgba(184, 134, 11, 0.2);
            animation: orbit1 8s linear infinite;
            transform: translate(-50%, -50%);
        }
        
        .planet-1::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 28px;
            height: 5px;
            border: 1px solid rgba(139, 69, 19, 0.25);
            border-radius: 50%;
            box-shadow: 0 0 6px rgba(139, 69, 19, 0.15);
        }
        
        /* Venus - Orange with clouds */
        .planet-2 {
            width: 22px;
            height: 22px;
            background: radial-gradient(circle at 30% 25%, #FFF8DC, #FFD700, #FFA500, #FF8C00, #E67E22);
            box-shadow: 
                0 0 18px rgba(255, 140, 0, 0.9),
                0 0 35px rgba(255, 100, 0, 0.5),
                inset -2px -2px 5px rgba(0, 0, 0, 0.4),
                inset 2px 2px 5px rgba(255, 200, 100, 0.3);
            animation: orbit2 12s linear infinite;
            transform: translate(-50%, -50%);
        }
        
        .planet-2::before {
            content: '';
            position: absolute;
            top: 30%;
            left: 20%;
            width: 60%;
            height: 20%;
            background: radial-gradient(ellipse at center, rgba(255, 255, 200, 0.4), transparent);
            border-radius: 50%;
            filter: blur(1px);
        }
        
        /* Earth - Blue with continents */
        .planet-3 {
            width: 26px;
            height: 26px;
            background: radial-gradient(circle at 30% 30%, #4DD0E1, #2196F3, #1565C0, #0D47A1);
            box-shadow: 
                0 0 20px rgba(65, 105, 225, 0.9),
                0 0 40px rgba(30, 144, 255, 0.6),
                inset -2px -2px 6px rgba(0, 0, 0, 0.5),
                inset 2px 2px 6px rgba(150, 220, 255, 0.3);
            animation: orbit3 15s linear infinite;
            transform: translate(-50%, -50%);
        }
        
        .planet-3::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotateX(70deg) rotateZ(20deg);
            width: 35px;
            height: 12px;
            border: 1.5px solid rgba(65, 105, 225, 0.35);
            border-radius: 50%;
            box-shadow: 0 0 12px rgba(65, 105, 225, 0.2);
        }
        
        .planet-3::before {
            content: '';
            position: absolute;
            top: 25%;
            left: 60%;
            width: 8px;
            height: 4px;
            background: radial-gradient(ellipse, rgba(76, 175, 80, 0.6), transparent);
            border-radius: 50%;
            filter: blur(0.5px);
        }
        
        /* Mars - Red planet with dust */
        .planet-4 {
            width: 18px;
            height: 18px;
            background: radial-gradient(circle at 35% 35%, #E74C3C, #C0392B, #8B0000, #5D0000);
            box-shadow: 
                0 0 14px rgba(200, 0, 0, 0.85),
                0 0 28px rgba(255, 100, 0, 0.4),
                inset -2px -2px 4px rgba(0, 0, 0, 0.6),
                inset 1px 1px 3px rgba(255, 150, 100, 0.2);
            animation: orbit4 20s linear infinite;
            transform: translate(-50%, -50%);
        }
        
        .planet-4::before {
            content: '';
            position: absolute;
            top: 40%;
            left: 35%;
            width: 6px;
            height: 6px;
            background: radial-gradient(circle, rgba(100, 50, 0, 0.5), transparent);
            border-radius: 50%;
            filter: blur(0.5px);
        }
        
        @keyframes orbit1 { 0% { transform: translate(-50%, -50%) rotate(0deg) translateX(70px) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg) translateX(70px) rotate(-360deg); } }
        @keyframes orbit2 { 0% { transform: translate(-50%, -50%) rotate(0deg) translateX(110px) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg) translateX(110px) rotate(-360deg); } }
        @keyframes orbit3 { 0% { transform: translate(-50%, -50%) rotate(0deg) translateX(150px) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg) translateX(150px) rotate(-360deg); } }
        @keyframes orbit4 { 0% { transform: translate(-50%, -50%) rotate(0deg) translateX(190px) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg) translateX(190px) rotate(-360deg); } }
        
        
        @media (max-width: 1200px) {
            #game-sidebar { width: 300px; padding: 1rem; }
            #giant-clicker { width: 250px; height: 250px; font-size: 100px; }
        }

        @media (max-width: 768px) {
            .flex { flex-direction: column; height: auto; }
            #game-sidebar { width: 100%; height: auto; max-height: 300px; max-width: none; }
            #game-wrapper { height: auto; padding: 0.5rem; }
            #giant-clicker { width: 200px; height: 200px; font-size: 80px; margin: 1rem 0; }
            .stats-panel { max-width: 100%; }
            #game-session-timer { max-width: 100%; }
        }
    </style>
    <script src="../theme_manager.js"></script>
    <style>
        #pause-screen.hidden { display: none !important; }
    </style>
    <style>
        #start-screen.hidden { display: none !important; }
    </style>
    <style>
        #game-over.hidden { display: none !important; }
    </style>
</head>
<body class="dark-mode bg-gray-900 min-h-screen text-white">
<script src="../scripts/taskbar.js"></script>
<script src="../scripts/global_translations.js?v=8.0"></script>

<div class="flex">

    <!-- LEFT SIDE - MAIN GAME AREA -->
    <div id="game-wrapper" class="relative">
        <button class="pause-btn" onclick="togglePause()" title="Pause"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg></button>

        <div>
            <h1 class="text-2xl font-bold bg-gradient-to-r from-amber-400 to-orange-500 bg-clip-text text-transparent text-center">🔬 LAB EMPIRE</h1>

            <!-- STATS PANEL -->
            <div class="stats-panel">
                <div class="particle-count-display" id="particleCount">0</div>
                <div style="color: #c0cfd9; margin-bottom: 0.75rem;">✨ Particles</div>
                <div class="per-second-display">
                    Per second: <span id="perSecond" style="color: #86efac; font-weight: bold;">0</span> ✨/s
                </div>
            </div>

            <!-- GIANT CLICKER BUTTON -->
            <button id="giant-clicker" onclick="clickParticle()" title="Click for particles">
                <svg width="100%" height="100%" viewBox="0 0 200 200" style="filter: drop-shadow(0 0 40px rgba(251, 191, 36, 0.9)) drop-shadow(0 0 60px rgba(255, 140, 0, 0.6))">
                    <!-- Multiple glow circles for depth -->
                    <defs>
                        <radialGradient id="particleGradient" cx="35%" cy="35%">
                            <stop offset="0%" style="stop-color:#FFFACD;stop-opacity:1" />
                            <stop offset="40%" style="stop-color:#FFD700;stop-opacity:1" />
                            <stop offset="70%" style="stop-color:#FFA500;stop-opacity:0.9" />
                            <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:0.7" />
                        </radialGradient>
                        <filter id="particleGlow">
                            <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
                            <feMerge>
                                <feMergeNode in="coloredBlur"/>
                                <feMergeNode in="coloredBlur"/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                        <filter id="shine">
                            <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
                            <feMerge>
                                <feMergeNode in="coloredBlur"/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                    </defs>
                    
                    <!-- Outer atmosphere -->
                    <circle cx="100" cy="100" r="98" fill="none" stroke="rgba(255, 215, 0, 0.2)" stroke-width="2" opacity="0.8"/>
                    <circle cx="100" cy="100" r="95" fill="none" stroke="rgba(251, 191, 36, 0.4)" stroke-width="2" opacity="0.6"/>
                    
                    <!-- Main star shape with enhanced gradient -->
                    <g filter="url(#particleGlow)">
                        <polygon points="100,20 130,70 185,70 147,110 175,170 100,130 25,170 53,110 15,70 70,70" fill="url(#particleGradient)" stroke="#FF8C00" stroke-width="2.5"/>
                    </g>
                    
                    <!-- Inner shadow for depth -->
                    <g opacity="0.3">
                        <polygon points="100,20 130,70 185,70 147,110 175,170 100,130 25,170 53,110 15,70 70,70" fill="none" stroke="#1a1a00" stroke-width="1"/>
                    </g>
                    
                    <!-- Primary highlight -->
                    <circle cx="80" cy="75" r="18" fill="white" opacity="0.35" filter="url(#shine)"/>
                    
                    <!-- Secondary highlight -->
                    <circle cx="95" cy="65" r="8" fill="white" opacity="0.25"/>
                    
                    <!-- Dynamic sparkles with animation group -->
                    <g id="sparkles">
                        <circle cx="40" cy="40" r="4" fill="#FFFF99" opacity="0.8"/>
                        <circle cx="160" cy="50" r="3.5" fill="#FFFF88" opacity="0.7"/>
                        <circle cx="185" cy="145" r="3" fill="#FFFF77" opacity="0.6"/>
                        <circle cx="15" cy="135" r="2.5" fill="#FFFF66" opacity="0.5"/>
                        <circle cx="155" cy="165" r="2" fill="#FFFF55" opacity="0.4"/>
                    </g>
                </svg>
            </button>

            <!-- SESSION TIMER -->
            <div id="start-screen" class="fixed inset-0 bg-black z-50 text-center p-6" style="display:flex;flex-direction:column;align-items:center;justify-content:center;">
                <h2 class="text-3xl amber-400 font-bold mb-3">🔬 LAB EMPIRE</h2>
                <p class="text-gray-300 mb-4 font-sans text-sm">Build your empire!</p>
                <div class="text-left text-xs text-gray-400 font-sans mb-6 space-y-1">
                    <p><span class="font-bold">Click</span> — Tap particles</p><p><span class="font-bold">Touch</span> — Tap (mobile)</p>
                    <p><span class="font-bold">Esc / P</span> — Pause</p>
                </div>
                <button onclick="startGame()" class="bg-amber-600 hover:bg-amber-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transform transition active:scale-95">
                    START
                </button>
            </div>

            <div id="pause-screen" class="absolute inset-0 bg-black/80 rounded-lg z-30 text-center p-6 backdrop-blur-sm" style="display:none;flex-direction:column;align-items:center;justify-content:center;top:50%;left:50%;transform:translate(-50%,-50%);width:90%;max-width:400px;height:auto;">
                <h2 class="text-4xl text-white font-bold mb-4">PAUSED</h2>
                <button onclick="togglePause()" class="bg-amber-600 hover:bg-amber-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transform transition active:scale-95">
                    RESUME
                </button>
            </div>
        </div>
    </div>

    <!-- MIDDLE - SOLAR SYSTEM BACKGROUND -->
    <div id="solar-system">
        <div id="starfield"></div>
        <div class="solar-system-container">
            <div class="orbit orbit-1"></div>
            <div class="orbit orbit-2"></div>
            <div class="orbit orbit-3"></div>
            <div class="orbit orbit-4"></div>
            <div class="sun"></div>
            <div class="planet planet-1"></div>
            <div class="planet planet-2"></div>
            <div class="planet planet-3"></div>
            <div class="planet planet-4"></div>
        </div>
    </div>

    <!-- RIGHT SIDEBAR - UPGRADES -->
    <div id="game-sidebar">
        <div style="width: 100%; text-align: center; color: #9ca3af; margin-bottom: 1rem; font-size: 0.875rem; font-weight: 600;">
            🛒 UPGRADES
        </div>
        <div id="notificationContainer" style="min-height: 3rem; margin-bottom: 1rem;"></div>
        <div id="shopContainer"></div>
    </div>
</div>

    <script>
        let gameState = {
            particles: 0,
            perSecond: 0,
            score: 0,
            playtime: 0,
            upgrades: {
                farm: { count: 0, cost: 10, base_cost: 10, production: 1, name: '🚜 Farm', icon: '🚜', unlocked: true },
                factory: { count: 0, cost: 100, base_cost: 100, production: 10, name: '🏭 Factory', icon: '🏭', unlocked: false, unlocksAt: 50 },
                robot: { count: 0, cost: 1000, base_cost: 1000, production: 100, name: '🤖 Robot', icon: '🤖', unlocked: false, unlocksAt: 500 },
                ai: { count: 0, cost: 10000, base_cost: 10000, production: 1000, name: '🧠 AI System', icon: '🧠', unlocked: false, unlocksAt: 5000 },
                quantum: { count: 0, cost: 100000, base_cost: 100000, production: 10000, name: '⚛️ Quantum', icon: '⚛️', unlocked: false, unlocksAt: 50000 }
            },
            achievements: {
                firstParticle: false,
                millionaire: false,
                factoryOwner: false,
                techGod: false
            }
        };

        function clickParticle() {
            gameState.particles += 1;
            gameState.score += 1;
            updateDisplay();
            
            // Visual feedback
            const button = document.getElementById('giant-clicker');
            button.style.transform = 'scale(0.9)';
            setTimeout(() => {
                button.style.transform = '';
            }, 50);
        }

        function calculatePerSecond() {
            let perSecond = 0;
            for (const key in gameState.upgrades) {
                const upgrade = gameState.upgrades[key];
                if (upgrade.unlocked) {
                    perSecond += upgrade.count * upgrade.production;
                }
            }
            return perSecond;
        }

        function checkUnlocks() {
            for (const key in gameState.upgrades) {
                const upgrade = gameState.upgrades[key];
                if (!upgrade.unlocked && upgrade.unlocksAt && gameState.particles >= upgrade.unlocksAt) {
                    upgrade.unlocked = true;
                    showNotification(`🔓 Unlocked: ${upgrade.name}!`);
                }
            }

            // Check achievements
            if (gameState.particles >= 1 && !gameState.achievements.firstParticle) {
                gameState.achievements.firstParticle = true;
                showNotification('📜 Achievement: Your first particle!');
            }
            if (gameState.particles >= 1000000 && !gameState.achievements.millionaire) {
                gameState.achievements.millionaire = true;
                showNotification('💰 Achievement: Millionaire!');
            }
            if (gameState.upgrades.factory.count >= 50 && !gameState.achievements.factoryOwner) {
                gameState.achievements.factoryOwner = true;
                showNotification('🔬 Achievement: Lab Master!');
            }
            if (gameState.upgrades.quantum.count >= 1 && !gameState.achievements.techGod) {
                gameState.achievements.techGod = true;
                showNotification('⚛️ Achievement: Tech God!');
            }
        }

        function buyUpgrade(upgradeKey) {
            const upgrade = gameState.upgrades[upgradeKey];
            if (!upgrade.unlocked) {
                showNotification(`🔒 Unlock at ${upgrade.unlocksAt.toLocaleString()} ✨`);
                return;
            }
            if (gameState.particles >= upgrade.cost) {
                gameState.particles -= upgrade.cost;
                upgrade.count++;
                upgrade.cost = Math.ceil(upgrade.base_cost * Math.pow(1.15, upgrade.count));
                gameState.perSecond = calculatePerSecond();
                gameState.score += upgrade.production * 10;
                checkUnlocks();
                updateDisplay();
                renderShop();
                showNotification(`Bought ${upgrade.name}!`);
            } else {
                const needed = Math.ceil(upgrade.cost - gameState.particles);
                showNotification(`Need ${needed} more ✨`);
            }
        }

        let notificationTimeout;
        function showNotification(message) {
            const container = document.getElementById('notificationContainer');
            container.innerHTML = '';
            const notification = document.createElement('div');
            notification.style.cssText = `
                background: rgba(34, 197, 94, 0.2);
                border: 2px solid #22c55e;
                padding: 0.75rem;
                border-radius: 8px;
                color: white;
                font-size: 0.9rem;
                animation: slideIn 0.3s ease;
                text-align: center;
            `;
            notification.textContent = message;
            container.appendChild(notification);
            
            clearTimeout(notificationTimeout);
            notificationTimeout = setTimeout(() => {
                container.innerHTML = '';
            }, 3000);
        }

        function updateDisplay() {
            document.getElementById('particleCount').textContent = Math.floor(gameState.particles);
            document.getElementById('perSecond').textContent = gameState.perSecond;
        }

        function renderShop() {
            const shopContainer = document.getElementById('shopContainer');
            shopContainer.innerHTML = '';

            for (const [key, upgrade] of Object.entries(gameState.upgrades)) {
                const canAfford = gameState.particles >= upgrade.cost;
                const isLocked = !upgrade.unlocked;
                
                const button = document.createElement('button');
                button.className = 'upgrade';
                button.onclick = () => buyUpgrade(key);
                
                if (isLocked) {
                    button.style.opacity = '0.5';
                    button.style.cursor = 'not-allowed';
                    button.innerHTML = `
                        <div class="upgrade-name">🔒 ${upgrade.name}</div>
                        <div class="upgrade-cost" style="color: #888;">Unlock at: ${upgrade.unlocksAt.toLocaleString()} ✨</div>
                        <div class="upgrade-effect">+${upgrade.production} ✨/s</div>
                        <div class="upgrade-count" style="color: #aaa;">Progress: ${Math.floor((gameState.particles / upgrade.unlocksAt) * 100)}%</div>
                    `;
                } else if (!canAfford) {
                    button.style.opacity = '0.6';
                    button.innerHTML = `
                        <div class="upgrade-name">${upgrade.icon} ${upgrade.name}</div>
                        <div class="upgrade-cost" style="color: #f87171;">Cost: ${upgrade.cost.toLocaleString()} ✨</div>
                        <div class="upgrade-effect">+${upgrade.production} ✨/s</div>
                        <div class="upgrade-count">Owned: ${upgrade.count}</div>
                    `;
                } else {
                    button.innerHTML = `
                        <div class="upgrade-name">${upgrade.icon} ${upgrade.name}</div>
                        <div class="upgrade-cost">Cost: ${upgrade.cost.toLocaleString()} ✨</div>
                        <div class="upgrade-effect">+${upgrade.production} ✨/s</div>
                        <div class="upgrade-count">Owned: ${upgrade.count}</div>
                    `;
                }

                shopContainer.appendChild(button);
            }
        }

        function gameLoop() {
            if (!arcadeState.gamePaused) {
                // Passive income
                gameState.particles += gameState.perSecond / 60; // 60 FPS
                gameState.score += gameState.perSecond / 60;
                gameState.playtime++;
                
                updateDisplay();
                
                // Check unlocks every frame
                if (gameState.playtime % 30 === 0) {
                    checkUnlocks();
                }
            }

            arcadeState.animFrame = requestAnimationFrame(gameLoop);
        }

        async function exitGame() {
            const user = await getUser();
            if (user) {
                const tokensEarned = Math.floor(gameState.score / 50);
                await updateUserPoints(user.id, tokensEarned);
                
                setTimeout(() => {
                    window.history.back();
                }, 1000);
            }
        }

        // Initialize - deferred until user clicks START
        // (async function() {
        //     if (!await initializeArcadeGame('🔬 LAB EMPIRE', 'from-amber-400', 'to-orange-500')) return;
        //     updateDisplay();
        //     checkUnlocks();
        //     renderShop();
        //     gameLoop();
        
        // Generate starfield with nebula colors
        function generateStarfield() {
            const starfield = document.getElementById('starfield');
            const starCount = 150;
            const colors = ['white', '#E8D5F2', '#B4D7FF', '#FFD7B5', '#D7F2FF', '#FFE8D7'];
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 2 + 0.3;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.opacity = Math.random() * 0.8 + 0.2;
                star.style.background = colors[Math.floor(Math.random() * colors.length)];
                starfield.appendChild(star);
            }
        }
        
        // Initialize starfield on page load
        generateStarfield();
        // })();
    
    async function startGame() {
        if (!await initializeArcadeGame('🔬 LAB EMPIRE', 'from-amber-400', 'to-orange-500')) return;
        document.getElementById('start-screen').style.display = 'none';
        updateDisplay();
        checkUnlocks();
        renderShop();
        gameLoop();
    }

    </script>
</body>
