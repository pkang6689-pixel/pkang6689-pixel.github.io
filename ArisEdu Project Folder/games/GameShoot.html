<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TARGET AIM - Arcade</title>
    <script src="../scripts/arcade-core.js"></script>
    <script src="../firebase-utils.js"></script>
    <style>
        #game-session-timer {
            font-size: 2.5rem !important;
            font-weight: 700 !important;
        }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/main.css">
        <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; }
        body { 
            font-family: 'Orbitron', monospace; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        body > .flex { display: flex !important; flex-direction: row !important; overflow: hidden; height: 100vh; gap: 1rem; padding: 1rem; }
        #game-wrapper { 
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: auto;
            min-width: 0;
            max-width: 100%;
            margin: 0;
            overflow: auto;
        }
        #game-wrapper > div:first-child {
            width: 100%;
            height: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        #game-sidebar {
            background: rgba(55, 65, 81, 0.98);
            border-radius: 1rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            width: 350px;
            height: auto;
            max-height: 100vh;
            border: 2px solid rgba(107, 114, 128, 0.9);
            box-shadow: 0 20px 45px rgba(0,0,0,0.6);
            overflow-y: auto;
            flex-shrink: 0;
        }
        #game-session-timer {
            background: rgba(34, 197, 94, 0.95);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 700;
            font-size: 2rem;
            font-family: monospace;
            width: 100%;
            text-align: center;
            margin-top: 0.5rem;
            letter-spacing: 2px;
        }
        #game-session-timer.warning {
            background: rgba(239, 68, 68, 0.95);
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .pause-btn { position: absolute; bottom: 0.75rem; left: 0.75rem; z-index: 50; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 0.75rem; color: white; cursor: pointer; padding: 8px; line-height: 0; transition: background 0.2s, transform 0.2s; }
        .pause-btn:hover { background: rgba(255,255,255,0.25); transform: scale(1.1); }
        
        @media (max-width: 1200px) {
            #game-sidebar { width: 300px; padding: 1rem; }
        }
        @media (max-width: 768px) {
            .flex { flex-direction: column; height: auto; }
            #game-sidebar { width: 100%; height: auto; max-height: 250px; }
            #game-wrapper { height: auto; }
        }
    </style>
    <script src="../theme_manager.js"></script>
    <style>
        #pause-screen.hidden { display: none !important; }
    </style>
    <style>
        #start-screen.hidden { display: none !important; }
    </style>
    </style>
    <style>
        #game-over.hidden { display: none !important; }
    </style>
</head>
<body class="dark-mode bg-gray-900 min-h-screen text-white">
<script src="../scripts/taskbar.js"></script>
<script src="../scripts/translation_loader.js" data-base="../translations"></script>
<div class="flex">

    <div id="game-wrapper" class="relative max-w-md bg-gray-800 rounded-2xl shadow-2xl p-6 border border-gray-700">
        <button class="pause-btn" onclick="togglePause()" title="Pause"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg></button>
        <!-- Header -->
        <div class="flex justify-between items-end mb-4">
            <div>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent" data-i18n="TARGET AIM">TARGET AIM</h1>
                <p class="text-xs text-gray-400 font-sans" data-i18n="Click targets quickly!">Click targets quickly!</p>
            </div>
            <div class="text-right">
                <div class="text-xs text-gray-400 font-sans" data-i18n="SCORE">SCORE</div>
                <div id="score" class="text-3xl font-bold text-white">0</div>
            </div>
            <div class="text-right">
                <div class="text-xs text-gray-400 font-sans">BEST</div>
                <div id="best-score" class="text-3xl font-bold text-amber-400">0</div>
            </div>
        </div>

        <canvas id="game" class="bg-gray-900 border-2 border-gray-700 mx-auto block" width="400" height="400"></canvas>

        <!-- Game Over -->
        <div id="game-over" class="absolute inset-0 bg-black/90 rounded-2xl z-20 text-center p-6 backdrop-blur-sm" style="display:none;flex-direction:column;align-items:center;justify-content:center;">
            <h2 class="text-3xl text-red-500 font-bold mb-2">GAME OVER</h2>
            <div class="text-4xl font-bold text-white mb-6" id="final-score">0</div>
            <button onclick="resetGame()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transform transition active:scale-95">
                <span data-i18n="PLAY AGAIN">PLAY AGAIN</span>
            </button>
        </div>

        <!-- Start -->
        <div id="start-screen" class="absolute inset-0 bg-black/80 rounded-2xl z-20 text-center p-6 backdrop-blur-sm" style="display:flex;flex-direction:column;align-items:center;justify-content:center;">
            <h2 class="text-3xl text-blue-400 font-bold mb-2">TARGET AIM</h2>
            <p class="text-gray-300 mb-6 font-sans">Click targets quickly!</p>
            <p class="text-xs text-gray-400 mb-6 font-sans">Don't misclick backgrounds.</p>
            <button onclick="startGame()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transform transition active:scale-95">
                <span data-i18n="START">START</span>
            </button>
        </div>

        <!-- Pause -->
        <div id="pause-screen" class="absolute inset-0 bg-black/80 rounded-2xl z-30 text-center p-6 backdrop-blur-sm" style="display:none;flex-direction:column;align-items:center;justify-content:center;">
            <h2 class="text-4xl text-white font-bold mb-4">PAUSED</h2>
            <button onclick="togglePause()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transform transition active:scale-95">
                <span data-i18n="RESUME">RESUME</span>
            </button>
        </div>
    </div>

    <div id="game-sidebar">
        <div style="width: 100%; text-align: center; color: #9ca3af; margin-bottom: 1rem; font-size: 0.875rem; font-weight: 600;">
            ⭐ TOKEN SESSION
        </div>
    </div>
</div>

<script>
let gamePaused = false;
let animFrame = null;
let running = false;
function togglePause() {
    if (!running && !gamePaused) return;
    gamePaused = !gamePaused;
    document.getElementById('pause-screen').classList.toggle('hidden', !gamePaused);
    if (!gamePaused) {
        lastTime = performance.now();
        animFrame = requestAnimationFrame(loop);
    } else {
        cancelAnimationFrame(animFrame);
    }
}

document.addEventListener('visibilitychange', () => {
    if (document.hidden && running && !gamePaused) togglePause();
});

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

let score = 0;
let bestScore = parseInt(localStorage.getItem('shoot_best') || '0');
document.getElementById('best-score').textContent = bestScore;

function saveBest() {
    if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('shoot_best', bestScore);
        document.getElementById('best-score').textContent = bestScore;
    }
}

function gameOver() {
    running = false;
    cancelAnimationFrame(animFrame);
    saveBest();
    document.getElementById('final-score').textContent = score;
    document.getElementById('game-over').style.display = 'flex';
}

let lastTime = 0;

let tgt = null;
let timer = 0, misclicks = 0;
let frameCount = 0;
let pointer = {x: W/2, y: H/2};
let hitParticles = [];
let flash = 0;

canvas.addEventListener('mousedown', e => {
    if (!running || !tgt) return;
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (canvas.width / rect.width), y = (e.clientY - rect.top) * (canvas.height / rect.height);
    
    if (Math.hypot(x - tgt.x, y - tgt.y) < tgt.r) {
        score++;
        streakCount++;
        streakTimer = 2000;
        document.getElementById('score').textContent = score;
        flash = 0.6;
        emitHitParticles(tgt.x, tgt.y);
        clickRipples.push({x: tgt.x, y: tgt.y, radius: tgt.r, alpha: 0.8, color: '#10b981'});
        spawn();
    } else {
        misclicks++;
        flash = 0.3;
        clickRipples.push({x, y, radius: 5, alpha: 0.6, color: '#ef4444'});
        if (misclicks >= 3) gameOver();
    }
});
canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    pointer.x = (e.clientX - rect.left) * (canvas.width / rect.width);
    pointer.y = (e.clientY - rect.top) * (canvas.height / rect.height);
});
canvas.addEventListener('touchmove', e => {
    const rect = canvas.getBoundingClientRect();
    pointer.x = (e.touches[0].clientX - rect.left) * (canvas.width / rect.width);
    pointer.y = (e.touches[0].clientY - rect.top) * (canvas.height / rect.height);
});

function emitHitParticles(x, y) {
    for (let i = 0; i < 12; i++) {
        const angle = (Math.PI * 2 / 12) * i;
        const spd = 0.2 + Math.random() * 0.4;
        hitParticles.push({
            x, y,
            vx: Math.cos(angle) * spd,
            vy: Math.sin(angle) * spd,
            life: 1,
            color: ['#facc15','#f97316','#ef4444','#fb923c'][Math.floor(Math.random()*4)],
            size: 2 + Math.random() * 3
        });
    }
}

let clickRipples = [];
let streakCount = 0;
let streakTimer = 0;
let targetPulse = 0;
let targetAppear = 0;

function spawn() {
    let r = Math.max(10, 30 - score*0.5);
    tgt = {
        x: r + Math.random()*(W - r*2),
        y: r + Math.random()*(H - r*2),
        r: r
    };
    timer = Math.max(500, 2000 - score*50);
    flash = 1;
    targetAppear = 0;
}

function init() {
    score = 0; misclicks = 0;
    hitParticles = [];
    clickRipples = [];
    streakCount = 0; streakTimer = 0;
    targetPulse = 0; targetAppear = 0;
    spawn();
}

function update(dt) {
    frameCount++;
    targetPulse += dt * 0.004;
    targetAppear = Math.min(1, targetAppear + dt * 0.005);
    flash = Math.max(0, flash - dt / 250);
    if (streakTimer > 0) streakTimer -= dt;
    else streakCount = 0;
    
    if (tgt) {
        timer -= dt;
        if (timer <= 0) gameOver();
    }

    for (let i = hitParticles.length - 1; i >= 0; i--) {
        const p = hitParticles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.life -= dt / 500;
        if (p.life <= 0) hitParticles.splice(i, 1);
    }
    
    for (let i = clickRipples.length - 1; i >= 0; i--) {
        const r = clickRipples[i];
        r.radius += dt * 0.15;
        r.alpha -= dt * 0.003;
        if (r.alpha <= 0) clickRipples.splice(i, 1);
    }
}

function draw() {
    // Rich gradient background
    const bg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W*0.7);
    bg.addColorStop(0, '#0f172a');
    bg.addColorStop(1, '#030712');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    // Hit flash
    if (flash > 0) {
        ctx.save();
        ctx.globalAlpha = flash * 0.4;
        ctx.fillStyle = 'rgba(16,185,129,0.3)';
        ctx.fillRect(0, 0, W, H);
        ctx.restore();
    }

    // Subtle grid
    ctx.strokeStyle = 'rgba(148,163,184,0.08)';
    ctx.lineWidth = 1;
    for (let y = 20; y < H; y += 40) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
    for (let x = 20; x < W; x += 40) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }

    // Click ripples
    ctx.save();
    for (const r of clickRipples) {
        ctx.globalAlpha = Math.max(0, r.alpha);
        ctx.strokeStyle = r.color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
        ctx.stroke();
    }
    ctx.restore();

    // Target with gradient rings and pulsing
    if (tgt) {
        const scale = targetAppear;
        const pulse = 1 + Math.sin(targetPulse) * 0.06;
        const r = tgt.r * scale * pulse;
        
        ctx.save();
        ctx.translate(tgt.x, tgt.y);
        
        // Outer glow
        ctx.shadowBlur = 30;
        ctx.shadowColor = '#ef4444';
        
        // Outer ring - red gradient
        const g1 = ctx.createRadialGradient(0, 0, r * 0.7, 0, 0, r);
        g1.addColorStop(0, '#dc2626');
        g1.addColorStop(1, '#7f1d1d');
        ctx.fillStyle = g1;
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.fill();
        
        // Middle ring - white gradient
        ctx.shadowBlur = 0;
        const g2 = ctx.createRadialGradient(0, 0, r * 0.3, 0, 0, r * 0.65);
        g2.addColorStop(0, '#f8fafc');
        g2.addColorStop(1, '#cbd5e1');
        ctx.fillStyle = g2;
        ctx.beginPath();
        ctx.arc(0, 0, r * 0.65, 0, Math.PI * 2);
        ctx.fill();
        
        // Inner ring - red gradient
        const g3 = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 0.35);
        g3.addColorStop(0, '#f87171');
        g3.addColorStop(1, '#dc2626');
        ctx.fillStyle = g3;
        ctx.beginPath();
        ctx.arc(0, 0, r * 0.35, 0, Math.PI * 2);
        ctx.fill();
        
        // Bullseye dot
        ctx.fillStyle = '#fef2f2';
        ctx.beginPath();
        ctx.arc(0, 0, r * 0.1, 0, Math.PI * 2);
        ctx.fill();
        
        // Highlight shine
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.beginPath();
        ctx.ellipse(-r*0.2, -r*0.3, r*0.35, r*0.15, -0.5, 0, Math.PI*2);
        ctx.fill();
        
        // Timer ring around target
        const timerRatio = Math.max(0, Math.min(1, timer / Math.max(500, 2000 - score*50)));
        ctx.strokeStyle = timerRatio > 0.3 ? '#22c55e' : '#ef4444';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(0, 0, r + 6, -Math.PI/2, -Math.PI/2 + Math.PI*2*timerRatio);
        ctx.stroke();
        
        ctx.restore();
    }

    // Hit particles with glow
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const p of hitParticles) {
        ctx.globalAlpha = Math.max(0, p.life);
        const pg = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
        pg.addColorStop(0, p.color);
        pg.addColorStop(1, 'transparent');
        ctx.fillStyle = pg;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * 2, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.restore();
    ctx.globalCompositeOperation = 'source-over';

    // Crosshair with glow
    ctx.save();
    ctx.shadowBlur = 8;
    ctx.shadowColor = '#f8fafc';
    ctx.strokeStyle = 'rgba(248,250,252,0.9)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(pointer.x - 18, pointer.y);
    ctx.lineTo(pointer.x - 5, pointer.y);
    ctx.moveTo(pointer.x + 5, pointer.y);
    ctx.lineTo(pointer.x + 18, pointer.y);
    ctx.moveTo(pointer.x, pointer.y - 18);
    ctx.lineTo(pointer.x, pointer.y - 5);
    ctx.moveTo(pointer.x, pointer.y + 5);
    ctx.lineTo(pointer.x, pointer.y + 18);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(pointer.x, pointer.y, 12, 0, Math.PI * 2);
    ctx.stroke();
    // Center dot
    ctx.fillStyle = '#f87171';
    ctx.shadowColor = '#ef4444';
    ctx.beginPath();
    ctx.arc(pointer.x, pointer.y, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // HUD
    ctx.fillStyle = '#94a3b8';
    ctx.font = '13px "Orbitron", sans-serif';
    ctx.textAlign = 'left';
    // Miss indicators as hearts/dots
    for (let i = 0; i < 3; i++) {
        ctx.fillStyle = i < (3 - misclicks) ? '#ef4444' : '#334155';
        ctx.beginPath();
        ctx.arc(15 + i * 20, 15, 6, 0, Math.PI * 2);
        ctx.fill();
    }
    
    // Streak counter
    if (streakCount >= 3) {
        ctx.fillStyle = '#fbbf24';
        ctx.font = 'bold 14px "Orbitron", sans-serif';
        ctx.textAlign = 'center';
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#fbbf24';
        ctx.fillText('🔥 ' + streakCount + 'x STREAK', W/2, 25);
        ctx.shadowBlur = 0;
    }

    // Bottom timer bar with gradient
    const timerRatio = Math.max(0, Math.min(1, timer / 2000));
    const barW = (W - 20) * timerRatio;
    const barGrad = ctx.createLinearGradient(10, 0, 10 + barW, 0);
    barGrad.addColorStop(0, timerRatio > 0.3 ? '#10b981' : '#ef4444');
    barGrad.addColorStop(1, timerRatio > 0.3 ? '#34d399' : '#f87171');
    ctx.fillStyle = barGrad;
    const barH = 6, barY = H - 14;
    ctx.beginPath();
    ctx.moveTo(13, barY);
    ctx.lineTo(10 + barW - 3, barY);
    ctx.quadraticCurveTo(10 + barW, barY, 10 + barW, barY + 3);
    ctx.quadraticCurveTo(10 + barW, barY + barH, 10 + barW - 3, barY + barH);
    ctx.lineTo(13, barY + barH);
    ctx.quadraticCurveTo(10, barY + barH, 10, barY + 3);
    ctx.quadraticCurveTo(10, barY, 13, barY);
    ctx.fill();
    
    // Bar track
    ctx.strokeStyle = 'rgba(148,163,184,0.2)';
    ctx.lineWidth = 1;
    ctx.strokeRect(10, barY, W - 20, barH);
}

function loop(timestamp) {
    if (!running || gamePaused) return;
    let dt = timestamp - lastTime;
    lastTime = timestamp;
    if (dt > 100) dt = 100;
    
    update(dt);
    draw();
    if(running) animFrame = requestAnimationFrame(loop);
}

async function startGame() {
    if (!await initializeArcadeGame()) return;
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('game-over').style.display = 'none';
    init();
    running = true;
    gamePaused = false;
    score = 0;
    document.getElementById('score').textContent = score;
    lastTime = performance.now();
    animFrame = requestAnimationFrame(loop);
}

function resetGame() {
    startGame();
}
</script>
</body>
</html>
