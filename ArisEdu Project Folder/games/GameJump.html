<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUNNER - Arcade</title>
    <script src="../scripts/arcade-core.js"></script>
    <script src="../firebase-utils.js"></script>
    <style>
        #game-session-timer {
            font-size: 2.5rem !important;
            font-weight: 700 !important;
        }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/main.css">
        <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; }
        body { 
            font-family: 'Orbitron', monospace; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        body > .flex { display: flex !important; flex-direction: row !important; overflow: hidden; height: 100vh; gap: 1rem; padding: 1rem; }
        #game-wrapper { 
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: auto;
            min-width: 0;
            max-width: 100%;
            margin: 0;
            overflow: auto;
        }
        #game-wrapper > div:first-child {
            width: 100%;
            height: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        #game-sidebar {
            background: rgba(55, 65, 81, 0.98);
            border-radius: 1rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            width: 350px;
            height: auto;
            max-height: 100vh;
            border: 2px solid rgba(107, 114, 128, 0.9);
            box-shadow: 0 20px 45px rgba(0,0,0,0.6);
            overflow-y: auto;
            flex-shrink: 0;
        }
        #game-session-timer {
            background: rgba(34, 197, 94, 0.95);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 700;
            font-size: 2rem;
            font-family: monospace;
            width: 100%;
            text-align: center;
            margin-top: 0.5rem;
            letter-spacing: 2px;
        }
        #game-session-timer.warning {
            background: rgba(239, 68, 68, 0.95);
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .pause-btn { position: absolute; bottom: 0.75rem; left: 0.75rem; z-index: 50; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 0.75rem; color: white; cursor: pointer; padding: 8px; line-height: 0; transition: background 0.2s, transform 0.2s; }
        .pause-btn:hover { background: rgba(255,255,255,0.25); transform: scale(1.1); }
        
        @media (max-width: 1200px) {
            #game-sidebar { width: 300px; padding: 1rem; }
        }
        @media (max-width: 768px) {
            .flex { flex-direction: column; height: auto; }
            #game-sidebar { width: 100%; height: auto; max-height: 250px; }
            #game-wrapper { height: auto; }
        }
    </style>
    <script src="../theme_manager.js"></script>
    <style>
        #pause-screen.hidden { display: none !important; }
    </style>
    <style>
        #start-screen.hidden { display: none !important; }
    </style>
    </style>
    <style>
        #game-over.hidden { display: none !important; }
    </style>
</head>
<body class="dark-mode bg-gray-900 min-h-screen text-white">
<script src="../scripts/taskbar.js"></script>
<script src="../scripts/global_translations.js?v=8.0"></script>

<div class="flex">

    <div id="game-wrapper" class="relative max-w-md bg-gray-800 rounded-2xl shadow-2xl p-6 border border-gray-700">
        <button class="pause-btn" onclick="togglePause()" title="Pause"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg></button>
        <!-- Header -->
        <div class="flex justify-between items-end mb-4">
            <div>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent" data-i18n="RUNNER">RUNNER</h1>
                <p class="text-xs text-gray-400 font-sans" data-i18n="Jump over obstacles!">Jump over obstacles!</p>
            </div>
            <div class="text-right">
                <div class="text-xs text-gray-400 font-sans" data-i18n="SCORE">SCORE</div>
                <div id="score" class="text-3xl font-bold text-white">0</div>
            </div>
            <div class="text-right">
                <div class="text-xs text-gray-400 font-sans">BEST</div>
                <div id="best-score" class="text-3xl font-bold text-amber-400">0</div>
            </div>
        </div>

        <canvas id="game" class="bg-gray-900 border-2 border-gray-700 mx-auto block" width="400" height="400"></canvas>

        <!-- Game Over -->
        <div id="game-over" class="absolute inset-0 bg-black/90 rounded-2xl z-20 text-center p-6 backdrop-blur-sm" style="display:none;flex-direction:column;align-items:center;justify-content:center;">
            <h2 class="text-3xl text-red-500 font-bold mb-2">GAME OVER</h2>
            <div class="text-4xl font-bold text-white mb-6" id="final-score">0</div>
            <button onclick="resetGame()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transform transition active:scale-95">
                <span data-i18n="PLAY AGAIN">PLAY AGAIN</span>
            </button>
        </div>

        <!-- Start -->
        <div id="start-screen" class="absolute inset-0 bg-black/80 rounded-2xl z-20 text-center p-6 backdrop-blur-sm" style="display:flex;flex-direction:column;align-items:center;justify-content:center;">
            <h2 class="text-3xl text-blue-400 font-bold mb-2">RUNNER</h2>
            <p class="text-gray-300 mb-6 font-sans">Jump over obstacles!</p>
            <p class="text-xs text-gray-400 mb-6 font-sans">Click or Space to jump</p>
            <button onclick="startGame()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transform transition active:scale-95">
                <span data-i18n="START">START</span>
            </button>
        </div>

        <!-- Pause -->
        <div id="pause-screen" class="absolute inset-0 bg-black/80 rounded-2xl z-30 text-center p-6 backdrop-blur-sm" style="display:none;flex-direction:column;align-items:center;justify-content:center;">
            <h2 class="text-4xl text-white font-bold mb-4">PAUSED</h2>
            <button onclick="togglePause()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transform transition active:scale-95">
                <span data-i18n="RESUME">RESUME</span>
            </button>
        </div>
    </div>

    <div id="game-sidebar">
        <div style="width: 100%; text-align: center; color: #9ca3af; margin-bottom: 1rem; font-size: 0.875rem; font-weight: 600;">
            ⭐ TOKEN SESSION
        </div>
    </div>
</div>

<script>
let gamePaused = false;
let animFrame = null;
let running = false;
function togglePause() {
    if (!running && !gamePaused) return;
    gamePaused = !gamePaused;
    document.getElementById('pause-screen').classList.toggle('hidden', !gamePaused);
    if (!gamePaused) {
        lastTime = performance.now();
        animFrame = requestAnimationFrame(loop);
    } else {
        cancelAnimationFrame(animFrame);
    }
}

document.addEventListener('visibilitychange', () => {
    if (document.hidden && running && !gamePaused) togglePause();
});

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

let score = 0;
let bestScore = parseInt(localStorage.getItem('jump_best') || '0');
document.getElementById('best-score').textContent = bestScore;

function saveBest() {
    if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('jump_best', bestScore);
        document.getElementById('best-score').textContent = bestScore;
    }
}

function gameOver() {
    running = false;
    cancelAnimationFrame(animFrame);
    saveBest();
    document.getElementById('final-score').textContent = score;
    document.getElementById('game-over').style.display = 'flex';
}

let lastTime = 0;

let px, py, pvy;
let obstacles = [];
let spawnT, speed;
let frameCount = 0;
let dust = [];
const GROUND_HEIGHT = 32;

function doJump() {
    if (!running) return;
    if (py === H - 40) pvy = -8;
}

canvas.addEventListener('mousedown', doJump);
document.addEventListener('keydown', e => { if(e.code==='Space') doJump(); });

let jumpParticles = [];
let screenShake = 0;
let starsBg = [];
for (let i = 0; i < 30; i++) {
    starsBg.push({x: Math.random() * 600, y: Math.random() * 300, s: 0.5 + Math.random() * 1.5, twinkle: Math.random() * Math.PI * 2});
}

function emitDust() {
    for (let i = 0; i < 3; i++) {
        dust.push({
            x: px + 8 + Math.random() * 6,
            y: H - GROUND_HEIGHT - 4,
            life: 1,
            vx: -Math.random() * 0.5 - 0.2,
            vy: -Math.random() * 0.5,
            size: 4 + Math.random() * 6
        });
    }
}

function emitJumpTrail() {
    jumpParticles.push({
        x: px + 10, y: py,
        vx: (Math.random()-0.5)*0.5,
        vy: Math.random()*0.5 + 0.2,
        life: 1, size: 3 + Math.random() * 3
    });
}

function init() {
    px = 50; py = H - 40; pvy = 0;
    obstacles = [];
    dust = [];
    jumpParticles = [];
    spawnT = 1000;
    speed = 300;
    screenShake = 0;
}

function update(dt) {
    frameCount++;
    pvy += 0.3;
    py += pvy;
    
    // Emit trail while airborne
    if (py < H - 40 && frameCount % 2 === 0) emitJumpTrail();
    
    if (py > H - 40) {
        py = H - 40;
        if (pvy > 2) { emitDust(); screenShake = Math.min(5, pvy); }
        if (pvy !== 0) emitDust();
        pvy = 0;
    }
    
    if (screenShake > 0) screenShake *= 0.9;

    speed += dt * 0.01;
    spawnT -= dt;
    if (spawnT <= 0) {
        spawnT = 800 + Math.random() * 1000;
        const type = Math.floor(Math.random() * 3); // 0=spike, 1=block, 2=tall
        obstacles.push({x: W, w: 20 + Math.random() * 20, h: 20 + Math.random() * 30, type});
    }

    for (let i = obstacles.length - 1; i >= 0; i--) {
        let ob = obstacles[i];
        ob.x -= (speed * dt) / 1000;

        if (px + 18 > ob.x && px + 2 < ob.x + ob.w && py + 18 > H - ob.h) {
            screenShake = 8;
            gameOver();
            return;
        }

        if (ob.x + ob.w < 0) {
            obstacles.splice(i, 1);
            score += 10;
            document.getElementById('score').textContent = score;
        }
    }

    for (let i = dust.length - 1; i >= 0; i--) {
        const puff = dust[i];
        puff.x += puff.vx * dt;
        puff.y += (puff.vy || 0) * dt * 0.5;
        puff.life -= dt / 600;
        if (puff.life <= 0) dust.splice(i, 1);
    }
    
    for (let i = jumpParticles.length - 1; i >= 0; i--) {
        const p = jumpParticles[i];
        p.x += p.vx; p.y += p.vy; p.life -= 0.04;
        if (p.life <= 0) jumpParticles.splice(i, 1);
    }
}

function drawPlayer(x, y) {
    const isAirborne = y < H - 40;
    ctx.save();
    ctx.translate(x + 10, y);
    
    // Body - gradient
    const bodyG = ctx.createLinearGradient(-10, -20, 10, 0);
    bodyG.addColorStop(0, '#60a5fa');
    bodyG.addColorStop(1, '#2563eb');
    ctx.fillStyle = bodyG;
    ctx.shadowBlur = 15;
    ctx.shadowColor = '#3b82f6';
    
    // Rounded body
    ctx.beginPath();
    ctx.moveTo(-8, 0);
    ctx.lineTo(-10, -14);
    ctx.quadraticCurveTo(-10, -22, -2, -22);
    ctx.lineTo(2, -22);
    ctx.quadraticCurveTo(10, -22, 10, -14);
    ctx.lineTo(8, 0);
    ctx.closePath();
    ctx.fill();
    
    // Face
    ctx.shadowBlur = 0;
    
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-3, -14, 3, 0, Math.PI*2);
    ctx.arc(5, -14, 3, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#1e293b';
    const eyeOff = isAirborne ? -1 : 0;
    ctx.beginPath();
    ctx.arc(-3, -14 + eyeOff, 1.5, 0, Math.PI*2);
    ctx.arc(5, -14 + eyeOff, 1.5, 0, Math.PI*2);
    ctx.fill();
    
    // Mouth
    if (isAirborne) {
        ctx.strokeStyle = '#1e293b';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(1, -8, 3, 0, Math.PI);
        ctx.stroke();
    }
    
    // Feet
    ctx.fillStyle = '#1e40af';
    ctx.fillRect(-8, -2, 6, 3);
    ctx.fillRect(4, -2, 6, 3);
    
    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.beginPath();
    ctx.ellipse(-4, -18, 3, 2, -0.3, 0, Math.PI*2);
    ctx.fill();
    
    ctx.restore();
}

function drawObstacle(ob) {
    const x = ob.x, h = ob.h, w = ob.w, y = H - h;
    ctx.save();
    
    const colors = [
        ['#ef4444','#991b1b'], // red spike
        ['#f97316','#9a3412'], // orange block
        ['#a855f7','#581c87']  // purple tall
    ];
    const [c1, c2] = colors[ob.type || 0];
    
    const g = ctx.createLinearGradient(x, y, x + w, H);
    g.addColorStop(0, c1);
    g.addColorStop(1, c2);
    ctx.fillStyle = g;
    ctx.shadowBlur = 10;
    ctx.shadowColor = c1;
    
    if (ob.type === 0) {
        // Spike/triangle
        ctx.beginPath();
        ctx.moveTo(x + w/2, y - 4);
        ctx.lineTo(x + w, H - GROUND_HEIGHT);
        ctx.lineTo(x, H - GROUND_HEIGHT);
        ctx.closePath();
        ctx.fill();
    } else if (ob.type === 1) {
        // Rounded block
        const r = 4;
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, H - GROUND_HEIGHT);
        ctx.lineTo(x, H - GROUND_HEIGHT);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.fill();
        // face pattern
        ctx.shadowBlur = 0;
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.fillRect(x + 3, y + 5, 3, 3);
        ctx.fillRect(x + w - 6, y + 5, 3, 3);
    } else {
        // Tall crystal
        ctx.beginPath();
        ctx.moveTo(x + w * 0.3, y - 6);
        ctx.lineTo(x + w * 0.7, y - 6);
        ctx.lineTo(x + w, H - GROUND_HEIGHT);
        ctx.lineTo(x, H - GROUND_HEIGHT);
        ctx.closePath();
        ctx.fill();
        // Shine line
        ctx.shadowBlur = 0;
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(x + w*0.4, y);
        ctx.lineTo(x + w*0.3, H - GROUND_HEIGHT);
        ctx.stroke();
    }
    ctx.restore();
}

function draw() {
    ctx.save();
    if (screenShake > 0.5) {
        ctx.translate((Math.random()-0.5)*screenShake, (Math.random()-0.5)*screenShake);
    }
    
    // Sky gradient
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#020617');
    sky.addColorStop(0.5, '#0c1631');
    sky.addColorStop(0.85, '#172554');
    sky.addColorStop(1, '#1e3a5f');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    // Stars
    for (const s of starsBg) {
        const twinkle = 0.4 + Math.sin(s.twinkle + frameCount * 0.02) * 0.3;
        ctx.fillStyle = `rgba(255,255,255,${twinkle})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.s, 0, Math.PI * 2);
        ctx.fill();
    }

    // Background mountains/hills silhouettes
    ctx.save();
    ctx.fillStyle = 'rgba(30,58,138,0.3)';
    for (let i = 0; i < 3; i++) {
        const offset = (frameCount * (0.3 + i * 0.2)) % (W + 200) - 100;
        ctx.beginPath();
        ctx.ellipse(offset, H - GROUND_HEIGHT - 5 - i * 8, W / 2.5 + i * 60, 30 + i * 12, 0, 0, Math.PI, true);
        ctx.fill();
    }
    ctx.restore();

    // Ground with gradient
    const groundG = ctx.createLinearGradient(0, H - GROUND_HEIGHT, 0, H);
    groundG.addColorStop(0, '#1e3a5f');
    groundG.addColorStop(0.1, '#0f2847');
    groundG.addColorStop(1, '#0a1929');
    ctx.fillStyle = groundG;
    ctx.fillRect(0, H - GROUND_HEIGHT, W, GROUND_HEIGHT);
    // Ground line
    ctx.strokeStyle = 'rgba(96,165,250,0.3)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, H - GROUND_HEIGHT);
    ctx.lineTo(W, H - GROUND_HEIGHT);
    ctx.stroke();
    // Running ground dots
    ctx.fillStyle = 'rgba(96,165,250,0.15)';
    for (let x = -(frameCount * 2) % 30; x < W; x += 30) {
        ctx.fillRect(x, H - GROUND_HEIGHT + 8, 10, 2);
    }

    // Dust particles
    ctx.save();
    for (const puff of dust) {
        ctx.globalAlpha = Math.max(0, puff.life) * 0.6;
        ctx.fillStyle = 'rgba(203,213,225,0.6)';
        ctx.beginPath();
        ctx.arc(puff.x, puff.y, puff.size * puff.life, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.restore();
    
    // Jump trail particles
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const p of jumpParticles) {
        ctx.globalAlpha = p.life * 0.5;
        ctx.fillStyle = '#60a5fa';
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
        ctx.fill();
    }
    ctx.restore();
    ctx.globalCompositeOperation = 'source-over';

    // Player
    drawPlayer(px, py);

    // Obstacles
    for (const ob of obstacles) {
        drawObstacle(ob);
    }

    // HUD
    ctx.fillStyle = '#e2e8f0';
    ctx.font = '14px "Orbitron", sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('Score: ' + score, 10, 22);
    ctx.fillText('Best: ' + bestScore, 10, 42);
    
    // Speed indicator
    const spdNorm = Math.min(1, (speed - 300) / 500);
    const spdColor = spdNorm > 0.7 ? '#ef4444' : spdNorm > 0.4 ? '#fbbf24' : '#22c55e';
    ctx.fillStyle = spdColor;
    ctx.fillText('Speed: ' + Math.min(999, Math.floor(speed)), 10, 62);
    
    ctx.restore(); // screenShake
}


function loop(timestamp) {
    if (!running || gamePaused) return;
    let dt = timestamp - lastTime;
    lastTime = timestamp;
    if (dt > 100) dt = 100;
    
    update(dt);
    draw();
    if(running) animFrame = requestAnimationFrame(loop);
}

async function startGame() {
    if (!await initializeArcadeGame()) return;
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('game-over').style.display = 'none';
    init();
    running = true;
    gamePaused = false;
    score = 0;
    document.getElementById('score').textContent = score;
    lastTime = performance.now();
    animFrame = requestAnimationFrame(loop);
}

function resetGame() {
    startGame();
}
</script>
</body>
</html>
