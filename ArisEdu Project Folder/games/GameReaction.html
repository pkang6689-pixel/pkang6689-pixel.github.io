<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REACTION TEST - Arcade</title>
    <script src="../scripts/arcade-core.js"></script>
    <script src="../firebase-utils.js"></script>
    <style>
        #game-session-timer {
            font-size: 2.5rem !important;
            font-weight: 700 !important;
        }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/main.css">
        <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; }
        body { 
            font-family: 'Orbitron', monospace; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        body > .flex { display: flex !important; flex-direction: row !important; overflow: hidden; height: 100vh; gap: 1rem; padding: 1rem; }
        #game-wrapper { 
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: auto;
            min-width: 0;
            max-width: 100%;
            margin: 0;
            overflow: auto;
        }
        #game-wrapper > div:first-child {
            width: 100%;
            height: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        #game-sidebar {
            background: rgba(55, 65, 81, 0.98);
            border-radius: 1rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            width: 350px;
            height: auto;
            max-height: 100vh;
            border: 2px solid rgba(107, 114, 128, 0.9);
            box-shadow: 0 20px 45px rgba(0,0,0,0.6);
            overflow-y: auto;
            flex-shrink: 0;
        }
        #game-session-timer {
            background: rgba(34, 197, 94, 0.95);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 700;
            font-size: 2rem;
            font-family: monospace;
            width: 100%;
            text-align: center;
            margin-top: 0.5rem;
            letter-spacing: 2px;
        }
        #game-session-timer.warning {
            background: rgba(239, 68, 68, 0.95);
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .pause-btn { position: absolute; bottom: 0.75rem; left: 0.75rem; z-index: 50; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 0.75rem; color: white; cursor: pointer; padding: 8px; line-height: 0; transition: background 0.2s, transform 0.2s; }
        .pause-btn:hover { background: rgba(255,255,255,0.25); transform: scale(1.1); }
        
        @media (max-width: 1200px) {
            #game-sidebar { width: 300px; padding: 1rem; }
        }
        @media (max-width: 768px) {
            .flex { flex-direction: column; height: auto; }
            #game-sidebar { width: 100%; height: auto; max-height: 250px; }
            #game-wrapper { height: auto; }
        }
    </style>
    <script src="../theme_manager.js"></script>
    <style>
        #pause-screen.hidden { display: none !important; }
    </style>
    <style>
        #start-screen.hidden { display: none !important; }
    </style>
    </style>
    <style>
        #game-over.hidden { display: none !important; }
    </style>
</head>
<body class="dark-mode bg-gray-900 min-h-screen text-white">
<script src="../scripts/taskbar.js"></script>
<script src="../scripts/translation_loader.js" data-base="../translations"></script>
<div class="flex">

    <div id="game-wrapper" class="relative max-w-md bg-gray-800 rounded-2xl shadow-2xl p-6 border border-gray-700">
        <button class="pause-btn" onclick="togglePause()" title="Pause"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg></button>
        <!-- Header -->
        <div class="flex justify-between items-end mb-4">
            <div>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent" data-i18n="REACTION TEST">REACTION TEST</h1>
                <p class="text-xs text-gray-400 font-sans" data-i18n="Click when it turns green!">Click when it turns green!</p>
            </div>
            <div class="text-right">
                <div class="text-xs text-gray-400 font-sans" data-i18n="SCORE">SCORE</div>
                <div id="score" class="text-3xl font-bold text-white">0</div>
            </div>
            <div class="text-right">
                <div class="text-xs text-gray-400 font-sans">BEST</div>
                <div id="best-score" class="text-3xl font-bold text-amber-400">0</div>
            </div>
        </div>

        <canvas id="game" class="bg-gray-900 border-2 border-gray-700 mx-auto block" width="400" height="400"></canvas>

        <!-- Game Over -->
        <div id="game-over" class="absolute inset-0 bg-black/90 rounded-2xl z-20 text-center p-6 backdrop-blur-sm" style="display:none;flex-direction:column;align-items:center;justify-content:center;">
            <h2 class="text-3xl text-red-500 font-bold mb-2">GAME OVER</h2>
            <div class="text-4xl font-bold text-white mb-6" id="final-score">0</div>
            <button onclick="resetGame()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transform transition active:scale-95">
                <span data-i18n="PLAY AGAIN">PLAY AGAIN</span>
            </button>
        </div>

        <!-- Start -->
        <div id="start-screen" class="absolute inset-0 bg-black/80 rounded-2xl z-20 text-center p-6 backdrop-blur-sm" style="display:flex;flex-direction:column;align-items:center;justify-content:center;">
            <h2 class="text-3xl text-blue-400 font-bold mb-2">REACTION TEST</h2>
            <p class="text-gray-300 mb-6 font-sans">Click when it turns green!</p>
            <p class="text-xs text-gray-400 mb-6 font-sans">Wait for green, don't click early.</p>
            <button onclick="startGame()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transform transition active:scale-95">
                <span data-i18n="START">START</span>
            </button>
        </div>

        <!-- Pause -->
        <div id="pause-screen" class="absolute inset-0 bg-black/80 rounded-2xl z-30 text-center p-6 backdrop-blur-sm" style="display:none;flex-direction:column;align-items:center;justify-content:center;">
            <h2 class="text-4xl text-white font-bold mb-4">PAUSED</h2>
            <button onclick="togglePause()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transform transition active:scale-95">
                <span data-i18n="RESUME">RESUME</span>
            </button>
        </div>
    </div>

    <div id="game-sidebar">
        <div style="width: 100%; text-align: center; color: #9ca3af; margin-bottom: 1rem; font-size: 0.875rem; font-weight: 600;">
            ⭐ TOKEN SESSION
        </div>
    </div>
</div>

<script>
let gamePaused = false;
let animFrame = null;
let running = false;
function togglePause() {
    if (!running && !gamePaused) return;
    gamePaused = !gamePaused;
    document.getElementById('pause-screen').classList.toggle('hidden', !gamePaused);
    if (!gamePaused) {
        lastTime = performance.now();
        animFrame = requestAnimationFrame(loop);
    } else {
        cancelAnimationFrame(animFrame);
    }
}

document.addEventListener('visibilitychange', () => {
    if (document.hidden && running && !gamePaused) togglePause();
});

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

let score = 0;
let bestScore = parseInt(localStorage.getItem('reaction_best') || '0');
document.getElementById('best-score').textContent = bestScore;

function saveBest() {
    if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('reaction_best', bestScore);
        document.getElementById('best-score').textContent = bestScore;
    }
}

function gameOver() {
    running = false;
    cancelAnimationFrame(animFrame);
    saveBest();
    document.getElementById('final-score').textContent = score;
    document.getElementById('game-over').style.display = 'flex';
}

let lastTime = 0;
let frameCount = 0;
let sparkles = [];
let state = 'waiting'; // waiting, ready, fail, win
let waitTimer = 0;
let reactTimer = 0;
let bestReact = 9999;
if (localStorage.getItem('reaction_best')) {
    bestReact = parseInt(localStorage.getItem('reaction_best'));
}
document.getElementById('best-score').textContent = bestReact === 9999 ? '-' : bestReact + 'ms';
const centerX = W / 2;
const centerY = H / 2;

canvas.addEventListener('mousedown', () => handleClick());
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    handleClick();
});
document.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'Enter') {
        e.preventDefault();
        handleClick();
    }
});

function emitSpark(color) {
    for (let i = 0; i < 8; i++) {
        const angle = (Math.PI * 2 / 8) * i + Math.random() * 0.5;
        const spd = 0.02 + Math.random() * 0.04;
        sparkles.push({
            x: centerX + Math.cos(angle) * 40,
            y: centerY + Math.sin(angle) * 40,
            vx: Math.cos(angle) * spd,
            vy: Math.sin(angle) * spd,
            life: 1,
            color,
            size: 3 + Math.random() * 5
        });
    }
}

let clickRipples = [];
let bgStars = [];
for (let i = 0; i < 40; i++) {
    bgStars.push({x: Math.random()*600, y: Math.random()*600, s: 0.5+Math.random()*1.5, phase: Math.random()*Math.PI*2});
}

function handleClick() {
    if (!running) return;
    clickRipples.push({x: centerX, y: centerY, r: 40, alpha: 0.8, color: state === 'waiting' ? '#ef4444' : '#22c55e'});
    if (state === 'waiting') {
        state = 'fail';
        score = 'TOO EARLY';
        emitSpark('#ef4444');
        gameOver();
    } else if (state === 'ready') {
        score = Math.floor(reactTimer);
        document.getElementById('score').textContent = score + ' ms';
        if (score < bestReact) {
            bestReact = score;
            bestScore = score;
            localStorage.setItem('reaction_best', score);
            document.getElementById('best-score').textContent = score + 'ms';
        }
        emitSpark('#22c55e');
        state = 'win';
        setTimeout(() => {
            gameOver();
            document.getElementById('final-score').textContent = score + ' ms';
        }, 1000);
    }
}

function init() {
    state = 'waiting';
    waitTimer = 1000 + Math.random() * 3000;
    reactTimer = 0;
    frameCount = 0;
    sparkles = [];
    clickRipples = [];
    score = 0;
    document.getElementById('score').textContent = '0 ms';
}

function update(dt) {
    frameCount++;
    if (state === 'waiting') {
        waitTimer -= dt;
        if (waitTimer <= 0) {
            state = 'ready';
            emitSpark('#22c55e');
        }
    } else if (state === 'ready') {
        reactTimer += dt;
        if (reactTimer > 5000) {
            score = 'TOO LATE';
            emitSpark('#ef4444');
            gameOver();
        }
    }

    for (let i = sparkles.length - 1; i >= 0; i--) {
        const sparkle = sparkles[i];
        sparkle.x += sparkle.vx * dt;
        sparkle.y += sparkle.vy * dt;
        sparkle.life -= dt / 600;
        if (sparkle.life <= 0) sparkles.splice(i, 1);
    }
    
    for (let i = clickRipples.length - 1; i >= 0; i--) {
        const r = clickRipples[i];
        r.r += dt * 0.2;
        r.alpha -= dt * 0.002;
        if (r.alpha <= 0) clickRipples.splice(i, 1);
    }
}

function draw() {
    // Background with reactive color shift
    const readyFactor = state === 'ready' ? Math.min(1, reactTimer / 500) : 0;
    const bg = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, W * 0.7);
    if (state === 'ready') {
        bg.addColorStop(0, '#052e16');
        bg.addColorStop(1, '#030712');
    } else if (state === 'win') {
        bg.addColorStop(0, '#052e16');
        bg.addColorStop(1, '#022c22');
    } else {
        bg.addColorStop(0, '#1c1917');
        bg.addColorStop(1, '#030712');
    }
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    // Stars
    for (const s of bgStars) {
        const twinkle = 0.2 + Math.sin(s.phase + frameCount * 0.015) * 0.2;
        ctx.fillStyle = `rgba(255,255,255,${twinkle})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.s, 0, Math.PI * 2);
        ctx.fill();
    }

    // Click ripples
    for (const r of clickRipples) {
        ctx.strokeStyle = r.color;
        ctx.globalAlpha = Math.max(0, r.alpha);
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
        ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Sparkle particles with glow
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const sparkle of sparkles) {
        ctx.globalAlpha = Math.max(0, sparkle.life);
        const sg = ctx.createRadialGradient(sparkle.x, sparkle.y, 0, sparkle.x, sparkle.y, sparkle.size);
        sg.addColorStop(0, sparkle.color);
        sg.addColorStop(1, 'transparent');
        ctx.fillStyle = sg;
        ctx.beginPath();
        ctx.arc(sparkle.x, sparkle.y, sparkle.size * 2, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.restore();
    ctx.globalCompositeOperation = 'source-over';

    ctx.save();
    ctx.translate(centerX, centerY);
    
    // Outer pulsing ring
    const ringRadius = 80 + Math.sin(frameCount * 0.03) * 12;
    const ringColor = state === 'waiting' ? '#ef4444' : '#22c55e';
    ctx.lineWidth = 3;
    ctx.strokeStyle = ringColor;
    ctx.globalAlpha = 0.2;
    ctx.beginPath();
    ctx.arc(0, 0, ringRadius + 15, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 0.4;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(0, 0, ringRadius, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Rotating dashes around ring
    ctx.save();
    ctx.rotate(frameCount * 0.01);
    ctx.strokeStyle = ringColor;
    ctx.lineWidth = 3;
    ctx.globalAlpha = 0.5;
    for (let i = 0; i < 12; i++) {
        const a = (Math.PI * 2 / 12) * i;
        ctx.beginPath();
        ctx.arc(0, 0, ringRadius + 8, a, a + 0.15);
        ctx.stroke();
    }
    ctx.restore();

    // Main circle with gradient
    const mainColor1 = state === 'waiting' ? '#f87171' : state === 'win' ? '#4ade80' : '#22c55e';
    const mainColor2 = state === 'waiting' ? '#991b1b' : state === 'win' ? '#15803d' : '#166534';
    const cg = ctx.createRadialGradient(-8, -8, 2, 0, 0, 48);
    cg.addColorStop(0, mainColor1);
    cg.addColorStop(1, mainColor2);
    ctx.fillStyle = cg;
    ctx.shadowBlur = 35;
    ctx.shadowColor = mainColor1;
    ctx.beginPath();
    ctx.arc(0, 0, 48, 0, Math.PI * 2);
    ctx.fill();
    
    // Highlight on circle
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.beginPath();
    ctx.ellipse(-12, -15, 18, 10, -0.3, 0, Math.PI * 2);
    ctx.fill();
    
    // Countdown ring when waiting (shows how much wait time has passed)
    if (state === 'waiting') {
        ctx.strokeStyle = 'rgba(239,68,68,0.3)';
        ctx.lineWidth = 4;
        const waitProg = 1 - (waitTimer / 4000);
        ctx.beginPath();
        ctx.arc(0, 0, 55, -Math.PI/2, -Math.PI/2 + Math.PI * 2 * waitProg);
        ctx.stroke();
    }
    
    // Timer display when reacting
    if (state === 'ready' && reactTimer > 0) {
        ctx.strokeStyle = 'rgba(34,197,94,0.5)';
        ctx.lineWidth = 4;
        const timeProg = Math.min(1, reactTimer / 1000);
        ctx.beginPath();
        ctx.arc(0, 0, 55, -Math.PI/2, -Math.PI/2 + Math.PI * 2 * timeProg);
        ctx.stroke();
    }

    ctx.restore();

    // Label text
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 22px "Orbitron", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const label = state === 'waiting'
        ? 'WAIT...'
        : state === 'ready'
            ? 'CLICK!'
            : state === 'win'
                ? `${score} ms`
                : score;
    ctx.fillText(label, centerX, centerY);
    
    // Sub-label
    ctx.font = '11px "Orbitron", sans-serif';
    ctx.fillStyle = '#94a3b8';
    if (state === 'waiting') {
        ctx.fillText('Wait for green', centerX, centerY + 85);
    } else if (state === 'ready') {
        ctx.fillText('Click/Tap/Space NOW!', centerX, centerY + 85);
    } else if (state === 'win') {
        const rating = score < 200 ? '⚡ AMAZING!' : score < 300 ? '🔥 GREAT!' : score < 400 ? '👍 GOOD' : '🐌 SLOW';
        ctx.font = '13px "Orbitron", sans-serif';
        ctx.fillStyle = score < 200 ? '#fbbf24' : score < 300 ? '#22c55e' : '#94a3b8';
        ctx.fillText(rating, centerX, centerY + 85);
    }
}

function loop(timestamp) {
    if (!running || gamePaused) return;
    let dt = timestamp - lastTime;
    lastTime = timestamp;
    if (dt > 100) dt = 100;
    update(dt);
    draw();
    animFrame = requestAnimationFrame(loop);
}

async function startGame() {
    if (!await initializeArcadeGame()) return;
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('game-over').style.display = 'none';
    init();
    running = true;
    gamePaused = false;
    lastTime = performance.now();
    animFrame = requestAnimationFrame(loop);
}

function resetGame() {
    startGame();
}
</script>
</body>
</html>
