<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVOIDance - Arcade</title>
    <script src="../scripts/arcade-core.js"></script>
    <script src="../firebase-utils.js"></script>
    <style>
        #game-session-timer {
            font-size: 2.5rem !important;
            font-weight: 700 !important;
        }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/main.css">
        <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; }
        body { 
            font-family: 'Orbitron', monospace; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        body > .flex { display: flex !important; flex-direction: row !important; overflow: hidden; height: 100vh; gap: 1rem; padding: 1rem; }
        #game-wrapper { 
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: auto;
            min-width: 0;
            max-width: 100%;
            margin: 0;
            overflow: auto;
        }
        #game-wrapper > div:first-child {
            width: 100%;
            height: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        #game-sidebar {
            background: rgba(55, 65, 81, 0.98);
            border-radius: 1rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            width: 350px;
            height: auto;
            max-height: 100vh;
            border: 2px solid rgba(107, 114, 128, 0.9);
            box-shadow: 0 20px 45px rgba(0,0,0,0.6);
            overflow-y: auto;
            flex-shrink: 0;
        }
        #game-session-timer {
            background: rgba(34, 197, 94, 0.95);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 700;
            font-size: 2rem;
            font-family: monospace;
            width: 100%;
            text-align: center;
            margin-top: 0.5rem;
            letter-spacing: 2px;
        }
        #game-session-timer.warning {
            background: rgba(239, 68, 68, 0.95);
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .pause-btn { position: absolute; bottom: 0.75rem; left: 0.75rem; z-index: 50; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 0.75rem; color: white; cursor: pointer; padding: 8px; line-height: 0; transition: background 0.2s, transform 0.2s; }
        .pause-btn:hover { background: rgba(255,255,255,0.25); transform: scale(1.1); }
        
        @media (max-width: 1200px) {
            #game-sidebar { width: 300px; padding: 1rem; }
        }
        @media (max-width: 768px) {
            .flex { flex-direction: column; height: auto; }
            #game-sidebar { width: 100%; height: auto; max-height: 250px; }
            #game-wrapper { height: auto; }
        }
    </style>
    <script src="../theme_manager.js"></script>
    <style>
        #pause-screen.hidden { display: none !important; }
    </style>
    <style>
        #start-screen.hidden { display: none !important; }
    </style>
    </style>
    <style>
        #game-over.hidden { display: none !important; }
    </style>
</head>
<body class="dark-mode bg-gray-900 min-h-screen text-white">
<script src="../scripts/taskbar.js"></script>
<script src="../scripts/global_translations.js?v=8.0"></script>

<div class="flex">

    <div id="game-wrapper" class="relative max-w-md bg-gray-800 rounded-2xl shadow-2xl p-6 border border-gray-700">
        <button class="pause-btn" onclick="togglePause()" title="Pause"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg></button>
        <!-- Header -->
        <div class="flex justify-between items-end mb-4">
            <div>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent" data-i18n="AVOIDance">AVOIDance</h1>
                <p class="text-xs text-gray-400 font-sans" data-i18n="Dodge the red blocks!">Dodge the red blocks!</p>
            </div>
            <div class="text-right">
                <div class="text-xs text-gray-400 font-sans" data-i18n="SCORE">SCORE</div>
                <div id="score" class="text-3xl font-bold text-white">0</div>
            </div>
            <div class="text-right">
                <div class="text-xs text-gray-400 font-sans">BEST</div>
                <div id="best-score" class="text-3xl font-bold text-amber-400">0</div>
            </div>
        </div>

        <canvas id="game" class="bg-gray-900 border-2 border-gray-700 mx-auto block" width="400" height="400"></canvas>

        <!-- Game Over -->
        <div id="game-over" class="absolute inset-0 bg-black/90 rounded-2xl z-20 text-center p-6 backdrop-blur-sm" style="display:none;flex-direction:column;align-items:center;justify-content:center;">
            <h2 class="text-3xl text-red-500 font-bold mb-2">GAME OVER</h2>
            <div class="text-4xl font-bold text-white mb-6" id="final-score">0</div>
            <button onclick="resetGame()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transform transition active:scale-95">
                <span data-i18n="PLAY AGAIN">PLAY AGAIN</span>
            </button>
        </div>

        <!-- Start -->
        <div id="start-screen" class="absolute inset-0 bg-black/80 rounded-2xl z-20 text-center p-6 backdrop-blur-sm" style="display:flex;flex-direction:column;align-items:center;justify-content:center;">
            <h2 class="text-3xl text-blue-400 font-bold mb-2">AVOIDance</h2>
            <p class="text-gray-300 mb-6 font-sans">Dodge the red blocks!</p>
            <p class="text-xs text-gray-400 mb-6 font-sans">Arrow keys or WASD to dodge</p>
            <button onclick="startGame()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transform transition active:scale-95">
                <span data-i18n="START">START</span>
            </button>
        </div>

        <!-- Pause -->
        <div id="pause-screen" class="absolute inset-0 bg-black/80 rounded-2xl z-30 text-center p-6 backdrop-blur-sm" style="display:none;flex-direction:column;align-items:center;justify-content:center;">
            <h2 class="text-4xl text-white font-bold mb-4">PAUSED</h2>
            <button onclick="togglePause()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transform transition active:scale-95">
                <span data-i18n="RESUME">RESUME</span>
            </button>
        </div>
    </div>

    <div id="game-sidebar">
        <div style="width: 100%; text-align: center; color: #9ca3af; margin-bottom: 1rem; font-size: 0.875rem; font-weight: 600;">
            ⭐ TOKEN SESSION
        </div>
    </div>
</div>

<script>
let gamePaused = false;
let animFrame = null;
let running = false;
function togglePause() {
    if (!running && !gamePaused) return;
    gamePaused = !gamePaused;
    document.getElementById('pause-screen').classList.toggle('hidden', !gamePaused);
    if (!gamePaused) {
        lastTime = performance.now();
        animFrame = requestAnimationFrame(loop);
    } else {
        cancelAnimationFrame(animFrame);
    }
}

document.addEventListener('visibilitychange', () => {
    if (document.hidden && running && !gamePaused) togglePause();
});

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

let score = 0;
let bestScore = parseInt(localStorage.getItem('avoid_best') || '0');
document.getElementById('best-score').textContent = bestScore;

function saveBest() {
    if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('avoid_best', bestScore);
        document.getElementById('best-score').textContent = bestScore;
    }
}

function gameOver() {
    running = false;
    cancelAnimationFrame(animFrame);
    saveBest();
    document.getElementById('final-score').textContent = score;
    document.getElementById('game-over').style.display = 'flex';
}

let lastTime = 0;

let px, py;
let enemies = [];
let particles = [];
let spawnT = 0;
let speed = 100;
let frameCount = 0;
const PLAYER_SPEED = 260;
const PLAYER_RADIUS = 12;
const movement = {up: false, down: false, left: false, right: false};

canvas.addEventListener('touchmove', e => {
    const rect = canvas.getBoundingClientRect();
    px = Math.min(Math.max((e.touches[0].clientX - rect.left) * (canvas.width / rect.width), PLAYER_RADIUS), W - PLAYER_RADIUS);
    py = Math.min(Math.max((e.touches[0].clientY - rect.top) * (canvas.height / rect.height), PLAYER_RADIUS), H - PLAYER_RADIUS);
});

document.addEventListener('keydown', e => {
    if (e.code === 'ArrowUp' || e.code === 'KeyW') {
        movement.up = true; e.preventDefault();
    }
    if (e.code === 'ArrowDown' || e.code === 'KeyS') {
        movement.down = true; e.preventDefault();
    }
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
        movement.left = true; e.preventDefault();
    }
    if (e.code === 'ArrowRight' || e.code === 'KeyD') {
        movement.right = true; e.preventDefault();
    }
});
document.addEventListener('keyup', e => {
    if (e.code === 'ArrowUp' || e.code === 'KeyW') movement.up = false;
    if (e.code === 'ArrowDown' || e.code === 'KeyS') movement.down = false;
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') movement.left = false;
    if (e.code === 'ArrowRight' || e.code === 'KeyD') movement.right = false;
});

function emitParticle(x, y, color) {
    particles.push({x, y, r: 8, alpha: 0.6, shrink: 0.3, color});
}

function clampPlayer() {
    px = Math.min(Math.max(px, PLAYER_RADIUS), W - PLAYER_RADIUS);
    py = Math.min(Math.max(py, PLAYER_RADIUS), H - PLAYER_RADIUS);
}

function resetMovement() {
    movement.up = movement.down = movement.left = movement.right = false;
}

function init() {
    px = W / 2;
    py = H / 2;
    enemies = [];
    particles = [];
    spawnT = 0;
    speed = 100;
    frameCount = 0;
    resetMovement();
}

function update(dt) {
    frameCount++;
    speed += dt * 0.012;
    const moveAmt = PLAYER_SPEED * dt / 1000;
    if (movement.up) py -= moveAmt;
    if (movement.down) py += moveAmt;
    if (movement.left) px -= moveAmt;
    if (movement.right) px += moveAmt;
    clampPlayer();

    score = Math.floor(speed);
    document.getElementById('score').textContent = score;

    if (frameCount % 3 === 0) {
        emitParticle(px, py, '#60a5fa');
    }

    spawnT -= dt;
    if (spawnT <= 0) {
        spawnT = Math.max(100, 500 - speed * 0.5);
        const side = Math.floor(Math.random() * 4);
        let ex, ey, vx = 0, vy = 0;
        if (side === 0) { ex = Math.random() * W; ey = -10; vy = 1; }
        if (side === 1) { ex = Math.random() * W; ey = H + 10; vy = -1; }
        if (side === 2) { ex = -10; ey = Math.random() * H; vx = 1; }
        if (side === 3) { ex = W + 10; ey = Math.random() * H; vx = -1; }
        enemies.push({x: ex, y: ey, vx, vy});
    }

    for (let i = enemies.length - 1; i >= 0; i--) {
        const en = enemies[i];
        en.x += en.vx * speed * dt / 1000;
        en.y += en.vy * speed * dt / 1000;

        if (Math.hypot(en.x - px, en.y - py) < PLAYER_RADIUS + 5) {
            gameOver();
            return;
        }

        if (en.x < -20 || en.x > W + 20 || en.y < -20 || en.y > H + 20) {
            enemies.splice(i, 1);
        }
    }

    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.r -= p.shrink;
        p.alpha -= 0.05;
        if (p.r <= 0 || p.alpha <= 0) particles.splice(i, 1);
    }
}

function draw() {
    const gradient = ctx.createLinearGradient(0, 0, 0, H);
    gradient.addColorStop(0, '#020617');
    gradient.addColorStop(1, '#0f172a');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, W, H);

    const gridOffset = (frameCount * 2) % 40;
    ctx.strokeStyle = 'rgba(59,130,246,0.1)';
    ctx.lineWidth = 1;
    for (let x = -gridOffset; x < W; x += 40) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, H);
        ctx.stroke();
    }
    for (let y = -gridOffset; y < H; y += 40) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
    }

    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const p of particles) {
        ctx.globalAlpha = Math.max(0, p.alpha);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, Math.max(0, p.r), 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.restore();
    ctx.globalCompositeOperation = 'source-over';

    ctx.save();
    ctx.shadowBlur = 20;
    ctx.shadowColor = '#3b82f6';
    ctx.fillStyle = '#3b82f6';
    ctx.beginPath();
    ctx.arc(px, py, PLAYER_RADIUS, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    ctx.fillStyle = '#ef4444';
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#ef4444';
    for (const en of enemies) {
        ctx.fillRect(en.x - 5, en.y - 5, 10, 10);
    }
    ctx.shadowBlur = 0;
}

function loop(timestamp) {
    if (!running || gamePaused) return;
    let dt = timestamp - lastTime;
    lastTime = timestamp;
    if (dt > 100) dt = 100;
    update(dt);
    draw();
    animFrame = requestAnimationFrame(loop);
}

async function startGame() {
    if (!await initializeArcadeGame()) return;
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('game-over').style.display = 'none';
    init();
    running = true;
    gamePaused = false;
    score = 0;
    document.getElementById('score').textContent = score;
    lastTime = performance.now();
    animFrame = requestAnimationFrame(loop);
}

function resetGame() {
    startGame();
}
</script>
</body>
</html>
