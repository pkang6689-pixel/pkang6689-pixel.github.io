        <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; }

            font-family: 'Orbitron', monospace; 
            overflow: hidden;
            display: flex;
            flex-direction: column;

        #game-wrapper { 
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: auto;
            min-width: 0;
            max-width: 100%;
            margin: 0;
            overflow: auto;
        }
        #game-wrapper > div:first-child {
            width: 100%;
            height: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        #game-sidebar {
            background: rgba(55, 65, 81, 0.98);
            border-radius: 1rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            width: 350px;
            height: auto;
            max-height: 100vh;
            border: 2px solid rgba(107, 114, 128, 0.9);
            box-shadow: 0 20px 45px rgba(0,0,0,0.6);
            overflow-y: auto;
            flex-shrink: 0;
        }
        #game-session-timer {
            background: rgba(34, 197, 94, 0.95);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 700;
            font-size: 2rem;
            font-family: monospace;
            width: 100%;
            text-align: center;
            margin-top: 0.5rem;
            letter-spacing: 2px;
        }
        #game-session-timer.warning {
            background: rgba(239, 68, 68, 0.95);
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .pause-btn { position: absolute; bottom: 0.75rem; left: 0.75rem; z-index: 50; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 0.75rem; color: white; cursor: pointer; padding: 8px; line-height: 0; transition: background 0.2s, transform 0.2s; }
        .pause-btn:hover { background: rgba(255,255,255,0.25); transform: scale(1.1); }
        
        @media (max-width: 1200px) {
            #game-sidebar { width: 300px; padding: 1rem; }
        }
        @media (max-width: 768px) {
            .flex { flex-direction: column; height: auto; }
            #game-sidebar { width: 100%; height: auto; max-height: 250px; }
            #game-wrapper { height: auto; }
        }
    </style>
    <script src="../theme_manager.js"></script>
    <style>
        #pause-screen.hidden { display: none !important; }
    </style>
    <style>
        #start-screen.hidden { display: none !important; }
    </style>
    <style>
        #game-over.hidden { display: none !important; }
    </style>
</head>
<body class="dark-mode bg-gray-900 min-h-screen text-white">
<script src="../scripts/taskbar.js"></script>
<script src="../scripts/global_translations.js?v=8.0"></script>

<div class="flex">

    <div id="game-wrapper" class="relative max-w-md bg-gray-800 rounded-2xl shadow-2xl p-6 border border-gray-700">
        <button class="pause-btn" onclick="togglePause()" title="Pause"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg></button>

        <div class="flex justify-between items-end mb-4">
            <div>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-orange-400 to-yellow-500 bg-clip-text text-transparent">🚂 JUMP MASTER</h1>
                <p class="text-xs text-gray-400 font-sans">Avoid obstacles!</p>
            </div>
            <div class="text-right">
                <div class="text-xs text-gray-400 font-sans">DISTANCE</div>
                <div id="distance" class="text-3xl font-bold text-white">0</div>
            </div>
        </div>

        <canvas id="gameCanvas" class="bg-gray-900 border-2 border-gray-700 mx-auto block" width="400" height="600"></canvas>

        <div class="flex justify-between items-center mt-4 text-center">
            <div>
                <div class="text-xs text-gray-400 font-sans">SCORE</div>
                <div id="score" class="text-2xl font-bold text-white">0</div>
            </div>
            <div>
                <div class="text-xs text-gray-400 font-sans">BEST</div>
                <div id="highScore" class="text-2xl font-bold text-amber-400">0</div>
            </div>
        </div>

        <p class="text-center text-xs text-gray-500 mt-4 font-sans">Arrow keys / WASD • Space to jump</p>

        <div id="game-over" class="absolute inset-0 bg-black/90 rounded-2xl z-20 text-center p-6 backdrop-blur-sm" style="display:none;flex-direction:column;align-items:center;justify-content:center;">
            <h2 class="text-3xl text-red-500 font-bold mb-2">GAME OVER</h2>
            <div class="text-4xl font-bold text-white mb-4" id="final-distance">0</div>
            <button onclick="resetGame()" class="bg-orange-600 hover:bg-orange-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transform transition active:scale-95">
                TRY AGAIN
            </button>
        </div>        <div id="start-screen" class="absolute inset-0 bg-black/80 rounded-2xl z-20 text-center p-6 backdrop-blur-sm" style="display:flex;flex-direction:column;align-items:center;justify-content:center;">
            <h2 class="text-3xl yellow-400 font-bold mb-3">🚀 JUMP MASTER</h2>
            <p class="text-gray-300 mb-4 font-sans text-sm">Jump to the top!</p>
            <div class="text-left text-xs text-gray-400 font-sans mb-6 space-y-1">
                <p><span class="font-bold">Arrow Keys / WASD</span> — Move</p><p><span class="font-bold">Space / Click</span> — Jump</p>
                <p><span class="font-bold">Esc / P</span> — Pause</p>
            </div>
            <button onclick="startGame()" class="bg-yellow-600 hover:bg-yellow-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transform transition active:scale-95">
                START
            </button>
        </div>



        <div id="pause-screen" class="absolute inset-0 bg-black/80 rounded-2xl z-30 text-center p-6 backdrop-blur-sm" style="display:none;flex-direction:column;align-items:center;justify-content:center;">
            <h2 class="text-4xl text-white font-bold mb-4">PAUSED</h2>
            <button onclick="togglePause()" class="bg-orange-600 hover:bg-orange-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transform transition active:scale-95">
                RESUME
            </button>
        </div>
    </div>

    <div id="game-sidebar">
        <div style="width: 100%; text-align: center; color: #9ca3af; margin-bottom: 1rem; font-size: 0.875rem; font-weight: 600;">
            ⭐ TOKEN SESSION
        </div>
    </div>
</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let gameState = {
            player: {
                x: canvas.width / 2,
                y: canvas.height - 80,
                width: 30,
                height: 40,
                vx: 0,
                vy: 0,
                jumping: false,
                jumpPower: 0,
                maxJumpPower: 15
            },
            distance: 0,
            score: 0,
            highScore: localStorage.getItem('jumpMasterHighScore') || 0,
            gameOver: false,
            obstacles: [],
            coins: [],
            particles: [],
            groundY: canvas.height - 40,
            difficulty: 1,
            maxDistance: 1000,
            coinsCollected: 0
        };

        const difficultyThresholds = [
            { distance: 0, speed: 2, spawnRate: 0.02, obstacleWidth: 50 },
            { distance: 500, speed: 2.5, spawnRate: 0.025, obstacleWidth: 45 },
            { distance: 1500, speed: 3, spawnRate: 0.03, obstacleWidth: 40 },
            { distance: 3000, speed: 3.5, spawnRate: 0.035, obstacleWidth: 35 }
        ];

        const keys = {};
        let scrollOffset = 0;

        function drawPlayer() {
            const { player } = gameState;
            const isAirborne = player.jumping;
            
            ctx.save();
            ctx.translate(player.x + player.width/2, player.y + player.height/2);
            
            // Shadow on ground
            if (isAirborne) {
                ctx.save();
                const shadowY = gameState.groundY - player.y - player.height/2;
                ctx.globalAlpha = Math.max(0.1, 0.4 - shadowY / 300);
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(0, shadowY, player.width * 0.6, 4, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
            
            // Body gradient
            const bodyG = ctx.createLinearGradient(-player.width/2, -player.height/2, player.width/2, player.height/2);
            bodyG.addColorStop(0, '#fbbf24');
            bodyG.addColorStop(1, '#d97706');
            ctx.fillStyle = bodyG;
            ctx.shadowBlur = 12;
            ctx.shadowColor = '#f59e0b';
            
            // Rounded body
            const w = player.width, h = player.height, r = 6;
            ctx.beginPath();
            ctx.moveTo(-w/2 + r, -h/2);
            ctx.lineTo(w/2 - r, -h/2);
            ctx.quadraticCurveTo(w/2, -h/2, w/2, -h/2 + r);
            ctx.lineTo(w/2, h/2 - r);
            ctx.quadraticCurveTo(w/2, h/2, w/2 - r, h/2);
            ctx.lineTo(-w/2 + r, h/2);
            ctx.quadraticCurveTo(-w/2, h/2, -w/2, h/2 - r);
            ctx.lineTo(-w/2, -h/2 + r);
            ctx.quadraticCurveTo(-w/2, -h/2, -w/2 + r, -h/2);
            ctx.fill();
            
            ctx.shadowBlur = 0;
            
            // Highlight
            ctx.fillStyle = 'rgba(255,255,255,0.25)';
            ctx.beginPath();
            ctx.ellipse(-3, -h/4, 6, 4, -0.3, 0, Math.PI * 2);
            ctx.fill();
            
            // Eyes
            ctx.fillStyle = 'white';
            const eyeY = -5;
            ctx.beginPath();
            ctx.ellipse(-5, eyeY, 5, 5.5, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(5, eyeY, 5, 5.5, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Pupils (look in movement direction)
            const lookX = player.vx > 0 ? 1.5 : player.vx < 0 ? -1.5 : 0;
            const lookY = isAirborne && player.vy > 0 ? -1 : isAirborne ? 1 : 0;
            ctx.fillStyle = '#1e293b';
            ctx.beginPath();
            ctx.arc(-5 + lookX, eyeY + lookY, 2.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(5 + lookX, eyeY + lookY, 2.5, 0, Math.PI * 2);
            ctx.fill();
            
            // Eye shine
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            ctx.beginPath();
            ctx.arc(-6, eyeY - 2, 1.2, 0, Math.PI * 2);
            ctx.arc(4, eyeY - 2, 1.2, 0, Math.PI * 2);
            ctx.fill();
            
            // Mouth
            ctx.strokeStyle = '#92400e';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            if (isAirborne) {
                ctx.arc(0, 5, 4, 0, Math.PI); // open mouth when jumping
            } else {
                ctx.arc(0, 3, 3, 0.2, Math.PI - 0.2); // smile
            }
            ctx.stroke();
            
            // Feet
            ctx.fillStyle = '#92400e';
            const footSpread = isAirborne ? 4 : 2;
            ctx.beginPath();
            ctx.ellipse(-footSpread - 3, h/2 + 2, 5, 3, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(footSpread + 3, h/2 + 2, 5, 3, 0, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }

        function drawObstacle(obstacle) {
            ctx.save();
            const x = obstacle.x, y = obstacle.y, w = obstacle.width, h = obstacle.height;
            
            // Gradient fill
            const g = ctx.createLinearGradient(x, y, x, y + h);
            g.addColorStop(0, '#ef4444');
            g.addColorStop(1, '#991b1b');
            ctx.fillStyle = g;
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#ef4444';
            
            // Rounded rectangle
            const r = 4;
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.fill();
            
            // Danger stripes
            ctx.shadowBlur = 0;
            ctx.save();
            ctx.clip();
            ctx.strokeStyle = 'rgba(0,0,0,0.2)';
            ctx.lineWidth = 4;
            for (let i = -h; i < w + h; i += 12) {
                ctx.beginPath();
                ctx.moveTo(x + i, y);
                ctx.lineTo(x + i - h, y + h);
                ctx.stroke();
            }
            ctx.restore();
            
            // Top highlight
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.fillRect(x + 2, y + 1, w - 4, 3);
            
            ctx.restore();
        }

        function drawCoin(coin) {
            ctx.save();
            ctx.translate(coin.x, coin.y);
            
            // Glow
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#fbbf24';
            
            // Outer ring gradient
            const g = ctx.createRadialGradient(0, 0, 2, 0, 0, 10);
            g.addColorStop(0, '#fef3c7');
            g.addColorStop(0.5, '#fbbf24');
            g.addColorStop(1, '#d97706');
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(0, 0, 9, 0, Math.PI * 2);
            ctx.fill();
            
            // Inner circle
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#fef3c7';
            ctx.beginPath();
            ctx.arc(0, 0, 5, 0, Math.PI * 2);
            ctx.fill();
            
            // $ symbol
            ctx.fillStyle = '#d97706';
            ctx.font = 'bold 10px "Orbitron", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('$', 0, 0);
            
            // Shine
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.beginPath();
            ctx.ellipse(-2, -3, 3, 2, -0.5, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }

        function createParticles(x, y, color, count = 5) {
            for (let i = 0; i < count; i++) {
                const angle = (Math.random() * Math.PI * 2);
                gameState.particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * (2 + Math.random() * 3),
                    vy: Math.sin(angle) * (2 + Math.random() * 3) - 1,
                    life: 30,
                    maxLife: 30,
                    color: color
                });
            }
        }

        function drawParticles() {
            gameState.particles = gameState.particles.filter(p => p.life > 0);
            gameState.particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.2;
                p.life--;

                const alpha = p.life / p.maxLife;
                ctx.fillStyle = p.color.replace(')', `, ${alpha})`).replace('rgb', 'rgba');
                ctx.beginPath();
                ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function getDifficultyConfig() {
            for (let i = difficultyThresholds.length - 1; i >= 0; i--) {
                if (gameState.distance >= difficultyThresholds[i].distance) {
                    gameState.difficulty = i + 1;
                    return difficultyThresholds[i];
                }
            }
            return difficultyThresholds[0];
        }

        function update() {
            if (shouldSkipGameUpdate()) return;

            const { player } = gameState;
            const config = getDifficultyConfig();

            // Horizontal movement
            player.vx = 0;
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) player.vx = -5;
            if (keys['ArrowRight'] || keys['d'] || keys['D']) player.vx = 5;

            player.x += player.vx;
            player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));

            // Gravity and jumping
            if (!player.jumping) {
                player.vy = 0;
                player.y = gameState.groundY - player.height;
            } else {
                player.vy -= 0.6; // gravity
                player.y -= player.vy;

                if (player.y >= gameState.groundY - player.height) {
                    player.y = gameState.groundY - player.height;
                    player.jumping = false;
                    player.jumpPower = 0;
                    createParticles(player.x + player.width / 2, player.y + player.height, '#f59e0b', 4);
                }
            }

            // Update distance and scroll
            gameState.distance += config.speed;
            scrollOffset += config.speed;

            // Move obstacles
            gameState.obstacles = gameState.obstacles.filter(obs => {
                obs.y += 2;
                return obs.y < canvas.height;
            });

            // Move coins
            gameState.coins = gameState.coins.filter(coin => {
                coin.y += 2;
                return coin.y < canvas.height;
            });

            // Spawn obstacles
            if (Math.random() < config.spawnRate && gameState.obstacles.length < 4) {
                const width = config.obstacleWidth + Math.random() * 30;
                const laneX = Math.random() * (canvas.width - width);
                gameState.obstacles.push({
                    x: laneX,
                    y: -50,
                    width: width,
                    height: 30
                });
            }

            // Spawn coins
            if (Math.random() < 0.005 && gameState.coins.length < 3) {
                gameState.coins.push({
                    x: Math.random() * (canvas.width - 20) + 10,
                    y: -20
                });
            }

            // Collision with obstacles
            gameState.obstacles.forEach(obs => {
                if (player.x < obs.x + obs.width &&
                    player.x + player.width > obs.x &&
                    player.y < obs.y + obs.height &&
                    player.y + player.height > obs.y) {
                    setGameOver(true);
                    createParticles(player.x, player.y, '#dc2626', 10);
                }
            });

            // Collision with coins
            gameState.coins.forEach((coin, idx) => {
                if (Math.hypot(player.x + player.width / 2 - coin.x, player.y + player.height / 2 - coin.y) < 25) {
                    gameState.coins.splice(idx, 1);
                    gameState.score += 100;
                    gameState.coinsCollected++;
                    createParticles(coin.x, coin.y, '#fbbf24', 6);
                }
            });
        }

        function draw() {
            // Sky gradient
            const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
            sky.addColorStop(0, '#1e3a5f');
            sky.addColorStop(0.4, '#3b82f6');
            sky.addColorStop(0.7, '#7dd3fc');
            sky.addColorStop(1, '#bae6fd');
            ctx.fillStyle = sky;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Clouds with parallax
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            const c1x = (80 + (scrollOffset * 0.15)) % (canvas.width + 100) - 50;
            const c2x = (220 + (scrollOffset * 0.08)) % (canvas.width + 150) - 75;
            // Cloud 1
            ctx.beginPath();
            ctx.arc(c1x, 50, 25, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath();
            ctx.arc(c1x + 20, 40, 20, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath();
            ctx.arc(c1x - 15, 48, 18, 0, Math.PI * 2); ctx.fill();
            // Cloud 2
            ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
            ctx.beginPath();
            ctx.arc(c2x, 85, 35, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath();
            ctx.arc(c2x + 30, 70, 28, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath();
            ctx.arc(c2x - 20, 78, 22, 0, Math.PI * 2); ctx.fill();

            // Ground with gradient
            const groundG = ctx.createLinearGradient(0, gameState.groundY, 0, canvas.height);
            groundG.addColorStop(0, '#22c55e');
            groundG.addColorStop(0.3, '#16a34a');
            groundG.addColorStop(1, '#15803d');
            ctx.fillStyle = groundG;
            ctx.fillRect(0, gameState.groundY, canvas.width, canvas.height - gameState.groundY);
            
            // Ground detail lines
            ctx.strokeStyle = 'rgba(21,128,61,0.4)';
            ctx.lineWidth = 1;
            for (let x = -(scrollOffset * 2) % 20; x < canvas.width; x += 20) {
                ctx.beginPath();
                ctx.moveTo(x, gameState.groundY + 5);
                ctx.lineTo(x + 8, gameState.groundY + 3);
                ctx.stroke();
            }
            
            // Grass blades
            ctx.strokeStyle = '#4ade80';
            ctx.lineWidth = 1.5;
            for (let x = -(scrollOffset * 1.5) % 15; x < canvas.width; x += 15) {
                ctx.beginPath();
                ctx.moveTo(x, gameState.groundY);
                ctx.quadraticCurveTo(x + 2, gameState.groundY - 6, x + 4, gameState.groundY - 8);
                ctx.stroke();
            }

            // Draw all game objects
            gameState.obstacles.forEach(drawObstacle);
            gameState.coins.forEach(drawCoin);
            drawParticles();
            drawPlayer();

            // Distance text with better styling
            ctx.save();
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fillRect(5, 8, 180, 68);
            ctx.fillStyle = '#f8fafc';
            ctx.font = 'bold 16px "Orbitron", sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(`${Math.floor(gameState.distance)}m`, 12, 30);
            
            const diffLevel = ['Easy', 'Normal', 'Hard', 'Expert'];
            const diffColors = ['#22c55e', '#fbbf24', '#f97316', '#ef4444'];
            ctx.font = '11px "Orbitron", sans-serif';
            ctx.fillStyle = diffColors[gameState.difficulty - 1];
            ctx.fillText(diffLevel[gameState.difficulty - 1], 12, 48);
            ctx.fillStyle = '#fbbf24';
            ctx.fillText(`🪙 ${gameState.coinsCollected}`, 12, 66);
            ctx.restore();
        }

        function gameLoop() {
            update();
            draw();
            
            document.getElementById('distance').textContent = gameState.distance;
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('highScore').textContent = gameState.highScore;

            if (gameState.gameOver) {
                document.getElementById('final-distance').textContent = Math.floor(gameState.distance) + 'm';
                document.getElementById('game-over').style.display = 'flex';
            }

            arcadeState.animFrame = requestAnimationFrame(gameLoop);
        }

        function resetGame() {
            gameState = {
                player: {
                    x: canvas.width / 2,
                    y: canvas.height - 80,
                    width: 30,
                    height: 40,
                    vx: 0,
                    vy: 0,
                    jumping: false,
                    jumpPower: 0,
                    maxJumpPower: 15
                },
                distance: 0,
                score: 0,
                highScore: localStorage.getItem('jumpMasterHighScore') || 0,
                gameOver: false,
                obstacles: [],
                coins: [],
                particles: [],
                groundY: canvas.height - 40,
                difficulty: 1,
                maxDistance: 1000,
                coinsCollected: 0
            };
            resetArcadeGame();
            document.getElementById('game-over').style.display = 'none';
            document.getElementById('pause-screen').style.display = 'none';
        }

        // Input handlers
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;

            if (e.code === 'Space' && !gameState.player.jumping) {
                e.preventDefault();
                gameState.player.jumping = true;
                gameState.player.vy = gameState.player.maxJumpPower;
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        async function exitGame() {
            const user = await getUser();
            if (user) {
                if (gameState.score > gameState.highScore) {
                    gameState.highScore = gameState.score;
                    localStorage.setItem('jumpMasterHighScore', gameState.score);
                }
                
                const tokensEarned = Math.floor(gameState.score / 10);
                await updateUserPoints(user.id, tokensEarned);
                
                setTimeout(() => {
                    window.history.back();
                }, 1000);
            }
        }

        // Initialize - deferred until user clicks START
        // (async function() {
        //     if (!await initializeArcadeGame('🚂 JUMP MASTER', 'from-orange-400', 'to-yellow-500')) return;
        //     gameLoop();
        // })();
    
    async function startGame() {
            if (!await initializeArcadeGame('🚀 JUMP MASTER', 'from-yellow-400', 'to-orange-500')) return;
            document.getElementById('start-screen').style.display = 'none';
            init();
            gameRunning = true;
            gameLoop();
        }

    </script>
</body>
</html>
