<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 - Arcade</title>
    <script src="../scripts/arcade-core.js"></script>
    <script src="../firebase-utils.js"></script>
    <script src="../scripts/badges.js"></script>
    <style>
        #game-session-timer {
            font-size: 2.5rem !important;
            font-weight: 700 !important;
        }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/main.css">
        <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; }
        body { 
            font-family: 'Orbitron', monospace; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        body > .flex { display: flex !important; flex-direction: row !important; overflow: hidden; height: 100vh; gap: 0.5rem; padding: 0.5rem; }
        #game-wrapper { 
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: auto;
            min-width: 0;
            max-width: 100%;
            margin: 0;
            overflow: hidden;
        }
        #game-wrapper > div:first-child {
            width: 100%;
            height: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 0.3rem;
            padding: 1rem;
            position: relative;
        }
        #text-header {
            position: absolute !important;
            top: 0.5rem !important;
            left: 0.5rem !important;
            z-index: 10 !important;
            display: block !important;
            width: auto !important;
            align-items: unset !important;
            justify-content: unset !important;
            padding: 0 !important;
        }
        #text-header h1 {
            margin: 0 !important;
            display: block !important;
        }
        #text-header p {
            margin: 0 !important;
            display: block !important;
        }
        #game-sidebar {
            background: rgba(55, 65, 81, 0.98);
            border-radius: 1rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            width: 350px;
            height: auto;
            max-height: 100vh;
            border: 2px solid rgba(107, 114, 128, 0.9);
            box-shadow: 0 20px 45px rgba(0,0,0,0.6);
            overflow-y: auto;
            flex-shrink: 0;
        }
        #game-session-timer {
            background: rgba(34, 197, 94, 0.95);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 700;
            font-size: 2rem;
            font-family: monospace;
            width: 100%;
            text-align: center;
            margin-top: 0.5rem;
            letter-spacing: 2px;
        }
        #game-session-timer.warning {
            background: rgba(239, 68, 68, 0.95);
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .pause-btn { position: absolute; bottom: 0.75rem; left: 0.75rem; z-index: 50; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 0.75rem; color: white; cursor: pointer; padding: 8px; line-height: 0; transition: background 0.2s, transform 0.2s; }
        .pause-btn:hover { background: rgba(255,255,255,0.25); transform: scale(1.1); }
        
        @media (max-width: 1200px) {
            #game-sidebar { width: 300px; padding: 1rem; }
        }
        @media (max-width: 768px) {
            .flex { flex-direction: column; height: auto; }
            #game-sidebar { width: 100%; height: auto; max-height: 250px; }
            #game-wrapper { height: auto; }
        }
    </style>
    <script src="../theme_manager.js"></script>
    <style>
        #pause-screen.hidden { display: none !important; }
    </style>
    <style>
        #start-screen.hidden { display: none !important; }
    </style>
    <style>
        #game-over.hidden { display: none !important; }
    </style>
    <style>
        #board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 8px;
            width: 90%;
            max-width: calc(100vh - 16rem);
            aspect-ratio: 1;
            padding: 8px;
            background: rgba(187, 173, 160, 0.35);
            border-radius: 8px;
            position: relative;
        }
        
        .tile {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: clamp(1rem, 5vw, 2rem);
            font-weight: 700;
            border-radius: 4px;
            background: rgba(205, 193, 180, 0.35);
            color: #776e65;
            font-family: 'Orbitron', monospace;
        }
        
        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile-128 { background: #edcf72; color: #095f6b; font-size: 1.5rem; }
        .tile-256 { background: #edcc61; color: #095f6b; font-size: 1.5rem; }
        .tile-512 { background: #edc850; color: #095f6b; font-size: 1.5rem; }
        .tile-1024 { background: #edc53f; color: #095f6b; font-size: 1.25rem; }
        .tile-2048 { background: #edc22e; color: #095f6b; font-size: 1.25rem; font-weight: 900; }
        
        .explosion-particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
        }
        
        @keyframes tileAppear {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); }
        }
        
        @keyframes tilePop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        
        @keyframes moveUp {
            0% { transform: translateY(10px); }
            100% { transform: translateY(0); }
        }
        
        @keyframes moveDown {
            0% { transform: translateY(-10px); }
            100% { transform: translateY(0); }
        }
        
        @keyframes moveLeft {
            0% { transform: translateX(10px); }
            100% { transform: translateX(0); }
        }
        
        @keyframes moveRight {
            0% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }
        
        .arrow-controls {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 1rem;
            width: 100%;
        }
        
        .arrow-row {
            display: flex;
            gap: 4px;
        }
        
        .arrow-btn {
            flex: 1;
            padding: 8px;
            background: rgba(107, 114, 128, 0.7);
            border: 1px solid rgba(107, 114, 128, 0.9);
            border-radius: 6px;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .arrow-btn:hover {
            background: rgba(107, 114, 128, 0.9);
            transform: scale(1.05);
        }
        
        .arrow-btn:active {
            transform: scale(0.95);
        }
        
        #game-wrapper {
            max-width: 100% !important;
            width: 100% !important;
            height: 100% !important;
            padding: 2% !important;
        }
        
        #game-wrapper h1 {
            font-size: clamp(1.5rem, 5vw, 2.5rem) !important;
        }
        
        #game-wrapper p {
            font-size: clamp(0.7rem, 2vw, 1rem) !important;
        }
        
        #score, #best-score {
            font-size: clamp(1.5rem, 4vw, 3rem) !important;
        }
        
        #game-wrapper button {
            font-size: clamp(0.7rem, 1.5vw, 1rem) !important;
            padding: clamp(0.5rem, 2vw, 0.75rem) clamp(0.5rem, 1.5vw, 1rem) !important;
        }
    </style>
</head>

<div class="flex">
    <div id="game-wrapper" class="relative max-w-md bg-gray-800 rounded-2xl shadow-2xl p-6 border border-gray-700">
        <div id="text-header">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-amber-400 to-orange-500 bg-clip-text text-transparent" data-i18n="2048">2048</h1>
            <p class="text-xs text-gray-400 font-sans" data-i18n="Slide tiles, merge to 2048!">Slide tiles, merge to 2048!</p>
        </div>
        
        <div class="flex justify-between items-end mb-4">
            <div></div>
            <div class="flex gap-4 text-right">
                <div>
                    <div class="text-xs text-gray-400 font-sans" data-i18n="SCORE">SCORE</div>

                </div>
                <div>
                    <div class="text-xs text-gray-400 font-sans">BEST</div>
                    <div id="best-score" class="text-3xl font-bold text-amber-300">0</div>
                </div>
            </div>
        </div>

        <div class="flex gap-2 mb-3 -mt-24">
            <button onclick="undoMove()" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white font-bold py-2 px-3 rounded-lg text-xs transition active:scale-95" title="Undo">↩ UNDO</button>
            <button onclick="resetGame()" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white font-bold py-2 px-3 rounded-lg text-xs transition active:scale-95" title="New Game">🔄 NEW</button>
        </div>

        <div id="board" class="grid-2048"></div>

        <p class="text-center text-xs text-gray-500 mt-4 font-sans" data-i18n="Arrow keys / WASD / Swipe to slide">Arrow keys / WASD / Swipe to slide</p>

        <div class="arrow-controls">
            <div class="arrow-row" style="justify-content:center;margin-bottom:4px;">
                <button class="arrow-btn" onclick="move('up')" title="Up">⬆️</button>
            </div>
            <div class="arrow-row">
                <button class="arrow-btn" onclick="move('left')" title="Left">⬅️</button>
                <button class="arrow-btn" onclick="move('down')" title="Down">⬇️</button>
                <button class="arrow-btn" onclick="move('right')" title="Right">➡️</button>
            </div>
        </div>        <div id="start-screen" class="absolute inset-0 bg-black/80 rounded-2xl z-20 text-center p-6 backdrop-blur-sm" style="display:flex;flex-direction:column;align-items:center;justify-content:center;">
            <h2 class="text-3xl gray-400 font-bold mb-3">2048</h2>
            <p class="text-gray-300 mb-4 font-sans text-sm">Combine tiles to reach 2048!</p>
            <div class="text-left text-xs text-gray-400 font-sans mb-6 space-y-1">
                <p><span class="font-bold">Arrow Keys</span> — Move tiles</p><p><span class="font-bold">Swipe</span> — Move (mobile)</span></p>
                <p><span class="font-bold">Esc / P</span> — Pause</p>
            </div>
            <button onclick="startGame()" class="bg-gray-600 hover:bg-gray-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transform transition active:scale-95">
                START

        <!-- Game Over Overlay -->
        <div id="game-over" class="absolute inset-0 bg-black/90 rounded-2xl z-20 text-center p-6 backdrop-blur-sm" style="display:none;flex-direction:column;align-items:center;justify-content:center;">
            <h2 id="end-title" class="text-3xl font-bold mb-2 text-red-500">GAME OVER</h2>
            <p id="end-msg" class="text-gray-300 mb-6 font-sans">No moves left!</p>
            <div class="text-4xl font-bold text-white mb-8" id="final-score">0</div>
            <button onclick="resetGame()" class="bg-amber-600 hover:bg-amber-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transform transition active:scale-95" data-i18n="TRY AGAIN">
                TRY AGAIN
            </button>
        </div>
    </div>

    <div id="game-sidebar">
        <div style="width:100%;text-align:center;color:#9ca3af;margin-bottom:0.5rem;font-size:0.875rem;font-weight:600;">
            ⭐ TOKEN SESSION
        </div>
        <div id="token-display" style="width:100%;text-align:center;margin-bottom:1rem;color:#d1d5db;font-size:0.95rem;"></div>
        <div class="settings-box">
            <div class="settings-title">⚙️ EFFECTS</div>
            <div class="toggle-item">
                <span>Screen Shake</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="toggleScreenShake" checked>
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <div class="toggle-item">
                <span>Explosions</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="toggleExplosions" checked>
                    <span class="toggle-slider"></span>
                </label>
            </div>
        </div>

<script>
    let grid = [], score = 0, gameActive = true, won2048 = false;
    let bestScore = parseInt(localStorage.getItem('2048_best') || '0');
    let prevGrid = null, prevScore = 0;
    let moveCount = 0;
    let enableScreenShake = true;
    let enableExplosions = true;

    document.getElementById('best-score').textContent = bestScore;

    // Toggle event listeners
    document.getElementById('toggleScreenShake').addEventListener('change', (e) => {
        enableScreenShake = e.target.checked;
        localStorage.setItem('2048_screenShake', enableScreenShake);
    });
    document.getElementById('toggleExplosions').addEventListener('change', (e) => {
        enableExplosions = e.target.checked;
        localStorage.setItem('2048_explosions', enableExplosions);
    });

    // Load saved settings
    enableScreenShake = localStorage.getItem('2048_screenShake') !== 'false';
    enableExplosions = localStorage.getItem('2048_explosions') !== 'false';
    document.getElementById('toggleScreenShake').checked = enableScreenShake;
    document.getElementById('toggleExplosions').checked = enableExplosions;

    async function init() {
        if (!await initializeArcadeGame()) return;
        grid = Array.from({length: 4}, () => Array(4).fill(0));
        score = 0; gameActive = true; won2048 = false;
        prevGrid = null; prevScore = 0; moveCount = 0;
        explosionParticles = [];
        if (explosionAnimFrame) cancelAnimationFrame(explosionAnimFrame);
        document.getElementById('score').textContent = '0';
        document.getElementById('game-over').style.display = 'none';
        addRandom(); addRandom();
        render();
    }

    function addRandom() {
        const empty = [];
        for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) if (grid[r][c] === 0) empty.push({r, c});
        if (empty.length === 0) return;
        const {r, c} = empty[Math.floor(Math.random() * empty.length)];
        grid[r][c] = Math.random() < 0.9 ? 2 : 4;
    }

    function render(mergedCells) {
        const board = document.getElementById('board');
        
        // Remove all tiles (keep particles)
        const particleElements = Array.from(board.querySelectorAll('.explosion-particle'));
        board.innerHTML = '';
        particleElements.forEach(el => board.appendChild(el));
        
        for (let r = 0; r < 4; r++) {
            for (let c = 0; c < 4; c++) {
                const tile = document.createElement('div');
                const val = grid[r][c];
                const cls = val <= 2048 ? 'tile-' + val : 'tile-2048';
                tile.className = 'tile ' + cls;
                tile.textContent = val || '';
                if (mergedCells && mergedCells.has(r + ',' + c)) {
                    tile.style.animation = 'tilePop 0.25s ease';
                }
                if (val && !mergedCells) {
                    tile.style.animation = 'tileAppear 0.15s ease';
                }
                board.appendChild(tile);
            }
        }
        
        // Create explosion effect for merged tiles with a slight delay (if enabled)
        if (enableExplosions && mergedCells && mergedCells.size > 0) {
            setTimeout(() => {
                for (let key of mergedCells) {
                    const [r, c] = key.split(',').map(Number);
                    const val = grid[r][c];
                    const allElements = Array.from(board.querySelectorAll('.tile'));
                    const index = r * 4 + c;
                    if (allElements[index]) {
                        const color = getColorForValue(val);
                        createExplosion(allElements[index], color);
                    }
                }
            }, 80);
        }
        
        // Score pulse animation
        const scoreEl = document.getElementById('score');
        scoreEl.style.transition = 'transform 0.15s ease';
        scoreEl.style.transform = 'scale(1.15)';
        setTimeout(() => scoreEl.style.transform = 'scale(1)', 150);
    }
    
    function getColorForValue(val) {
        const colors = {
            2:    '#fcd34d',    4:    '#fbbf24',    8:    '#fb923c',    16:   '#f87171',
            32:   '#ef4444',    64:   '#dc2626',    128:  '#a78bfa',    256:  '#8b5cf6',
            512:  '#7c3aed',    1024: '#6d28d9',    2048: '#34d399'
        };
        return colors[val] || '#a78bfa';
    }

    let explosionParticles = [];
    let explosionAnimFrame = null;

    function createExplosion(tileElement, color) {
        const rect = tileElement.getBoundingClientRect();
        const boardRect = document.getElementById('board').getBoundingClientRect();
        const centerX = rect.left - boardRect.left + rect.width / 2;
        const centerY = rect.top - boardRect.top + rect.height / 2;
        
        const particleCount = 10;
        const redOrangePalette = ['#ff4444', '#ff6644', '#ff8844', '#ffaa44', '#ff5555', '#ff7755', '#ff9955'];
        
        for (let i = 0; i < particleCount; i++) {
            const angle = (i / particleCount) * Math.PI * 2;
            const velocity = 4 + Math.random() * 3;
            
            // Pick random red/orange color from palette
            const variedColor = redOrangePalette[Math.floor(Math.random() * redOrangePalette.length)];
            
            explosionParticles.push({
                x: centerX,
                y: centerY,
                vx: Math.cos(angle) * velocity,
                vy: Math.sin(angle) * velocity,
                life: 1.0,
                color: variedColor,
                element: null
            });
        }
        
        animateExplosion();
    }
    
    function animateExplosion() {
        if (explosionAnimFrame) cancelAnimationFrame(explosionAnimFrame);
        
        const board = document.getElementById('board');
        
        function updateParticles() {
            let hasAliveParticles = false;
            
            for (let p of explosionParticles) {
                if (p.life <= 0) continue;
                hasAliveParticles = true;
                
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1; // gravity
                p.life -= 0.016;
                
                if (!p.element) {
                    p.element = document.createElement('div');
                    p.element.className = 'explosion-particle';
                    board.appendChild(p.element);
                }
                
                const size = 35 * Math.max(0, p.life);
                const offset = size / 2;
                p.element.style.transform = `translate(${p.x - offset}px, ${p.y - offset}px)`;
                p.element.style.width = size + 'px';
                p.element.style.height = size + 'px';
                p.element.style.background = p.color;
                p.element.style.opacity = Math.max(0, p.life);
                p.element.style.boxShadow = `0 0 ${12 * p.life}px ${p.color}`;
            }
            
            if (hasAliveParticles) {
                explosionAnimFrame = requestAnimationFrame(updateParticles);
            } else {
                // Clean up dead particles
                for (let p of explosionParticles) {
                    if (p.element && p.element.parentNode) {
                        p.element.remove();
                    }
                }
                explosionParticles = [];
            }
        }
        
        explosionAnimFrame = requestAnimationFrame(updateParticles);
    }

    function slide(row) {
        let arr = row.filter(v => v !== 0);
        let mergedIndices = [];
        for (let i = 0; i < arr.length - 1; i++) {
            if (arr[i] === arr[i + 1]) {
                arr[i] *= 2;
                score += arr[i];
                
                // Track max tile for badges
                try {
                const currentMax = parseInt(localStorage.getItem('2048_max_tile') || '0');
                if (arr[i] > currentMax) {
                    localStorage.setItem('2048_max_tile', arr[i]);
                    if (window.BadgeSystem && window.BadgeSystem.checkAll) {
                       window.BadgeSystem.checkAll(); 
                    }
                }
                } catch(e) {}
                
                // Add a small delay for badges to trigger properly if needed
                if (arr[i] === 2048 && !won2048) { won2048 = true; }
                arr.splice(i + 1, 1);
                mergedIndices.push(i);
            }
        }
        while (arr.length < 4) arr.push(0);
        return {result: arr, merged: mergedIndices};
    }

    function undoMove() {
        if (!prevGrid) return;
        grid = prevGrid.map(row => [...row]);
        score = prevScore;
        gameActive = true;
        document.getElementById('score').textContent = score;
        document.getElementById('game-over').style.display = 'none';
        render();
        prevGrid = null; // can only undo once
    }

    function move(direction) {
        if (!gameActive) return;
        const oldGrid = JSON.stringify(grid);

        // Save state for undo
        prevGrid = grid.map(row => [...row]);
        prevScore = score;

        let mergedCells = new Set();

        if (direction === 'left') {
            for (let r = 0; r < 4; r++) {
                const {result, merged} = slide(grid[r]);
                grid[r] = result;
                merged.forEach(i => mergedCells.add(r + ',' + i));
            }
        } else if (direction === 'right') {
            for (let r = 0; r < 4; r++) {
                const {result, merged} = slide(grid[r].reverse());
                grid[r] = result.reverse();
                merged.forEach(i => mergedCells.add(r + ',' + (3-i)));
            }
        } else if (direction === 'up') {
            for (let c = 0; c < 4; c++) {
                let col = [grid[0][c], grid[1][c], grid[2][c], grid[3][c]];
                const {result, merged} = slide(col);
                for (let r = 0; r < 4; r++) grid[r][c] = result[r];
                merged.forEach(i => mergedCells.add(i + ',' + c));
            }
        } else if (direction === 'down') {
            for (let c = 0; c < 4; c++) {
                let col = [grid[3][c], grid[2][c], grid[1][c], grid[0][c]];
                const {result, merged} = slide(col);
                for (let r = 0; r < 4; r++) grid[3 - r][c] = result[r];
                merged.forEach(i => mergedCells.add((3-i) + ',' + c));
            }
        }

        if (JSON.stringify(grid) !== oldGrid) {
            moveCount++;
            addRandom();
            document.getElementById('score').textContent = score;

            // Update best score
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('2048_best', bestScore);
                document.getElementById('best-score').textContent = bestScore;
            }

            render(mergedCells);

            // Award badge for achievements
            if (won2048) {
                if (window.BadgeSystem) {
                    window.BadgeSystem.award('2048_tile');
                }
                won2048 = false;
            }

            // Apply direction indicator animation to game wrapper (if enabled)
            if (enableScreenShake) {
                const wrapper = document.getElementById('game-wrapper');
                wrapper.style.animation = 'none';
                setTimeout(() => {
                    wrapper.style.animation = `move${direction.charAt(0).toUpperCase() + direction.slice(1)} 0.3s ease-in-out`;
                }, 10);
            }

            if (!canMove()) {
                gameActive = false;
                document.getElementById('final-score').textContent = score;
                document.getElementById('game-over').style.display = 'flex';
            }
        } else {
            prevGrid = null; // no actual move, don't save undo state
        }
    }

    function canMove() {
        for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) {
            if (grid[r][c] === 0) return true;
            if (c < 3 && grid[r][c] === grid[r][c + 1]) return true;
            if (r < 3 && grid[r][c] === grid[r + 1][c]) return true;
        }
        return false;
    }

    function resetGame() { init(); }

    // Keyboard
    document.addEventListener('keydown', e => {
        switch (e.key) {
            case 'ArrowUp': case 'w': case 'W': move('up'); e.preventDefault(); break;
            case 'ArrowDown': case 's': case 'S': move('down'); e.preventDefault(); break;
            case 'ArrowLeft': case 'a': case 'A': move('left'); e.preventDefault(); break;
            case 'ArrowRight': case 'd': case 'D': move('right'); e.preventDefault(); break;
        }
    });

    // Touch / Swipe
    let touchStart = null;
    document.addEventListener('touchstart', e => {
        touchStart = {x: e.touches[0].clientX, y: e.touches[0].clientY};
    });
    document.addEventListener('touchend', e => {
        if (!touchStart) return;
        const dx = e.changedTouches[0].clientX - touchStart.x;
        const dy = e.changedTouches[0].clientY - touchStart.y;
        if (Math.abs(dx) > Math.abs(dy)) {
            if (dx > 30) move('right'); else if (dx < -30) move('left');
        } else {
            if (dy > 30) move('down'); else if (dy < -30) move('up');
        }
        touchStart = null;
    });

    // Game loop for continuous animation
    function gameLoop() {
        if (gameActive) {
            animFrame = requestAnimationFrame(gameLoop);
        }
    }

    // init() is called by startGame() when user clicks START

    async function startGame() {
        if (!await initializeArcadeGame('2048', 'from-slate-400', 'to-slate-600')) return;
        document.getElementById('start-screen').style.display = 'none';
        init();
        gameActive = true;
        animFrame = requestAnimationFrame(gameLoop);
    }

    </script>
</body>
</html>
