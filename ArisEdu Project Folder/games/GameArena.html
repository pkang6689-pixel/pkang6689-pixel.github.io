<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena - Arcade</title>
    <script src="../scripts/arcade-core.js"></script>
    <script src="../firebase-utils.js"></script>
    <style>
        #game-session-timer {
            font-size: 2.5rem !important;
            font-weight: 700 !important;
        }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/main.css">
        <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; }
        body { 
            font-family: 'Orbitron', monospace; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        body > .flex { display: flex !important; flex-direction: row !important; overflow: hidden; height: 100vh; gap: 1rem; padding: 1rem; }
        #game-wrapper { 
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: auto;
            min-width: 0;
            max-width: 100%;
            margin: 0;
            overflow: auto;
        }
        #game-wrapper > div:first-child {
            width: 100%;
            height: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        #game-sidebar {
            background: rgba(55, 65, 81, 0.98);
            border-radius: 1rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            width: 350px;
            height: auto;
            max-height: 100vh;
            border: 2px solid rgba(107, 114, 128, 0.9);
            box-shadow: 0 20px 45px rgba(0,0,0,0.6);
            overflow-y: auto;
            flex-shrink: 0;
        }
        #game-session-timer {
            background: rgba(34, 197, 94, 0.95);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 700;
            font-size: 2rem;
            font-family: monospace;
            width: 100%;
            text-align: center;
            margin-top: 0.5rem;
            letter-spacing: 2px;
        }
        #game-session-timer.warning {
            background: rgba(239, 68, 68, 0.95);
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .pause-btn { position: absolute; bottom: 0.75rem; left: 0.75rem; z-index: 50; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 0.75rem; color: white; cursor: pointer; padding: 8px; line-height: 0; transition: background 0.2s, transform 0.2s; }
        .pause-btn:hover { background: rgba(255,255,255,0.25); transform: scale(1.1); }
        
        @media (max-width: 1200px) {
            #game-sidebar { width: 300px; padding: 1rem; }
        }
        @media (max-width: 768px) {
            .flex { flex-direction: column; height: auto; }
            #game-sidebar { width: 100%; height: auto; max-height: 250px; }
            #game-wrapper { height: auto; }
        }
    </style>
    <script src="../theme_manager.js"></script>
    <style>
        #pause-screen.hidden { display: none !important; }
    </style>
    <style>
        #start-screen.hidden { display: none !important; }
    </style>
    <style>
        #game-over.hidden { display: none !important; }
    </style>
</head>
<body class="dark-mode bg-gray-900 min-h-screen text-white">
<script src="../scripts/taskbar.js"></script>
<script src="../scripts/global_translations.js?v=8.0"></script>

<div class="flex">

    <div id="game-wrapper" class="relative max-w-md bg-gray-800 rounded-2xl shadow-2xl p-6 border border-gray-700">
        <button class="pause-btn" onclick="togglePause()" title="Pause"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg></button>

        <div class="flex justify-between items-end mb-4">
            <div>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">⚔️ ARENA</h1>
                <p class="text-xs text-gray-400 font-sans">Survive all waves!</p>
            </div>
            <div class="text-right">
                <div class="text-xs text-gray-400 font-sans">SCORE</div>
                <div id="score" class="text-3xl font-bold text-white">0</div>
            </div>
        </div>

        <canvas id="gameCanvas" class="bg-gray-900 border-2 border-gray-700 mx-auto block" width="480" height="400"></canvas>

        <div class="flex justify-between items-center mt-4 text-center">
            <div>
                <div class="text-xs text-gray-400 font-sans">HEALTH</div>
                <div id="health" class="text-2xl font-bold text-white">100</div>
            </div>
            <div>
                <div class="text-xs text-gray-400 font-sans">WAVE</div>
                <div id="wave" class="text-2xl font-bold text-white">1</div>
            </div>
        </div>

        <p class="text-center text-xs text-gray-500 mt-4 font-sans">Arrow keys / WASD to move • Click or Space to attack</p>

        <div id="game-over" class="absolute inset-0 bg-black/90 rounded-2xl z-20 text-center p-6 backdrop-blur-sm" style="display:none;flex-direction:column;align-items:center;justify-content:center;">
            <h2 class="text-3xl text-red-500 font-bold mb-2">GAME OVER</h2>
            <div class="text-4xl font-bold text-white mb-4" id="final-score">0</div>
            <div class="text-lg text-gray-300 mb-6" id="final-wave">Wave: 1</div>
            <button onclick="resetGame()" class="bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transform transition active:scale-95">
                TRY AGAIN
            </button>
        </div>        <div id="start-screen" class="absolute inset-0 bg-black/80 rounded-2xl z-20 text-center p-6 backdrop-blur-sm" style="display:flex;flex-direction:column;align-items:center;justify-content:center;">
            <h2 class="text-3xl red-400 font-bold mb-3">⚔️ ARENA</h2>
            <p class="text-gray-300 mb-4 font-sans text-sm">Survive the waves of enemies!</p>
            <div class="text-left text-xs text-gray-400 font-sans mb-6 space-y-1">
                <p><span class="font-bold">Mouse / Arrow Keys</span> — Move</p><p><span class="font-bold">Click / Space</span> — Shoot</p>
                <p><span class="font-bold">Esc / P</span> — Pause</p>
            </div>
            <button onclick="startGame()" class="bg-red-600 hover:bg-red-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transform transition active:scale-95">
                START
            </button>
        </div>



        <div id="pause-screen" class="absolute inset-0 bg-black/80 rounded-2xl z-30 text-center p-6 backdrop-blur-sm" style="display:none;flex-direction:column;align-items:center;justify-content:center;">
            <h2 class="text-4xl text-white font-bold mb-4">PAUSED</h2>
            <button onclick="togglePause()" class="bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transform transition active:scale-95">
                RESUME
            </button>
        </div>
    </div>

    <div id="game-sidebar">
        <div style="width: 100%; text-align: center; color: #9ca3af; margin-bottom: 1rem; font-size: 0.875rem; font-weight: 600;">
            ⭐ TOKEN SESSION
        </div>
    </div>
</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let gameState = {
            player: {
                x: canvas.width / 2,
                y: canvas.height / 2,
                radius: 12,
                health: 100,
                maxHealth: 100,
                speed: 4,
                angle: 0,
                shootCooldown: 0,
                invulnerable: 0
            },
            enemies: [],
            projectiles: [],
            score: 0,
            killCount: 0,
            gameOver: false,
            wave: 1,
            timeElapsed: 0,
            particles: [],
            difficulty: 1,
            coins: [],
            maxWave: 15
        };

        const difficultyMultipliers = {
            1: { enemyHealth: 1, enemySpeed: 1, enemyCount: 1, spawnRate: 0.01 },
            2: { enemyHealth: 1.3, enemySpeed: 1.2, enemyCount: 1.3, spawnRate: 0.015 },
            3: { enemyHealth: 1.7, enemySpeed: 1.5, enemyCount: 1.6, spawnRate: 0.02 }
        };

        const keys = {};

        let gridOffset = 0;
        let screenShake = 0;
        let waveFlash = 0;
        let scorePopups = [];
        const enemyTypes = [
            {color1:'#ef4444', color2:'#991b1b', glowColor:'rgba(239,68,68,0.5)', shape:'circle'},
            {color1:'#a855f7', color2:'#6b21a8', glowColor:'rgba(168,85,247,0.5)', shape:'diamond'},
            {color1:'#f97316', color2:'#9a3412', glowColor:'rgba(249,115,22,0.5)', shape:'triangle'}
        ];

        function drawPlayer() {
            const { player } = gameState;
            
            if (player.invulnerable > 0 && Math.floor(player.invulnerable / 5) % 2 === 0) {
                ctx.globalAlpha = 0.5;
            }
            
            // Player shadow
            ctx.save();
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath();
            ctx.ellipse(player.x, player.y + player.radius + 4, player.radius * 0.8, 4, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
            
            // Player body with gradient
            ctx.save();
            const pGrad = ctx.createRadialGradient(player.x - 3, player.y - 3, 2, player.x, player.y, player.radius);
            pGrad.addColorStop(0, '#4ade80');
            pGrad.addColorStop(0.6, '#22c55e');
            pGrad.addColorStop(1, '#15803d');
            ctx.shadowBlur = 15;
            ctx.shadowColor = 'rgba(34,197,94,0.6)';
            ctx.fillStyle = pGrad;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
            
            // Player eyes
            const eyeOffsetX = Math.cos(player.angle) * 3;
            const eyeOffsetY = Math.sin(player.angle) * 3;
            ctx.fillStyle = '#f0fdf4';
            ctx.beginPath(); ctx.arc(player.x - 4 + eyeOffsetX*0.5, player.y - 3, 3, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(player.x + 4 + eyeOffsetX*0.5, player.y - 3, 3, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#1a1a2e';
            ctx.beginPath(); ctx.arc(player.x - 4 + eyeOffsetX, player.y - 3 + eyeOffsetY*0.5, 1.5, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(player.x + 4 + eyeOffsetX, player.y - 3 + eyeOffsetY*0.5, 1.5, 0, Math.PI*2); ctx.fill();

            // Weapon barrel (line from center outward in aim direction)
            ctx.save();
            const barrelGrad = ctx.createLinearGradient(
                player.x, player.y,
                player.x + Math.cos(player.angle) * 22,
                player.y + Math.sin(player.angle) * 22
            );
            barrelGrad.addColorStop(0, '#94a3b8');
            barrelGrad.addColorStop(1, '#64748b');
            ctx.strokeStyle = barrelGrad;
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(player.x + Math.cos(player.angle) * 8, player.y + Math.sin(player.angle) * 8);
            ctx.lineTo(player.x + Math.cos(player.angle) * 22, player.y + Math.sin(player.angle) * 22);
            ctx.stroke();
            // Barrel tip glow
            ctx.fillStyle = '#e2e8f0';
            ctx.beginPath();
            ctx.arc(player.x + Math.cos(player.angle) * 22, player.y + Math.sin(player.angle) * 22, 2, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();

            // Health bar with gradient
            const hpW = 30, hpH = 5;
            const hpPercent = player.health / player.maxHealth;
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.fillRect(player.x - hpW/2 - 1, player.y - 27, hpW + 2, hpH + 2);
            const hpGrad = ctx.createLinearGradient(player.x - hpW/2, 0, player.x - hpW/2 + hpW*hpPercent, 0);
            hpGrad.addColorStop(0, hpPercent > 0.5 ? '#22c55e' : hpPercent > 0.25 ? '#eab308' : '#ef4444');
            hpGrad.addColorStop(1, hpPercent > 0.5 ? '#16a34a' : hpPercent > 0.25 ? '#ca8a04' : '#dc2626');
            ctx.fillStyle = hpGrad;
            ctx.fillRect(player.x - hpW/2, player.y - 26, hpW * hpPercent, hpH);
            
            ctx.globalAlpha = 1;
        }

        function drawEnemy(enemy) {
            const type = enemyTypes[enemy.typeIdx || 0];
            
            // Enemy shadow
            ctx.save();
            ctx.fillStyle = 'rgba(0,0,0,0.25)';
            ctx.beginPath();
            ctx.ellipse(enemy.x, enemy.y + enemy.radius + 3, enemy.radius*0.7, 3, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
            
            // Enemy body with gradient and glow
            ctx.save();
            ctx.shadowBlur = 10;
            ctx.shadowColor = type.glowColor;
            const eGrad = ctx.createRadialGradient(enemy.x-2, enemy.y-2, 2, enemy.x, enemy.y, enemy.radius);
            eGrad.addColorStop(0, type.color1);
            eGrad.addColorStop(1, type.color2);
            ctx.fillStyle = eGrad;
            
            if (type.shape === 'circle') {
                ctx.beginPath(); ctx.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI*2); ctx.fill();
            } else if (type.shape === 'diamond') {
                ctx.beginPath();
                ctx.moveTo(enemy.x, enemy.y - enemy.radius);
                ctx.lineTo(enemy.x + enemy.radius, enemy.y);
                ctx.lineTo(enemy.x, enemy.y + enemy.radius);
                ctx.lineTo(enemy.x - enemy.radius, enemy.y);
                ctx.closePath(); ctx.fill();
            } else {
                ctx.beginPath();
                for (let j = 0; j < 3; j++) {
                    const a = (j * Math.PI * 2 / 3) - Math.PI/2;
                    const tx = enemy.x + Math.cos(a) * enemy.radius;
                    const ty = enemy.y + Math.sin(a) * enemy.radius;
                    j === 0 ? ctx.moveTo(tx, ty) : ctx.lineTo(tx, ty);
                }
                ctx.closePath(); ctx.fill();
            }
            ctx.restore();
            
            // Enemy eyes
            const dx = gameState.player.x - enemy.x;
            const dy = gameState.player.y - enemy.y;
            const dist = Math.max(1, Math.hypot(dx,dy));
            const lookX = (dx/dist)*2, lookY = (dy/dist)*2;
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(enemy.x-3, enemy.y-2, 2.5, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(enemy.x+3, enemy.y-2, 2.5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#1a1a2e';
            ctx.beginPath(); ctx.arc(enemy.x-3+lookX, enemy.y-2+lookY*0.5, 1.2, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(enemy.x+3+lookX, enemy.y-2+lookY*0.5, 1.2, 0, Math.PI*2); ctx.fill();

            // Health bar
            const healthPercent = Math.max(0, enemy.health / enemy.maxHealth);
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.fillRect(enemy.x - 11, enemy.y - 21, 22, 4);
            ctx.fillStyle = healthPercent > 0.5 ? '#22c55e' : healthPercent > 0.25 ? '#eab308' : '#ef4444';
            ctx.fillRect(enemy.x - 10, enemy.y - 20, 20 * healthPercent, 3);
        }

        function drawProjectile(proj) {
            // Projectile trail
            ctx.save();
            const trailGrad = ctx.createLinearGradient(
                proj.x, proj.y,
                proj.x - proj.vx * 4, proj.y - proj.vy * 4
            );
            trailGrad.addColorStop(0, 'rgba(251,191,36,0.8)');
            trailGrad.addColorStop(1, 'rgba(251,191,36,0)');
            ctx.strokeStyle = trailGrad;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(proj.x, proj.y);
            ctx.lineTo(proj.x - proj.vx * 4, proj.y - proj.vy * 4);
            ctx.stroke();
            ctx.restore();
            
            // Projectile body
            ctx.save();
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#fbbf24';
            const pGrad = ctx.createRadialGradient(proj.x, proj.y, 1, proj.x, proj.y, 5);
            pGrad.addColorStop(0, '#fef3c7');
            pGrad.addColorStop(1, '#f59e0b');
            ctx.fillStyle = pGrad;
            ctx.beginPath();
            ctx.arc(proj.x, proj.y, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function drawCoin(coin) {
            // Coin glow
            ctx.save();
            const coinGlow = ctx.createRadialGradient(coin.x, coin.y, 2, coin.x, coin.y, 12);
            coinGlow.addColorStop(0, 'rgba(251,191,36,0.3)');
            coinGlow.addColorStop(1, 'transparent');
            ctx.fillStyle = coinGlow;
            ctx.beginPath(); ctx.arc(coin.x, coin.y, 12, 0, Math.PI*2); ctx.fill();
            ctx.restore();
            
            // Coin body
            ctx.save();
            ctx.shadowBlur = 6;
            ctx.shadowColor = '#fbbf24';
            const cGrad = ctx.createRadialGradient(coin.x-2, coin.y-2, 1, coin.x, coin.y, 6);
            cGrad.addColorStop(0, '#fef3c7');
            cGrad.addColorStop(1, '#f59e0b');
            ctx.fillStyle = cGrad;
            ctx.beginPath(); ctx.arc(coin.x, coin.y, 6, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#d97706'; ctx.lineWidth = 1; ctx.stroke();
            // $ symbol
            ctx.fillStyle = '#92400e';
            ctx.font = 'bold 8px Arial';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText('$', coin.x, coin.y);
            ctx.restore();
        }

        function createParticles(x, y, color, count = 8) {
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 * i) / count;
                gameState.particles.push({
                    x: x, y: y,
                    vx: Math.cos(angle) * 4,
                    vy: Math.sin(angle) * 4,
                    life: 30, maxLife: 30,
                    color: color, r: Math.random()*3+2
                });
            }
        }

        function drawParticles() {
            gameState.particles = gameState.particles.filter(p => p.life > 0);
            gameState.particles.forEach(p => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life--;
                const alpha = p.life / p.maxLife;
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.shadowBlur = 4;
                ctx.shadowColor = p.color.replace(')', `, ${alpha})`).replace('rgb', 'rgba');
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, (p.r || 3) * alpha, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            });
        }

        function update() {
            if (shouldSkipGameUpdate()) return;

            const { player } = gameState;
            const multipliers = difficultyMultipliers[gameState.difficulty];

            // Player movement
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) player.x -= player.speed;
            if (keys['ArrowRight'] || keys['d'] || keys['D']) player.x += player.speed;
            if (keys['ArrowUp'] || keys['w'] || keys['W']) player.y -= player.speed;
            if (keys['ArrowDown'] || keys['s'] || keys['S']) player.y += player.speed;

            // Keep player in bounds
            player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));
            
            player.invulnerable--;
            player.shootCooldown--;

            // Update projectiles
            gameState.projectiles = gameState.projectiles.filter(proj => {
                proj.x += proj.vx;
                proj.y += proj.vy;
                return proj.x > 0 && proj.x < canvas.width && proj.y > 0 && proj.y < canvas.height;
            });

            // Collect coins
            gameState.coins = gameState.coins.filter(coin => {
                if (Math.hypot(player.x - coin.x, player.y - coin.y) < 20) {
                    gameState.score += 50;
                    createParticles(coin.x, coin.y, '#fbbf24', 5);
                    return false;
                }
                return true;
            });

            // Enemy AI and attacks
            gameState.enemies.forEach(enemy => {
                const dx = player.x - enemy.x;
                const dy = player.y - enemy.y;
                const dist = Math.hypot(dx, dy);

                if (dist > 0) {
                    enemy.vx = (dx / dist) * enemy.speed * multipliers.enemySpeed;
                    enemy.vy = (dy / dist) * enemy.speed * multipliers.enemySpeed;
                }

                enemy.x += enemy.vx;
                enemy.y += enemy.vy;

                // Keep enemy in bounds
                enemy.x = Math.max(enemy.radius, Math.min(canvas.width - enemy.radius, enemy.x));
                enemy.y = Math.max(enemy.radius, Math.min(canvas.height - enemy.radius, enemy.y));
            });

            // Collision: projectiles hit enemies
            gameState.projectiles.forEach((proj, pIdx) => {
                gameState.enemies.forEach((enemy, eIdx) => {
                    if (Math.hypot(proj.x - enemy.x, proj.y - enemy.y) < enemy.radius + 4) {
                        enemy.health -= 10;
                        createParticles(proj.x, proj.y, '#fbbf24', 4);
                        gameState.projectiles.splice(pIdx, 1);
                        
                        if (enemy.health <= 0) {
                            gameState.enemies.splice(eIdx, 1);
                            gameState.score += 100;
                            gameState.killCount++;
                            createParticles(enemy.x, enemy.y, '#ef4444', 10);
                            screenShake = 8;
                            
                            // Drop coins
                            if (Math.random() < 0.3) {
                                gameState.coins.push({
                                    x: enemy.x,
                                    y: enemy.y
                                });
                            }
                        }
                    }
                });
            });

            // Collision: enemies hit player
            gameState.enemies.forEach(enemy => {
                if (Math.hypot(player.x - enemy.x, player.y - enemy.y) < player.radius + enemy.radius && player.invulnerable <= 0) {
                    player.health -= 15;
                    player.invulnerable = 120; // 2 seconds of invulnerability
                    createParticles(player.x, player.y, '#ef4444', 5);
                    
                    if (player.health <= 0) {
                        gameState.gameOver = true;
                        setGameOver(true);
                    }
                }
            });

            // Spawn enemies based on difficulty
            const enemyLimit = Math.min(15, 3 + gameState.wave);
            if (gameState.enemies.length < enemyLimit && Math.random() < 0.01 * multipliers.spawnRate * 100) {
                const angle = Math.random() * Math.PI * 2;
                const dist = 180;
                gameState.enemies.push({
                    x: player.x + Math.cos(angle) * dist,
                    y: player.y + Math.sin(angle) * dist,
                    radius: 10,
                    health: 30 * multipliers.enemyHealth,
                    maxHealth: 30 * multipliers.enemyHealth,
                    speed: 1 * multipliers.enemySpeed,
                    vx: 0,
                    vy: 0,
                    typeIdx: Math.floor(Math.random() * enemyTypes.length)
                });
            }

            // Wave progression
            if (gameState.killCount >= 5 * gameState.wave) {
                gameState.wave++;
                gameState.killCount = 0;
                player.health = Math.min(player.maxHealth, player.health + 15);
                gameState.difficulty = Math.min(3, Math.floor(gameState.wave / 5) + 1);
                waveFlash = 1;
                screenShake = 15;
                
                // Spawn health pack on wave clear
                if (gameState.wave % 3 === 0) {
                    gameState.coins.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height
                    });
                }
            }

            gameState.timeElapsed++;
        }

        function draw() {
            // Proper dark space background with gradient
            const bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            bgGrad.addColorStop(0, '#030712');
            bgGrad.addColorStop(0.5, '#0f172a');
            bgGrad.addColorStop(1, '#030712');
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Grid lines
            gridOffset = (gridOffset + 0.3) % 40;
            ctx.strokeStyle = 'rgba(59,130,246,0.07)';
            ctx.lineWidth = 1;
            for (let x = -gridOffset; x < canvas.width; x += 40) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            for (let y = -gridOffset; y < canvas.height; y += 40) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }
            
            // Screen shake
            ctx.save();
            if (screenShake > 0) {
                screenShake -= 0.5;
                ctx.translate((Math.random()-0.5)*screenShake*0.5, (Math.random()-0.5)*screenShake*0.5);
            }
            
            // Wave flash
            if (waveFlash > 0) {
                ctx.save();
                ctx.globalAlpha = waveFlash * 0.15;
                ctx.fillStyle = '#3b82f6';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.restore();
                waveFlash -= 0.02;
            }

            gameState.projectiles.forEach(drawProjectile);
            gameState.coins.forEach(drawCoin);
            gameState.enemies.forEach(drawEnemy);
            drawParticles();
            drawPlayer();
            
            ctx.restore();

            // Draw HUD with better styling
            ctx.save();
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            ctx.font = 'bold 13px "Orbitron", sans-serif';
            ctx.textAlign = 'left';
            ctx.shadowBlur = 4; ctx.shadowColor = 'rgba(59,130,246,0.5)';
            ctx.fillText(`Wave: ${gameState.wave}`, 10, 24);
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.font = '11px "Orbitron", sans-serif';
            ctx.shadowBlur = 0;
            const killsNeeded = 5 * gameState.wave;
            ctx.fillText(`Kills: ${gameState.killCount}/${killsNeeded}`, 10, 42);
            ctx.restore();
        }

        function gameLoop() {
            update();
            draw();
            
            document.getElementById('health').textContent = Math.max(0, Math.floor(gameState.player.health));
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('wave').textContent = gameState.wave;

            if (gameState.gameOver) {
                document.getElementById('final-score').textContent = gameState.score;
                setGameOver(true);
            }

            arcadeState.animFrame = requestAnimationFrame(gameLoop);
        }

        function resetGame() {
            gameState = {
                player: {
                    x: canvas.width / 2,
                    y: canvas.height / 2,
                    radius: 12,
                    health: 100,
                    maxHealth: 100,
                    speed: 4,
                    angle: 0,
                    shootCooldown: 0,
                    invulnerable: 0
                },
                enemies: [],
                projectiles: [],
                score: 0,
                killCount: 0,
                gameOver: false,
                wave: 1,
                timeElapsed: 0,
                particles: [],
                difficulty: 1,
                coins: [],
                maxWave: 15
            };
            resetArcadeGame();
        }

        // Initialize arcade game
        (async function() {
            if (!await initializeArcadeGame()) return;
            gameLoop();
        })();

        // Input handlers
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);
            gameState.player.angle = Math.atan2(y - gameState.player.y, x - gameState.player.x);
        });

        canvas.addEventListener('click', () => {
            if (gameState.player.shootCooldown <= 0) {
                const { player } = gameState;
                for (let i = 0; i < 3; i++) {
                    const spread = (i - 1) * 0.2;
                    gameState.projectiles.push({
                        x: player.x + Math.cos(player.angle) * 15,
                        y: player.y + Math.sin(player.angle) * 15,
                        vx: (Math.cos(player.angle + spread) * 6),
                        vy: (Math.sin(player.angle + spread) * 6)
                    });
                }
                gameState.player.shootCooldown = 10;
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameState.player.shootCooldown <= 0) {
                    const { player } = gameState;
                    for (let i = 0; i < 3; i++) {
                        const spread = (i - 1) * 0.2;
                        gameState.projectiles.push({
                            x: player.x + Math.cos(player.angle) * 15,
                            y: player.y + Math.sin(player.angle) * 15,
                            vx: (Math.cos(player.angle + spread) * 6),
                            vy: (Math.sin(player.angle + spread) * 6)
                        });
                    }
                    gameState.player.shootCooldown = 10;
                }
            }
        });

        // gameLoop() is called by startGame() when user clicks START

        async function exitGame() {
            const user = await getUser();
            if (user) {
                const tokensEarned = Math.floor(gameState.score / 20);
                await updateUserPoints(user.id, tokensEarned);
                
                setTimeout(() => {
                    window.history.back();
                }, 1000);
            }
        }

        // gameLoop() is called by startGame() when user clicks START
    
    async function startGame() {
        if (!await initializeArcadeGame('⚔️ ARENA', 'from-red-400', 'to-red-600')) return;
        document.getElementById('start-screen').style.display = 'none';
        resetGame();
        gameRunning = true;
        gameLoop();
    }

    </script>
</body>
</html>
