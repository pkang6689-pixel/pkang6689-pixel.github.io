<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHACK A MOLE - Arcade</title>
    <script src="../scripts/arcade-core.js"></script>
    <script src="../firebase-utils.js"></script>
    <style>
        #game-session-timer {
            font-size: 2.5rem !important;
            font-weight: 700 !important;
        }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/main.css">
    <style>
        #game-sidebar {
            background: rgba(55, 65, 81, 0.98);
            border-radius: 1rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            width: 400px;
            min-height: 800px;
            border: 2px solid rgba(107, 114, 128, 0.9);
            box-shadow: 0 20px 45px rgba(0,0,0,0.6);
        }
        #game-session-timer {
            background: rgba(34, 197, 94, 0.95);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 700;
            font-size: 2rem;
            font-family: monospace;
            width: 100%;
            text-align: center;
            margin-top: 0.5rem;
            letter-spacing: 2px;
        }
        #game-session-timer.warning {
            background: rgba(239, 68, 68, 0.95);
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        body { font-family: 'Orbitron', monospace; padding-top: 50px; }
        canvas { border-radius: 0.5rem; }
        #game-wrapper { margin-left:150px; width: min(720px, calc(100vw - 360px)); max-width: 100%; }
        .pause-btn { position: absolute; bottom: 0.75rem; left: 0.75rem; z-index: 50; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 0.75rem; color: white; cursor: pointer; padding: 8px; line-height: 0; transition: background 0.2s, transform 0.2s; }
        .pause-btn:hover { background: rgba(255,255,255,0.25); transform: scale(1.1); }
        :fullscreen { background: #111827; }
    </style>
    <script src="../theme_manager.js"></script>
</head>
<body class="dark-mode bg-gray-900 min-h-screen text-white">
<script src="../scripts/taskbar.js"></script>
<script src="../scripts/global_translations.js?v=8.0"></script>

<div class="flex flex-row items-start justify-start p-4 gap-10 overflow-x-auto overflow-y-visible">

    <div id="game-wrapper" class="relative flex-shrink-0 max-w-md bg-gray-800 rounded-2xl shadow-2xl p-6 border border-gray-700">
        <button class="pause-btn" onclick="togglePause()" title="Pause"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg></button>
        <!-- Header -->
        <div class="flex justify-between items-end mb-4">
            <div>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent" data-i18n="WHACK A MOLE">WHACK A MOLE</h1>
                <p class="text-xs text-gray-400 font-sans" data-i18n="Click the targets quickly!">Click the targets quickly!</p>
            </div>
            <div class="text-right">
                <div class="text-xs text-gray-400 font-sans" data-i18n="SCORE">SCORE</div>
                <div id="score" class="text-3xl font-bold text-white">0</div>
            </div>
            <div class="text-right">
                <div class="text-xs text-gray-400 font-sans">BEST</div>
                <div id="best-score" class="text-3xl font-bold text-amber-400">0</div>
            </div>
        </div>

        <canvas id="game" class="bg-gray-900 border-2 border-gray-700 mx-auto block" width="400" height="400"></canvas>

        <!-- Game Over -->
        <div id="game-over" class="hidden absolute inset-0 bg-black/90 rounded-2xl z-20 flex flex-col items-center justify-center text-center p-6 backdrop-blur-sm">
            <h2 class="text-3xl text-red-500 font-bold mb-2">GAME OVER</h2>
            <div class="text-4xl font-bold text-white mb-6" id="final-score">0</div>
            <button onclick="resetGame()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transform transition active:scale-95">
                <span data-i18n="PLAY AGAIN">PLAY AGAIN</span>
            </button>
        </div>

        <!-- Start -->
        <div id="start-screen" class="absolute inset-0 bg-black/80 rounded-2xl z-20 flex flex-col items-center justify-center text-center p-6 backdrop-blur-sm">
            <h2 class="text-3xl text-blue-400 font-bold mb-2">WHACK A MOLE</h2>
            <p class="text-gray-300 mb-6 font-sans">Click the targets quickly!</p>
            <p class="text-xs text-gray-400 mb-6 font-sans">Click the green circles before they disappear.</p>
            <button onclick="startGame()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transform transition active:scale-95">
                <span data-i18n="START">START</span>
            </button>
        </div>

        <!-- Pause -->
        <div id="pause-screen" class="hidden absolute inset-0 bg-black/80 rounded-2xl z-30 flex flex-col items-center justify-center text-center p-6 backdrop-blur-sm">
            <h2 class="text-4xl text-white font-bold mb-4">PAUSED</h2>
            <button onclick="togglePause()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transform transition active:scale-95">
                <span data-i18n="RESUME">RESUME</span>
            </button>
        </div>
    </div>

    <div id="game-sidebar">
        <div style="width: 100%; text-align: center; color: #9ca3af; margin-bottom: 1rem; font-size: 0.875rem; font-weight: 600;">
            ⭐ TOKEN SESSION
        </div>
    </div>
</div>

<script>
let gamePaused = false;
let animFrame = null;
let running = false;
function togglePause() {
    if (!running && !gamePaused) return;
    gamePaused = !gamePaused;
    document.getElementById('pause-screen').classList.toggle('hidden', !gamePaused);
    if (!gamePaused) {
        lastTime = performance.now();
        animFrame = requestAnimationFrame(loop);
    } else {
        cancelAnimationFrame(animFrame);
    }
}

document.addEventListener('visibilitychange', () => {
    if (document.hidden && running && !gamePaused) togglePause();
});

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

let score = 0;
let bestScore = parseInt(localStorage.getItem('whack_best') || '0');
document.getElementById('best-score').textContent = bestScore;

function saveBest() {
    if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('whack_best', bestScore);
        document.getElementById('best-score').textContent = bestScore;
    }
}

function gameOver() {
    running = false;
    cancelAnimationFrame(animFrame);
    saveBest();
    document.getElementById('final-score').textContent = score;
    document.getElementById('game-over').classList.remove('hidden');
}

let lastTime = 0;

let moles = [];
let spawnTimer = 0;
let timeMultiplier = 1;

canvas.addEventListener('mousedown', e => {
    if(!running) return;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    
    for (let i = moles.length-1; i >= 0; i--) {
        const m = moles[i];
        if (Math.hypot(mx - m.x, my - m.y) < m.size) {
            score += 10;
            document.getElementById('score').textContent = score;
            moles.splice(i, 1);
            timeMultiplier += 0.05;
            break;
        }
    }
});

function init() {
    moles = [];
    spawnTimer = 0;
    timeMultiplier = 1;
}

function update(dt) {
    spawnTimer -= dt;
    if (spawnTimer <= 0) {
        spawnTimer = 800 / timeMultiplier;
        moles.push({
            x: 50 + Math.random() * (W - 100),
            y: 50 + Math.random() * (H - 100),
            size: 30,
            life: 2000 / timeMultiplier
        });
    }
    
    for (let i = moles.length-1; i>=0; i--) {
        moles[i].life -= dt;
        if (moles[i].life <= 0) {
            gameOver(); // Game over if you miss one
        }
    }
}

function draw() {
    ctx.fillStyle = '#1e293b';
    ctx.fillRect(0,0,W,H);
    
    for (const m of moles) {
        ctx.fillStyle = '#10b981';
        ctx.beginPath(); ctx.arc(m.x, m.y, m.size, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
    }
}


function loop(timestamp) {
    if (!running || gamePaused) return;
    let dt = timestamp - lastTime;
    lastTime = timestamp;
    if (dt > 100) dt = 100;
    
    update(dt);
    draw();
    if(running) animFrame = requestAnimationFrame(loop);
}

async function startGame() {
    if (!await initializeArcadeGame()) return;
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('game-over').classList.add('hidden');
    init();
    running = true;
    gamePaused = false;
    score = 0;
    document.getElementById('score').textContent = score;
    lastTime = performance.now();
    animFrame = requestAnimationFrame(loop);
}

function resetGame() {
    startGame();
}
</script>
</body>
</html>
