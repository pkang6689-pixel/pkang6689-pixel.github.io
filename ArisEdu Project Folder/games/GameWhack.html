<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHACK A MOLE - Arcade</title>
    <script src="../scripts/arcade-core.js"></script>
    <script src="../firebase-utils.js"></script>
    <style>
        #game-session-timer {
            font-size: 2.5rem !important;
            font-weight: 700 !important;
        }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/main.css">
        <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; }
        body { 
            font-family: 'Orbitron', monospace; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        body > .flex { display: flex !important; flex-direction: row !important; overflow: hidden; height: 100vh; gap: 1rem; padding: 1rem; }
        #game-wrapper { 
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: auto;
            min-width: 0;
            max-width: 100%;
            margin: 0;
            overflow: auto;
        }
        #game-wrapper > div:first-child {
            width: 100%;
            height: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        #game-sidebar {
            background: rgba(55, 65, 81, 0.98);
            border-radius: 1rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            width: 350px;
            height: auto;
            max-height: 100vh;
            border: 2px solid rgba(107, 114, 128, 0.9);
            box-shadow: 0 20px 45px rgba(0,0,0,0.6);
            overflow-y: auto;
            flex-shrink: 0;
        }
        #game-session-timer {
            background: rgba(34, 197, 94, 0.95);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 700;
            font-size: 2rem;
            font-family: monospace;
            width: 100%;
            text-align: center;
            margin-top: 0.5rem;
            letter-spacing: 2px;
        }
        #game-session-timer.warning {
            background: rgba(239, 68, 68, 0.95);
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .pause-btn { position: absolute; bottom: 0.75rem; left: 0.75rem; z-index: 50; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 0.75rem; color: white; cursor: pointer; padding: 8px; line-height: 0; transition: background 0.2s, transform 0.2s; }
        .pause-btn:hover { background: rgba(255,255,255,0.25); transform: scale(1.1); }
        
        @media (max-width: 1200px) {
            #game-sidebar { width: 300px; padding: 1rem; }
        }
        @media (max-width: 768px) {
            .flex { flex-direction: column; height: auto; }
            #game-sidebar { width: 100%; height: auto; max-height: 250px; }
            #game-wrapper { height: auto; }
        }
    </style>
    <script src="../theme_manager.js"></script>
    <style>
        #pause-screen.hidden { display: none !important; }
    </style>
    <style>
        #start-screen.hidden { display: none !important; }
    </style>
    </style>
    <style>
        #game-over.hidden { display: none !important; }
    </style>
</head>
<body class="dark-mode bg-gray-900 min-h-screen text-white">
<script src="../scripts/taskbar.js"></script>
<script src="../scripts/global_translations.js?v=8.0"></script>

<div class="flex">

    <div id="game-wrapper" class="relative max-w-md bg-gray-800 rounded-2xl shadow-2xl p-6 border border-gray-700">
        <button class="pause-btn" onclick="togglePause()" title="Pause"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg></button>
        <!-- Header -->
        <div class="flex justify-between items-end mb-4">
            <div>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent" data-i18n="WHACK A MOLE">WHACK A MOLE</h1>
                <p class="text-xs text-gray-400 font-sans" data-i18n="Click the targets quickly!">Click the targets quickly!</p>
            </div>
            <div class="text-right">
                <div class="text-xs text-gray-400 font-sans" data-i18n="SCORE">SCORE</div>
                <div id="score" class="text-3xl font-bold text-white">0</div>
            </div>
            <div class="text-right">
                <div class="text-xs text-gray-400 font-sans">BEST</div>
                <div id="best-score" class="text-3xl font-bold text-amber-400">0</div>
            </div>
        </div>

        <canvas id="game" class="bg-gray-900 border-2 border-gray-700 mx-auto block" width="400" height="400"></canvas>

        <!-- Game Over -->
        <div id="game-over" class="absolute inset-0 bg-black/90 rounded-2xl z-20 text-center p-6 backdrop-blur-sm" style="display:none;flex-direction:column;align-items:center;justify-content:center;">
            <h2 class="text-3xl text-red-500 font-bold mb-2">GAME OVER</h2>
            <div class="text-4xl font-bold text-white mb-6" id="final-score">0</div>
            <button onclick="resetGame()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transform transition active:scale-95">
                <span data-i18n="PLAY AGAIN">PLAY AGAIN</span>
            </button>
        </div>

        <!-- Start -->
        <div id="start-screen" class="absolute inset-0 bg-black/80 rounded-2xl z-20 text-center p-6 backdrop-blur-sm" style="display:flex;flex-direction:column;align-items:center;justify-content:center;">
            <h2 class="text-3xl text-blue-400 font-bold mb-2">WHACK A MOLE</h2>
            <p class="text-gray-300 mb-6 font-sans">Click the targets quickly!</p>
            <p class="text-xs text-gray-400 mb-6 font-sans">Click the green circles before they disappear.</p>
            <button onclick="startGame()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transform transition active:scale-95">
                <span data-i18n="START">START</span>
            </button>
        </div>

        <!-- Pause -->
        <div id="pause-screen" class="absolute inset-0 bg-black/80 rounded-2xl z-30 text-center p-6 backdrop-blur-sm" style="display:none;flex-direction:column;align-items:center;justify-content:center;">
            <h2 class="text-4xl text-white font-bold mb-4">PAUSED</h2>
            <button onclick="togglePause()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transform transition active:scale-95">
                <span data-i18n="RESUME">RESUME</span>
            </button>
        </div>
    </div>

    <div id="game-sidebar">
        <div style="width: 100%; text-align: center; color: #9ca3af; margin-bottom: 1rem; font-size: 0.875rem; font-weight: 600;">
            ⭐ TOKEN SESSION
        </div>
    </div>
</div>

<script>
let gamePaused = false;
let animFrame = null;
let running = false;
function togglePause() {
    if (!running && !gamePaused) return;
    gamePaused = !gamePaused;
    document.getElementById('pause-screen').classList.toggle('hidden', !gamePaused);
    if (!gamePaused) {
        lastTime = performance.now();
        animFrame = requestAnimationFrame(loop);
    } else {
        cancelAnimationFrame(animFrame);
    }
}

document.addEventListener('visibilitychange', () => {
    if (document.hidden && running && !gamePaused) togglePause();
});

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

let score = 0;
let bestScore = parseInt(localStorage.getItem('whack_best') || '0');
document.getElementById('best-score').textContent = bestScore;

function saveBest() {
    if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('whack_best', bestScore);
        document.getElementById('best-score').textContent = bestScore;
    }
}

function gameOver() {
    running = false;
    cancelAnimationFrame(animFrame);
    saveBest();
    document.getElementById('final-score').textContent = score;
    document.getElementById('game-over').style.display = 'flex';
}

let lastTime = 0;

let moles = [];
let spawnTimer = 0;
let timeMultiplier = 1;
let hitParticles = [];
let holes = [];
let screenShake = 0;
let scorePopups = [];

// Create a 3x3 grid of holes
for (let r = 0; r < 3; r++) {
    for (let c = 0; c < 3; c++) {
        holes.push({
            x: 70 + c * 130,
            y: 80 + r * 120,
            occupied: false
        });
    }
}

function addHitParticles(x, y) {
    for (let i = 0; i < 10; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 5 + 2;
        hitParticles.push({
            x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed - 3,
            life: 1, r: Math.random()*4+2,
            color: Math.random() > 0.5 ? '#fbbf24' : '#f97316'
        });
    }
}

function addScorePopup(x, y, text) {
    scorePopups.push({x, y, text, life: 1, vy: -2});
}

canvas.addEventListener('mousedown', e => {
    if(!running) return;
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
    const my = (e.clientY - rect.top) * (canvas.height / rect.height);
    
    for (let i = moles.length-1; i >= 0; i--) {
        const m = moles[i];
        if (Math.hypot(mx - m.x, my - (m.y - 15)) < 35) {
            score += 10;
            document.getElementById('score').textContent = score;
            addHitParticles(m.x, m.y - 15);
            addScorePopup(m.x, m.y - 40, '+10');
            screenShake = 100;
            // Free up the hole
            const hole = holes.find(h => h.x === m.x && h.y === m.y);
            if (hole) hole.occupied = false;
            moles.splice(i, 1);
            timeMultiplier += 0.05;
            break;
        }
    }
});

function init() {
    moles = [];
    spawnTimer = 0;
    timeMultiplier = 1;
    hitParticles = [];
    scorePopups = [];
    screenShake = 0;
    holes.forEach(h => h.occupied = false);
}

function update(dt) {
    if (screenShake > 0) screenShake -= dt;
    
    spawnTimer -= dt;
    if (spawnTimer <= 0) {
        spawnTimer = 800 / timeMultiplier;
        // Find a free hole
        const freeHoles = holes.filter(h => !h.occupied);
        if (freeHoles.length > 0) {
            const hole = freeHoles[Math.floor(Math.random() * freeHoles.length)];
            hole.occupied = true;
            moles.push({
                x: hole.x,
                y: hole.y,
                size: 30,
                life: 2000 / timeMultiplier,
                maxLife: 2000 / timeMultiplier,
                popUp: 0 // animation progress 0-1
            });
        }
    }
    
    for (let i = moles.length-1; i>=0; i--) {
        moles[i].life -= dt;
        moles[i].popUp = Math.min(1, moles[i].popUp + dt * 0.005);
        if (moles[i].life <= 0) {
            const hole = holes.find(h => h.x === moles[i].x && h.y === moles[i].y);
            if (hole) hole.occupied = false;
            moles.splice(i, 1);
            gameOver();
            return;
        }
    }
    
    // Update particles
    for (let i = hitParticles.length-1; i >= 0; i--) {
        const p = hitParticles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= 0.03;
        if (p.life <= 0) hitParticles.splice(i, 1);
    }
    
    // Update score popups
    for (let i = scorePopups.length-1; i >= 0; i--) {
        const p = scorePopups[i];
        p.y += p.vy; p.life -= 0.02;
        if (p.life <= 0) scorePopups.splice(i, 1);
    }
}

function drawMole(m) {
    const popScale = Math.min(1, m.popUp * 1.2);
    const lifeRatio = m.life / m.maxLife;
    const wobble = lifeRatio < 0.3 ? Math.sin(Date.now() * 0.02) * 3 : 0;
    
    ctx.save();
    ctx.translate(m.x + wobble, m.y);
    ctx.scale(popScale, popScale);
    
    // Mole body (brown furry body)
    const bodyGrad = ctx.createRadialGradient(0, -20, 5, 0, -10, 35);
    bodyGrad.addColorStop(0, '#8B6914');
    bodyGrad.addColorStop(0.7, '#6B4F12');
    bodyGrad.addColorStop(1, '#4A3510');
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.ellipse(0, -15, 28, 30, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Mole face (lighter belly)
    const faceGrad = ctx.createRadialGradient(0, -12, 3, 0, -10, 18);
    faceGrad.addColorStop(0, '#D4A54A');
    faceGrad.addColorStop(1, '#B8862D');
    ctx.fillStyle = faceGrad;
    ctx.beginPath();
    ctx.ellipse(0, -10, 18, 20, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(-9, -20, 7, 8, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(9, -20, 7, 8, 0, 0, Math.PI*2); ctx.fill();
    // Pupils
    ctx.fillStyle = '#1a1a2e';
    ctx.beginPath(); ctx.arc(-8, -19, 3.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(10, -19, 3.5, 0, Math.PI*2); ctx.fill();
    // Eye shine
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-6, -21, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(12, -21, 1.5, 0, Math.PI*2); ctx.fill();
    
    // Nose
    ctx.fillStyle = '#E85D75';
    ctx.beginPath(); ctx.ellipse(0, -10, 5, 4, 0, 0, Math.PI*2); ctx.fill();
    // Nose shine
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath(); ctx.arc(-1.5, -11.5, 2, 0, Math.PI*2); ctx.fill();
    
    // Mouth
    ctx.strokeStyle = '#4A3510';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(0, -6, 4, 0.1*Math.PI, 0.9*Math.PI);
    ctx.stroke();
    
    // Whiskers
    ctx.strokeStyle = 'rgba(74,53,16,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(-12,-10); ctx.lineTo(-28,-14); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-12,-8); ctx.lineTo(-27,-6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(12,-10); ctx.lineTo(28,-14); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(12,-8); ctx.lineTo(27,-6); ctx.stroke();
    
    // Timer ring around mole
    if (lifeRatio < 0.5) {
        ctx.strokeStyle = lifeRatio < 0.25 ? 'rgba(239,68,68,0.7)' : 'rgba(234,179,8,0.5)';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(0, -15, 35, -Math.PI/2, -Math.PI/2 + Math.PI*2*lifeRatio);
        ctx.stroke();
    }
    
    ctx.restore();
}

function draw() {
    // Background - grassy field
    const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
    bgGrad.addColorStop(0, '#1a472a');
    bgGrad.addColorStop(0.3, '#2d5a3f');
    bgGrad.addColorStop(1, '#1a3a2a');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);
    
    // Grass texture
    ctx.strokeStyle = 'rgba(34,197,94,0.15)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 40; i++) {
        const gx = (i * 37 + 5) % W;
        const gy = (i * 23 + 10) % H;
        ctx.beginPath();
        ctx.moveTo(gx, gy);
        ctx.quadraticCurveTo(gx - 3, gy - 12, gx + 2, gy - 18);
        ctx.stroke();
    }
    
    ctx.save();
    if (screenShake > 0) {
        ctx.translate((Math.random()-0.5)*6, (Math.random()-0.5)*6);
    }
    
    // Draw holes
    for (const hole of holes) {
        // Hole shadow
        ctx.save();
        ctx.shadowBlur = 8;
        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        const holeGrad = ctx.createRadialGradient(hole.x, hole.y+10, 5, hole.x, hole.y+10, 40);
        holeGrad.addColorStop(0, '#0a1a10');
        holeGrad.addColorStop(0.7, '#1a2a1a');
        holeGrad.addColorStop(1, '#2d4a35');
        ctx.fillStyle = holeGrad;
        ctx.beginPath();
        ctx.ellipse(hole.x, hole.y + 10, 38, 18, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        
        // Dirt mound rim
        const rimGrad = ctx.createLinearGradient(hole.x-40, hole.y, hole.x+40, hole.y+20);
        rimGrad.addColorStop(0, '#5a4a2a');
        rimGrad.addColorStop(0.5, '#7a6a4a');
        rimGrad.addColorStop(1, '#4a3a1a');
        ctx.fillStyle = rimGrad;
        ctx.beginPath();
        ctx.ellipse(hole.x, hole.y + 14, 42, 12, 0, 0, Math.PI);
        ctx.fill();
        
        // Rim highlight
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.ellipse(hole.x, hole.y + 14, 42, 12, 0, Math.PI, Math.PI*2);
        ctx.stroke();
    }
    
    // Draw moles
    for (const m of moles) {
        drawMole(m);
    }
    
    // Hit particles
    for (const p of hitParticles) {
        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.shadowBlur = 6;
        ctx.shadowColor = p.color;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        // Star-shaped particles
        const spikes = 4;
        for (let j = 0; j < spikes*2; j++) {
            const angle = (j * Math.PI) / spikes - Math.PI/2;
            const radius = j % 2 === 0 ? p.r * p.life : p.r * p.life * 0.4;
            if (j === 0) ctx.moveTo(p.x + Math.cos(angle)*radius, p.y + Math.sin(angle)*radius);
            else ctx.lineTo(p.x + Math.cos(angle)*radius, p.y + Math.sin(angle)*radius);
        }
        ctx.closePath();
        ctx.fill();
        ctx.restore();
    }
    
    // Score popups
    for (const p of scorePopups) {
        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.fillStyle = '#fbbf24';
        ctx.font = 'bold 20px "Orbitron", sans-serif';
        ctx.textAlign = 'center';
        ctx.shadowBlur = 6; ctx.shadowColor = '#fbbf24';
        ctx.fillText(p.text, p.x, p.y);
        ctx.restore();
    }
    
    ctx.restore();
}


function loop(timestamp) {
    if (!running || gamePaused) return;
    let dt = timestamp - lastTime;
    lastTime = timestamp;
    if (dt > 100) dt = 100;
    
    update(dt);
    draw();
    if(running) animFrame = requestAnimationFrame(loop);
}

async function startGame() {
    if (!await initializeArcadeGame()) return;
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('game-over').style.display = 'none';
    init();
    running = true;
    gamePaused = false;
    score = 0;
    document.getElementById('score').textContent = score;
    lastTime = performance.now();
    animFrame = requestAnimationFrame(loop);
}

function resetGame() {
    startGame();
}
</script>
</body>
</html>
