<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMON MEMORY - Arcade</title>
    <script src="../scripts/arcade-core.js"></script>
    <script src="../firebase-utils.js"></script>
    <style>
        #game-session-timer {
            font-size: 2.5rem !important;
            font-weight: 700 !important;
        }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/main.css">
        <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; }
        body { 
            font-family: 'Orbitron', monospace; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        body > .flex { display: flex !important; flex-direction: row !important; overflow: hidden; height: 100vh; gap: 1rem; padding: 1rem; }
        #game-wrapper { 
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: auto;
            min-width: 0;
            max-width: 100%;
            margin: 0;
            overflow: auto;
        }
        #game-wrapper > div:first-child {
            width: 100%;
            height: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        #game-sidebar {
            background: rgba(55, 65, 81, 0.98);
            border-radius: 1rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            width: 350px;
            height: auto;
            max-height: 100vh;
            border: 2px solid rgba(107, 114, 128, 0.9);
            box-shadow: 0 20px 45px rgba(0,0,0,0.6);
            overflow-y: auto;
            flex-shrink: 0;
        }
        #game-session-timer {
            background: rgba(34, 197, 94, 0.95);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 700;
            font-size: 2rem;
            font-family: monospace;
            width: 100%;
            text-align: center;
            margin-top: 0.5rem;
            letter-spacing: 2px;
        }
        #game-session-timer.warning {
            background: rgba(239, 68, 68, 0.95);
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .pause-btn { position: absolute; bottom: 0.75rem; left: 0.75rem; z-index: 50; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 0.75rem; color: white; cursor: pointer; padding: 8px; line-height: 0; transition: background 0.2s, transform 0.2s; }
        .pause-btn:hover { background: rgba(255,255,255,0.25); transform: scale(1.1); }
        
        @media (max-width: 1200px) {
            #game-sidebar { width: 300px; padding: 1rem; }
        }
        @media (max-width: 768px) {
            .flex { flex-direction: column; height: auto; }
            #game-sidebar { width: 100%; height: auto; max-height: 250px; }
            #game-wrapper { height: auto; }
        }
    </style>
    <script src="../theme_manager.js"></script>
    <style>
        #pause-screen.hidden { display: none !important; }
    </style>
    <style>
        #start-screen.hidden { display: none !important; }
    </style>
    </style>
    <style>
        #game-over.hidden { display: none !important; }
    </style>
</head>
<body class="dark-mode bg-gray-900 min-h-screen text-white">
<script src="../scripts/taskbar.js"></script>
<script src="../scripts/translation_loader.js" data-base="../translations"></script>
<div class="flex">

    <div id="game-wrapper" class="relative max-w-md bg-gray-800 rounded-2xl shadow-2xl p-6 border border-gray-700">
        <button class="pause-btn" onclick="togglePause()" title="Pause"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg></button>
        <!-- Header -->
        <div class="flex justify-between items-end mb-4">
            <div>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent" data-i18n="SIMON MEMORY">SIMON MEMORY</h1>
                <p class="text-xs text-gray-400 font-sans" data-i18n="Repeat the pattern!">Repeat the pattern!</p>
            </div>
            <div class="text-right">
                <div class="text-xs text-gray-400 font-sans" data-i18n="SCORE">SCORE</div>
                <div id="score" class="text-3xl font-bold text-white">0</div>
            </div>
            <div class="text-right">
                <div class="text-xs text-gray-400 font-sans">BEST</div>
                <div id="best-score" class="text-3xl font-bold text-amber-400">0</div>
            </div>
        </div>

        <canvas id="game" class="bg-gray-900 border-2 border-gray-700 mx-auto block" width="400" height="400"></canvas>

        <!-- Game Over -->
        <div id="game-over" class="absolute inset-0 bg-black/90 rounded-2xl z-20 text-center p-6 backdrop-blur-sm" style="display:none;flex-direction:column;align-items:center;justify-content:center;">
            <h2 class="text-3xl text-red-500 font-bold mb-2">GAME OVER</h2>
            <div class="text-4xl font-bold text-white mb-6" id="final-score">0</div>
            <button onclick="resetGame()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transform transition active:scale-95">
                <span data-i18n="PLAY AGAIN">PLAY AGAIN</span>
            </button>
        </div>

        <!-- Start -->
        <div id="start-screen" class="absolute inset-0 bg-black/80 rounded-2xl z-20 text-center p-6 backdrop-blur-sm" style="display:flex;flex-direction:column;align-items:center;justify-content:center;">
            <h2 class="text-3xl text-blue-400 font-bold mb-2">SIMON MEMORY</h2>
            <p class="text-gray-300 mb-6 font-sans">Repeat the pattern!</p>
            <p class="text-xs text-gray-400 mb-6 font-sans">Watch and click.</p>
            <button onclick="startGame()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transform transition active:scale-95">
                <span data-i18n="START">START</span>
            </button>
        </div>

        <!-- Pause -->
        <div id="pause-screen" class="absolute inset-0 bg-black/80 rounded-2xl z-30 text-center p-6 backdrop-blur-sm" style="display:none;flex-direction:column;align-items:center;justify-content:center;">
            <h2 class="text-4xl text-white font-bold mb-4">PAUSED</h2>
            <button onclick="togglePause()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transform transition active:scale-95">
                <span data-i18n="RESUME">RESUME</span>
            </button>
        </div>
    </div>

    <div id="game-sidebar">
        <div style="width: 100%; text-align: center; color: #9ca3af; margin-bottom: 1rem; font-size: 0.875rem; font-weight: 600;">
            ⭐ TOKEN SESSION
        </div>
    </div>
</div>

<script>
let gamePaused = false;
let animFrame = null;
let running = false;
function togglePause() {
    if (!running && !gamePaused) return;
    gamePaused = !gamePaused;
    document.getElementById('pause-screen').classList.toggle('hidden', !gamePaused);
    if (!gamePaused) {
        lastTime = performance.now();
        animFrame = requestAnimationFrame(loop);
    } else {
        cancelAnimationFrame(animFrame);
    }
}

document.addEventListener('visibilitychange', () => {
    if (document.hidden && running && !gamePaused) togglePause();
});

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

let score = 0;
let bestScore = parseInt(localStorage.getItem('simon_best') || '0');
document.getElementById('best-score').textContent = bestScore;

function saveBest() {
    if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('simon_best', bestScore);
        document.getElementById('best-score').textContent = bestScore;
    }
}

function gameOver() {
    running = false;
    cancelAnimationFrame(animFrame);
    saveBest();
    document.getElementById('final-score').textContent = score;
    document.getElementById('game-over').style.display = 'flex';
}

let lastTime = 0;

const colors = ['#ef4444','#3b82f6','#eab308','#22c55e'];
const bright = ['#fca5a5','#93c5fd','#fde047','#86efac'];
const glowColors = ['rgba(239,68,68,0.6)','rgba(59,130,246,0.6)','rgba(234,179,8,0.6)','rgba(34,197,94,0.6)'];
const darkColors = ['#991b1b','#1e3a8a','#854d0e','#15803d'];
let seq = [], playerIdx = 0;
let state = 'show'; // show, play
let showTimer = 0, showIdx = 0;
let lit = -1;
let wrongFlash = 0;
let successPulse = 0;
let particles = [];

function addButtonParticles(quadrant) {
    const cx = W/2, cy = H/2;
    const centers = [
        {x: cx/2, y: cy/2},
        {x: cx + cx/2, y: cy/2},
        {x: cx/2, y: cy + cy/2},
        {x: cx + cx/2, y: cy + cy/2}
    ];
    const c = centers[quadrant];
    for (let i = 0; i < 8; i++) {
        const angle = Math.random() * Math.PI * 2;
        particles.push({
            x: c.x, y: c.y,
            vx: Math.cos(angle)*3, vy: Math.sin(angle)*3,
            life: 1, color: bright[quadrant], r: Math.random()*3+2
        });
    }
}

canvas.addEventListener('mousedown', e => {
    if (!running || state !== 'play') return;
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (canvas.width / rect.width);
    const y = (e.clientY - rect.top) * (canvas.height / rect.height);
    
    const cx = W/2, cy = H/2;
    let clicked = -1;
    if (x<cx && y<cy) clicked = 0;
    if (x>=cx && y<cy) clicked = 1;
    if (x<cx && y>=cy) clicked = 2;
    if (x>=cx && y>=cy) clicked = 3;
    
    if (clicked === seq[playerIdx]) {
        playerIdx++;
        lit = clicked;
        addButtonParticles(clicked);
        successPulse = 0.5;
        setTimeout(()=>lit=-1, 200);
        if (playerIdx === seq.length) {
            score++;
            document.getElementById('score').textContent = score;
            nextRound();
        }
    } else {
        wrongFlash = 1;
        gameOver();
    }
});

function init() {
    seq = [];
    score = 0;
    particles = [];
    wrongFlash = 0;
    successPulse = 0;
    nextRound();
}

function nextRound() {
    seq.push(Math.floor(Math.random() * 4));
    state = 'show';
    showIdx = 0;
    showTimer = 800;
    lit = -1;
}

function update(dt) {
    if (wrongFlash > 0) wrongFlash -= dt * 0.003;
    if (successPulse > 0) successPulse -= dt * 0.002;
    
    if (state === 'show') {
        showTimer -= dt;
        if (showTimer <= 0) {
            if (showIdx < seq.length) {
                lit = seq[showIdx];
                showTimer = 600;
                showIdx++;
            } else if (lit !== -1) {
                lit = -1;
                showTimer = 400;
            } else {
                state = 'play';
                playerIdx = 0;
                lit = -1;
            }
        } else if (showIdx > 0 && showTimer < 200 && lit !== -1) {
            lit = -1;
        }
    }
    
    for (let i = particles.length-1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.life -= 0.025;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

function drawQuadrant(idx, x, y, w, h, isLit) {
    ctx.save();
    
    const baseColor = isLit ? bright[idx] : colors[idx];
    const grad = ctx.createRadialGradient(x+w*0.4, y+h*0.4, w*0.1, x+w/2, y+h/2, w*0.8);
    grad.addColorStop(0, isLit ? '#fff' : baseColor);
    grad.addColorStop(0.3, baseColor);
    grad.addColorStop(1, darkColors[idx]);
    
    // Quadrant shape with rounded inner corner
    const r = 12, ir = 30; // outer radius, inner radius
    ctx.beginPath();
    if (idx === 0) { // top-left
        ctx.moveTo(x+r, y);
        ctx.lineTo(x+w, y);
        ctx.lineTo(x+w, y+h);
        ctx.quadraticCurveTo(x+w-ir, y+h, x+w-ir, y+h-ir);
        ctx.lineTo(x, y+h-ir);
        ctx.lineTo(x, y+r);
        ctx.quadraticCurveTo(x, y, x+r, y);
    } else if (idx === 1) { // top-right
        ctx.moveTo(x, y);
        ctx.lineTo(x+w-r, y);
        ctx.quadraticCurveTo(x+w, y, x+w, y+r);
        ctx.lineTo(x+w, y+h-ir);
        ctx.lineTo(x+ir, y+h-ir);
        ctx.quadraticCurveTo(x, y+h, x, y+h);
        ctx.lineTo(x, y);
    } else if (idx === 2) { // bottom-left
        ctx.moveTo(x, y+ir);
        ctx.lineTo(x+w-ir, y+ir);
        ctx.quadraticCurveTo(x+w, y, x+w, y);
        ctx.lineTo(x+w, y+h);
        ctx.lineTo(x, y+h);
        ctx.lineTo(x, y+ir);
    } else { // bottom-right
        ctx.moveTo(x, y);
        ctx.lineTo(x, y);
        ctx.quadraticCurveTo(x, y, x+ir, y+ir);
        ctx.lineTo(x+w, y+ir);
        ctx.lineTo(x+w, y+h-r);
        ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
        ctx.lineTo(x, y+h);
    }
    ctx.closePath();
    
    if (isLit) {
        ctx.shadowBlur = 30;
        ctx.shadowColor = glowColors[idx];
    }
    
    ctx.fillStyle = grad;
    ctx.fill();
    
    // Inner bevel highlight
    ctx.save();
    ctx.globalAlpha = isLit ? 0.3 : 0.12;
    ctx.fillStyle = '#fff';
    ctx.clip();
    ctx.fillRect(x, y, w, h*0.3);
    ctx.restore();
    
    // Border
    ctx.strokeStyle = isLit ? bright[idx] : 'rgba(255,255,255,0.1)';
    ctx.lineWidth = isLit ? 2 : 1;
    ctx.stroke();
    
    ctx.restore();
}

function draw() {
    // Background
    const bgGrad = ctx.createRadialGradient(W/2, H/2, 50, W/2, H/2, W*0.7);
    bgGrad.addColorStop(0, '#1e293b');
    bgGrad.addColorStop(1, '#0f172a');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);
    
    // Wrong flash overlay
    if (wrongFlash > 0) {
        ctx.save();
        ctx.globalAlpha = wrongFlash * 0.3;
        ctx.fillStyle = '#ef4444';
        ctx.fillRect(0, 0, W, H);
        ctx.restore();
    }
    
    const cx = W/2, cy = H/2;
    const gap = 4;
    
    // Draw 4 quadrants
    drawQuadrant(0, 0, 0, cx-gap, cy-gap, lit===0);
    drawQuadrant(1, cx+gap, 0, cx-gap, cy-gap, lit===1);
    drawQuadrant(2, 0, cy+gap, cx-gap, cy-gap, lit===2);
    drawQuadrant(3, cx+gap, cy+gap, cx-gap, cy-gap, lit===3);
    
    // Center circle
    ctx.save();
    const centerGrad = ctx.createRadialGradient(cx, cy, 5, cx, cy, 28);
    centerGrad.addColorStop(0, '#475569');
    centerGrad.addColorStop(1, '#1e293b');
    ctx.fillStyle = centerGrad;
    ctx.shadowBlur = 10;
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.beginPath(); ctx.arc(cx, cy, 25, 0, Math.PI*2); ctx.fill();
    
    // Center circle border
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();
    
    // State indicator in center
    ctx.fillStyle = state === 'show' ? '#fbbf24' : '#22c55e';
    ctx.font = 'bold 12px "Orbitron", sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(state === 'show' ? 'WATCH' : 'GO!', cx, cy);
    
    // Round number
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '10px "Orbitron", sans-serif';
    ctx.fillText('Round ' + seq.length, cx, cy + 14);
    
    // Success pulse ring
    if (successPulse > 0) {
        ctx.save();
        ctx.globalAlpha = successPulse;
        ctx.strokeStyle = '#22c55e';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(cx, cy, 25 + (1-successPulse)*40, 0, Math.PI*2);
        ctx.stroke();
        ctx.restore();
    }
    
    // Particles
    for (const p of particles) {
        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.shadowBlur = 4; ctx.shadowColor = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r*p.life, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }
}

function loop(timestamp) {
    if (!running || gamePaused) return;
    let dt = timestamp - lastTime;
    lastTime = timestamp;
    if (dt > 100) dt = 100;
    
    update(dt);
    draw();
    if(running) animFrame = requestAnimationFrame(loop);
}

async function startGame() {
    if (!await initializeArcadeGame()) return;
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('game-over').style.display = 'none';
    init();
    running = true;
    gamePaused = false;
    score = 0;
    document.getElementById('score').textContent = score;
    lastTime = performance.now();
    animFrame = requestAnimationFrame(loop);
}

function resetGame() {
    startGame();
}
</script>
</body>
</html>
