<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PONG - Arcade</title>
    <script src="../scripts/arcade-core.js"></script>
    <script src="../firebase-utils.js"></script>
    <style>
        #game-session-timer {
            font-size: 2.5rem !important;
            font-weight: 700 !important;
        }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/main.css">
        <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; }
        body { 
            font-family: 'Orbitron', monospace; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        body > .flex { display: flex !important; flex-direction: row !important; overflow: hidden; height: 100vh; gap: 1rem; padding: 1rem; }
        #game-wrapper { 
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: auto;
            min-width: 0;
            max-width: 100%;
            margin: 0;
            overflow: auto;
        }
        #game-wrapper > div:first-child {
            width: 100%;
            height: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        #game-sidebar {
            background: rgba(55, 65, 81, 0.98);
            border-radius: 1rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            width: 350px;
            height: auto;
            max-height: 100vh;
            border: 2px solid rgba(107, 114, 128, 0.9);
            box-shadow: 0 20px 45px rgba(0,0,0,0.6);
            overflow-y: auto;
            flex-shrink: 0;
        }
        #game-session-timer {
            background: rgba(34, 197, 94, 0.95);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 700;
            font-size: 2rem;
            font-family: monospace;
            width: 100%;
            text-align: center;
            margin-top: 0.5rem;
            letter-spacing: 2px;
        }
        #game-session-timer.warning {
            background: rgba(239, 68, 68, 0.95);
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .pause-btn { position: absolute; bottom: 0.75rem; left: 0.75rem; z-index: 50; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 0.75rem; color: white; cursor: pointer; padding: 8px; line-height: 0; transition: background 0.2s, transform 0.2s; }
        .pause-btn:hover { background: rgba(255,255,255,0.25); transform: scale(1.1); }
        
        @media (max-width: 1200px) {
            #game-sidebar { width: 300px; padding: 1rem; }
        }
        @media (max-width: 768px) {
            .flex { flex-direction: column; height: auto; }
            #game-sidebar { width: 100%; height: auto; max-height: 250px; }
            #game-wrapper { height: auto; }
        }
    </style>
    <script src="../theme_manager.js"></script>
    <style>
        #pause-screen.hidden { display: none !important; }
    </style>
    <style>
        #start-screen.hidden { display: none !important; }
    </style>
    </style>
    <style>
        #game-over.hidden { display: none !important; }
    </style>
</head>
<body class="dark-mode bg-gray-900 min-h-screen text-white">
<script src="../scripts/taskbar.js"></script>
<script src="../scripts/global_translations.js?v=8.0"></script>

<div class="flex">

    <div id="game-wrapper" class="relative max-w-md bg-gray-800 rounded-2xl shadow-2xl p-6 border border-gray-700">
        <button class="pause-btn" onclick="togglePause()" title="Pause"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg></button>
        <!-- Header -->
        <div class="flex justify-between items-end mb-4">
            <div>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent" data-i18n="PONG">PONG</h1>
                <p class="text-xs text-gray-400 font-sans" data-i18n="Classic paddle game">Classic paddle game</p>
            </div>
            <div class="text-right">
                <div class="text-xs text-gray-400 font-sans" data-i18n="SCORE">SCORE</div>
                <div id="score" class="text-3xl font-bold text-white">0</div>
            </div>
            <div class="text-right">
                <div class="text-xs text-gray-400 font-sans">BEST</div>
                <div id="best-score" class="text-3xl font-bold text-amber-400">0</div>
            </div>
        </div>

        <canvas id="game" class="bg-gray-900 border-2 border-gray-700 mx-auto block" width="400" height="400"></canvas>

        <!-- Game Over -->
        <div id="game-over" class="absolute inset-0 bg-black/90 rounded-2xl z-20 text-center p-6 backdrop-blur-sm" style="display:none;flex-direction:column;align-items:center;justify-content:center;">
            <h2 class="text-3xl text-red-500 font-bold mb-2">GAME OVER</h2>
            <div class="text-4xl font-bold text-white mb-6" id="final-score">0</div>
            <button onclick="resetGame()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transform transition active:scale-95">
                <span data-i18n="PLAY AGAIN">PLAY AGAIN</span>
            </button>
        </div>

        <!-- Start -->
        <div id="start-screen" class="absolute inset-0 bg-black/80 rounded-2xl z-20 text-center p-6 backdrop-blur-sm" style="display:flex;flex-direction:column;align-items:center;justify-content:center;">
            <h2 class="text-3xl text-blue-400 font-bold mb-2">PONG</h2>
            <p class="text-gray-300 mb-6 font-sans">Classic paddle game</p>
            <p class="text-xs text-gray-400 mb-6 font-sans">Use W/S or Up &amp; Down arrows</p>
            <button onclick="startGame()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transform transition active:scale-95">
                <span data-i18n="START">START</span>
            </button>
        </div>

        <!-- Pause -->
        <div id="pause-screen" class="absolute inset-0 bg-black/80 rounded-2xl z-30 text-center p-6 backdrop-blur-sm" style="display:none;flex-direction:column;align-items:center;justify-content:center;">
            <h2 class="text-4xl text-white font-bold mb-4">PAUSED</h2>
            <button onclick="togglePause()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transform transition active:scale-95">
                <span data-i18n="RESUME">RESUME</span>
            </button>
        </div>
    </div>

    <div id="game-sidebar">
        <div style="width: 100%; text-align: center; color: #9ca3af; margin-bottom: 1rem; font-size: 0.875rem; font-weight: 600;">
            ⭐ TOKEN SESSION
        </div>
    </div>
</div>

<script>
let gamePaused = false;
let animFrame = null;
let running = false;
function togglePause() {
    if (!running && !gamePaused) return;
    gamePaused = !gamePaused;
    document.getElementById('pause-screen').classList.toggle('hidden', !gamePaused);
    if (!gamePaused) {
        lastTime = performance.now();
        animFrame = requestAnimationFrame(loop);
    } else {
        cancelAnimationFrame(animFrame);
    }
}

document.addEventListener('visibilitychange', () => {
    if (document.hidden && running && !gamePaused) togglePause();
});

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

let score = 0;
let bestScore = parseInt(localStorage.getItem('pong_best') || '0');
document.getElementById('best-score').textContent = bestScore;

function saveBest() {
    if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('pong_best', bestScore);
        document.getElementById('best-score').textContent = bestScore;
    }
}

function gameOver() {
    running = false;
    cancelAnimationFrame(animFrame);
    saveBest();
    document.getElementById('final-score').textContent = score;
    document.getElementById('game-over').style.display = 'flex';
}

let lastTime = 0;
let frameCount = 0;
let shakeTime = 0;
let particles = [];
let trails = [];

let padY = 150, padH = 60, padW = 10;
let aiY = 150, aiH = 60;
let ball = {x: 200, y: 200, r: 8, vx: 4, vy: 3};
const padSpeed = 360;
const keyState = {up: false, down: false};

document.addEventListener('keydown', e => {
    if (e.code === 'ArrowUp' || e.code === 'KeyW') {
        keyState.up = true;
        e.preventDefault();
    }
    if (e.code === 'ArrowDown' || e.code === 'KeyS') {
        keyState.down = true;
        e.preventDefault();
    }
});
document.addEventListener('keyup', e => {
    if (e.code === 'ArrowUp' || e.code === 'KeyW') keyState.up = false;
    if (e.code === 'ArrowDown' || e.code === 'KeyS') keyState.down = false;
});

canvas.addEventListener('touchmove', e => {
    const rect = canvas.getBoundingClientRect();
    padY = (e.touches[0].clientY - rect.top) * (canvas.height / rect.height) - padH/2;
});

function init() {
    ball = {x: 200, y: 200, r: 8, vx: 5, vy: 3 * (Math.random()>0.5?1:-1)};
    aiY = 150;
}

function addParticles(x, y, color, count=10) {
    for(let i=0; i<count; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random()-0.5)*10,
            vy: (Math.random()-0.5)*10,
            life: 1.0,
            color: color
        });
    }
}

function update(dt) {
    frameCount++;
    if (shakeTime > 0) shakeTime -= dt;

    const moveAmt = padSpeed * dt / 1000;
    if (keyState.up) padY -= moveAmt;
    if (keyState.down) padY += moveAmt;
    padY = Math.max(0, Math.min(H - padH, padY));

    // Trails for the ball
    trails.push({x: ball.x, y: ball.y, life: 1.0});

    // Update trails
    for (let i = trails.length - 1; i >= 0; i--) {
        trails[i].life -= 0.05;
        if (trails[i].life <= 0) trails.splice(i, 1);
    }

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 0.02;
        if (p.life <= 0) particles.splice(i, 1);
    }

    // AI
    const aiCenter = aiY + aiH/2;
    if (aiCenter < ball.y - 10) aiY += 3;
    if (aiCenter > ball.y + 10) aiY -= 3;
    aiY = Math.max(0, Math.min(H - aiH, aiY));
    
    ball.x += ball.vx;
    ball.y += ball.vy;
    
    // Bounce Y
    if (ball.y < ball.r || ball.y > H - ball.r) {
        ball.vy *= -1;
        addParticles(ball.x, ball.y, '#f8fafc', 5);
        shakeTime = 50;
    }

    // Paddle collisions
    if (ball.x < 20 + padW + ball.r && ball.y > padY && ball.y < padY + padH) {
        ball.vx = Math.abs(ball.vx) + 0.5;
        ball.x = 20 + padW + ball.r;
        score += 10;
        document.getElementById('score').textContent = score;
        addParticles(ball.x, ball.y, '#3b82f6', 15);
        shakeTime = 100;
    }
    if (ball.x > W - 20 - padW - ball.r && ball.y > aiY && ball.y < aiY + aiH) {
        ball.vx = -Math.abs(ball.vx) - 0.5;
        ball.x = W - 20 - padW - ball.r;
        addParticles(ball.x, ball.y, '#ef4444', 15);
        shakeTime = 100;
    }

    // Game over
    if (ball.x < -10) {
        gameOver();
    }
    // AI miss -> wrap around just bounce back for endless
    if (ball.x > W + 10) {
        ball.vx = -Math.abs(ball.vx);
        score += 50;
        document.getElementById('score').textContent = score;
    }
}

function draw() {
    // Dark space background
    const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
    bgGrad.addColorStop(0, '#020617');
    bgGrad.addColorStop(0.5, '#0f172a');
    bgGrad.addColorStop(1, '#020617');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0,0,W,H);

    ctx.save();
    if (shakeTime > 0) {
        const dx = (Math.random()-0.5)*10;
        const dy = (Math.random()-0.5)*10;
        ctx.translate(dx, dy);
    }

    // Scrolling grid
    ctx.strokeStyle = 'rgba(30,41,59,0.5)';
    ctx.lineWidth = 1;
    const offset = (frameCount * 0.5) % 20;
    for (let i = -offset; i < W; i += 20) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, H); ctx.stroke();
    }
    for (let i = -offset; i < H; i += 20) {
        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(W, i); ctx.stroke();
    }

    // Center line with glow
    ctx.save();
    ctx.shadowBlur = 12;
    ctx.shadowColor = 'rgba(51,65,85,0.8)';
    ctx.setLineDash([10, 10]);
    ctx.strokeStyle = '#334155';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(W/2, 0);
    ctx.lineTo(W/2, H);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    // Ball trails with additive blend
    ctx.globalCompositeOperation = 'lighter';
    for (let t of trails) {
        const alpha = Math.max(0, Math.min(1, t.life));
        ctx.fillStyle = `rgba(248, 250, 252, ${alpha * 0.4})`;
        ctx.beginPath();
        ctx.arc(t.x, t.y, ball.r * (0.9 + (1 - t.life)), 0, Math.PI*2);
        ctx.fill();
    }
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 1.0;

    // Particles
    for (let p of particles) {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3 * Math.max(0, p.life), 0, Math.PI*2);
        ctx.fill();
    }
    ctx.globalAlpha = 1.0;

    // Player paddle with gradient and rounded corners
    ctx.save();
    ctx.shadowBlur = 20;
    ctx.shadowColor = '#3b82f6';
    const pGrad = ctx.createLinearGradient(20, padY, 20+padW, padY+padH);
    pGrad.addColorStop(0, '#60a5fa');
    pGrad.addColorStop(0.5, '#3b82f6');
    pGrad.addColorStop(1, '#2563eb');
    ctx.fillStyle = pGrad;
    ctx.beginPath();
    const pr = 4;
    ctx.moveTo(20+pr, padY); ctx.lineTo(20+padW-pr, padY);
    ctx.quadraticCurveTo(20+padW, padY, 20+padW, padY+pr);
    ctx.lineTo(20+padW, padY+padH-pr);
    ctx.quadraticCurveTo(20+padW, padY+padH, 20+padW-pr, padY+padH);
    ctx.lineTo(20+pr, padY+padH);
    ctx.quadraticCurveTo(20, padY+padH, 20, padY+padH-pr);
    ctx.lineTo(20, padY+pr);
    ctx.quadraticCurveTo(20, padY, 20+pr, padY);
    ctx.fill();
    // Paddle highlight
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(20, padY, padW*0.3, padH);
    ctx.restore();

    // AI paddle with gradient and rounded corners
    ctx.save();
    ctx.shadowBlur = 20;
    ctx.shadowColor = '#ef4444';
    const aGrad = ctx.createLinearGradient(W-20-padW, aiY, W-20, aiY+aiH);
    aGrad.addColorStop(0, '#f87171');
    aGrad.addColorStop(0.5, '#ef4444');
    aGrad.addColorStop(1, '#dc2626');
    ctx.fillStyle = aGrad;
    ctx.beginPath();
    const ax = W-20-padW;
    ctx.moveTo(ax+pr, aiY); ctx.lineTo(ax+padW-pr, aiY);
    ctx.quadraticCurveTo(ax+padW, aiY, ax+padW, aiY+pr);
    ctx.lineTo(ax+padW, aiY+aiH-pr);
    ctx.quadraticCurveTo(ax+padW, aiY+aiH, ax+padW-pr, aiY+aiH);
    ctx.lineTo(ax+pr, aiY+aiH);
    ctx.quadraticCurveTo(ax, aiY+aiH, ax, aiY+aiH-pr);
    ctx.lineTo(ax, aiY+pr);
    ctx.quadraticCurveTo(ax, aiY, ax+pr, aiY);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(ax, aiY, padW*0.3, aiH);
    ctx.restore();

    // Ball with radial gradient and glow
    ctx.save();
    ctx.shadowBlur = 20;
    ctx.shadowColor = '#f8fafc';
    const ballGrad = ctx.createRadialGradient(ball.x-2, ball.y-2, 1, ball.x, ball.y, ball.r);
    ballGrad.addColorStop(0, '#ffffff');
    ballGrad.addColorStop(0.5, '#e2e8f0');
    ballGrad.addColorStop(1, '#94a3b8');
    ctx.fillStyle = ballGrad;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // Score display on field
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.font = 'bold 60px "Orbitron", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(score, W/4, H/2 + 20);
    ctx.fillText('AI', W*3/4, H/2 + 20);
    ctx.restore();

    ctx.restore();
}



function loop(timestamp) {
    if (!running || gamePaused) return;
    let dt = timestamp - lastTime;
    lastTime = timestamp;
    if (dt > 100) dt = 100;
    
    update(dt);
    draw();
    if(running) animFrame = requestAnimationFrame(loop);
}

async function startGame() {
    if (!await initializeArcadeGame()) return;
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('game-over').style.display = 'none';
    init();
    running = true;
    gamePaused = false;
    score = 0;
    document.getElementById('score').textContent = score;
    lastTime = performance.now();
    animFrame = requestAnimationFrame(loop);
}

function resetGame() {
    startGame();
}
</script>
</body>
</html>
