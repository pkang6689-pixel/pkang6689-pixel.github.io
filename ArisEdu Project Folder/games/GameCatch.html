<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRUIT CATCHER - Arcade</title>
    <script src="../scripts/arcade-core.js"></script>
    <script src="../firebase-utils.js"></script>
    <style>
        #game-session-timer {
            font-size: 2.5rem !important;
            font-weight: 700 !important;
        }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/main.css">
        <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; }
        body { 
            font-family: 'Orbitron', monospace; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        body > .flex { display: flex !important; flex-direction: row !important; overflow: hidden; height: 100vh; gap: 1rem; padding: 1rem; }
        #game-wrapper { 
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: auto;
            min-width: 0;
            max-width: 100%;
            margin: 0;
            overflow: auto;
        }
        #game-wrapper > div:first-child {
            width: 100%;
            height: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        #game-sidebar {
            background: rgba(55, 65, 81, 0.98);
            border-radius: 1rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            width: 350px;
            height: auto;
            max-height: 100vh;
            border: 2px solid rgba(107, 114, 128, 0.9);
            box-shadow: 0 20px 45px rgba(0,0,0,0.6);
            overflow-y: auto;
            flex-shrink: 0;
        }
        #game-session-timer {
            background: rgba(34, 197, 94, 0.95);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 700;
            font-size: 2rem;
            font-family: monospace;
            width: 100%;
            text-align: center;
            margin-top: 0.5rem;
            letter-spacing: 2px;
        }
        #game-session-timer.warning {
            background: rgba(239, 68, 68, 0.95);
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .pause-btn { position: absolute; bottom: 0.75rem; left: 0.75rem; z-index: 50; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 0.75rem; color: white; cursor: pointer; padding: 8px; line-height: 0; transition: background 0.2s, transform 0.2s; }
        .pause-btn:hover { background: rgba(255,255,255,0.25); transform: scale(1.1); }
        
        @media (max-width: 1200px) {
            #game-sidebar { width: 300px; padding: 1rem; }
        }
        @media (max-width: 768px) {
            .flex { flex-direction: column; height: auto; }
            #game-sidebar { width: 100%; height: auto; max-height: 250px; }
            #game-wrapper { height: auto; }
        }
    </style>
    <script src="../theme_manager.js"></script>
    <style>
        #pause-screen.hidden { display: none !important; }
    </style>
    <style>
        #start-screen.hidden { display: none !important; }
    </style>
    </style>
    <style>
        #game-over.hidden { display: none !important; }
    </style>
</head>
<body class="dark-mode bg-gray-900 min-h-screen text-white">
<script src="../scripts/taskbar.js"></script>
<script src="../scripts/global_translations.js?v=8.0"></script>

<div class="flex">

    <div id="game-wrapper" class="relative max-w-md bg-gray-800 rounded-2xl shadow-2xl p-6 border border-gray-700">
        <button class="pause-btn" onclick="togglePause()" title="Pause"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg></button>
        <!-- Header -->
        <div class="flex justify-between items-end mb-4">
            <div>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent" data-i18n="FRUIT CATCHER">FRUIT CATCHER</h1>
                <p class="text-xs text-gray-400 font-sans" data-i18n="Catch falling fruits!">Catch falling fruits!</p>
            </div>
            <div class="text-right">
                <div class="text-xs text-gray-400 font-sans" data-i18n="SCORE">SCORE</div>
                <div id="score" class="text-3xl font-bold text-white">0</div>
            </div>
            <div class="text-right">
                <div class="text-xs text-gray-400 font-sans">BEST</div>
                <div id="best-score" class="text-3xl font-bold text-amber-400">0</div>
            </div>
        </div>

        <canvas id="game" class="bg-gray-900 border-2 border-gray-700 mx-auto block" width="400" height="400"></canvas>

        <!-- Game Over -->
        <div id="game-over" class="absolute inset-0 bg-black/90 rounded-2xl z-20 text-center p-6 backdrop-blur-sm" style="display:none;flex-direction:column;align-items:center;justify-content:center;">
            <h2 class="text-3xl text-red-500 font-bold mb-2">GAME OVER</h2>
            <div class="text-4xl font-bold text-white mb-6" id="final-score">0</div>
            <button onclick="resetGame()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transform transition active:scale-95">
                <span data-i18n="PLAY AGAIN">PLAY AGAIN</span>
            </button>
        </div>

        <!-- Start -->
        <div id="start-screen" class="absolute inset-0 bg-black/80 rounded-2xl z-20 text-center p-6 backdrop-blur-sm" style="display:flex;flex-direction:column;align-items:center;justify-content:center;">
            <h2 class="text-3xl text-blue-400 font-bold mb-2">FRUIT CATCHER</h2>
            <p class="text-gray-300 mb-6 font-sans">Catch falling fruits!</p>
            <p class="text-xs text-gray-400 mb-6 font-sans">Move mouse/finger to catch.</p>
            <button onclick="startGame()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transform transition active:scale-95">
                <span data-i18n="START">START</span>
            </button>
        </div>

        <!-- Pause -->
        <div id="pause-screen" class="absolute inset-0 bg-black/80 rounded-2xl z-30 text-center p-6 backdrop-blur-sm" style="display:none;flex-direction:column;align-items:center;justify-content:center;">
            <h2 class="text-4xl text-white font-bold mb-4">PAUSED</h2>
            <button onclick="togglePause()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transform transition active:scale-95">
                <span data-i18n="RESUME">RESUME</span>
            </button>
        </div>
    </div>

    <div id="game-sidebar">
        <div style="width: 100%; text-align: center; color: #9ca3af; margin-bottom: 1rem; font-size: 0.875rem; font-weight: 600;">
            ⭐ TOKEN SESSION
        </div>
    </div>
</div>

<script>
let gamePaused = false;
let animFrame = null;
let running = false;
function togglePause() {
    if (!running && !gamePaused) return;
    gamePaused = !gamePaused;
    document.getElementById('pause-screen').classList.toggle('hidden', !gamePaused);
    if (!gamePaused) {
        lastTime = performance.now();
        animFrame = requestAnimationFrame(loop);
    } else {
        cancelAnimationFrame(animFrame);
    }
}

document.addEventListener('visibilitychange', () => {
    if (document.hidden && running && !gamePaused) togglePause();
});

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

let score = 0;
let bestScore = parseInt(localStorage.getItem('catch_best') || '0');
document.getElementById('best-score').textContent = bestScore;

function saveBest() {
    if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('catch_best', bestScore);
        document.getElementById('best-score').textContent = bestScore;
    }
}

function gameOver() {
    running = false;
    cancelAnimationFrame(animFrame);
    saveBest();
    document.getElementById('final-score').textContent = score;
    document.getElementById('game-over').style.display = 'flex';
}

let lastTime = 0;

let px = 200;
const pW = 60, pH = 20;
let items = [];
let spawnT = 0;
let speedMult = 1;
let catchParticles = [];
let scorePopups = [];
let screenShake = 0;
let starsBg = [];
for (let i = 0; i < 25; i++) starsBg.push({x: Math.random()*W, y: Math.random()*H*0.6, r: Math.random()*1.5+0.5});

const fruits = ['🍎','🍊','🍋','🍇','🍓','🍑','🫐','🍒'];
const badItems = ['💣','☠️','🔥'];

function addCatchParticles(x, y, good) {
    for (let i = 0; i < 8; i++) {
        const angle = Math.random() * Math.PI * 2;
        catchParticles.push({
            x, y, vx: Math.cos(angle)*4, vy: Math.sin(angle)*-3-Math.random()*2,
            life: 1, color: good ? '#22c55e' : '#ef4444', r: Math.random()*3+2
        });
    }
}

canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    px = (e.clientX - rect.left) * (canvas.width / rect.width);
});

canvas.addEventListener('touchmove', e => {
    const rect = canvas.getBoundingClientRect();
    px = (e.touches[0].clientX - rect.left) * (canvas.width / rect.width);
    e.preventDefault();
}, {passive: false});

function init() {
    items = [];
    spawnT = 0;
    speedMult = 1;
    px = 200;
    catchParticles = [];
    scorePopups = [];
    screenShake = 0;
}

function update(dt) {
    if (screenShake > 0) screenShake -= dt;
    px = Math.max(pW/2, Math.min(W - pW/2, px));
    
    spawnT -= dt;
    if (spawnT <= 0) {
        spawnT = 1000 / speedMult;
        speedMult += 0.02;
        const isBad = Math.random() > 0.7;
        items.push({
            x: Math.random() * (W - 40) + 20,
            y: -20,
            bad: isBad,
            emoji: isBad ? badItems[Math.floor(Math.random()*badItems.length)] : fruits[Math.floor(Math.random()*fruits.length)],
            rotation: Math.random() * Math.PI * 2,
            rotSpeed: (Math.random()-0.5) * 0.003
        });
    }
    
    for (let i = items.length-1; i>=0; i--) {
        let it = items[i];
        it.y += (150 * speedMult * dt) / 1000;
        it.rotation += it.rotSpeed * dt;
        
        if (it.y > H - 40 - pH && it.y < H - 15 && Math.abs(px - it.x) < pW/2 + 12) {
            if (it.bad) {
                screenShake = 200;
                addCatchParticles(it.x, it.y, false);
                gameOver();
                return;
            } else {
                score += 10;
                document.getElementById('score').textContent = score;
                addCatchParticles(it.x, H - 35, true);
                scorePopups.push({x: it.x, y: H - 50, text: '+10', life: 1, vy: -1.5});
            }
            items.splice(i, 1);
            continue;
        }
        
        if (it.y > H + 20) {
            if (!it.bad) {
                gameOver();
                return;
            }
            items.splice(i, 1);
        }
    }
    
    for (let i = catchParticles.length-1; i>=0; i--) {
        const p = catchParticles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.life -= 0.025;
        if (p.life <= 0) catchParticles.splice(i, 1);
    }
    for (let i = scorePopups.length-1; i>=0; i--) {
        const p = scorePopups[i];
        p.y += p.vy; p.life -= 0.02;
        if (p.life <= 0) scorePopups.splice(i, 1);
    }
}

function draw() {
    // Night sky background
    const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
    bgGrad.addColorStop(0, '#0c1445');
    bgGrad.addColorStop(0.5, '#1a237e');
    bgGrad.addColorStop(0.85, '#1b5e20');
    bgGrad.addColorStop(1, '#2e7d32');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);
    
    // Stars
    for (const s of starsBg) {
        const tw = 0.3 + Math.sin(Date.now()*0.002 + s.x)*0.4;
        ctx.fillStyle = `rgba(255,255,255,${tw})`;
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
    }
    
    ctx.save();
    if (screenShake > 0) ctx.translate((Math.random()-0.5)*8, (Math.random()-0.5)*8);
    
    // Ground
    const groundGrad = ctx.createLinearGradient(0, H-45, 0, H);
    groundGrad.addColorStop(0, '#2e7d32');
    groundGrad.addColorStop(1, '#1b5e20');
    ctx.fillStyle = groundGrad;
    ctx.fillRect(0, H-45, W, 45);
    
    // Basket - trapezoid shape with gradient
    ctx.save();
    const bx = px - pW/2;
    const by = H - 38;
    const bGrad = ctx.createLinearGradient(bx, by, bx, by+pH+8);
    bGrad.addColorStop(0, '#d4a056');
    bGrad.addColorStop(0.5, '#b5832a');
    bGrad.addColorStop(1, '#8B6914');
    ctx.fillStyle = bGrad;
    ctx.beginPath();
    ctx.moveTo(bx - 5, by);
    ctx.lineTo(bx + pW + 5, by);
    ctx.lineTo(bx + pW - 3, by + pH + 5);
    ctx.lineTo(bx + 3, by + pH + 5);
    ctx.closePath();
    ctx.fill();
    // Basket rim
    ctx.strokeStyle = '#6B4F12';
    ctx.lineWidth = 2;
    ctx.stroke();
    // Basket weave lines
    ctx.strokeStyle = 'rgba(107,79,18,0.3)';
    ctx.lineWidth = 1;
    for (let wx = bx+8; wx < bx+pW-5; wx += 10) {
        ctx.beginPath(); ctx.moveTo(wx, by+2); ctx.lineTo(wx-2, by+pH+3); ctx.stroke();
    }
    // Rim highlight
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(bx-4, by+1); ctx.lineTo(bx+pW+4, by+1); ctx.stroke();
    // Shadow under basket
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(px, by+pH+8, pW/2+5, 4, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
    
    // Items (fruits/bombs)
    for (const it of items) {
        ctx.save();
        ctx.translate(it.x, it.y);
        ctx.rotate(it.rotation);
        // Glow behind fruit
        if (!it.bad) {
            const fruitGlow = ctx.createRadialGradient(0,0,2,0,0,20);
            fruitGlow.addColorStop(0, 'rgba(34,197,94,0.2)');
            fruitGlow.addColorStop(1, 'transparent');
            ctx.fillStyle = fruitGlow;
            ctx.beginPath(); ctx.arc(0,0,20,0,Math.PI*2); ctx.fill();
        } else {
            const badGlow = ctx.createRadialGradient(0,0,2,0,0,20);
            badGlow.addColorStop(0, 'rgba(239,68,68,0.3)');
            badGlow.addColorStop(1, 'transparent');
            ctx.fillStyle = badGlow;
            ctx.beginPath(); ctx.arc(0,0,20,0,Math.PI*2); ctx.fill();
        }
        ctx.font = '24px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(it.emoji, 0, 0);
        ctx.restore();
    }
    
    // Particles
    for (const p of catchParticles) {
        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.shadowBlur = 4; ctx.shadowColor = p.color;
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r*p.life, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }
    
    // Score popups
    for (const p of scorePopups) {
        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.fillStyle = '#22c55e';
        ctx.font = 'bold 18px "Orbitron", sans-serif';
        ctx.textAlign = 'center';
        ctx.shadowBlur = 4; ctx.shadowColor = '#22c55e';
        ctx.fillText(p.text, p.x, p.y);
        ctx.restore();
    }
    
    ctx.restore();
}


function loop(timestamp) {
    if (!running || gamePaused) return;
    let dt = timestamp - lastTime;
    lastTime = timestamp;
    if (dt > 100) dt = 100;
    
    update(dt);
    draw();
    if(running) animFrame = requestAnimationFrame(loop);
}

async function startGame() {
    if (!await initializeArcadeGame()) return;
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('game-over').style.display = 'none';
    init();
    running = true;
    gamePaused = false;
    score = 0;
    document.getElementById('score').textContent = score;
    lastTime = performance.now();
    animFrame = requestAnimationFrame(loop);
}

function resetGame() {
    startGame();
}
</script>
</body>
</html>
