  { question: 'Define: Predation', answer: 'One organism (predator) killing and consuming another (prey); drives coevolutionary adaptations like camouflage, warning coloration, and mimicry' },
  { question: 'Define: Mutualism', answer: 'An interaction beneficial to both species (e.g., mycorrhizal fungi and plant roots; clownfish and sea anemones)' },
  { question: 'Define: Keystone species', answer: 'A species whose impact on community structure is disproportionately large relative to its abundance (e.g., sea otters, wolves in Yellowstone)' },
  { question: 'Define: Ecological succession', answer: 'Predictable changes in community composition over time: primary (bare substrate) or secondary (after disturbance with existing soil)' },
  { question: 'What is Community Ecology?', answer: 'Community Ecology examines interactions between species in ecological communities.' },
  { question: 'Why is Community Ecology important?', answer: 'Interspecific competition (competition exclusion principle or resource partitioning), predation (including coevolutionary arms races), mutualism, commensalism, and parasitism shape community structure.' },
  { question: 'Give a real-world example of Community Ecology', answer: 'Wolf reintroduction into Yellowstone (1995) demonstrating trophic cascades: wolves reduced elk overgrazing, allowing riparian vegetation recovery, which stabilized stream banks and increased beaver populations' },

  { question: 'Describe a practical application of Community Ecology', answer: 'Batesian mimicry in butterflies: harmless viceroy butterflies mimicking toxic monarch butterflies to avoid predation, a classic example of coevolutionary interaction' },
