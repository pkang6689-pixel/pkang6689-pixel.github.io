  { question: 'Define: Allosteric regulation', answer: 'Regulatory molecules bind to a site other than the active site, changing the enzyme\'s conformation and activity; can be activating or inhibiting' },
  { question: 'Define: Competitive inhibitor', answer: 'A molecule resembling the substrate that competes for the active site; increases apparent Km but does not affect Vmax (can be overcome by more substrate)' },
  { question: 'Define: Noncompetitive inhibitor', answer: 'A molecule that binds to a site other than the active site, reducing enzyme activity by changing the active site\'s shape; decreases Vmax but Km is unchanged' },
  { question: 'Define: Feedback inhibition', answer: 'The end product of a metabolic pathway inhibits an early enzyme in the pathway, preventing overproduction (e.g., isoleucine inhibiting threonine deaminase)' },
  { question: 'Define: Cofactors and coenzymes', answer: 'Non-protein helpers required for enzyme function; cofactors are inorganic ions (Zn²⁺, Fe²⁺); coenzymes are organic molecules (NAD⁺, vitamins)' },
  { question: 'What is Regulation of Enzyme Activity?', answer: 'Regulation of Enzyme Activity controls metabolic pathways through allosteric regulation, competitive and noncompetitive inhibition, and feedback inhibition.' },
  { question: 'Why is Regulation of Enzyme Activity important?', answer: 'Allosteric regulators bind to sites other than the active site, changing the enzyme\'s conformation to activate or inhibit it.' },
  { question: 'Give a real-world example of Regulation of Enzyme Activity', answer: 'Aspirin acting as an irreversible inhibitor of cyclooxygenase (COX), blocking prostaglandin synthesis and reducing pain, inflammation, and blood clotting' },
