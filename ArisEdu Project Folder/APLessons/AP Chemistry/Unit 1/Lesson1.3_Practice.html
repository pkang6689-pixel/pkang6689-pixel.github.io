  { question: 'Define: Ionization energy (IE)', answer: 'The energy required to remove the highest-energy electron from a gaseous atom; increases across a period and up a group' },
  { question: 'Define: Electronegativity', answer: 'A measure of an atom\'s ability to attract shared electrons in a covalent bond; Pauling scale—F is the highest at 4.0' },
  { question: 'Define: Electron affinity', answer: 'The energy change when a gaseous atom gains an electron; halogens have the most negative (exothermic) electron affinities' },
  { question: 'Define: Atomic radius', answer: 'The distance from the nucleus to the outermost electron shell; decreases across a period (more Zeff), increases down a group (more shells)' },
  { question: 'What is Periodic Table Trends?', answer: 'Periodic Table Trends arise from systematic changes in electron configuration across periods and groups.' },
  { question: 'Why is Periodic Table Trends important?', answer: 'Atomic radius decreases left to right (increasing Zeff) and increases top to bottom (more electron shells).' },
  { question: 'Give a real-world example of Periodic Table Trends', answer: 'Lithium-ion batteries exploiting Li\'s small atomic radius and low ionization energy for high energy density in lightweight portable electronics' },
  { question: 'How is Periodic Table Trends applied in practice?', answer: 'Fluorine\'s extreme electronegativity making it the most reactive nonmetal, used in Teflon (PTFE) coatings and uranium enrichment (UF₆)' },
  { question: 'Describe a practical application of Periodic Table Trends', answer: 'Noble gas applications: helium in MRI superconducting magnets, argon as inert shielding gas in welding, neon in illuminated signs' },
