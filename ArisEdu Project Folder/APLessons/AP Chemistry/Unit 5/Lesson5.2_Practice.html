  { question: 'Define: Reaction order', answer: 'The exponent of a concentration term in the rate law; indicates how rate responds to concentration changes (0th, 1st, 2nd)' },
  { question: 'Define: Rate constant (k)', answer: 'The proportionality constant in the rate law; units depend on overall order; increases exponentially with temperature' },
  { question: 'Define: Integrated rate law', answer: 'Relates concentration to time: zero-order [A] = -kt + [A]₀; first-order ln[A] = -kt + ln[A]₀; second-order 1/[A] = kt + 1/[A]₀' },
  { question: 'Define: Half-life', answer: 'Time for [A] to decrease to half its initial value: t₁/₂ = [A]₀/2k (zero), 0.693/k (first, constant), 1/k[A]₀ (second)' },
  { question: 'What is Rate Laws and Reaction Order?', answer: 'Rate Laws and Reaction Order describe the mathematical relationship between reaction rate and reactant concentrations.' },
  { question: 'Why is Rate Laws and Reaction Order important?', answer: 'For aA + bB → products, rate = k[A]ᵐ[B]ⁿ, where m and n are reaction orders (determined experimentally, NOT from coefficients).' },
  { question: 'Give a real-world example of Rate Laws and Reaction Order', answer: 'Radioactive decay following first-order kinetics with constant half-life: carbon-14 (t₁/₂ = 5,730 years) used for archaeological dating' },
